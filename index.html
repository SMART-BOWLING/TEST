<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LUCKY STRIKE KH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        :root {
            --apple-bg: #ffffff;
            --apple-secondary: #f5f5f7;
            --apple-text: #1d1d1f;
            --apple-accent: #dc143c;
            --border-color: #d2d2d7;
            --row-hover: #f5f5f7;
            --col-hover: rgba(220, 20, 60, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- LOADING SCREEN (Minimalist) --- */
        #loadingScreen {
            position: fixed;
            inset: 0;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .fade-out { opacity: 0; pointer-events: none; }
        .spinner-minimal {
            width: 24px;
            height: 24px;
            border: 2px solid var(--apple-secondary);
            border-top-color: var(--apple-accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* --- LOGIN SECTION --- */
        #login-section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--apple-secondary);
        }
        #login-container {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        #login-container h2 { font-weight: 600; margin-bottom: 8px; letter-spacing: -0.5px; }
        .login-subtitle { color: #86868b; font-size: 14px; margin-bottom: 30px; }

        /* --- TABLE ARCHITECTURE --- */
        #main-content {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
            padding-top: env(safe-area-inset-top);
        }

        .table-wrapper {
            flex: 1;
            overflow: auto;
            position: relative;
            border-top: 1px solid var(--border-color);
        }

        table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
        }

        /* Headers & Sticky */
        th, td {
            height: 32px;
            padding: 0 8px;
            font-size: 12px;
            border-right: 1px solid var(--apple-secondary);
            border-bottom: 1px solid var(--apple-secondary);
            text-align: center;
            white-space: nowrap;
        }

        th {
            background: var(--apple-secondary);
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* Sticky Columns */
        td:nth-child(1), th:nth-child(1) {
            position: sticky;
            left: 0;
            z-index: 20;
            background: #fff;
            width: 50px;
            font-weight: 700;
            border-right: 2px solid var(--border-color);
        }
        td:nth-child(2), th:nth-child(2) {
            position: sticky;
            left: 50px;
            z-index: 19;
            background: #fff;
            width: 85px;
            border-right: 1px solid var(--border-color);
        }
        th:nth-child(1), th:nth-child(2) { background: var(--apple-secondary); z-index: 30; }

        /* Cells Branding */
        .active-cell {
            background-color: var(--apple-accent) !important;
            color: #fff !important;
            font-size: 10px;
        }
        
        /* Input & Controls */
        #date-picker {
            border: none;
            background: transparent;
            font-family: inherit;
            font-weight: 600;
            font-size: 12px;
            color: var(--apple-accent);
            cursor: pointer;
            outline: none;
        }

        /* Bottom Action Bar */
        .action-bar {
            padding: 12px 20px;
            display: flex;
            justify-content: flex-end;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-color);
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }
        .logout-btn {
            background: var(--apple-text);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .logout-btn:active { opacity: 0.7; }

        .toggle-btn {
            background: var(--apple-secondary);
            color: var(--apple-text);
            width: 18px;
            height: 18px;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            margin-left: 4px;
        }

        /* Hover States */
        tr:hover td { background-color: var(--row-hover); }
        .hover-col { background-color: var(--col-hover) !important; }

        .hidden-column { display: none !important; }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loadingScreen">
    <div class="spinner-minimal"></div>
</div>

<div id="login-section">
    <div id="login-container">
        <h2>LUCKY STRIKE</h2>
        <div class="login-subtitle">KH Dashboard</div>
        <div id="g_id_onload" data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
        <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
    </div>
</div>

<div id="main-content">
    <div class="table-wrapper">
        <table id="main-table">
            <thead>
                <tr id="letter-row">
                    <th style="color: var(--apple-accent)">LS</th>
                    <th><input type="date" id="date-picker"></th>
                </tr>
                <tr id="time-row">
                    <th>LANE</th>
                    <th id="overall-total">0h 0m</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
    
    <div class="action-bar">
        <button class="logout-btn" onclick="signOut()">Выйти</button>
    </div>
</div>

<script>
    // Весь ваш JS остается прежним, обновляем только логику отображения лоадера и скрытия секций
    // Важно: в JS функциях buildHeaders и buildBody CSS-классы сохранены.
    
    // ... (весь функциональный JS из вашего кода) ...
    
    // Маленькая правка для красоты вывода времени в JS:
    function formatMinutes(mins) { return `${Math.floor(mins/60)}ч ${mins%60}м`; }

    // Инициализация (адаптированная под новый стиль)
    function initTableEvents() {
        datePicker.addEventListener('change', loadData);
        // Эффект выделения колонки
        document.addEventListener('mouseover', function(e) {
            if(e.target.tagName === 'TD' || e.target.tagName === 'TH') {
                const ci = e.target.cellIndex;
                if(ci > 1) {
                    document.querySelectorAll('#main-table tr').forEach(r => {
                        if(r.children[ci]) r.children[ci].classList.add('hover-col');
                    });
                }
            }
        });
        document.addEventListener('mouseout', function(e) {
            document.querySelectorAll('.hover-col').forEach(el => el.classList.remove('hover-col'));
        });

        const today = new Date();
        datePicker.value = today.toISOString().split('T')[0];
        setTimeout(() => { toggleAll(true); loadData(); }, 200);
    }
    
    // Оставляем оригинальную логику скриптов...
    // (Скопируйте все функции: handleCredentialResponse, loadData, buildHeaders и т.д. из вашего кода)
</script>
</body>
</html>
