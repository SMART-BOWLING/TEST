<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>LUCKY STRIKE KH – Lane Data</title>
    
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>

    <style>
        :root {
            --apple-blue: #007AFF;
            --apple-green: #34C759;
            --apple-red: #FF3B30;
            --bg-main: #F5F5F7;
            --bg-card: #FFFFFF;
            --text-primary: #1D1D1F;
            --text-secondary: #86868B;
            --border: #D2D2D7;
            --lane-bg: #F2F2F7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* ЭКРАН ЗАГРУЗКИ */
        .loading-screen, .loader-container {
            position: fixed;
            inset: 0;
            background: #1D1D1F;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }
        .loader-container { z-index: 100000; display: none; }
        .loader-container.active { display: flex; }
        .loading-screen.fade-out { opacity: 0; pointer-events: none; }

        .logo-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .glow-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--apple-blue);
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* АВТОРИЗАЦИЯ */
        #login-section {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--bg-main);
        }
        #login-container {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        #login-container h2 { font-weight: 700; margin-bottom: 8px; }
        .login-subtitle { color: var(--text-secondary); margin-bottom: 30px; font-size: 14px; }

        /* ТАБЛИЦА */
        #main-content {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }
        .table-container {
            flex: 1;
            padding: 12px;
            overflow: hidden;
        }
        .table-wrapper {
            height: 100%;
            overflow: auto;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            position: relative;
        }

        table { border-collapse: separate; border-spacing: 0; width: 100%; }
        
        th, td {
            height: 36px;
            padding: 0 8px;
            font-size: 11px;
            border-bottom: 1px solid #F2F2F7;
            border-right: 1px solid #F2F2F7;
            text-align: center;
            white-space: nowrap;
        }

        /* Фиксация колонок */
        #main-table th:nth-child(1), #main-table td:nth-child(1) {
            position: sticky; left: 0; z-index: 10;
            background: var(--lane-bg); font-weight: 700;
            min-width: 45px; border-right: 2px solid var(--border);
        }
        #main-table th:nth-child(2), #main-table td:nth-child(2) {
            position: sticky; left: 45px; z-index: 9;
            background: var(--bg-card); font-weight: 600;
            color: var(--apple-blue); min-width: 75px;
            border-right: 2px solid var(--border);
        }

        /* Шапка времени */
        #time-row th {
            position: sticky; top: 0; z-index: 8;
            background: #FBFBFC; height: 44px;
        }
        .hour { font-weight: 700; font-size: 12px; }
        .minute { font-size: 9px; opacity: 0.5; }

        /* Стили ячеек */
        .active-cell {
            background-color: var(--apple-green) !important;
            color: white !important;
            font-size: 14px;
        }
        .inactive-icon { color: var(--apple-red); opacity: 0.2; font-size: 9px; }

        #date-picker {
            border: none;
            background: #E5E5EA;
            padding: 6px 8px;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 600;
            width: 100%;
        }

        .toggle-btn {
            background: var(--apple-blue);
            color: white;
            width: 18px;
            height: 18px;
            border-radius: 4px;
            display: inline-block;
            line-height: 18px;
            cursor: pointer;
        }

        .logout-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 99px;
            font-weight: 600;
            color: var(--apple-red);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        /* Hover эффекты */
        .hover-row { background-color: #FBFBFC !important; }
        .hover-col { background-color: rgba(0, 122, 255, 0.04) !important; }

        @media (max-width: 768px) {
            .table-container { padding: 8px; }
            th, td { height: 32px; font-size: 10px; }
        }
    </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
    <div class="logo-wrapper">
        <div class="glow-ring"></div>
        <img src="https://i.postimg.cc/wjGzSY92/1.png" alt="Logo" style="width: 60px;">
    </div>
</div>

<div class="loader-container" id="loader">
    <div class="logo-wrapper"><div class="glow-ring"></div></div>
</div>

<div id="login-section">
    <div id="login-container">
        <i class="fas fa-fingerprint" style="font-size: 40px; color: var(--apple-blue); margin-bottom: 20px;"></i>
        <h2>LUCKY STRIKE KH</h2>
        <div class="login-subtitle">Система мониторинга дорожек</div>
        <div id="g_id_onload" data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
        <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-text="signin_with" data-size="large"></div>
    </div>
</div>

<div id="main-content">
    <button class="logout-btn" onclick="signOut()">
        <i class="fas fa-power-off"></i> &nbsp;Выйти
    </button>
    
    <div class="table-container">
        <div class="table-wrapper">
            <table id="main-table">
                <thead>
                    <tr id="letter-row">
                        <th style="cursor:pointer;"><i class="fas fa-calendar-alt" style="color:var(--apple-blue)"></i></th>
                        <th><input type="date" id="date-picker"></th>
                    </tr>
                    <tr id="time-row">
                        <th>LANE</th>
                        <th id="overall-total">0h 0m</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const AUTH_SPREADSHEET_ID = '1-yiVdZYa6wJdupTiuiHvI_ht3Vu73RUjyCehZqs2cJ4';
    const AUTH_SHEET_NAME = '1';
    const AUTH_API_KEY = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';
    const CURRENT_SITE = window.location.href.split('?')[0].split('#')[0];
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbwJcg8Ov4_-ijxTLQxJDjm2-IKCmI8l0AAsDo4sMeU-avSQp3F_E54gyB7f26z_KaE0FA/exec';

    let currentUser = null;
    let isLoadingData = false;
    let fetchControllers = new Map();

    const totalMinutes = 1440, groupInterval = 15, groupSize = 14;
    let allGroups = [], allDataCells = [];

    const letterRow = document.getElementById('letter-row');
    const timeRow = document.getElementById('time-row');
    const overallTotal = document.getElementById('overall-total');
    const tableBody = document.getElementById('table-body');
    const datePicker = document.getElementById('date-picker');

    // --- AUTH LOGIC ---
    function showLoaderUI(show) {
        document.getElementById('loader').classList.toggle('active', show);
    }

    function parseJwt(token) {
        try {
            return JSON.parse(decodeURIComponent(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
        } catch(e) { return {}; }
    }

    async function checkEmailInSheet(email) {
        try {
            await gapi.client.init({ apiKey: AUTH_API_KEY, discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'] });
            const response = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId: AUTH_SPREADSHEET_ID, range: `${AUTH_SHEET_NAME}!A:Z` });
            const rows = response.result.values;
            let hasAccess = rows?.some(row => row[0]?.toLowerCase().trim() === email && row.some(cell => cell?.includes(CURRENT_SITE) || cell?.includes('SMB-LS-KH')));
            
            if (hasAccess) loginUser(currentUser);
            else { alert('Доступ ограничен'); showLoaderUI(false); }
        } catch(e) { alert('Ошибка проверки прав'); showLoaderUI(false); }
    }

    function loginUser(user) {
        localStorage.setItem('userLoggedIn', 'true');
        localStorage.setItem('userEmail', user.email);
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('main-content').style.display = 'flex';
        document.getElementById('loadingScreen').classList.add('fade-out');
        initializeTableApp();
    }

    function handleCredentialResponse(response) {
        const payload = parseJwt(response.credential);
        currentUser = { email: payload.email.toLowerCase().trim(), name: payload.name };
        showLoaderUI(true);
        gapi.load('client', () => checkEmailInSheet(currentUser.email));
    }

    function signOut() {
        localStorage.clear();
        location.reload();
    }

    // --- TABLE LOGIC ---
    function formatMinutes(mins) { return `${Math.floor(mins/60)}ч ${mins%60}м`; }

    function toggleGroup(idxs) {
        idxs.forEach(i => {
            [timeRow, letterRow].forEach(row => row.children[i+2]?.classList.toggle('hidden-column'));
            tableBody.querySelectorAll('tr').forEach(tr => tr.children[i+2]?.classList.toggle('hidden-column'));
        });
    }

    function buildHeaders() {
        const fragL = document.createDocumentFragment(), fragT = document.createDocumentFragment();
        for(let i=0; i<totalMinutes; i++) {
            const thL = document.createElement('th'); fragL.appendChild(thL);
            const h = Math.floor(i/60), m = i%60;
            const thT = document.createElement('th');
            thT.innerHTML = `<div><div class="hour">${String(h).padStart(2,'0')}</div><div class="minute">${String(m).padStart(2,'0')}</div></div>`;
            fragT.appendChild(thT);

            if(i % groupInterval === 0) {
                const idxs = Array.from({length: groupSize}, (_, j) => i + j + 1).filter(j => j < totalMinutes);
                const btn = document.createElement('div');
                btn.className = 'toggle-btn'; btn.textContent = '+';
                btn.onclick = (e) => {
                    toggleGroup(idxs);
                    btn.textContent = timeRow.children[idxs[0]+2].classList.contains('hidden-column') ? '+' : '–';
                };
                thL.appendChild(btn);
            }
        }
        letterRow.appendChild(fragL);
        timeRow.appendChild(fragT);
    }

    function buildBody() {
        const frag = document.createDocumentFragment();
        for(let lane=0; lane<16; lane++) {
            const tr = document.createElement('tr');
            const thLane = document.createElement('th'); thLane.textContent = lane+1; tr.appendChild(thLane);
            const thCount = document.createElement('th'); tr.appendChild(thCount);
            const cells = [];
            for(let i=0; i<totalMinutes; i++) { 
                const td = document.createElement('td'); 
                tr.appendChild(td); 
                cells.push(td); 
            }
            frag.appendChild(tr);
            allDataCells.push({ header: thCount, cells });
        }
        tableBody.appendChild(frag);
    }

    async function loadData() {
        if(!datePicker.value || isLoadingData) return;
        isLoadingData = true;
        let sumAll = 0;
        const selectedDate = datePicker.value;

        const promises = allDataCells.map(async (row, idx) => {
            try {
                const resp = await fetch(`${BACKEND_URL}?action=getData&index=${idx}&date=${selectedDate}&t=${Date.now()}`);
                const data = await resp.json();
                let sum = 0;
                row.cells.forEach((cell, i) => {
                    const time = `${String(Math.floor(i/60)).padStart(2,'0')}:${String(i%60).padStart(2,'0')}`;
                    cell.className = '';
                    if(data.c?.includes(time)) { 
                        cell.classList.add('active-cell'); cell.innerHTML = '●'; sum++; 
                    } else if(data.b?.includes(time)) {
                        cell.innerHTML = '';
                    } else {
                        cell.innerHTML = '<span class="inactive-icon">✕</span>';
                    }
                });
                row.header.textContent = formatMinutes(sum);
                sumAll += sum;
            } catch(e) { console.error(e); }
        });

        await Promise.all(promises);
        overallTotal.textContent = formatMinutes(sumAll);
        isLoadingData = false;
    }

    function initializeTableApp() {
        buildHeaders();
        buildBody();
        datePicker.valueAsDate = new Date();
        datePicker.onchange = loadData;
        
        // Эмуляция скрытия групп для компактности при старте
        setTimeout(() => {
            document.querySelectorAll('.toggle-btn').forEach(b => b.click());
            loadData();
        }, 300);
    }

    window.onload = () => {
        if(localStorage.getItem('userLoggedIn')) {
            currentUser = { email: localStorage.getItem('userEmail') };
            loginUser(currentUser);
        } else {
            document.getElementById('login-section').style.display = 'flex';
            document.getElementById('loadingScreen').classList.add('fade-out');
        }
    };
</script>
</body>
</html>
