        async function initAndCheckEmail() {
            try {
                await loadSheetsAPI();
                await gapi.client.init({
                    apiKey: AUTH_API_KEY,
                    discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
                });
                
                await checkEmailInSheet(currentUser.email);
                
            } catch (error) {
                console.error('Ошибка инициализации:', error);
                showLoading(false);
                alert('Ошибка инициализации Google API');
            }
        }

        async function checkEmailInSheet(email) {
            try {
                const response = await gapi.client.sheets.spreadsheets.values.get({
                    spreadsheetId: AUTH_SPREADSHEET_ID,
                    range: `${AUTH_SHEET_NAME}!A:Z`,
                });
                
                const rows = response.result.values;
                if (!rows || rows.length === 0) {
                    showLoading(false);
                    alert('Таблица пуста');
                    return;
                }
                
                let hasAccess = false;
                
                for (let i = 0; i < rows.length; i++) {
                    if (!rows[i]?.[0]) continue;
                    
                    const rowEmail = rows[i][0].toLowerCase().trim();
                    if (rowEmail === email) {
                        for (let j = 1; j < rows[i].length; j++) {
                            const siteUrl = rows[i][j]?.trim().split('?')[0].split('#')[0] || '';
                            if (siteUrl === CURRENT_SITE || siteUrl.includes('SMB-LS-KH')) {
                                hasAccess = true;
                                break;
                            }
                        }
                        break;
                    }
                }
                
                if (hasAccess) {
                    loginUser(currentUser);
                } else {
                    showLoading(false);
                    alert('Доступ запрещен');
                }
                
            } catch (error) {
                console.error('Ошибка доступа к таблице:', error);
                showLoading(false);
                alert('Ошибка доступа к таблице');
            }
        }

        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                console.error('Ошибка парсинга JWT:', e);
                return {};
            }
        }

        // ===== ОСНОВНЫЕ ФУНКЦИИ ПРИЛОЖЕНИЯ =====
        function convertGoogleDriveLink(driveLink) {
            if (!driveLink) return null;
            
            if (driveLink.includes('drive.google.com/file/d/')) {
                const match = driveLink.match(/\/d\/([^\/]+)/);
                if (match && match[1]) {
                    return `https://drive.google.com/uc?export=view&id=${match[1]}`;
                }
            }
            
            if (driveLink.includes('uc?export=view')) {
                return driveLink;
            }
            
            return null;
        }

        function openDriveLink(driveLink) {
            if (!driveLink) return;
            
            const viewLink = convertGoogleDriveLink(driveLink);
            if (viewLink) {
                window.open(viewLink, '_blank');
            } else {
                window.open(driveLink, '_blank');
            }
        }

        async function makeRequest(url, options = {}) {
            try {
                if (!options.method || options.method === 'GET') {
                    const separator = url.includes('?') ? '&' : '?';
                    url = `${url}${separator}_=${Date.now()}`;
                }
                
                const response = await fetch(url, options);
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Ошибка запроса:', error);
                throw error;
            }
        }

        function goToPage(type, pageNumber) {
            if (type === 'journal') {
                if (pageNumber >= 1 && pageNumber <= totalJournalPages && pageNumber !== currentJournalPage) {
                    currentJournalPage = pageNumber;
                    renderJournalCards(journalData);
                    updatePagination('journal', currentJournalPage, totalJournalPages);
                }
            } else if (type === 'tasks') {
                if (pageNumber >= 1 && pageNumber <= totalTasksPages && pageNumber !== currentTasksPage) {
                    currentTasksPage = pageNumber;
                    renderTasksCards(tasksData);
                    updatePagination('tasks', currentTasksPage, totalTasksPages);
                }
            }
        }

        function updatePagination(type, currentPage, totalPages) {
            const pagination = document.getElementById(`${type}-pagination`);
            const currentPageSpan = document.getElementById(`${type}-current-page`);
            const totalPagesSpan = document.getElementById(`${type}-total-pages`);
            const firstBtn = pagination.querySelector('.first-btn');
            const prevBtn = pagination.querySelector('.prev-btn');
            const nextBtn = pagination.querySelector('.next-btn');
            const lastBtn = pagination.querySelector('.last-btn');
            
            currentPageSpan.textContent = currentPage;
            totalPagesSpan.textContent = totalPages;
            
            firstBtn.disabled = currentPage === 1;
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages;
            lastBtn.disabled = currentPage === totalPages;
            
            lastBtn.onclick = function() {
                goToPage(type, totalPages);
            };
            
            pagination.style.display = totalPages > 1 ? 'flex' : 'none';
        }

        function changePage(type, direction) {
            if (type === 'journal') {
                const newPage = currentJournalPage + direction;
                goToPage('journal', newPage);
            } else if (type === 'tasks') {
                const newPage = currentTasksPage + direction;
                goToPage('tasks', newPage);
            }
        }

        function getCurrentPageData(data, currentPage) {
            const startIndex = (currentPage - 1) * CARDS_PER_PAGE;
            const endIndex = startIndex + CARDS_PER_PAGE;
            return data.slice(startIndex, endIndex);
        }

                        filterJournalByDate(formattedDate);
                    }
                },

        function extractUniqueDatesFromJournal(journalData) {
            const dates = new Set();
            
            if (journalData && journalData.length > 0) {
                journalData.forEach(task => {
                    if (task.completedDate && task.completedDate.trim() !== '' && task.completedDate !== '-') {
                        dates.add(task.completedDate);
                    }
                });
            }
            
            return Array.from(dates).sort((a, b) => {
                // Сортируем даты в формате DD.MM.YYYY
                const [dayA, monthA, yearA] = a.split('.').map(Number);
                const [dayB, monthB, yearB] = b.split('.').map(Number);
                
                if (yearA !== yearB) return yearB - yearA;
                if (monthA !== monthB) return monthB - monthA;
                return dayB - dayA;
            });
        }

        // Функция для подсчета выполненных задач по дате
        function countCompletedTasksByDate(date, journalData) {
            if (!date || !journalData) return 0;
            
            return journalData.filter(task => {
                return task.completedDate === date && task.isCompleted;
            }).length;
        }

        // Функция для подсчета всех задач по дате (выполненных и невыполненных)
        function countAllTasksByDate(date, journalData) {
            if (!date || !journalData) return 0;
            
            return journalData.filter(task => {
                return task.completedDate === date;
            }).length;
        }

        function filterJournalByDate(date) {
            if (!date || date === '') {
                // Сброс фильтра
                isFilterActive = false;
                currentFilterDate = '';
                journalData = originalJournalData ? [...originalJournalData] : [];
                
                // Обновляем отображение
                currentJournalPage = 1;
                renderJournalCards(journalData);
                updateCounterLabel();
                
                // Обновляем поле ввода
                const dateInput = document.getElementById('date-filter-input');
                if (dateInput) {
                    dateInput.value = '';
                }
                
                return;
            }
            
            // Применяем фильтр
            isFilterActive = true;
            currentFilterDate = date;
            
            const filteredData = originalJournalData.filter(task => {
                return task.completedDate === date;
            });
            
            journalData = filteredData;
            
            // Обновляем отображение
            currentJournalPage = 1;
            renderJournalCards(journalData);
            
            // Обновляем счетчик с количеством всех задач за эту дату
            updateCounterLabel();
        }

        function updateCounterLabel() {
            const openTasksCounter = document.getElementById('open-tasks-counter');
            const labelSpan = openTasksCounter.querySelector('.label');
            const countSpan = openTasksCounter.querySelector('.count');
            
            if (isFilterActive && currentFilterDate) {
                // Показываем количество всех задач за выбранную дату (и выполненных, и невыполненных)
                const allTasksCount = countAllTasksByDate(currentFilterDate, originalJournalData);
                labelSpan.innerHTML = `Выполненные задачи за дату: ${currentFilterDate}`;
                countSpan.textContent = allTasksCount;
                // Оставляем красный цвет фона как было изначально
                countSpan.style.backgroundColor = '#dc143c';
            } else {
                // Показываем количество открытых (незавершенных) задач
                let openTasksCount = 0;
                if (journalData && journalData.length > 0) {
                    openTasksCount = journalData.filter(task => !task.isCompleted).length;
                }
                labelSpan.innerHTML = 'КОЛИЧЕСТВО НЕВЫПОЛНЕННЫХ ЗАДАЧ:';
                countSpan.textContent = openTasksCount;
                countSpan.style.backgroundColor = '#dc143c'; // Красный цвет для открытых задач
            }
        }

        function clearDateFilter() {
            const dateInput = document.getElementById('date-filter-input');
            if (dateInput) {
                dateInput.value = '';
            }
            filterJournalByDate('');
        }

        // Новая функция для фильтрации задач по названию
        function filterTasksByTitle(tasks, keywords) {
            if (!tasks || tasks.length === 0) return [];
            return tasks.filter(task => {
                const title = task.task ? task.task.toLowerCase() : '';
                return keywords.some(keyword => title.includes(keyword.toLowerCase()));
            });
        }

        async function loadTasks() {
            try {
                if (tasksData && !isInitialLoad) {
                    renderTasksCards(tasksData);
                    return;
                }
                
                // Очищаем контейнер перед загрузкой
                const tasksCards = document.getElementById('tasks-cards');
                tasksCards.innerHTML = '';
                
                const tasks = await makeRequest(`${BACKEND_URL}?action=getTasks`);
                originalTasksData = tasks; // Сохраняем оригинальные данные
                
                // Фильтруем задачи по ключевым словам "ИНСТ"
                const filteredTasks = filterTasksByTitle(originalTasksData, ['ИНСТ', 'инст']);
                tasksData = filteredTasks;
                
                // Сначала рендерим карточки
                renderTasksCards(filteredTasks);
                
            } catch (error) {
                console.error('Ошибка загрузки задач:', error);
                const tasksCards = document.getElementById('tasks-cards');
                tasksCards.innerHTML = `
                    <div class="task-card error">
                        Ошибка загрузки: ${error.message}
                    </div>
                `;
                // Уведомления отключены
            }
        }

        async function loadJournal() {
            try {
                if (journalData && !isInitialLoad) {
                    renderJournalCards(journalData);
                    return;
                }
                
                // Очищаем контейнер перед загрузкой
                const journalCards = document.getElementById('journal-cards');
                journalCards.innerHTML = '';
                
                const journal = await makeRequest(`${BACKEND_URL}?action=getJournal`);
                
                // Сохраняем оригинальные данные
                originalJournalData = [...journal];
                
                // Фильтруем журнал по ключевым словам "PS" или "МЕХ"
                const filteredJournal = filterTasksByTitle(originalJournalData, ['PS', 'МЕХ', 'ps', 'мех']);
                journalData = [...filteredJournal];
                
                // Извлекаем уникальные даты выполнения
                uniqueDates = extractUniqueDatesFromJournal(journalData);
                
                // Сначала рендерим карточки
                renderJournalCards(journalData);
                
                // Обновляем счетчик при загрузке
                updateCounterLabel();
                
            } catch (error) {
                console.error('Ошибка загрузки журнала:', error);
                const journalCards = document.getElementById('journal-cards');
                journalCards.innerHTML = `
                    <div class="task-card error">
                        Ошибка загрузки: ${error.message}
                    </div>
                `;
                // Уведомления отключены
            }
        }

        async function completeTask(taskId, executor, rowIndex) {
            showLoader();
            
            try {
                const updateUrl = `${BACKEND_URL}?action=updateCell&sheetName=B&column=E&row=${rowIndex}&value=${encodeURIComponent(executor)}`;
                const result = await makeRequest(updateUrl);
                
                if (result.success) {
                    const immediateUpdateResult = await makeRequest(`${BACKEND_URL}?action=updateFromRowNumber&rowNumber=${rowIndex}`);
                    
                    if (immediateUpdateResult === 'SUCCESS') {
                        // Уведомления отключены
                        
                        const card = document.querySelector(`[data-task-id="${taskId}"]`);
                        if (card) {
                            const submitBtn = card.querySelector('.submit-btn');
                            if (submitBtn) {
                                const submittedText = document.createElement('div');
                                submittedText.className = 'submitted-text';
                                submittedText.innerHTML = '<i class="fas fa-check-circle"></i>ОТПРАВЛЕНО';
                                submitBtn.parentNode.replaceChild(submittedText, submitBtn);
                            }
                            
                            const select = card.querySelector('.executor-select');
                            if (select) {
                                const executorName = document.createElement('span');
                                executorName.className = 'row-value';
                                executorName.textContent = executor;
                                select.parentNode.replaceChild(executorName, select);
                            }
                        }
                        
                        // Сбрасываем кэшированные данные
                        journalData = null;
                        originalJournalData = null;
                        tasksData = null;
                        originalTasksData = null;
                        isFilterActive = false;
                        currentFilterDate = '';
                        
                        // Обновляем интерфейс
                        updateCounterLabel();
                        
                        // Закрываем фильтр
                        const dateFilterContainer = document.getElementById('date-filter-container');
                        dateFilterContainer.classList.remove('show');
                        
                        // Загружаем новые данные и скрываем загрузчик только после полной отрисовки
                        await Promise.all([
                            loadJournal(),
                            loadTasks()
                        ]);
                        
                        hideLoader();
                    } else {
                        // Уведомления отключены
                        
                        // Сбрасываем кэшированные данные
                        journalData = null;
                        originalJournalData = null;
                        tasksData = null;
                        originalTasksData = null;
                        isFilterActive = false;
                        currentFilterDate = '';
                        
                        // Обновляем интерфейс
                        updateCounterLabel();
                        
                        // Закрываем фильтр
                        const dateFilterContainer = document.getElementById('date-filter-container');
                        dateFilterContainer.classList.remove('show');
                        
                        // Загружаем новые данные и скрываем загрузчик только после полной отрисовки
                        await Promise.all([
                            loadJournal(),
                            loadTasks()
                        ]);
                        
                        hideLoader();
                    }
                } else {
                    hideLoader();
                    // Уведомления отключены
                }
            } catch (error) {
                console.error('Ошибка выполнения задачи:', error);
                hideLoader();
                // Уведомления отключены
            }
        }

        function renderTasksCards(tasks) {
            const tasksCards = document.getElementById('tasks-cards');
            
            if (!tasks || tasks.length === 0) {
                tasksCards.innerHTML = `
                    <div class="task-card">
                        <div class="loading-container">
                            <div class="loading-card-text">Нет задач</div>
                        </div>
                    </div>
                `;
                updatePagination('tasks', 1, 1);
                return;
            }
            
            totalTasksPages = Math.ceil(tasks.length / CARDS_PER_PAGE);
            if (currentTasksPage > totalTasksPages) {
                currentTasksPage = 1;
            }
            
            const currentTasks = getCurrentPageData(tasks, currentTasksPage);
            
            tasksCards.innerHTML = currentTasks.map(task => {
                let statusClass = 'success';
                if (task.daysLeft <= 0) {
                    statusClass = 'danger';
                } else if (task.daysLeft <= 2) {
                    statusClass = 'warning';
                }
                
                const hasLink = task.driveLink && task.driveLink.trim() !== '';
                
                return `
                    <div class="task-card catalog-task">
                        <div class="task-header">
                            <div class="task-title">${task.task}</div>
                        </div>
                        
                        <div class="card-content">
                            <div class="content-row">
                                <span class="row-label">Последнее выполнение:</span>
                                <span class="row-value">${task.lastDate || '-'}</span>
                            </div>
                            <div class="content-row">
                                <span class="row-label">Прошло дней:</span>
                                <span class="row-value">${task.daysPassed}</span>
                            </div>
                            <div class="content-row">
                                <span class="row-label">Интервал:</span>
                                <span class="row-value">${task.frequency} дн.</span>
                            </div>
                            <div class="content-row">
                                <span class="row-label">Остаток дней:</span>
                                <span class="row-value">
                                    <span class="status-badge ${statusClass}">${task.daysLeft}</span>
                                </span>
                            </div>
                            <div class="content-row">
                                <span class="row-label">Следующее выполнение:</span>
                                <span class="row-value">${task.nextDate || '-'}</span>
                            </div>
                        </div>
                        
                        <div class="catalog-buttons-container">
                            <div class="catalog-button-wrapper">
                                ${hasLink 
                                    ? `<a href="#" onclick="openDriveLink('${task.driveLink}')" class="open-button">
                                        <i class="fas fa-file-alt"></i>ОТКРЫТЬ ЗАДАЧУ
                                      </a>`
                                    : '<div class="no-open">Недоступно</div>'
                                }
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            updatePagination('tasks', currentTasksPage, totalTasksPages);
        }

        function renderJournalCards(journal) {

            if (!journal || journal.length === 0) {

                            <div class="loading-card-text">Нет данных</div>
                        </div>
                    </div>
                `;
                
                updatePagination('journal', 1, 1);
                return;
            }
            
            // Обновляем счетчик
            updateCounterLabel();
            
            // НЕ СОРТИРУЕМ ДАННЫЕ! Сохраняем порядок из Google Таблицы
            const sortedJournal = [...journal];
            
            totalJournalPages = Math.ceil(sortedJournal.length / CARDS_PER_PAGE);
            if (currentJournalPage > totalJournalPages) {
                currentJournalPage = 1;
            }
            
            const currentJournal = getCurrentPageData(sortedJournal, currentJournalPage);
            
            let html = '';
            
            currentJournal.forEach((task, index) => {
                const rowIndex = task.rowIndex || (index + 2);
                const hasLink = task.driveLink && task.driveLink.trim() !== '';
                const taskId = task.id || task.driveLink || '';
                
                if (!task.isCompleted) {
                    html += `
                        <div class="task-card pending" data-task-id="${taskId}" data-row-index="${rowIndex}">
                            <div class="task-header">
                                <div class="task-title">${task.task}</div>
                            </div>
                            
                            <div class="card-content">
                                <div class="content-row">
                                    <span class="row-label">Дата появления:</span>
                                    <span class="row-value">${task.createdDate}</span>
                                </div>
                                <div class="content-row">
                                    <span class="row-label">Дата выполнения:</span>
                                    <span class="row-value">${task.completedDate || '-'}</span>
                                </div>
                                <div class="content-row">
                                    <span class="row-label">Выполнил:</span>
                                    <span class="row-value">
                                        <select class="executor-select" id="executor-${taskId}">
                                            <option value="" selected disabled></option>
                                            <option value="Вадим">Вадим</option>
                                            <option value="Гена">Гена</option>
                                            <option value="Саша">Саша</option>
                                            <option value="Данил">Данил</option>
                                        </select>
                                    </span>
                                </div>
                            </div>
                            
                            <div class="buttons-container">
                                ${hasLink 
                                    ? `<a href="#" onclick="openDriveLink('${task.driveLink}')" class="schema-button">
                                        <i class="fas fa-file-alt"></i>ОТКРЫТЬ ЗАДАЧУ
                                      </a>`
                                    : '<div class="no-open">Недоступно</div>'
                                }
                                <button class="submit-btn" onclick="submitTask(event, '${taskId}', ${rowIndex})" disabled>
                                    <i class="fas fa-paper-plane"></i>ОТПРАВИТЬ
                                </button>
                            </div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="task-card completed">
                            <div class="task-header">
                                <div class="task-title">${task.task}</div>
                            </div>
                            
                            <div class="card-content">
                                <div class="content-row">
                                    <span class="row-label">Дата появления:</span>
                                    <span class="row-value">${task.createdDate}</span>
                                </div>
                                <div class="content-row">
                                    <span class="row-label">Дата выполнения:</span>
                                    <span class="row-value">${task.completedDate}</span>
                                </div>
                                <div class="content-row">
                                    <span class="row-label">Выполнил:</span>
                                    <span class="row-value">${task.executor}</span>
                                </div>
                            </div>
                            
                            <div class="buttons-container">
                                ${hasLink 
                                    ? `<a href="#" onclick="openDriveLink('${task.driveLink}')" class="schema-button">
                                        <i class="fas fa-file-alt"></i>ОТКРЫТЬ ЗАДАЧУ
                                      </a>`
                                    : '<div class="no-open">Недоступно</div>'
                                }
                                <div class="submitted-text">
                                    <i class="fas fa-check-circle"></i>ОТПРАВЛЕНО
                                </div>
                            </div>
                        </div>
                    `;
                }
            });
            
            journalCards.innerHTML = html;
            
            document.querySelectorAll('.executor-select').forEach(select => {
                select.addEventListener('change', function() {
                    const card = this.closest('.task-card');
                    const submitBtn = card.querySelector('.submit-btn');
                    if (submitBtn) {
                        submitBtn.disabled = !this.value || this.value === '';
                    }
                    event.stopPropagation();
                });
                
                select.addEventListener('click', function(event) {
                    event.stopPropagation();
                });
            });
            
            updatePagination('journal', currentJournalPage, totalJournalPages);
        }

        function submitTask(event, taskId, rowIndex) {
            const button = event.currentTarget;
            const card = button.closest('.task-card');
            
            if (!card) {
                // Уведомления отключены
                return;
            }
            
            const select = card.querySelector('.executor-select');
            
            if (!select) {
                // Уведомления отключены
                return;
            }
            
            if (!select.value || select.value === '' || select.value === 'Выберите исполнителя') {
                // Уведомления отключены
                return;
            }
            
            completeTask(taskId, select.value, rowIndex);
            event.stopPropagation();
        }

        function initializeApp() {
            console.log('Инициализация приложения после авторизации');
            
            let lastTouchEnd = 0;
            
            document.addEventListener('touchend', function(event) {
                const now = (new Date()).getTime();
                if (now - lastTouchEnd <= 300) {
                    event.preventDefault();
                }
                lastTouchEnd = now;
            }, false);
            
            document.addEventListener('click', function(e) {
                const userDropdown = document.getElementById('userDropdown');
                const dateFilterContainer = document.getElementById('date-filter-container');
                
                // Удалена проверка для siteNameDropdown
                
                if (!e.target.closest('.user-avatar') && userDropdown.style.display === 'block') {
                    userDropdown.style.display = 'none';
                }
                
                // Закрываем фильтр при клике вне его области
                if (!e.target.closest('#open-tasks-counter') && 
                    !e.target.closest('#date-filter-container') && 
                    dateFilterContainer.classList.contains('show')) {
                    dateFilterContainer.classList.remove('show');
                }
            });
            
            showLoader();
            
            const tabButtons = document.querySelectorAll('.tab-btn');
            const tabContents = document.querySelectorAll('.tab-content');
            
            // Обработчик для открытия фильтра по дате
            document.getElementById('open-tasks-counter').addEventListener('click', toggleDateFilter);
            
            // Обработчик для кнопки сброса фильтра
            document.getElementById('clear-filter-btn').addEventListener('click', clearDateFilter);
            
            // iPhone-specific: предотвращаем проблемы с вводом на iOS
            const dateInput = document.getElementById('date-filter-input');
            if (dateInput && /iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                dateInput.addEventListener('focus', function() {
                    this.style.fontSize = '16px'; // Предотвращает автоматический zoom в iOS
                });
                
                dateInput.addEventListener('blur', function() {
                    this.style.fontSize = '';
                });
            }
            
            // Загружаем данные и скрываем загрузчик только после полной отрисовки
            Promise.all([
                loadJournal(),
                loadTasks()
            ]).then(() => {
                // Небольшая задержка для завершения всех операций рендеринга
                setTimeout(() => {
                    hideLoader();
                }, 100);
            }).catch(error => {
                console.error('Ошибка загрузки:', error);
                hideLoader();
            });
            
            tabButtons.forEach(button => {
                button.addEventListener('click', () => {
                    tabButtons.forEach(btn => btn.classList.remove('active'));
                    tabContents.forEach(content => content.classList.remove('active'));
                    
                    button.classList.add('active');
                    
                    const tabId = button.getAttribute('data-tab');
                    document.getElementById(tabId).classList.add('active');
                    
                    if (tabId === 'tab2') {
                        currentTasksPage = 1;
                        loadTasks(); // loadTasks теперь применяет фильтр "ИНСТ"
                    } else if (tabId === 'tab1') {
                        currentJournalPage = 1;
                        loadJournal(); // loadJournal теперь применяет фильтр "PS" или "МЕХ"
                    }
                });
            });

            setInterval(() => {
                const activeTab = document.querySelector('.tab-content.active');
                if (activeTab && activeTab.id === 'tab2') {
                    loadTasks();
                } else if (activeTab && activeTab.id === 'tab1') {
                    loadJournal();
                }
            }, 30000);

            setTimeout(() => {
                isInitialLoad = false;
            }, 1000);

            document.addEventListener('click', function(e) {
                if (e.target.closest('.task-card')) {
                    const card = e.target.closest('.task-card');
                    
                    if (e.target.tagName === 'BUTTON' || 
                        e.target.tagName === 'SELECT' || 
                        e.target.tagName === 'OPTION' ||
                        e.target.tagName === 'A' ||
                        e.target.tagName === 'I') {
                        return;
                    }
                    
                    document.querySelectorAll('.task-card').forEach(c => {
                        c.classList.remove('selected');
                    });
                    
                    card.classList.add('selected');
                }
            });
            
            document.addEventListener('change', function(e) {
                if (e.target && e.target.classList.contains('executor-select')) {
                    const card = e.target.closest('.task-card');
                    const submitBtn = card.querySelector('.submit-btn');
                    if (submitBtn) {
                        submitBtn.disabled = !e.target.value || e.target.value === '';
                    }
                }
            });
        }

        window.addEventListener('load', function() {
            const isLoggedIn = localStorage.getItem('userLoggedIn') === 'true';
            const email = localStorage.getItem('userEmail');
            const name = localStorage.getItem('userName');
            const pic = localStorage.getItem('userPic');
            
            if (isLoggedIn && email) {
                loginSection.style.display = 'none';
                mainContent.style.display = 'block';
                
                currentUser = {
                    email: email,
                    name: name,
                    picture: pic
                };
                
                updateUserAvatar(currentUser);
                showLoading(true);
                
                loadSheetsAPI()
                    .then(() => gapi.client.init({
                        apiKey: AUTH_API_KEY,
                        discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
                    }))
                    .then(() => checkEmailInSheet(email))
                    .catch(() => {
                        signOut();
                    });
            } else {
                loginSection.style.display = 'flex';
                mainContent.style.display = 'none';
                
                setTimeout(() => {
                    loadingScreen.classList.add('fade-out');
                }, 500);
            }
        });

        window.onload = function() {
            if (google && google.accounts && google.accounts.id) {
                google.accounts.id.initialize({
                    client_id: '328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com',
                    callback: handleCredentialResponse
                });
                
                google.accounts.id.renderButton(
                    document.querySelector('.g_id_signin'),
                    { 
                        type: 'standard', 
                        shape: 'pill', 
                        theme: 'outline', 
                        text: 'signin_with', 
                        size: 'large',
                        logo_alignment: 'left'
                    }
                );
            }
        };
    </script>

    <!-- ИСПРАВЛЕНИЕ ДЛЯ КНОПОК -->
    <script>
        (function fixButtonsOnAllPages() {
            'use strict';
            
            // Сохраняем lastTouchEnd для всего документа
            let lastTouchEnd = 0;
            
            // Полностью переопределяем обработчик touch событий
            document.removeEventListener('touchend', document.touchEndHandler, false);
            
            document.addEventListener('touchend', function(event) {
                const target = event.target;
                
                // Проверяем все возможные интерактивные элементы
                const isInteractive = target.closest('button') || 
                                     target.closest('a') || 
                                     target.closest('select') || 
                                     target.closest('.submit-btn') || 
                                     target.closest('.open-button') || 
                                     target.closest('.schema-button') ||
                                     target.closest('.executor-select') ||
                                     target.closest('.page-btn') ||
                                     target.closest('.tab-btn') ||
                                     target.closest('.menu-button') ||
                                     target.closest('.site-name') ||
                                     target.closest('.clear-filter-btn') ||
                                     target.closest('#open-tasks-counter') ||
                                     target.closest('.user-avatar');
                
                // Для интерактивных элементов - разрешаем всё
                if (isInteractive) {
                    event.stopPropagation(); // Останавливаем всплытие
                    return true; // Разрешаем стандартное поведение
                }
                
                // Для остальных - предотвращаем двойное касание
                const now = Date.now();
                if (now - lastTouchEnd <= 300) {
                    event.preventDefault();
                }
                lastTouchEnd = now;
            }, { passive: false });
            
            // Принудительное восстановление обработчиков для кнопок
            function forceButtonHandlers() {
                // Для всех кнопок "открыть задачу" в реестре
                document.querySelectorAll('#tab1 .schema-button').forEach(btn => {
                    // Удаляем старые обработчики
                    btn.removeEventListener('click', handleOpenClick);
                    btn.removeEventListener('touchstart', handleTouchStart);
                    
                    // Добавляем новые
                    btn.addEventListener('touchstart', handleTouchStart, { passive: false });
                    btn.addEventListener('click', handleOpenClick);
                    
                    if (!btn.hasAttribute('data-handler-fixed')) {
                        btn.setAttribute('data-handler-fixed', 'true');
                    }
                });
                
                // Для всех кнопок "отправить" в реестре
                document.querySelectorAll('#tab1 .submit-btn').forEach(btn => {
                    btn.removeEventListener('click', handleSubmitClick);
                    btn.removeEventListener('touchstart', handleTouchStart);
                    
                    btn.addEventListener('touchstart', handleTouchStart, { passive: false });
                    btn.addEventListener('click', handleSubmitClick);
                    
                    if (!btn.hasAttribute('data-handler-fixed')) {
                        const card = btn.closest('.task-card');
                        if (card) {
                            const taskId = card.dataset.taskId;
                            const rowIndex = card.dataset.rowIndex;
                            if (taskId && rowIndex) {
                                btn.setAttribute('data-task-id', taskId);
                                btn.setAttribute('data-row-index', rowIndex);
                            }
                        }
                        btn.setAttribute('data-handler-fixed', 'true');
                    }
                });
                
                // Для всех кнопок "открыть задачу" в каталоге
                document.querySelectorAll('#tab2 .open-button').forEach(btn => {
                    btn.removeEventListener('click', handleCatalogOpenClick);
                    btn.removeEventListener('touchstart', handleTouchStart);
                    
                    btn.addEventListener('touchstart', handleTouchStart, { passive: false });
                    btn.addEventListener('click', handleCatalogOpenClick);
                    
                    if (!btn.hasAttribute('data-handler-fixed')) {
                        btn.setAttribute('data-handler-fixed', 'true');
                    }
                });
                
                // Для всех select
                document.querySelectorAll('.executor-select').forEach(select => {
                    select.removeEventListener('change', handleSelectChange);
                    select.removeEventListener('touchstart', handleTouchStart);
                    select.removeEventListener('click', handleSelectClick);
                    
                    select.addEventListener('touchstart', handleTouchStart, { passive: false });
                    select.addEventListener('click', handleSelectClick);
                    select.addEventListener('change', handleSelectChange);
                });
            }
            
            // Обработчики событий
            function handleTouchStart(e) {
                e.stopPropagation();
            }
            
            function handleOpenClick(e) {
                e.preventDefault();
                e.stopPropagation();
                
                const btn = e.currentTarget;
                const onclickAttr = btn.getAttribute('onclick');
                
                if (onclickAttr) {
                    try {
                        const match = onclickAttr.match(/'([^']+)'/);
                        if (match && match[1]) {
                            window.open(convertGoogleDriveLink(match[1]) || match[1], '_blank');
                        }
                    } catch (error) {
                        console.log('Ошибка открытия ссылки:', error);
                    }
                }
            }
            
            function handleSubmitClick(e) {
                e.preventDefault();
                e.stopPropagation();
                
                const btn = e.currentTarget;
                if (btn.disabled) return;
                
                const card = btn.closest('.task-card');
                if (!card) return;
                
                const select = card.querySelector('.executor-select');
                if (!select || !select.value) {
                    alert('Выберите исполнителя');
                    return;
                }
                
                const taskId = card.dataset.taskId || btn.dataset.taskId;
                const rowIndex = card.dataset.rowIndex || btn.dataset.rowIndex;
                
                if (taskId && rowIndex) {
                    completeTask(taskId, select.value, rowIndex);
                }
            }
            
            function handleCatalogOpenClick(e) {
                e.preventDefault();
                e.stopPropagation();
                
                const btn = e.currentTarget;
                const onclickAttr = btn.getAttribute('onclick');
                
                if (onclickAttr) {
                    try {
                        const match = onclickAttr.match(/'([^']+)'/);
                        if (match && match[1]) {
                            window.open(convertGoogleDriveLink(match[1]) || match[1], '_blank');
                        }
                    } catch (error) {
                        console.log('Ошибка открытия ссылки:', error);
                    }
                }
            }
            
            function handleSelectClick(e) {
                e.stopPropagation();
            }
            
            function handleSelectChange(e) {
                e.stopPropagation();
                const select = e.target;
                const card = select.closest('.task-card');
                if (card) {
                    const submitBtn = card.querySelector('.submit-btn');
                    if (submitBtn) {
                        submitBtn.disabled = !select.value;
                    }
                }
            }
            
            // Добавляем CSS для улучшения кликабельности
            const style = document.createElement('style');
            style.textContent = `
                .schema-button, .submit-btn, .open-button, .executor-select {
                    position: relative;
                    z-index: 9999 !important;
                    cursor: pointer !important;
                    pointer-events: auto !important;
                    touch-action: manipulation !important;
                    -webkit-tap-highlight-color: rgba(220,20,60,0.2) !important;
                }
                
                .task-card:active {
                    transform: none !important;
                }
                
                button, a, select, .schema-button, .submit-btn, .open-button, .user-avatar {
                    pointer-events: auto !important;
                    -webkit-user-select: none !important;
                    user-select: none !important;
                }
                
                .schema-button:active, .submit-btn:active:not(:disabled), 
                .open-button:active, .user-avatar:active {
                    opacity: 0.7;
                    transform: scale(0.98);
                }
                
                .executor-select {
                    background-color: #cccccc !important;
                    border: 2px solid #cccccc !important;
                    color: #666666 !important;
                    -webkit-appearance: menulist !important;
                    appearance: menulist !important;
                }
            `;
            document.head.appendChild(style);
            
            // Наблюдаем за изменениями в DOM и восстанавливаем обработчики
            const observer = new MutationObserver(function(mutations) {
                let needsUpdate = false;
                
                mutations.forEach(mutation => {
                    if (mutation.type === 'childList' && mutation.addedNodes.length > 0) {
                        needsUpdate = true;
                    }
                });
                
                if (needsUpdate) {
                    setTimeout(forceButtonHandlers, 50);
                    setTimeout(forceButtonHandlers, 150);
                }
            });
            
            // Наблюдаем за контейнерами с карточками
            const tab1 = document.getElementById('tab1');
            const tab2 = document.getElementById('tab2');
            
            if (tab1) observer.observe(tab1, { childList: true, subtree: true });
            if (tab2) observer.observe(tab2, { childList: true, subtree: true });
            
            // Запускаем восстановление при загрузке страницы
            document.addEventListener('DOMContentLoaded', function() {
                setTimeout(forceButtonHandlers, 100);
                setTimeout(forceButtonHandlers, 500);
                setTimeout(forceButtonHandlers, 1000);
            });
            
            // Переопределяем функции пагинации для автоматического восстановления
            const originalGoToPage = window.goToPage;
            window.goToPage = function(type, pageNumber) {
                originalGoToPage(type, pageNumber);
                setTimeout(forceButtonHandlers, 100);
            };
            
            const originalChangePage = window.changePage;
            window.changePage = function(type, direction) {
                originalChangePage(type, direction);
                setTimeout(forceButtonHandlers, 100);
            };
            
            console.log('Фикс кнопок установлен');
        })();
    </script>
