    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <script>
        // ===== КОНСТАНТЫ =====
        const AUTH_SPREADSHEET_ID = '1-yiVdZYa6wJdupTiuiHvI_ht3Vu73RUjyCehZqs2cJ4';
        const AUTH_SHEET_NAME = '1';
        const AUTH_API_KEY = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';
        const CURRENT_SITE = 'https://smart-bowling.github.io/SMB-LS-KH/';
        const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbyBiibLN40TjLDo1pz69ogyUgERUBhuCcmmkXDCgvS3fUGbt6ifyt_Lh9f3gg8yXZOA/exec';
        const CARDS_PER_PAGE = 6;

        let currentUser = null;
        let journalData = null, instructorData = null, engineerData = null;
        let originalJournalData = null;
        let currentJournalPage = 1, currentInstructorPage = 1, currentEngineerPage = 1;
        let totalJournalPages = 1, totalInstructorPages = 1, totalEngineerPages = 1;
        let isFilterActive = false, currentFilterDate = '', filterType = 'journal';
        let datePicker = null;
        let isInitialLoad = true;

        const loadingScreen = document.getElementById("loadingScreen");
        const loginSection = document.getElementById("login-section");
        const mainContent = document.getElementById("main-content");
        const loader = document.getElementById("loader");

        function toggleUserDropdown() { const menu = document.getElementById("userDropdown"); menu.style.display = menu.style.display === "block" ? "none" : "block"; }
        function updateUserAvatar(user) { const avatar = document.getElementById('userAvatar'); if (user?.picture) avatar.innerHTML = `<img src="${user.picture}" alt="Avatar">`; else avatar.innerHTML = '<i class="fas fa-user"></i>'; }
        function showLoader() { loader.classList.add('active'); }
        function hideLoader() { loader.classList.remove('active'); }

        function loadSheetsAPI() { return new Promise((resolve, reject) => { gapi.load('client', { callback: resolve, onerror: () => reject('Ошибка загрузки Google API'), timeout: 10000, ontimeout: () => reject('Таймаут') }); }); }

        function handleCredentialResponse(response) {
            try { const payload = parseJwt(response.credential); currentUser = { email: payload.email.toLowerCase().trim(), name: payload.name, picture: payload.picture }; showLoading(true); initAndCheckEmail(); } 
            catch(e) { console.error(e); showLoading(false); alert('Ошибка аутентификации'); }
        }

        function showLoading(show) { const loginDiv = document.getElementById('login-container'); if(show) { if(!loginDiv.hasAttribute('data-original')) loginDiv.setAttribute('data-original', loginDiv.innerHTML); loginDiv.innerHTML = '<div style="padding:40px;text-align:center;"><div class="loading-spinner"></div><br><span>Проверка доступа...</span></div>'; } else { if(loginDiv.getAttribute('data-original') && loginSection.style.display !== 'none') loginDiv.innerHTML = loginDiv.getAttribute('data-original'); } }

        async function initAndCheckEmail() { try { await loadSheetsAPI(); await gapi.client.init({ apiKey: AUTH_API_KEY, discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'] }); await checkEmailInSheet(currentUser.email); } catch(e) { console.error(e); showLoading(false); alert('Ошибка инициализации'); } }

        async function checkEmailInSheet(email) { try { const response = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId: AUTH_SPREADSHEET_ID, range: `${AUTH_SHEET_NAME}!A:Z` }); const rows = response.result.values; if(!rows || rows.length===0) { showLoading(false); alert('Таблица пуста'); return; } let hasAccess=false; for(let i=0;i<rows.length;i++) { if(!rows[i]?.[0]) continue; const rowEmail = rows[i][0].toLowerCase().trim(); if(rowEmail===email) { for(let j=1;j<rows[i].length;j++) { const siteUrl = rows[i][j]?.trim().split('?')[0].split('#')[0] || ''; if(siteUrl===CURRENT_SITE || siteUrl.includes('SMB-LS-KH')) { hasAccess=true; break; } } break; } } if(hasAccess) loginUser(currentUser); else { showLoading(false); alert('Доступ запрещен'); } } catch(e) { console.error(e); showLoading(false); alert('Ошибка доступа'); } }

        function loginUser(payload) { loginSection.style.display='none'; mainContent.style.display='block'; updateUserAvatar(payload); localStorage.setItem('userLoggedIn','true'); localStorage.setItem('userEmail',payload.email.toLowerCase()); localStorage.setItem('userName',payload.name); localStorage.setItem('userPic',payload.picture); showLoading(false); setTimeout(()=>loadingScreen.classList.add('fade-out'),500); initializeApp(); }

        function parseJwt(token) { try { const base64Url=token.split('.')[1]; const base64=base64Url.replace(/-/g,'+').replace(/_/g,'/'); const jsonPayload=decodeURIComponent(atob(base64).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')); return JSON.parse(jsonPayload); } catch(e){ return {}; } }

        function signOut() { localStorage.clear(); sessionStorage.clear(); if(google && google.accounts && google.accounts.id) google.accounts.id.disableAutoSelect(); mainContent.style.display='none'; loginSection.style.display='flex'; const loginDiv=document.getElementById('login-container'); if(loginDiv.getAttribute('data-original')) loginDiv.innerHTML=loginDiv.getAttribute('data-original'); }

        function convertGoogleDriveLink(driveLink) { if(!driveLink) return null; if(driveLink.includes('drive.google.com/file/d/')) { const match=driveLink.match(/\/d\/([^\/]+)/); if(match&&match[1]) return `https://drive.google.com/uc?export=view&id=${match[1]}`; } if(driveLink.includes('uc?export=view')) return driveLink; return null; }
        function openDriveLink(driveLink) { if(!driveLink) return; const viewLink=convertGoogleDriveLink(driveLink); window.open(viewLink||driveLink,'_blank'); }
        async function makeRequest(url,options={}) { try { if(!options.method||options.method==='GET') url+=`${url.includes('?')?'&':'?'}_=${Date.now()}`; const resp=await fetch(url,options); return await resp.json(); } catch(e){ throw e; } }
        function scrollToTop() { const active=document.querySelector('.tab-content.active'); if(active) active.scrollTo({top:0,behavior:'smooth'}); }

        function goToPage(type,pageNumber) {
            if(type==='journal' && pageNumber>=1 && pageNumber<=totalJournalPages && pageNumber!==currentJournalPage) { currentJournalPage=pageNumber; renderJournalCards(journalData); updatePagination('journal',currentJournalPage,totalJournalPages); scrollToTop(); }
            else if(type==='instructor' && pageNumber>=1 && pageNumber<=totalInstructorPages && pageNumber!==currentInstructorPage) { currentInstructorPage=pageNumber; renderInstructorCards(instructorData); updatePagination('instructor',currentInstructorPage,totalInstructorPages); scrollToTop(); }
            else if(type==='engineer' && pageNumber>=1 && pageNumber<=totalEngineerPages && pageNumber!==currentEngineerPage) { currentEngineerPage=pageNumber; renderEngineerCards(engineerData); updatePagination('engineer',currentEngineerPage,totalEngineerPages); scrollToTop(); }
        }
        function changePage(type,direction) { if(type==='journal') goToPage('journal',currentJournalPage+direction); else if(type==='instructor') goToPage('instructor',currentInstructorPage+direction); else if(type==='engineer') goToPage('engineer',currentEngineerPage+direction); }
        function updatePagination(type,currentPage,totalPages) { const pag=document.getElementById(`${type}-pagination`); if(!pag) return; document.getElementById(`${type}-current-page`).textContent=currentPage; document.getElementById(`${type}-total-pages`).textContent=totalPages; const first=pag.querySelector('.first-btn'), prev=pag.querySelector('.prev-btn'), next=pag.querySelector('.next-btn'), last=pag.querySelector('.last-btn'); if(first) first.disabled=currentPage===1; if(prev) prev.disabled=currentPage===1; if(next) next.disabled=currentPage===totalPages; if(last) last.disabled=currentPage===totalPages; if(last) last.onclick=()=>goToPage(type,totalPages); pag.style.display=totalPages>1?'flex':'none'; }
        function getCurrentPageData(data,page) { const start=(page-1)*CARDS_PER_PAGE; return data.slice(start,start+CARDS_PER_PAGE); }

        function filterTasksByTitle(tasks,keywords) { if(!tasks) return []; return tasks.filter(task=>{ const title=(task.task||'').toLowerCase(); return keywords.some(k=>title.includes(k.toLowerCase())); }); }

        function initDatePicker() { if(datePicker) datePicker.destroy(); const inp=document.getElementById('date-filter-input'); datePicker=flatpickr(inp,{ locale:"ru", dateFormat:"d.m.Y", allowInput:false, clickOpens:true, disableMobile:false, onChange:function(sel,dateStr){ if(dateStr){ const active=document.querySelector('.tab-content.active'); if(active&&active.id==='tab1') filterJournalByDate(dateStr); else if(active&&active.id==='tab2') filterInstructorByDate(dateStr); else if(active&&active.id==='tab3') filterEngineerByDate(dateStr); } } }); inp.value=''; }

        function filterJournalByDate(date) { if(!date){ isFilterActive=false; currentFilterDate=''; filterType='journal'; journalData=originalJournalData?filterTasksByTitle([...originalJournalData],['PS','МЕХ','ps','мех']):[]; currentJournalPage=1; renderJournalCards(journalData); updateCounterLabel(); const inp=document.getElementById('date-filter-input'); if(inp) inp.value=''; return; } isFilterActive=true; currentFilterDate=date; filterType='journal'; const filtered=originalJournalData.filter(task=>{ const titleMatch=['PS','МЕХ','ps','мех'].some(k=>(task.task||'').toLowerCase().includes(k.toLowerCase())); return task.completedDate===date && titleMatch; }); journalData=filtered; currentJournalPage=1; renderJournalCards(journalData); updateCounterLabel(); }
        function filterInstructorByDate(date) { if(!date){ isFilterActive=false; currentFilterDate=''; filterType='instructor'; instructorData=originalJournalData?filterTasksByTitle([...originalJournalData],['ИНСТ','инст']):[]; currentInstructorPage=1; renderInstructorCards(instructorData); updateCounterLabel(); const inp=document.getElementById('date-filter-input'); if(inp) inp.value=''; return; } isFilterActive=true; currentFilterDate=date; filterType='instructor'; const filtered=originalJournalData.filter(task=>{ const titleMatch=['ИНСТ','инст'].some(k=>(task.task||'').toLowerCase().includes(k.toLowerCase())); return task.completedDate===date && titleMatch; }); instructorData=filtered; currentInstructorPage=1; renderInstructorCards(instructorData); updateCounterLabel(); }
        function filterEngineerByDate(date) { if(!date){ isFilterActive=false; currentFilterDate=''; filterType='engineer'; engineerData=originalJournalData?filterTasksByTitle([...originalJournalData],['ИНЖЕНЕР','инженер']):[]; currentEngineerPage=1; renderEngineerCards(engineerData); updateCounterLabel(); const inp=document.getElementById('date-filter-input'); if(inp) inp.value=''; return; } isFilterActive=true; currentFilterDate=date; filterType='engineer'; const filtered=originalJournalData.filter(task=>{ const titleMatch=['ИНЖЕНЕР','инженер'].some(k=>(task.task||'').toLowerCase().includes(k.toLowerCase())); return task.completedDate===date && titleMatch; }); engineerData=filtered; currentEngineerPage=1; renderEngineerCards(engineerData); updateCounterLabel(); }

        function updateCounterLabel() { const counterDiv=document.getElementById('open-tasks-counter'); const labelSpan=counterDiv.querySelector('.label'); const countSpan=counterDiv.querySelector('.count'); const active=document.querySelector('.tab-content.active'); if(isFilterActive && currentFilterDate){ if(active && active.id==='tab1'){ const cnt=journalData?journalData.length:0; labelSpan.innerHTML=`Задачи за ${currentFilterDate} (МЕХАНИК)`; countSpan.textContent=cnt; } else if(active && active.id==='tab2'){ const cnt=instructorData?instructorData.length:0; labelSpan.innerHTML=`Задачи за ${currentFilterDate} (ИНСТРУКТОР)`; countSpan.textContent=cnt; } else if(active && active.id==='tab3'){ const cnt=engineerData?engineerData.length:0; labelSpan.innerHTML=`Задачи за ${currentFilterDate} (ИНЖЕНЕР)`; countSpan.textContent=cnt; } } else { let open=0; if(active && active.id==='tab1') open=journalData?journalData.filter(t=>!t.isCompleted).length:0; else if(active && active.id==='tab2') open=instructorData?instructorData.filter(t=>!t.isCompleted).length:0; else if(active && active.id==='tab3') open=engineerData?engineerData.filter(t=>!t.isCompleted).length:0; labelSpan.innerHTML='КОЛИЧЕСТВО НЕВЫПОЛНЕННЫХ ЗАДАЧ:'; countSpan.textContent=open; } countSpan.style.backgroundColor='#dc143c'; }

        function clearDateFilter() { const inp=document.getElementById('date-filter-input'); if(inp) inp.value=''; const active=document.querySelector('.tab-content.active'); if(active && active.id==='tab1') filterJournalByDate(''); else if(active && active.id==='tab2') filterInstructorByDate(''); else if(active && active.id==='tab3') filterEngineerByDate(''); }

        async function loadJournal() { try { if(journalData && !isInitialLoad) { renderJournalCards(journalData); return; } const journal=await makeRequest(`${BACKEND_URL}?action=getJournal`); originalJournalData=[...journal]; journalData=filterTasksByTitle(originalJournalData,['PS','МЕХ','ps','мех']); renderJournalCards(journalData); updateCounterLabel(); } catch(e){ console.error(e); document.getElementById('journal-cards').innerHTML=`<div class="task-card error">Ошибка загрузки: ${e.message}</div>`; } }
        async function loadInstructorTasks() { try { if(instructorData && !isInitialLoad){ renderInstructorCards(instructorData); return; } const journal=originalJournalData?originalJournalData:await makeRequest(`${BACKEND_URL}?action=getJournal`); if(!originalJournalData) originalJournalData=[...journal]; instructorData=filterTasksByTitle(originalJournalData,['ИНСТ','инст']); renderInstructorCards(instructorData); updateCounterLabel(); } catch(e){ console.error(e); document.getElementById('instructor-cards').innerHTML=`<div class="task-card error">Ошибка загрузки: ${e.message}</div>`; } }
        async function loadEngineerTasks() { try { if(engineerData && !isInitialLoad){ renderEngineerCards(engineerData); return; } const journal=originalJournalData?originalJournalData:await makeRequest(`${BACKEND_URL}?action=getJournal`); if(!originalJournalData) originalJournalData=[...journal]; engineerData=filterTasksByTitle(originalJournalData,['ИНЖЕНЕР','инженер']); renderEngineerCards(engineerData); updateCounterLabel(); } catch(e){ console.error(e); document.getElementById('engineer-cards').innerHTML=`<div class="task-card error">Ошибка загрузки: ${e.message}</div>`; } }

        async function completeTask(taskId, executor, rowIndex) { showLoader(); try { const updateUrl=`${BACKEND_URL}?action=updateCell&sheetName=B&column=E&row=${rowIndex}&value=${encodeURIComponent(executor)}`; const result=await makeRequest(updateUrl); if(result.success){ await makeRequest(`${BACKEND_URL}?action=updateFromRowNumber&rowNumber=${rowIndex}`); journalData=null; instructorData=null; engineerData=null; originalJournalData=null; const wasFilter=isFilterActive; const savedDate=currentFilterDate; const savedType=filterType; updateCounterLabel(); document.getElementById('date-filter-container').classList.remove('show'); await Promise.all([loadJournal(), loadInstructorTasks(), loadEngineerTasks()]); if(wasFilter && savedDate){ if(savedType==='journal') filterJournalByDate(savedDate); else if(savedType==='instructor') filterInstructorByDate(savedDate); else if(savedType==='engineer') filterEngineerByDate(savedDate); } hideLoader(); } else hideLoader(); } catch(e){ console.error(e); hideLoader(); } }

        function renderJournalCards(journal) { const container=document.getElementById('journal-cards'); if(!journal || journal.length===0){ container.innerHTML='<div class="task-card"><div class="loading-container"><div class="loading-card-text">Нет данных</div></div></div>'; updatePagination('journal',1,1); return; } const sorted=[...journal]; totalJournalPages=Math.ceil(sorted.length/CARDS_PER_PAGE); if(currentJournalPage>totalJournalPages) currentJournalPage=1; const current=getCurrentPageData(sorted,currentJournalPage); let html=''; current.forEach(task=>{ const rowIndex=task.rowIndex||(task.id?2:2); const hasLink=task.driveLink&&task.driveLink.trim()!==''; const taskId=task.id||task.driveLink||''; if(!task.isCompleted){ html+=`<div class="task-card pending" data-task-id="${taskId}" data-row-index="${rowIndex}"><div class="task-header"><div class="task-title">${task.task}</div></div><div class="card-content"><div class="content-row"><span class="row-label">Дата появления:</span><span class="row-value">${task.createdDate}</span></div><div class="content-row"><span class="row-label">Дата выполнения:</span><span class="row-value">${task.completedDate||'-'}</span></div><div class="content-row"><span class="row-label">Выполнил:</span><span class="row-value"><select class="executor-select" id="executor-${taskId}"><option value="" selected disabled></option><option value="Вадим">Вадим</option><option value="Гена">Гена</option><option value="Саша">Саша</option><option value="Данил">Данил</option></select></span></div></div><div class="buttons-container">${hasLink?`<a href="#" onclick="openDriveLink('${task.driveLink}')" class="schema-button"><i class="fas fa-file-alt"></i>ОТКРЫТЬ ЗАДАЧУ</a>`:'<div class="no-open">Недоступно</div>'}<button class="submit-btn" onclick="submitTask(event, '${taskId}', ${rowIndex})" disabled><i class="fas fa-paper-plane"></i>ОТПРАВИТЬ</button></div></div>`; } else { html+=`<div class="task-card completed"><div class="task-header"><div class="task-title">${task.task}</div></div><div class="card-content"><div class="content-row"><span class="row-label">Дата появления:</span><span class="row-value">${task.createdDate}</span></div><div class="content-row"><span class="row-label">Дата выполнения:</span><span class="row-value">${task.completedDate}</span></div><div class="content-row"><span class="row-label">Выполнил:</span><span class="row-value">${task.executor}</span></div></div><div class="buttons-container">${hasLink?`<a href="#" onclick="openDriveLink('${task.driveLink}')" class="schema-button"><i class="fas fa-file-alt"></i>ОТКРЫТЬ ЗАДАЧУ</a>`:'<div class="no-open">Недоступно</div>'}<div class="submitted-text"><i class="fas fa-check-circle"></i>ОТПРАВЛЕНО</div></div></div>`; } }); container.innerHTML=html; attachSelectEvents('#tab1'); updatePagination('journal',currentJournalPage,totalJournalPages); }
        function renderInstructorCards(instructor) { const container=document.getElementById('instructor-cards'); if(!instructor || instructor.length===0){ container.innerHTML='<div class="task-card"><div class="loading-container"><div class="loading-card-text">Нет данных</div></div></div>'; updatePagination('instructor',1,1); return; } const sorted=[...instructor]; totalInstructorPages=Math.ceil(sorted.length/CARDS_PER_PAGE); if(currentInstructorPage>totalInstructorPages) currentInstructorPage=1; const current=getCurrentPageData(sorted,currentInstructorPage); let html=''; current.forEach(task=>{ const rowIndex=task.rowIndex||2; const hasLink=task.driveLink&&task.driveLink.trim()!==''; const taskId=task.id||task.driveLink||''; if(!task.isCompleted){ html+=`<div class="task-card pending" data-task-id="${taskId}" data-row-index="${rowIndex}"><div class="task-header"><div class="task-title">${task.task}</div></div><div class="card-content"><div class="content-row"><span class="row-label">Дата появления:</span><span class="row-value">${task.createdDate}</span></div><div class="content-row"><span class="row-label">Дата выполнения:</span><span class="row-value">${task.completedDate||'-'}</span></div><div class="content-row"><span class="row-label">Выполнил:</span><span class="row-value"><select class="executor-select" id="executor-${taskId}"><option value="" selected disabled></option><option value="Вадим">Вадим</option><option value="Гена">Гена</option><option value="Саша">Саша</option><option value="Данил">Данил</option></select></span></div></div><div class="buttons-container">${hasLink?`<a href="#" onclick="openDriveLink('${task.driveLink}')" class="schema-button"><i class="fas fa-file-alt"></i>ОТКРЫТЬ ЗАДАЧУ</a>`:'<div class="no-open">Недоступно</div>'}<button class="submit-btn" onclick="submitTask(event, '${taskId}', ${rowIndex})" disabled><i class="fas fa-paper-plane"></i>ОТПРАВИТЬ</button></div></div>`; } else { html+=`<div class="task-card completed"><div class="task-header"><div class="task-title">${task.task}</div></div><div class="card-content"><div class="content-row"><span class="row-label">Дата появления:</span><span class="row-value">${task.createdDate}</span></div><div class="content-row"><span class="row-label">Дата выполнения:</span><span class="row-value">${task.completedDate}</span></div><div class="content-row"><span class="row-label">Выполнил:</span><span class="row-value">${task.executor}</span></div></div><div class="buttons-container">${hasLink?`<a href="#" onclick="openDriveLink('${task.driveLink}')" class="schema-button"><i class="fas fa-file-alt"></i>ОТКРЫТЬ ЗАДАЧУ</a>`:'<div class="no-open">Недоступно</div>'}<div class="submitted-text"><i class="fas fa-check-circle"></i>ОТПРАВЛЕНО</div></div></div>`; } }); container.innerHTML=html; attachSelectEvents('#tab2'); updatePagination('instructor',currentInstructorPage,totalInstructorPages); }
        function renderEngineerCards(engineer) { const container=document.getElementById('engineer-cards'); if(!engineer || engineer.length===0){ container.innerHTML='<div class="task-card"><div class="loading-container"><div class="loading-card-text">Нет данных</div></div></div>'; updatePagination('engineer',1,1); return; } const sorted=[...engineer]; totalEngineerPages=Math.ceil(sorted.length/CARDS_PER_PAGE); if(currentEngineerPage>totalEngineerPages) currentEngineerPage=1; const current=getCurrentPageData(sorted,currentEngineerPage); let html=''; current.forEach(task=>{ const rowIndex=task.rowIndex||2; const hasLink=task.driveLink&&task.driveLink.trim()!==''; const taskId=task.id||task.driveLink||''; if(!task.isCompleted){ html+=`<div class="task-card pending" data-task-id="${taskId}" data-row-index="${rowIndex}"><div class="task-header"><div class="task-title">${task.task}</div></div><div class="card-content"><div class="content-row"><span class="row-label">Дата появления:</span><span class="row-value">${task.createdDate}</span></div><div class="content-row"><span class="row-label">Дата выполнения:</span><span class="row-value">${task.completedDate||'-'}</span></div><div class="content-row"><span class="row-label">Выполнил:</span><span class="row-value"><select class="executor-select" id="executor-${taskId}"><option value="" selected disabled></option><option value="Вадим">Вадим</option><option value="Гена">Гена</option><option value="Саша">Саша</option><option value="Данил">Данил</option></select></span></div></div><div class="buttons-container">${hasLink?`<a href="#" onclick="openDriveLink('${task.driveLink}')" class="schema-button"><i class="fas fa-file-alt"></i>ОТКРЫТЬ ЗАДАЧУ</a>`:'<div class="no-open">Недоступно</div>'}<button class="submit-btn" onclick="submitTask(event, '${taskId}', ${rowIndex})" disabled><i class="fas fa-paper-plane"></i>ОТПРАВИТЬ</button></div></div>`; } else { html+=`<div class="task-card completed"><div class="task-header"><div class="task-title">${task.task}</div></div><div class="card-content"><div class="content-row"><span class="row-label">Дата появления:</span><span class="row-value">${task.createdDate}</span></div><div class="content-row"><span class="row-label">Дата выполнения:</span><span class="row-value">${task.completedDate}</span></div><div class="content-row"><span class="row-label">Выполнил:</span><span class="row-value">${task.executor}</span></div></div><div class="buttons-container">${hasLink?`<a href="#" onclick="openDriveLink('${task.driveLink}')" class="schema-button"><i class="fas fa-file-alt"></i>ОТКРЫТЬ ЗАДАЧУ</a>`:'<div class="no-open">Недоступно</div>'}<div class="submitted-text"><i class="fas fa-check-circle"></i>ОТПРАВЛЕНО</div></div></div>`; } }); container.innerHTML=html; attachSelectEvents('#tab3'); updatePagination('engineer',currentEngineerPage,totalEngineerPages); }

        function attachSelectEvents(tabId) { const container=document.querySelector(tabId); if(!container) return; container.querySelectorAll('.executor-select').forEach(select=>{ select.addEventListener('change',function(e){ const card=this.closest('.task-card'); const btn=card.querySelector('.submit-btn'); if(btn) btn.disabled=!this.value; e.stopPropagation(); }); select.addEventListener('click',e=>e.stopPropagation()); }); }
        function submitTask(event, taskId, rowIndex) { const btn=event.currentTarget; if(btn.disabled) return; const card=btn.closest('.task-card'); if(!card) return; const select=card.querySelector('.executor-select'); if(!select || !select.value) return; completeTask(taskId,select.value,rowIndex); event.stopPropagation(); }

        function initializeApp() { console.log('Инициализация'); let lastTouchEnd=0; document.addEventListener('touchend',function(e){ const now=Date.now(); if(now-lastTouchEnd<=300) e.preventDefault(); lastTouchEnd=now;},{passive:false}); document.addEventListener('click',function(e){ const drop=document.getElementById('userDropdown'); if(!e.target.closest('.user-avatar') && drop.style.display==='block') drop.style.display='none'; const dateCont=document.getElementById('date-filter-container'); if(!e.target.closest('#open-tasks-counter') && !e.target.closest('#date-filter-container') && dateCont.classList.contains('show')) dateCont.classList.remove('show'); }); showLoader(); document.getElementById('open-tasks-counter').addEventListener('click',()=>{ const cont=document.getElementById('date-filter-container'); if(cont.classList.contains('show')) cont.classList.remove('show'); else cont.classList.add('show'); initDatePicker(); }); document.getElementById('clear-filter-btn').addEventListener('click',clearDateFilter); const tabs=document.querySelectorAll('.tab-btn'); const contents=document.querySelectorAll('.tab-content'); Promise.all([loadJournal(),loadInstructorTasks(),loadEngineerTasks()]).then(()=>{ setTimeout(()=>hideLoader(),100); }).catch(()=>hideLoader()); tabs.forEach(btn=>{ btn.addEventListener('click',()=>{ const tabId=btn.getAttribute('data-tab'); tabs.forEach(b=>b.classList.remove('active')); contents.forEach(c=>c.classList.remove('active')); btn.classList.add('active'); document.getElementById(tabId).classList.add('active'); if(tabId==='tab2'){ currentInstructorPage=1; loadInstructorTasks(); } else if(tabId==='tab1'){ currentJournalPage=1; loadJournal(); } else if(tabId==='tab3'){ currentEngineerPage=1; loadEngineerTasks(); } if(isFilterActive && currentFilterDate){ if(tabId==='tab1') filterJournalByDate(currentFilterDate); else if(tabId==='tab2') filterInstructorByDate(currentFilterDate); else filterEngineerByDate(currentFilterDate); } else updateCounterLabel(); scrollToTop(); }); }); setInterval(()=>{ const active=document.querySelector('.tab-content.active'); if(active && active.id==='tab2') loadInstructorTasks(); else if(active && active.id==='tab1') loadJournal(); else if(active && active.id==='tab3') loadEngineerTasks(); },30000); setTimeout(()=>{ isInitialLoad=false; },1000); document.addEventListener('click',function(e){ if(e.target.closest('.task-card') && !e.target.closest('button') && !e.target.closest('select') && !e.target.closest('a')){ document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('selected')); e.target.closest('.task-card').classList.add('selected'); } }); }

        window.addEventListener('load',function(){ const logged=localStorage.getItem('userLoggedIn')==='true'; const email=localStorage.getItem('userEmail'); const name=localStorage.getItem('userName'); const pic=localStorage.getItem('userPic'); if(logged && email){ loginSection.style.display='none'; mainContent.style.display='block'; currentUser={email:email,name:name,picture:pic}; updateUserAvatar(currentUser); showLoading(true); loadSheetsAPI().then(()=>gapi.client.init({apiKey:AUTH_API_KEY,discoveryDocs:['https://sheets.googleapis.com/$discovery/rest?version=v4']})).then(()=>checkEmailInSheet(email)).catch(()=>signOut()); } else { loginSection.style.display='flex'; mainContent.style.display='none'; setTimeout(()=>loadingScreen.classList.add('fade-out'),500); } });
        window.onload=function(){ if(google && google.accounts && google.accounts.id){ google.accounts.id.initialize({client_id:'328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com',callback:handleCredentialResponse}); google.accounts.id.renderButton(document.querySelector('.g_id_signin'),{type:'standard',shape:'pill',theme:'outline',text:'signin_with',size:'large',logo_alignment:'left'}); } };
    </script>

    <!-- ФИКС КНОПОК -->
    <script>
        (function fixButtonsOnAllPages(){ 'use strict'; let lastTouchEnd=0; document.addEventListener('touchend',function(e){ const target=e.target; const isInteractive=target.closest('button')||target.closest('a')||target.closest('select')||target.closest('.submit-btn')||target.closest('.open-button')||target.closest('.schema-button')||target.closest('.executor-select')||target.closest('.page-btn')||target.closest('.tab-btn')||target.closest('.clear-filter-btn')||target.closest('#open-tasks-counter')||target.closest('.user-avatar'); if(isInteractive){ e.stopPropagation(); return true; } const now=Date.now(); if(now-lastTouchEnd<=300) e.preventDefault(); lastTouchEnd=now; },{passive:false}); function forceHandlers(){ document.querySelectorAll('#tab1 .schema-button, #tab2 .schema-button, #tab3 .schema-button').forEach(btn=>{ btn.removeEventListener('click',openHandler); btn.removeEventListener('touchstart',touchStop); btn.addEventListener('touchstart',touchStop,{passive:false}); btn.addEventListener('click',openHandler); }); document.querySelectorAll('#tab1 .submit-btn, #tab2 .submit-btn, #tab3 .submit-btn').forEach(btn=>{ btn.removeEventListener('click',submitHandler); btn.removeEventListener('touchstart',touchStop); btn.addEventListener('touchstart',touchStop,{passive:false}); btn.addEventListener('click',submitHandler); }); document.querySelectorAll('.executor-select').forEach(sel=>{ sel.removeEventListener('change',selChange); sel.removeEventListener('touchstart',touchStop); sel.addEventListener('touchstart',touchStop,{passive:false}); sel.addEventListener('change',selChange); }); } function touchStop(e){ e.stopPropagation(); } function openHandler(e){ e.preventDefault(); e.stopPropagation(); const btn=e.currentTarget; const attr=btn.getAttribute('onclick'); if(attr){ try{ const match=attr.match(/'([^']+)'/); if(match&&match[1]) window.open(convertGoogleDriveLink(match[1])||match[1],'_blank'); }catch(err){} } } function submitHandler(e){ e.preventDefault(); e.stopPropagation(); const btn=e.currentTarget; if(btn.disabled) return; const card=btn.closest('.task-card'); if(!card) return; const select=card.querySelector('.executor-select'); if(!select||!select.value) return; const taskId=card.dataset.taskId||btn.dataset.taskId; const rowIndex=card.dataset.rowIndex||btn.dataset.rowIndex; if(taskId&&rowIndex) completeTask(taskId,select.value,rowIndex); } function selChange(e){ e.stopPropagation(); const sel=e.target; const card=sel.closest('.task-card'); if(card){ const btn=card.querySelector('.submit-btn'); if(btn) btn.disabled=!sel.value; } } const style=document.createElement('style'); style.textContent=` .schema-button, .submit-btn, .open-button, .executor-select { position:relative; z-index:9999!important; cursor:pointer!important; pointer-events:auto!important; touch-action:manipulation!important; } .executor-select { background-color:#cccccc!important; border:2px solid #cccccc!important; color:#666666!important; } `; document.head.appendChild(style); const obs=new MutationObserver(()=>setTimeout(forceHandlers,50)); obs.observe(document.getElementById('tab1')||document.body,{childList:true,subtree:true}); obs.observe(document.getElementById('tab2')||document.body,{childList:true,subtree:true}); obs.observe(document.getElementById('tab3')||document.body,{childList:true,subtree:true}); setTimeout(forceHandlers,200); })();
    </script>
