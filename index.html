<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Статистика деталей</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f4f7f9; padding: 24px 20px; display: flex; flex-direction: column; align-items: center; }
  .card { width: 100%; max-width: 1200px; background: white; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); overflow: hidden; }
  .top-bar { display: flex; align-items: center; padding: 18px 24px; background: #1e293b; gap: 12px; flex-wrap: wrap; }
  .club-select { background: #334155; color: white; border: 1px solid #475569; padding: 10px; border-radius: 10px; font-size: 15px; outline: none; cursor: pointer; }
  .search-box { background: #ffffff; border: none; border-radius: 10px; padding: 10px 16px; color: #1e293b; font-size: 15px; flex: 1; min-width: 200px; outline: none; }
  .rows-container { background: #ffffff; width: 100%; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

  .data-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 12px;
    border-radius: 12px;
    transition: background 0.2s ease;
    border: 1px solid transparent;
  }
  .data-row:hover { background: #f1f5f9; border-color: #cbd5e1; }

  .part-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  
  .part-number { 
    font-weight: 700; 
    color: #0f172a; 
    font-family: 'Courier New', monospace; 
    font-size: 1.1rem;
    background: #f1f5f9;
    padding: 4px 12px;
    border-radius: 20px;
    display: inline-block;
  }

  .copy-button {
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s;
    box-shadow: 0 2px 5px rgba(59, 130, 246, 0.3);
  }
  .copy-button:hover {
    background: #2563eb;
  }
  .copy-button:active {
    transform: scale(0.98);
  }
  .copy-button svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
  }

  .stat-wrapper { 
    display: flex; 
    align-items: center; 
    gap: 12px; 
    width: 100%; 
    max-width: 600px;
    cursor: pointer;
    padding: 4px 0;
  }
  .stat-number { font-weight: 700; font-size: 0.9rem; min-width: 40px; text-align: center; }
  .stat-taken { color: #dc2626; }
  .stat-added { color: #64748b; }
  .bar-wrapper { position: relative; flex: 1; height: 16px; background: #e2e8f0; border-radius: 20px; overflow: hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.15); }
  .bar-fill { height: 100%; width: 0%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); background: linear-gradient(to bottom, #ef4444, #dc2626); }

  /* Стили для контейнера изображения - УВЕЛИЧЕННЫЕ */
  .part-image-container {
    display: none;
    width: 100%;
    margin-top: 20px;
    padding: 25px;
    background: #f8fafc;
    border-radius: 16px;
    text-align: center;
    border: 2px dashed #94a3b8;
  }
  .part-image-container img {
    max-width: 100%;
    max-height: 600px; /* Увеличено с 400px до 600px */
    width: auto;
    height: auto;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.25);
    display: block;
    margin: 0 auto;
    cursor: zoom-in;
    transition: transform 0.3s;
  }
  .part-image-container img:hover {
    transform: scale(1.02);
  }
  
  /* Подпись под изображением */
  .image-caption {
    margin-top: 12px;
    font-size: 0.9rem;
    color: #475569;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }
  .image-caption span {
    background: #e2e8f0;
    padding: 4px 12px;
    border-radius: 20px;
    font-family: 'Courier New', monospace;
  }

  .copy-toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: rgba(30, 41, 59, 0.95); color: white; padding: 14px 28px;
    border-radius: 50px; font-size: 1rem; font-weight: 500; opacity: 0; pointer-events: none;
    transition: opacity 0.3s; z-index: 1000; backdrop-filter: blur(4px);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  
  @media (max-width:600px) { 
    body { padding: 10px; } 
    .stat-wrapper { max-width: 100%; }
    .part-header { flex-direction: column; align-items: flex-start; }
    .part-image-container img { max-height: 400px; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="top-bar">
    <select id="clubSelect" class="club-select">
      <option value="SKYMALL">SKYMALL</option>
      <option value="KH">KH</option>
      <option value="BB">BB</option>
    </select>
    <input id="searchInput" class="search-box" placeholder="Поиск детали">
  </div>
  <div id="rowsContainer" class="rows-container">Загрузка...</div>
</div>
<div id="toast" class="copy-toast">✓ Номер скопирован!</div>

<script>
(function() {
  const SPREADSHEET_ID = '1v-R394u6sKzSdvmkh9qsbqhfkNZEi5lIXwo8BdT_lhQ';
  const API_KEY = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';
  let currentSheet = 'SKYMALL';
  let allParts = [];
  const container = document.getElementById('rowsContainer');
  const clubSelect = document.getElementById('clubSelect');
  const searchInput = document.getElementById('searchInput');
  const toast = document.getElementById('toast');

  function showToast(message = '✓ Номер скопирован!') {
    toast.textContent = message;
    toast.style.opacity = '1';
    setTimeout(() => toast.style.opacity = '0', 2000);
  }

  function copyToClipboard(text, message = '✓ Номер скопирован!') {
    navigator.clipboard.writeText(text).then(() => showToast(message));
  }

  function render(parts) {
    if (!parts.length) { container.innerHTML = '<div style="text-align:center;padding:20px;">Ничего не найдено</div>'; return; }

    container.innerHTML = '';
    parts.forEach((part, index) => {
      const percent = part.added > 0 ? Math.min(100, (part.taken / part.added) * 100) : 0;
      const row = document.createElement('div');
      row.className = 'data-row';
      const imgContainerId = `img-${currentSheet}-${index}-${Date.now()}`;

      row.innerHTML = `
        <div class="part-header">
          <span class="part-number">${part.part}</span>
          <button class="copy-button" data-part="${part.part}" title="Копировать номер детали">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
            </svg>
            Копировать
          </button>
        </div>
        <div class="stat-wrapper" data-img-container="${imgContainerId}">
          <div class="stat-number stat-taken">${part.taken}</div>
          <div class="bar-wrapper"><div class="bar-fill" style="width:${percent}%"></div></div>
          <div class="stat-number stat-added">${part.added}</div>
        </div>
        <div id="${imgContainerId}" class="part-image-container">
          <img src="${part.img}" alt="Деталь ${part.part}" onclick="window.open(this.src, '_blank')">
          <div class="image-caption">
            <span>${part.part}</span>
            <span>взято ${part.taken} из ${part.added}</span>
          </div>
        </div>
      `;

      // Обработчик для кнопки копирования
      const copyBtn = row.querySelector('.copy-button');
      copyBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        copyToClipboard(part.part, '✓ Номер скопирован!');
      });

      // Обработчик для строки (клик по статистике открывает картинку)
      const statWrapper = row.querySelector('.stat-wrapper');
      statWrapper.addEventListener('click', (e) => {
        e.stopPropagation();
        
        // Копируем номер при клике на статистику
        copyToClipboard(part.part, '✓ Номер скопирован!');
        
        // Управление картинкой
        const currentImgContainer = document.getElementById(imgContainerId);
        if (!currentImgContainer) return;
        
        const isVisible = currentImgContainer.style.display === 'block';
        
        // Скрываем все картинки
        document.querySelectorAll('.part-image-container').forEach(cont => cont.style.display = 'none');
        
        // Показываем текущую, если была скрыта
        if (!isVisible) {
          currentImgContainer.style.display = 'block';
          // Плавная прокрутка к картинке
          setTimeout(() => currentImgContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
        }
      });

      container.appendChild(row);
    });
  }

  function filterAndRender() {
    const query = searchInput.value.toLowerCase();
    if (!allParts.length) return;
    const filtered = query ? allParts.filter(p => p.part.toLowerCase().includes(query)) : allParts;
    render(filtered);
  }

  async function loadSheet(name) {
    container.innerHTML = '<div style="text-align:center;padding:20px;">Загрузка данных...</div>';
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${name}!A2:I?key=${API_KEY}`;
    try {
      const response = await fetch(url);
      const data = await response.json();
      if (!data.values) { container.innerHTML = 'Нет данных'; return; }

      allParts = data.values.map(row => ({
        part: row[0]?.trim() || '',
        added: parseFloat(row[6]) || 0,
        taken: parseFloat(row[7]) || 0,
        img: row[3]?.trim() || ''
      })).filter(p => p.part);

      // Сортируем по популярности (процент взятых)
      allParts.sort((a, b) => (b.taken / (b.added || 1)) - (a.taken / (a.added || 1)));
      filterAndRender();
    } catch (e) {
      console.error('Ошибка загрузки:', e);
      container.innerHTML = '<div style="color:red;padding:20px;">Ошибка загрузки данных</div>';
    }
  }

  clubSelect.addEventListener('change', () => { currentSheet = clubSelect.value; loadSheet(currentSheet); });
  searchInput.addEventListener('input', filterAndRender);

  loadSheet(currentSheet);
})();
</script>
</body>
</html>
