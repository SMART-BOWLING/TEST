<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>LUCKY STRIKE KH – Данные по дорожкам</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <!-- Все кастомные стили удалены — оставлены только нативные браузерные стили -->
</head>
<body>

<!-- Экран загрузки (без стилей) -->
<div id="loadingScreen" style="display: flex; justify-content: center; align-items: center; position: fixed; inset: 0; background: #1f2937; z-index: 10000;">
    <div style="text-align: center;">
        <img src="https://i.postimg.cc/wjGzSY92/1.png" alt="Logo" style="width: 85px;">
        <div style="color: white; margin-top: 16px;">Загрузка...</div>
    </div>
</div>
<div id="loader" style="display: none; position: fixed; inset: 0; background: rgba(31,41,55,0.96); justify-content: center; align-items: center; z-index: 100000;">
    <div style="text-align: center;">
        <img src="https://i.postimg.cc/wjGzSY92/1.png" alt="Loading" style="width: 85px;">
        <div style="color: white; margin-top: 16px;">Загрузка данных...</div>
    </div>
</div>

<!-- Авторизация -->
<div id="login-section" style="display: none; justify-content: center; align-items: center; width: 100%; height: 100%; background: #f1f5f9;">
    <div style="background: white; padding: 28px 24px; border-radius: 32px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15); text-align: center; max-width: 380px; width: 100%;">
        <div style="width: 56px; height: 56px; background: #fff0f2; border-radius: 28px; display: flex; align-items: center; justify-content: center; margin: 0 auto;">
            <i class="fas fa-bowling-ball" style="font-size: 28px; color: #dc143c;"></i>
        </div>
        <h2 style="color: #1f2937; margin: 12px 0 6px; font-size: 24px;">LUCKY STRIKE KH</h2>
        <div style="color: #475569; font-size: 13px; margin-bottom: 24px;">Войдите через Google для доступа</div>
        <div id="g_id_onload" data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
        <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-text="signin_with" data-size="large"></div>
    </div>
</div>

<!-- Основной контент -->
<div id="main-content" style="display: none; width: 100%; height: 100%; background: #f4f6fa; overflow: hidden; flex-direction: column;">
    <button onclick="signOut()" style="position: fixed; bottom: 16px; right: 16px; background: #1f2937; color: white; border: none; border-radius: 40px; padding: 8px 18px; font-size: 12px; font-weight: bold; cursor: pointer; z-index: 1100;">
        <i class="fas fa-sign-out-alt"></i> Выйти
    </button>
    <div style="flex: 1; min-height: 0; width: 100%; padding: 12px; display: flex; flex-direction: column; overflow: hidden;">
        <div style="flex: 1; min-height: 0; width: 100%; overflow: auto; background: white; border-radius: 12px; border: 1px solid #e2e8f0;">
            <table id="main-table" style="border-collapse: collapse; width: auto; min-width: 100%; font-size: 11px;">
                <thead>
                    <tr id="letter-row">
                        <th style="border: 1px solid #e2e8f0; text-align: center; padding: 0 6px; height: 34px; background: #f1f5f9;">
                            <img src="https://i.postimg.cc/SQ3RgNsQ/image.png" alt="logo" style="width: 28px; height: 28px; object-fit: contain; cursor: pointer;">
                        </th>
                        <th id="date-cell-header" style="border: 1px solid #e2e8f0; text-align: center; padding: 0; height: 34px; background: #f1f5f9;">
                            <div style="position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;">
                                <input type="date" id="date-picker-native" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; border: none; background: transparent; z-index: 2;">
                                <div style="position: relative; z-index: 1; width: 100%; pointer-events: none;">
                                    <div style="width: 100%; padding: 6px 8px; font-size: 11px; font-weight: 600; border: 1px solid #cbd5e1; border-radius: 30px; background: white; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">📅 ДАТА</div>
                                </div>
                            </div>
                        </th>
                    </tr>
                    <tr id="time-row">
                        <th style="border: 1px solid #e2e8f0; text-align: center; padding: 0 6px; height: 34px; background: #f1f5f9;">LANE</th>
                        <th id="overall-total" style="border: 1px solid #e2e8f0; text-align: center; padding: 0 6px; height: 34px; background: #f1f5f9;">0ч 0м</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ========== АВТОРИЗАЦИЯ ==========
    const AUTH_SPREADSHEET_ID = '1-yiVdZYa6wJdupTiuiHvI_ht3Vu73RUjyCehZqs2cJ4';
    const AUTH_SHEET_NAME = '1';
    const AUTH_API_KEY = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';
    const CURRENT_SITE = window.location.href.split('?')[0].split('#')[0];
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbwJcg8Ov4_-ijxTLQxJDjm2-IKCmI8l0AAsDo4sMeU-avSQp3F_E54gyB7f26z_KaE0FA/exec';

    let currentUser = null, currentUserNameFromSheet = null, isLoadingData = false;
    let fetchControllers = new Map();
    const totalMinutes = 1440, groupInterval = 15, groupSize = 14;
    let allGroups = [], allDataCells = [];
    const letterRow = document.getElementById('letter-row'), timeRow = document.getElementById('time-row');
    const overallTotal = document.getElementById('overall-total'), tableBody = document.getElementById('table-body');
    const nativeDateInput = document.getElementById('date-picker-native');
    
    // Текущая выбранная дата
    let currentSelectedDate = null;
    
    // ========== ФУНКЦИИ РАБОТЫ С ДАТОЙ ==========
    function onDateChange() {
        if (nativeDateInput.value) {
            currentSelectedDate = nativeDateInput.value;
            loadData();
        }
    }
    
    function setDefaultDate() {
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        currentSelectedDate = `${year}-${month}-${day}`;
        nativeDateInput.value = currentSelectedDate;
    }
    
    // ========== ФУНКЦИИ ТАБЛИЦЫ ==========
    function formatMinutes(mins) { return `${Math.floor(mins/60)}ч ${mins%60}м`; }
    
    function toggleGroup(idxs) {
        idxs.forEach(i => {
            [timeRow, letterRow].forEach(row => { 
                if(row.children[i+2]) {
                    if(row.children[i+2].style.display === 'none') row.children[i+2].style.display = '';
                    else row.children[i+2].style.display = 'none';
                }
            });
            tableBody.querySelectorAll('tr').forEach(tr => { 
                if(tr.children[i+2]) {
                    if(tr.children[i+2].style.display === 'none') tr.children[i+2].style.display = '';
                    else tr.children[i+2].style.display = 'none';
                }
            });
        });
    }
    
    function areAllHidden() { 
        return allGroups.every(g => timeRow.children[g[0]+2]?.style.display === 'none'); 
    }
    
    function toggleAll(forceHide = null) {
        const shouldHide = forceHide !== null ? forceHide : !areAllHidden();
        allGroups.forEach(g => { 
            const el = timeRow.children[g[0]+2]; 
            if(el && ((el.style.display === 'none') !== shouldHide)) toggleGroup(g); 
        });
        document.querySelectorAll('.toggle-btn').forEach(b => b.textContent = shouldHide ? '+' : '–');
    }
    
    function makeBtn(idxs) {
        const btn = document.createElement('div'); 
        btn.className = 'toggle-btn'; 
        btn.textContent = '+';
        btn.style.cssText = 'cursor: pointer; background-color: #475569; border-radius: 20px; font-weight: bold; font-size: 9px; display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; color: white; margin-left: 4px;';
        let last = 0;
        btn.onclick = (e) => {
            e.stopPropagation(); 
            const now = Date.now();
            if(now - last < 300) toggleAll(!areAllHidden());
            else { 
                toggleGroup(idxs); 
                btn.textContent = timeRow.children[idxs[0]+2].style.display === 'none' ? '+' : '–'; 
            }
            last = now;
        };
        return btn;
    }
    
    function buildHeaders() {
        const fragL = document.createDocumentFragment(), fragT = document.createDocumentFragment();
        for (let i = 1; i <= totalMinutes; i++) {
            const thL = document.createElement('th');
            thL.style.cssText = 'border: 1px solid #e2e8f0; text-align: center; padding: 0 6px; height: 34px; background: #f8fafc;';
            fragL.appendChild(thL);
            const h = Math.floor((i-1)/60), m = (i-1)%60;
            const thT = document.createElement('th');
            thT.style.cssText = 'border: 1px solid #e2e8f0; text-align: center; padding: 2px 1px; height: 34px; background: #f1f5f9;';
            thT.innerHTML = `<div style="display: flex; flex-direction: column; align-items: center; line-height: 1.15;"><span style="font-size: 9px; font-weight: 700;">${String(h).padStart(2,'0')}</span><span style="font-size: 8px;">${String(m).padStart(2,'0')}</span></div>`;
            fragT.appendChild(thT);
            if ((h*60+m) % groupInterval === 0) {
                const start = (h*60+m)===0 ? 1 : (h*60+m)+1;
                const end = Math.min(start+groupSize-1, totalMinutes-1);
                const idxs = []; for (let j=start; j<=end; j++) idxs.push(j);
                if (idxs.length) { 
                    thL.appendChild(makeBtn(idxs)); 
                    allGroups.push(idxs); 
                }
            }
        }
        letterRow.appendChild(fragL); 
        timeRow.appendChild(fragT);
    }
    
    function buildBody() {
        const frag = document.createDocumentFragment();
        for (let lane=0; lane<16; lane++) {
            const tr = document.createElement('tr');
            const thLane = document.createElement('th'); 
            thLane.textContent = lane+1; 
            thLane.style.cssText = 'border: 1px solid #e2e8f0; text-align: center; padding: 0 6px; height: 34px; background: #f1f5f9;';
            tr.appendChild(thLane);
            const thCount = document.createElement('th'); 
            thCount.style.cssText = 'border: 1px solid #e2e8f0; text-align: center; padding: 0 6px; height: 34px; background: #f1f5f9;';
            tr.appendChild(thCount);
            const cells = [];
            for (let i=0; i<totalMinutes; i++) { 
                const td = document.createElement('td'); 
                td.style.cssText = 'border: 1px solid #e2e8f0; text-align: center; padding: 0 6px; height: 34px; white-space: nowrap;';
                tr.appendChild(td); 
                cells.push(td); 
            }
            frag.appendChild(tr);
            allDataCells.push({ header: thCount, cells });
        }
        tableBody.appendChild(frag);
    }
    
    function clearRows() {
        fetchControllers.forEach(c => c.abort()); 
        fetchControllers.clear();
        overallTotal.textContent = '0ч 0м';
        allDataCells.forEach(r => { 
            r.header.textContent = ''; 
            r.cells.forEach(c => { 
                c.classList.remove('active-cell'); 
                c.textContent = ''; 
                c.style.color = ''; 
                c.style.backgroundColor = '';
            }); 
        });
    }
    
    async function loadLaneData(idx, date) {
        const controller = new AbortController(); 
        fetchControllers.set(idx, controller);
        try {
            const res = await fetch(`${BACKEND_URL}?action=getData&index=${idx}&date=${date}&t=${Date.now()}`, { signal: controller.signal });
            return await res.json();
        } finally { 
            fetchControllers.delete(idx); 
        }
    }
    
    async function loadData() {
        if (!currentSelectedDate || isLoadingData) return;
        isLoadingData = true; 
        clearRows();
        const selectedDate = currentSelectedDate;
        let sumAll = 0;
        const promises = [];
        for (let idx=0; idx<allDataCells.length; idx++) {
            promises.push(loadLaneData(idx, selectedDate).then(data => {
                const row = allDataCells[idx]; 
                let sum=0;
                row.cells.forEach((cell,i) => {
                    const time = `${String(Math.floor(i/60)).padStart(2,'0')}:${String(i%60).padStart(2,'0')}`;
                    cell.classList.remove('active-cell');
                    cell.style.backgroundColor = '';
                    if (data.c && data.c.includes(time)) { 
                        cell.classList.add('active-cell'); 
                        cell.textContent = '🎳'; 
                        sum++; 
                    }
                    else if (data.b && data.b.includes(time)) { 
                        cell.textContent = ''; 
                        cell.style.color = '#475569'; 
                    }
                    else { 
                        cell.textContent = '⚡'; 
                        cell.style.color = '#dc143c'; 
                    }
                });
                row.header.textContent = formatMinutes(sum);
                sumAll += sum;
            }).catch(err => console.warn(`Лейн ${idx+1} ошибка`)));
        }
        await Promise.allSettled(promises);
        overallTotal.textContent = formatMinutes(sumAll);
        isLoadingData = false;
    }
    
    function initTableEvents() {
        nativeDateInput.addEventListener('change', onDateChange);
        
        // Добавляем простые эффекты наведения (без сложных стилей, просто меняем фон)
        document.addEventListener('mouseover', e => {
            if (e.target.tagName === 'TD' || e.target.tagName === 'TH') {
                const ci = e.target.cellIndex, row = e.target.parentElement;
                if (row && row.tagName === 'TR') {
                    for(let i=0; i<row.children.length; i++) {
                        if(row.children[i]) row.children[i].style.backgroundColor = '#fecdd3';
                    }
                }
                if (ci >= 0) {
                    const rows = document.querySelectorAll('#main-table tr');
                    for(let r=0; r<rows.length; r++) {
                        if(rows[r].children[ci]) rows[r].children[ci].style.backgroundColor = '#fecdd3';
                    }
                }
            }
        });
        
        document.addEventListener('mouseout', () => {
            const allCells = document.querySelectorAll('#main-table td, #main-table th');
            allCells.forEach(cell => {
                if(!cell.classList || !cell.classList.contains('active-cell')) {
                    // Возвращаем оригинальные цвета в зависимости от типа ячейки
                    if(cell.parentElement && cell.parentElement.parentElement && cell.parentElement.parentElement.tagName === 'THEAD') {
                        if(cell.cellIndex === 0 || cell.cellIndex === 1) {
                            if(cell.cellIndex === 0) cell.style.backgroundColor = '#dc143c';
                            else if(cell.cellIndex === 1) cell.style.backgroundColor = '#2c3e50';
                            else cell.style.backgroundColor = '#f8fafc';
                        } else {
                            cell.style.backgroundColor = '#f1f5f9';
                        }
                    } else if(cell.parentElement && cell.parentElement.tagName === 'TR' && cell.cellIndex === 0) {
                        cell.style.backgroundColor = '#dc143c';
                    } else if(cell.parentElement && cell.parentElement.tagName === 'TR' && cell.cellIndex === 1) {
                        cell.style.backgroundColor = '#2c3e50';
                    } else {
                        cell.style.backgroundColor = '';
                    }
                }
            });
        });
        
        // Логотип для выбора даты
        const logoCell = document.querySelector('.logo-cell');
        if(logoCell) {
            logoCell.addEventListener('click', () => {
                nativeDateInput.click();
            });
        }
        
        setDefaultDate();
        setTimeout(() => { toggleAll(true); loadData(); }, 150);
    }
    
    function initializeTableApp() {
        buildHeaders();
        buildBody();
        initTableEvents();
    }

    // ========== АВТОРИЗАЦИЯ ==========
    function showLoaderUI(show) { 
        const loader = document.getElementById('loader');
        if(loader) loader.style.display = show ? 'flex' : 'none';
    }
    
    function parseJwt(t) { 
        try { 
            const b = t.split('.')[1]; 
            return JSON.parse(atob(b.replace(/-/g, '+').replace(/_/g, '/'))); 
        } catch(e) { 
            return {}; 
        } 
    }
    
    function loadSheetsAPI() { 
        return new Promise((res, rej) => gapi.load('client', { callback: res, onerror: rej, timeout: 10000 })); 
    }
    
    async function checkEmailInSheet(email) {
        try {
            const resp = await gapi.client.sheets.spreadsheets.values.get({ 
                spreadsheetId: AUTH_SPREADSHEET_ID, 
                range: `${AUTH_SHEET_NAME}!A:Z` 
            });
            const rows = resp.result.values;
            let hasAccess = false, foundName = null;
            for (let i = 0; i < rows.length; i++) {
                if (!rows[i]?.[0]) continue;
                if (rows[i][0].toLowerCase().trim() === email) {
                    for (let j = 1; j < rows[i].length; j++) {
                        const siteUrl = rows[i][j]?.trim().split('?')[0].split('#')[0] || '';
                        if (siteUrl === CURRENT_SITE || siteUrl.includes('SMB-LS-KH') || siteUrl.includes('smart-bowling')) { 
                            hasAccess = true; 
                            break; 
                        }
                    }
                    if (rows[i].length > 1 && rows[i][1]) foundName = rows[i][1].trim();
                    break;
                }
            }
            if (hasAccess) { 
                currentUserNameFromSheet = foundName || currentUser.name; 
                loginUser(currentUser); 
            }
            else { 
                alert('Доступ запрещён'); 
                showLoaderUI(false); 
            }
        } catch(e) { 
            alert('Ошибка проверки доступа'); 
            showLoaderUI(false); 
        }
    }
    
    function loginUser(user) {
        localStorage.setItem('userLoggedIn', 'true'); 
        localStorage.setItem('userEmail', user.email.toLowerCase());
        localStorage.setItem('userName', user.name); 
        localStorage.setItem('userNameFromSheet', currentUserNameFromSheet || user.name);
        localStorage.setItem('userPic', user.picture);
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('main-content').style.display = 'flex';
        setTimeout(() => {
            const loadingScreen = document.getElementById('loadingScreen');
            if(loadingScreen) loadingScreen.style.display = 'none';
        }, 300);
        initializeTableApp();
    }
    
    async function initAndCheckEmail(email) {
        await loadSheetsAPI(); 
        await gapi.client.init({ 
            apiKey: AUTH_API_KEY, 
            discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'] 
        });
        await checkEmailInSheet(email);
    }
    
    function handleCredentialResponse(response) {
        const payload = parseJwt(response.credential);
        currentUser = { 
            email: payload.email.toLowerCase().trim(), 
            name: payload.name, 
            picture: payload.picture 
        };
        showLoaderUI(true); 
        initAndCheckEmail(currentUser.email).catch(e => { 
            alert('Ошибка'); 
            showLoaderUI(false); 
        });
    }
    
    function signOut() { 
        localStorage.clear(); 
        if (google?.accounts?.id) google.accounts.id.disableAutoSelect(); 
        location.reload(); 
    }

    window.addEventListener('load', () => {
        const isLoggedIn = localStorage.getItem('userLoggedIn') === 'true';
        const email = localStorage.getItem('userEmail'), name = localStorage.getItem('userName'), nameFromSheet = localStorage.getItem('userNameFromSheet'), pic = localStorage.getItem('userPic');
        if (isLoggedIn && email) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
            currentUser = { email, name, picture: pic };
            currentUserNameFromSheet = nameFromSheet || name;
            setTimeout(() => {
                const loadingScreen = document.getElementById('loadingScreen');
                if(loadingScreen) loadingScreen.style.display = 'none';
            }, 200);
            initializeTableApp();
        } else {
            document.getElementById('login-section').style.display = 'flex';
            document.getElementById('main-content').style.display = 'none';
            setTimeout(() => {
                const loadingScreen = document.getElementById('loadingScreen');
                if(loadingScreen) loadingScreen.style.display = 'none';
            }, 500);
        }
    });
    
    window.handleCredentialResponse = handleCredentialResponse;
    window.signOut = signOut;
</script>
</body>
</html>
