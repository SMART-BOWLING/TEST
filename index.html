    <script>
        // ===== КОНСТАНТЫ =====
        const AUTH_SPREADSHEET_ID = '1-yiVdZYa6wJdupTiuiHvI_ht3Vu73RUjyCehZqs2cJ4';
        const AUTH_SHEET_NAME = '1';
        const AUTH_API_KEY = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';
        const CURRENT_SITE = 'https://smart-bowling.github.io/SMB-LS-KH/';
        const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbyBiibLN40TjLDo1pz69ogyUgERUBhuCcmmkXDCgvS3fUGbt6ifyt_Lh9f3gg8yXZOA/exec';
        const CARDS_PER_PAGE = 6;

        let currentUser = null;
        let originalJournalData = null;
        
        let journalData = null;
        let instructorData = null;
        let engineerData = null;
        
        let currentJournalPage = 1, currentInstructorPage = 1, currentEngineerPage = 1;
        let totalJournalPages = 1, totalInstructorPages = 1, totalEngineerPages = 1;
        
        let isFilterActive = false;
        let currentFilterDate = '';
        let filterType = 'journal';
        
        let datePicker = null;
        let isInitialLoad = true;

        const loadingScreen = document.getElementById("loadingScreen");
        const loginSection = document.getElementById("login-section");
        const mainContent = document.getElementById("main-content");
        const loader = document.getElementById("loader");

        // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
        function showLoader() { loader.classList.add('active'); }
        function hideLoader() { loader.classList.remove('active'); }
        function scrollToTop() { document.querySelector('.tab-content.active')?.scrollTo({ top: 0, behavior: 'smooth' }); }

        function convertGoogleDriveLink(driveLink) {
            if (!driveLink) return null;
            if (driveLink.includes('drive.google.com/file/d/')) {
                const match = driveLink.match(/\/d\/([^\/]+)/);
                if (match && match[1]) return `https://drive.google.com/uc?export=view&id=${match[1]}`;
            }
            return driveLink.includes('uc?export=view') ? driveLink : null;
        }

        function openDriveLink(driveLink) {
            const link = convertGoogleDriveLink(driveLink);
            if (link) window.open(link, '_blank');
            else if (driveLink) window.open(driveLink, '_blank');
        }

        async function makeRequest(url, options = {}) {
            try {
                if (!options.method || options.method === 'GET') {
                    url = `${url}${url.includes('?') ? '&' : '?'}_=${Date.now()}`;
                }
                const response = await fetch(url, options);
                return await response.json();
            } catch (error) {
                console.error('Ошибка запроса:', error);
                throw error;
            }
        }

        function filterTasksByTitle(tasks, keywords) {
            if (!tasks) return [];
            return tasks.filter(task => {
                const title = (task.task || '').toLowerCase();
                return keywords.some(kw => title.includes(kw.toLowerCase()));
            });
        }

        function getCurrentPageData(data, page) {
            const start = (page - 1) * CARDS_PER_PAGE;
            return data.slice(start, start + CARDS_PER_PAGE);
        }

        function updatePagination(type, currentPage, totalPages) {
            const pagination = document.getElementById(`${type}-pagination`);
            if (!pagination) return;
            document.getElementById(`${type}-current-page`).textContent = currentPage;
            document.getElementById(`${type}-total-pages`).textContent = totalPages;
            const first = pagination.querySelector('.first-btn');
            const prev = pagination.querySelector('.prev-btn');
            const next = pagination.querySelector('.next-btn');
            const last = pagination.querySelector('.last-btn');
            if (first) first.disabled = currentPage === 1;
            if (prev) prev.disabled = currentPage === 1;
            if (next) next.disabled = currentPage === totalPages;
            if (last) last.disabled = currentPage === totalPages;
            pagination.style.display = totalPages > 1 ? 'flex' : 'none';
        }

        function goToPage(type, page) {
            if (type === 'journal' && page >= 1 && page <= totalJournalPages && page !== currentJournalPage) {
                currentJournalPage = page;
                renderJournalCards(journalData);
                updatePagination('journal', currentJournalPage, totalJournalPages);
                scrollToTop();
            } else if (type === 'instructor' && page >= 1 && page <= totalInstructorPages && page !== currentInstructorPage) {
                currentInstructorPage = page;
                renderInstructorCards(instructorData);
                updatePagination('instructor', currentInstructorPage, totalInstructorPages);
                scrollToTop();
            } else if (type === 'engineer' && page >= 1 && page <= totalEngineerPages && page !== currentEngineerPage) {
                currentEngineerPage = page;
                renderEngineerCards(engineerData);
                updatePagination('engineer', currentEngineerPage, totalEngineerPages);
                scrollToTop();
            }
        }

        function changePage(type, delta) {
            if (type === 'journal') goToPage('journal', currentJournalPage + delta);
            else if (type === 'instructor') goToPage('instructor', currentInstructorPage + delta);
            else if (type === 'engineer') goToPage('engineer', currentEngineerPage + delta);
        }

        function updateCounterLabel() {
            const activeTab = document.querySelector('.tab-content.active');
            const labelSpan = document.querySelector('#open-tasks-counter .label');
            const countSpan = document.querySelector('#open-tasks-counter .count');
            if (isFilterActive && currentFilterDate) {
                let count = 0;
                if (activeTab?.id === 'tab1') count = journalData?.length || 0;
                else if (activeTab?.id === 'tab2') count = instructorData?.length || 0;
                else if (activeTab?.id === 'tab3') count = engineerData?.length || 0;
                labelSpan.innerHTML = `Задачи за ${currentFilterDate}`;
                countSpan.textContent = count;
            } else {
                let openCount = 0;
                if (activeTab?.id === 'tab1') openCount = journalData?.filter(t => !t.isCompleted).length || 0;
                else if (activeTab?.id === 'tab2') openCount = instructorData?.filter(t => !t.isCompleted).length || 0;
                else if (activeTab?.id === 'tab3') openCount = engineerData?.filter(t => !t.isCompleted).length || 0;
                labelSpan.innerHTML = 'КОЛИЧЕСТВО НЕВЫПОЛНЕННЫХ ЗАДАЧ:';
                countSpan.textContent = openCount;
            }
        }

        // ===== ФИЛЬТРАЦИЯ ПО ДАТЕ =====
        function initDatePicker() {
            if (datePicker) datePicker.destroy();
            datePicker = flatpickr('#date-filter-input', {
                locale: "ru", dateFormat: "d.m.Y", allowInput: false,
                onChange: (_, dateStr) => {
                    if (dateStr) {
                        const activeTab = document.querySelector('.tab-content.active');
                        if (activeTab?.id === 'tab1') filterJournalByDate(dateStr);
                        else if (activeTab?.id === 'tab2') filterInstructorByDate(dateStr);
                        else if (activeTab?.id === 'tab3') filterEngineerByDate(dateStr);
                    }
                }
            });
        }

        function filterJournalByDate(date) {
            isFilterActive = !!date;
            currentFilterDate = date || '';
            filterType = 'journal';
            if (!date) {
                journalData = filterTasksByTitle([...originalJournalData], ['PS', 'МЕХ', 'ps', 'мех']);
                document.getElementById('date-filter-input').value = '';
            } else {
                journalData = originalJournalData.filter(t => t.completedDate === date && 
                    ['PS', 'МЕХ', 'ps', 'мех'].some(kw => (t.task || '').toLowerCase().includes(kw.toLowerCase())));
            }
            currentJournalPage = 1;
            renderJournalCards(journalData);
            updateCounterLabel();
        }

        function filterInstructorByDate(date) {
            isFilterActive = !!date;
            currentFilterDate = date || '';
            filterType = 'instructor';
            if (!date) {
                instructorData = filterTasksByTitle([...originalJournalData], ['ИНСТ', 'инст']);
                document.getElementById('date-filter-input').value = '';
            } else {
                instructorData = originalJournalData.filter(t => t.completedDate === date && 
                    ['ИНСТ', 'инст'].some(kw => (t.task || '').toLowerCase().includes(kw.toLowerCase())));
            }
            currentInstructorPage = 1;
            renderInstructorCards(instructorData);
            updateCounterLabel();
        }

        function filterEngineerByDate(date) {
            isFilterActive = !!date;
            currentFilterDate = date || '';
            filterType = 'engineer';
            if (!date) {
                engineerData = filterTasksByTitle([...originalJournalData], ['ИНЖЕНЕР', 'инженер']);
                document.getElementById('date-filter-input').value = '';
            } else {
                engineerData = originalJournalData.filter(t => t.completedDate === date && 
                    ['ИНЖЕНЕР', 'инженер'].some(kw => (t.task || '').toLowerCase().includes(kw.toLowerCase())));
            }
            currentEngineerPage = 1;
            renderEngineerCards(engineerData);
            updateCounterLabel();
        }

        function clearDateFilter() {
            const activeTab = document.querySelector('.tab-content.active');
            if (activeTab?.id === 'tab1') filterJournalByDate('');
            else if (activeTab?.id === 'tab2') filterInstructorByDate('');
            else if (activeTab?.id === 'tab3') filterEngineerByDate('');
            document.getElementById('date-filter-input').value = '';
        }

        // ===== ЗАГРУЗКА ДАННЫХ =====
        async function loadAllData() {
            try {
                const journal = await makeRequest(`${BACKEND_URL}?action=getJournal`);
                originalJournalData = [...journal];
                journalData = filterTasksByTitle(journal, ['PS', 'МЕХ', 'ps', 'мех']);
                instructorData = filterTasksByTitle(journal, ['ИНСТ', 'инст']);
                engineerData = filterTasksByTitle(journal, ['ИНЖЕНЕР', 'инженер']);
                renderJournalCards(journalData);
                renderInstructorCards(instructorData);
                renderEngineerCards(engineerData);
                updateCounterLabel();
            } catch (error) {
                console.error('Ошибка загрузки:', error);
            }
        }

        // ===== ОТРИСОВКА КАРТОЧЕК =====
        function renderJournalCards(data) {
            const container = document.getElementById('journal-cards');
            if (!data?.length) { container.innerHTML = '<div class="task-card"><div class="loading-container">Нет данных</div></div>'; updatePagination('journal', 1, 1); return; }
            totalJournalPages = Math.ceil(data.length / CARDS_PER_PAGE);
            if (currentJournalPage > totalJournalPages) currentJournalPage = 1;
            const currentData = getCurrentPageData(data, currentJournalPage);
            container.innerHTML = currentData.map(task => renderTaskCard(task, 'journal')).join('');
            attachSelectListeners('journal');
            updatePagination('journal', currentJournalPage, totalJournalPages);
        }

        function renderInstructorCards(data) {
            const container = document.getElementById('instructor-cards');
            if (!data?.length) { container.innerHTML = '<div class="task-card"><div class="loading-container">Нет данных</div></div>'; updatePagination('instructor', 1, 1); return; }
            totalInstructorPages = Math.ceil(data.length / CARDS_PER_PAGE);
            if (currentInstructorPage > totalInstructorPages) currentInstructorPage = 1;
            const currentData = getCurrentPageData(data, currentInstructorPage);
            container.innerHTML = currentData.map(task => renderTaskCard(task, 'instructor')).join('');
            attachSelectListeners('instructor');
            updatePagination('instructor', currentInstructorPage, totalInstructorPages);
        }

        function renderEngineerCards(data) {
            const container = document.getElementById('engineer-cards');
            if (!data?.length) { container.innerHTML = '<div class="task-card"><div class="loading-container">Нет данных</div></div>'; updatePagination('engineer', 1, 1); return; }
            totalEngineerPages = Math.ceil(data.length / CARDS_PER_PAGE);
            if (currentEngineerPage > totalEngineerPages) currentEngineerPage = 1;
            const currentData = getCurrentPageData(data, currentEngineerPage);
            container.innerHTML = currentData.map(task => renderTaskCard(task, 'engineer')).join('');
            attachSelectListeners('engineer');
            updatePagination('engineer', currentEngineerPage, totalEngineerPages);
        }

        function renderTaskCard(task, type) {
            const taskId = task.id || task.driveLink || '';
            const hasLink = task.driveLink && task.driveLink.trim();
            if (!task.isCompleted) {
                return `
                    <div class="task-card pending" data-task-id="${taskId}" data-row-index="${task.rowIndex}">
                        <div class="task-header"><div class="task-title">${task.task}</div></div>
                        <div class="card-content">
                            <div class="content-row"><span class="row-label">Дата появления:</span><span class="row-value">${task.createdDate}</span></div>
                            <div class="content-row"><span class="row-label">Дата выполнения:</span><span class="row-value">${task.completedDate || '-'}</span></div>
                            <div class="content-row"><span class="row-label">Выполнил:</span><span class="row-value"><select class="executor-select" data-task-id="${taskId}"><option value="" selected disabled></option><option value="Вадим">Вадим</option><option value="Гена">Гена</option><option value="Саша">Саша</option><option value="Данил">Данил</option></select></span></div>
                        </div>
                        <div class="buttons-container">
                            ${hasLink ? `<a href="#" onclick="openDriveLink('${task.driveLink}')" class="schema-button"><i class="fas fa-file-alt"></i>ОТКРЫТЬ ЗАДАЧУ</a>` : '<div class="no-open">Недоступно</div>'}
                            <button class="submit-btn" data-task-id="${taskId}" data-row-index="${task.rowIndex}" disabled><i class="fas fa-paper-plane"></i>ОТПРАВИТЬ</button>
                        </div>
                    </div>`;
            } else {
                return `
                    <div class="task-card completed">
                        <div class="task-header"><div class="task-title">${task.task}</div></div>
                        <div class="card-content">
                            <div class="content-row"><span class="row-label">Дата появления:</span><span class="row-value">${task.createdDate}</span></div>
                            <div class="content-row"><span class="row-label">Дата выполнения:</span><span class="row-value">${task.completedDate}</span></div>
                            <div class="content-row"><span class="row-label">Выполнил:</span><span class="row-value">${task.executor}</span></div>
                        </div>
                        <div class="buttons-container">
                            ${hasLink ? `<a href="#" onclick="openDriveLink('${task.driveLink}')" class="schema-button"><i class="fas fa-file-alt"></i>ОТКРЫТЬ ЗАДАЧУ</a>` : '<div class="no-open">Недоступно</div>'}
                            <div class="submitted-text"><i class="fas fa-check-circle"></i>ОТПРАВЛЕНО</div>
                        </div>
                    </div>`;
            }
        }

        function attachSelectListeners(type) {
            document.querySelectorAll(`#${type === 'journal' ? 'tab1' : type === 'instructor' ? 'tab2' : 'tab3'} .executor-select`).forEach(select => {
                select.removeEventListener('change', handleSelectChange);
                select.addEventListener('change', handleSelectChange);
                select.addEventListener('click', e => e.stopPropagation());
            });
            document.querySelectorAll(`#${type === 'journal' ? 'tab1' : type === 'instructor' ? 'tab2' : 'tab3'} .submit-btn`).forEach(btn => {
                btn.removeEventListener('click', handleSubmitClick);
                btn.addEventListener('click', handleSubmitClick);
            });
        }

        function handleSelectChange(e) {
            const btn = e.target.closest('.task-card')?.querySelector('.submit-btn');
            if (btn) btn.disabled = !e.target.value;
        }

        async function handleSubmitClick(e) {
            e.stopPropagation();
            const btn = e.currentTarget;
            if (btn.disabled) return;
            const card = btn.closest('.task-card');
            const select = card?.querySelector('.executor-select');
            if (!select?.value) return;
            const taskId = btn.dataset.taskId;
            const rowIndex = btn.dataset.rowIndex;
            showLoader();
            try {
                await makeRequest(`${BACKEND_URL}?action=updateCell&sheetName=B&column=E&row=${rowIndex}&value=${encodeURIComponent(select.value)}`);
                await makeRequest(`${BACKEND_URL}?action=updateFromRowNumber&rowNumber=${rowIndex}`);
                originalJournalData = null;
                await loadAllData();
                if (isFilterActive && currentFilterDate) {
                    if (filterType === 'journal') filterJournalByDate(currentFilterDate);
                    else if (filterType === 'instructor') filterInstructorByDate(currentFilterDate);
                    else if (filterType === 'engineer') filterEngineerByDate(currentFilterDate);
                }
            } catch (err) { console.error(err); } finally { hideLoader(); }
        }

        // ===== АВТОРИЗАЦИЯ =====
        function toggleUserDropdown() { const d = document.getElementById("userDropdown"); d.style.display = d.style.display === "block" ? "none" : "block"; }
        function updateUserAvatar(user) { document.getElementById('userAvatar').innerHTML = user?.picture ? `<img src="${user.picture}">` : '<i class="fas fa-user"></i>'; }
        function parseJwt(token) { try { return JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/'))); } catch { return {}; } }
        function showLoading(show) { const cont = document.getElementById('login-container'); if (show) { cont.setAttribute('data-original', cont.innerHTML); cont.innerHTML = '<div style="padding:40px;text-align:center"><div class="loading-spinner"></div><br>Проверка доступа...</div>'; } else if (cont.getAttribute('data-original')) cont.innerHTML = cont.getAttribute('data-original'); }

        async function loadSheetsAPI() { return new Promise((resolve, reject) => gapi.load('client', { callback: resolve, onerror: reject })); }

        async function checkEmailInSheet(email) {
            const resp = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId: AUTH_SPREADSHEET_ID, range: `${AUTH_SHEET_NAME}!A:Z` });
            const rows = resp.result.values || [];
            let has = rows.some(row => row[0]?.toLowerCase().trim() === email && row.slice(1).some(s => s?.trim() === CURRENT_SITE || s?.includes('SMB-LS-KH')));
            if (has) loginUser(currentUser);
            else { showLoading(false); alert('Доступ запрещен'); }
        }

        async function initAndCheckEmail() { await loadSheetsAPI(); await gapi.client.init({ apiKey: AUTH_API_KEY, discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'] }); await checkEmailInSheet(currentUser.email); }

        function handleCredentialResponse(resp) {
            const payload = parseJwt(resp.credential);
            currentUser = { email: payload.email.toLowerCase(), name: payload.name, picture: payload.picture };
            showLoading(true);
            initAndCheckEmail();
        }

        function loginUser(user) {
            loginSection.style.display = 'none';
            mainContent.style.display = 'block';
            updateUserAvatar(user);
            localStorage.setItem('userLoggedIn', 'true');
            localStorage.setItem('userEmail', user.email);
            showLoading(false);
            setTimeout(() => loadingScreen.classList.add('fade-out'), 500);
            initializeApp();
        }

        function signOut() {
            localStorage.clear();
            if (google?.accounts?.id) google.accounts.id.disableAutoSelect();
            mainContent.style.display = 'none';
            loginSection.style.display = 'flex';
        }

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        function initializeApp() {
            showLoader();
            loadAllData().finally(() => hideLoader());
            document.getElementById('open-tasks-counter').addEventListener('click', () => document.getElementById('date-filter-container').classList.toggle('show'));
            document.getElementById('clear-filter-btn').addEventListener('click', clearDateFilter);
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(btn.dataset.tab).classList.add('active');
                    if (isFilterActive && currentFilterDate) {
                        if (btn.dataset.tab === 'tab1') filterJournalByDate(currentFilterDate);
                        else if (btn.dataset.tab === 'tab2') filterInstructorByDate(currentFilterDate);
                        else if (btn.dataset.tab === 'tab3') filterEngineerByDate(currentFilterDate);
                    } else updateCounterLabel();
                    scrollToTop();
                });
            });
            setInterval(() => { if (document.querySelector('.tab-content.active')?.id === 'tab1') renderJournalCards(journalData); else if (document.querySelector('.tab-content.active')?.id === 'tab2') renderInstructorCards(instructorData); else if (document.querySelector('.tab-content.active')?.id === 'tab3') renderEngineerCards(engineerData); }, 30000);
        }

        window.addEventListener('load', () => {
            const logged = localStorage.getItem('userLoggedIn') === 'true';
            const email = localStorage.getItem('userEmail');
            if (logged && email) {
                loginSection.style.display = 'none';
                mainContent.style.display = 'block';
                currentUser = { email, name: localStorage.getItem('userName'), picture: localStorage.getItem('userPic') };
                updateUserAvatar(currentUser);
                showLoading(true);
                loadSheetsAPI().then(() => gapi.client.init({ apiKey: AUTH_API_KEY, discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'] })).then(() => checkEmailInSheet(email)).catch(signOut);
            } else {
                loginSection.style.display = 'flex';
                setTimeout(() => loadingScreen.classList.add('fade-out'), 500);
            }
            if (google?.accounts?.id) google.accounts.id.initialize({ client_id: '328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com', callback: handleCredentialResponse });
        });
    </script>
</body>
</html>
