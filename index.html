  <!-- Chart.js загружаем асинхронно -->
  <script>
    // Функция для загрузки скриптов по мере необходимости
    function loadScript(src, callback) {
      const script = document.createElement('script');
      script.src = src;
      script.async = true;
      script.onload = callback;
      document.head.appendChild(script);
    }

    // ОРИГИНАЛЬНЫЙ ПОЛНЫЙ СКРИПТ (с небольшими оптимизациями)
    (function() {
      // ===== КОНСТАНТЫ =====
      const AUTH_SPREADSHEET_ID = '1-yiVdZYa6wJdupTiuiHvI_ht3Vu73RUjyCehZqs2cJ4';
      const AUTH_SHEET_NAME = '1';
      const AUTH_API_KEY = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';
      const CURRENT_SITE = 'https://smart-bowling.github.io/PS-STOP-KH/';
      
      const SHEETS_CONFIG = {
        apiKey: AUTH_API_KEY,
        spreadsheetId: '1F4zy9OcSesAeWktCXsPZdBD4796MbAnOZDXGMqY7zBg',
        columnMapping: {
          1: 'F', 2: 'J', 3: 'N', 4: 'R', 5: 'V', 6: 'Z', 
          7: 'AD', 8: 'AH', 9: 'AL', 10: 'AP', 11: 'AT', 
          12: 'AX', 13: 'BB', 14: 'BF'
        },
        startRow: 4
      };
      
      const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbym_79krm2GhFqOJrq5UwgDXUTQFDnTT-FY67atU3Mpg3Tz2r4qfpBVmvEZ72A4wGMZdQ/exec';

      // ===== СОСТОЯНИЕ =====
      let currentUser = null;
      let machineErrors = Array(14).fill(0);
      let machineFPS = Array(14).fill(0);
      let selectedDate = new Date().toISOString().split('T')[0];
      let originalErrors = Array(14).fill(0);
      
      let errorsChart = null;
      let fpsChart = null;
      let yearlyComparisonChart = null;
      
      let monthlyErrors = 0;
      let monthlyFPS = 0;
      
      let analyticsLoaded = false;
      let isAnalysisOpen = false;
      let isDataLoaded = false;
      
      let dataCache = {};
      let lastSaveTime = 0;
      const SAVE_DEBOUNCE_TIME = 1000;

      // ===== DOM ЭЛЕМЕНТЫ =====
      const loadingScreen = document.getElementById("loadingScreen");
      const loginSection = document.getElementById("login-section");
      const mainContent = document.getElementById("main-content");
      const loader = document.getElementById("loader");
      const analyticsContent = document.getElementById("analytics-content");

      // ===== ФУНКЦИИ ДЛЯ UI =====
      function toggleUserDropdown() {
        const menu = document.getElementById("userDropdown");
        menu.style.display = menu.style.display === "block" ? "none" : "block";
      }

      function updateUserAvatar(user) {
        const avatarContainer = document.getElementById('userAvatar');
        if (user?.picture) {
          avatarContainer.innerHTML = `<img src="${user.picture}" alt="Avatar">`;
        } else {
          avatarContainer.innerHTML = '<i class="fas fa-user"></i>';
        }
      }

      function showLoader() {
        loader.classList.add('active');
      }

      function hideLoader() {
        loader.classList.remove('active');
      }

      // ===== ГЕНЕРАЦИЯ КАРТОЧЕК =====
      function generateMachineCells() {
        const grid = document.getElementById('machinesGrid');
        let html = '';
        
        for (let i = 0; i < 14; i++) {
          html += `
            <div class="machine-cell" onclick="incrementMachine(${i})">
              <div class="machine-number">LANE ${i + 1}</div>
              <div class="error-count zero">0</div>
            </div>
          `;
        }
        grid.innerHTML = html;
      }

      function updateDisplay() {
        const cells = document.querySelectorAll('.machine-cell .error-count');
        cells.forEach((cell, index) => {
          cell.textContent = machineErrors[index];
          cell.className = machineErrors[index] === 0 ? 'error-count zero' : 'error-count non-zero';
        });
      }

      window.incrementMachine = function(index) {
        machineErrors[index]++;
        updateDisplay();
      };

      // ===== ФУНКЦИИ АВТОРИЗАЦИИ =====
      function parseJwt(token) {
        try {
          const base64Url = token.split('.')[1];
          const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
          const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
          }).join(''));
          return JSON.parse(jsonPayload);
        } catch (e) {
          return {};
        }
      }

      window.handleCredentialResponse = function(response) {
        try {
          const payload = parseJwt(response.credential);
          
          currentUser = {
            email: payload.email.toLowerCase().trim(),
            name: payload.name,
            picture: payload.picture
          };
          
          showLoading(true);
          initAndCheckEmail();
        } catch (e) {
          console.error('Ошибка аутентификации:', e);
          showLoading(false);
          alert('Ошибка аутентификации');
        }
      };

      function showLoading(show) {
        const loginDiv = document.getElementById('login-container');
        if (show) {
          if (!loginDiv.hasAttribute('data-original')) {
            loginDiv.setAttribute('data-original', loginDiv.innerHTML);
          }
          loginDiv.innerHTML = '<div style="padding: 40px; text-align: center;"><div class="loading-spinner" style="display:inline-block;width:40px;height:40px;border:4px solid rgba(220,20,60,0.2);border-radius:50%;border-top-color:#dc143c;animation:spin 1s ease-in-out infinite;"></div><br><span style="color: #64748b; margin-top: 15px; display: block;">Проверка доступа...</span></div>';
        } else {
          if (loginDiv.getAttribute('data-original') && loginSection.style.display !== 'none') {
            loginDiv.innerHTML = loginDiv.getAttribute('data-original');
            
            if (window.google && google.accounts && google.accounts.id) {
              google.accounts.id.renderButton(
                document.querySelector('.g_id_signin'),
                { 
                  type: 'standard', 
                  shape: 'pill', 
                  theme: 'outline', 
                  text: 'signin_with', 
                  size: 'large', 
                  logo_alignment: 'left' 
                }
              );
            }
          }
        }
      }

      function loadSheetsAPI() {
        return new Promise((resolve, reject) => {
          gapi.load('client', {
            callback: () => resolve(),
            onerror: () => reject('Ошибка загрузки Google API'),
            timeout: 10000,
            ontimeout: () => reject('Таймаут загрузки Google API')
          });
        });
      }

      async function initAndCheckEmail() {
        try {
          await loadSheetsAPI();
          await gapi.client.init({
            apiKey: AUTH_API_KEY,
            discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
          });
          
          await checkEmailInSheet(currentUser.email);
        } catch (error) {
          console.error('Ошибка инициализации:', error);
          showLoading(false);
          alert('Ошибка инициализации Google API');
        }
      }

      async function checkEmailInSheet(email) {
        try {
          const response = await gapi.client.sheets.spreadsheets.values.get({
            spreadsheetId: AUTH_SPREADSHEET_ID,
            range: `${AUTH_SHEET_NAME}!A:Z`,
          });
          
          const rows = response.result.values;
          if (!rows || rows.length === 0) {
            showLoading(false);
            alert('Таблица пуста');
            return;
          }
          
          let hasAccess = false;
          
          for (let i = 0; i < rows.length; i++) {
            if (!rows[i]?.[0]) continue;
            
            const rowEmail = rows[i][0].toLowerCase().trim();
            if (rowEmail === email) {
              for (let j = 1; j < rows[i].length; j++) {
                const siteUrl = rows[i][j]?.trim().split('?')[0].split('#')[0] || '';
                if (siteUrl === CURRENT_SITE || siteUrl.includes('PS-STOP-KH')) {
                  hasAccess = true;
                  break;
                }
              }
              break;
            }
          }
          
          if (hasAccess) {
            loginUser(currentUser);
          } else {
            showLoading(false);
            alert('Доступ запрещен: Ваш email не найден в таблице или нет прав для этого сайта');
          }
        } catch (error) {
          console.error('Ошибка доступа к таблице:', error);
          showLoading(false);
          alert('Ошибка доступа к таблице');
        }
      }

      function loginUser(payload) {
        loginSection.style.display = 'none';
        mainContent.style.display = 'block';
        
        updateUserAvatar(payload);
        
        localStorage.setItem('userLoggedIn', 'true');
        localStorage.setItem('userEmail', payload.email.toLowerCase());
        localStorage.setItem('userName', payload.name);
        localStorage.setItem('userPic', payload.picture);
        
        showLoading(false);
        
        setTimeout(() => {
          loadingScreen.classList.add('fade-out');
        }, 500);
        
        // Загружаем остальные элементы интерфейса
        loadRemainingUI();
        
        // Инициализируем приложение
        ensureSheetsAPI().then(() => {
          initializeApp();
        }).catch(error => {
          console.warn('Не удалось инициализировать Sheets API:', error);
          initializeApp();
        });
      }

      function signOut() {
        localStorage.clear();
        sessionStorage.clear();
        
        if (google && google.accounts && google.accounts.id) {
          google.accounts.id.disableAutoSelect();
        }
        
        mainContent.style.display = 'none';
        loginSection.style.display = 'flex';
        
        const loginDiv = document.getElementById('login-container');
        if (loginDiv.getAttribute('data-original')) {
          loginDiv.innerHTML = loginDiv.getAttribute('data-original');
          
          if (window.google && google.accounts && google.accounts.id) {
            google.accounts.id.renderButton(
              document.querySelector('.g_id_signin'),
              { 
                type: 'standard', 
                shape: 'pill', 
                theme: 'outline', 
                text: 'signin_with', 
                size: 'large', 
                logo_alignment: 'left' 
              }
            );
          }
        }
      }

      // ===== ЗАГРУЗКА ОСТАЛЬНОГО ИНТЕРФЕЙСА =====
      function loadRemainingUI() {
        // Создаем элементы аналитики
        const html = `
          <div class="charts-container" id="chartsContainer" style="display:none;">
            <div class="chart-wrapper" id="errorsChartWrapper">
              <div class="chart-title">ОБЩЕЕ КОЛИЧЕСТВО ОШИБОК ЗА МЕСЯЦ</div>
              <canvas id="errorsChart"></canvas>
            </div>
            <div class="chart-wrapper" id="fpsChartWrapper">
              <div class="chart-title">FPS - КОЛИЧЕСТВО ФРЕЙМОВ НА ОДНУ ОШИБКУ</div>
              <canvas id="fpsChart"></canvas>
            </div>
          </div>
          
          <div class="stats-container" id="statsContainer" style="display:none;">
            <div class="stat-card" id="errorsStatCard">
              <div class="stat-title">Общее количество ошибок за месяц</div>
              <div class="stat-value errors-stat" id="totalErrors">0</div>
            </div>
            <div class="stat-card" id="fpsStatCard">
              <div class="stat-title">Общее число FPS за месяц</div>
              <div class="stat-value fps-stat" id="totalFPS">0</div>
            </div>
          </div>
          
          <div class="table-container" id="tableContainer" style="display:none;">
            <table class="data-table" id="dataTable">
              <thead>
                <tr>
                  <th>День</th>
                  <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th><th>10</th><th>11</th><th>12</th><th>13</th><th>14</th>
                </tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
          
          <div class="yearly-comparison-container" id="yearlyComparisonContainer" style="display:none;">
            <div class="chart-title">СРАВНЕНИЕ FPS ПО ГОДАМ</div>
            <canvas id="yearlyComparisonChart"></canvas>
          </div>
        `;
        
        analyticsContent.innerHTML = html;
        analyticsContent.style.display = 'block';
      }

      // ===== ФУНКЦИИ ДЛЯ РАБОТЫ С ДАННЫМИ =====
      let sheetsAPIPromise = null;

      function ensureSheetsAPI() {
        if (sheetsAPIPromise) return sheetsAPIPromise;
        
        sheetsAPIPromise = new Promise((resolve, reject) => {
          if (window.gapi?.client?.sheets) {
            resolve();
            return;
          }
          
          gapi.load('client', async () => {
            try {
              await gapi.client.init({
                apiKey: SHEETS_CONFIG.apiKey,
                discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
              });
              resolve();
            } catch (error) {
              reject(error);
            }
          });
        });
        
        return sheetsAPIPromise;
      }

      function getSheetNameFromDate(date) {
        const month = date.getMonth() + 1;
        const year = date.getFullYear().toString().slice(-2);
        return month + '.' + year;
      }

      async function loadDataDirectlyFromSheets(date) {
        try {
          const dateObj = new Date(date);
          const sheetName = getSheetNameFromDate(dateObj);
          const day = dateObj.getDate();
          const row = SHEETS_CONFIG.startRow + day - 1;
          
          await ensureSheetsAPI();
          
          const ranges = [];
          for (let i = 1; i <= 14; i++) {
            ranges.push(`'${sheetName}'!${SHEETS_CONFIG.columnMapping[i]}${row}`);
          }
          
          const response = await gapi.client.sheets.spreadsheets.values.batchGet({
            spreadsheetId: SHEETS_CONFIG.spreadsheetId,
            ranges: ranges,
            valueRenderOption: 'UNFORMATTED_VALUE'
          });
          
          const errors = response.result.valueRanges.map(range => {
            const value = range.values?.[0]?.[0] || 0;
            return Math.ceil(Number(value)) || 0;
          });
          
          return { errors: errors, exists: true };
        } catch (error) {
          console.error('Ошибка при чтении из Sheets:', error);
          if (error.status === 404 || error.status === 400) {
            return { errors: Array(14).fill(0), exists: false };
          }
          throw error;
        }
      }

      async function loadDataViaAppsScript(date) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 8000);
        
        try {
          const response = await fetch(`${BACKEND_URL}?date=${encodeURIComponent(date)}&simple=true`, {
            signal: controller.signal,
            headers: { 'Accept': 'application/json' },
          });
          
          clearTimeout(timeoutId);
          
          if (!response.ok) throw new Error(`Ошибка сервера: ${response.status}`);
          return await response.json();
        } catch (error) {
          clearTimeout(timeoutId);
          throw error;
        }
      }

      async function loadDataForDate(date, retryCount = 0) {
        const MAX_RETRIES = 3;
        
        if (dataCache[date]) {
          applyCachedData(dataCache[date]);
          return;
        }
        
        showLoader();
        
        try {
          let data;
          
          if (window.gapi?.client?.sheets) {
            try {
              data = await loadDataDirectlyFromSheets(date);
            } catch (sheetsError) {
              data = await loadDataViaAppsScript(date);
            }
          } else {
            data = await loadDataViaAppsScript(date);
          }
          
          dataCache[date] = data;
          applyCachedData(data);
        } catch (error) {
          if (retryCount < MAX_RETRIES) {
            setTimeout(() => {
              loadDataForDate(date, retryCount + 1);
            }, 1000 * (retryCount + 1));
          } else {
            applyDefaultData();
          }
        } finally {
          hideLoader();
        }
      }

      function applyCachedData(data) {
        if (data.errors) {
          machineErrors = data.errors;
          originalErrors = [...data.errors];
          updateDisplay();
        }
      }

      function applyDefaultData() {
        machineErrors = Array(14).fill(0);
        originalErrors = Array(14).fill(0);
        updateDisplay();
      }

      // ===== ОСНОВНЫЕ ФУНКЦИИ =====
      function cancelChanges() {
        if (confirm('Отменить все несохраненные изменения?')) {
          machineErrors = [...originalErrors];
          updateDisplay();
        }
      }

      async function saveData() {
        const now = Date.now();
        if (now - lastSaveTime < SAVE_DEBOUNCE_TIME) return;
        lastSaveTime = now;
        
        showLoader();
        
        try {
          const changes = machineErrors.map((current, index) => current - originalErrors[index]);
          const hasChanges = changes.some(change => change !== 0);
          
          if (!hasChanges) {
            hideLoader();
            return;
          }
          
          const formData = new URLSearchParams();
          formData.append('date', selectedDate);
          formData.append('errors', JSON.stringify(changes));
          
          const response = await fetch(BACKEND_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData
          });
          
          const text = await response.text();
          let result;
          try {
            result = JSON.parse(text);
          } catch (e) {
            throw new Error('Неверный формат ответа');
          }
          
          if (result.success) {
            originalErrors = [...machineErrors];
            
            if (dataCache[selectedDate]) {
              dataCache[selectedDate].errors = [...machineErrors];
            }
            
            updateDisplay();
            showSaveNotification();
          } else {
            throw new Error(result.error || 'Ошибка при сохранении');
          }
        } catch (error) {
          console.error('Ошибка:', error);
          alert('Ошибка при сохранении: ' + error.message);
        } finally {
          hideLoader();
        }
      }

      function showSaveNotification() {
        const saveBtn = document.querySelector('.save-btn');
        const originalText = saveBtn.textContent;
        
        saveBtn.textContent = '✓ СОХРАНЕНО';
        saveBtn.style.background = '#28a745';
        
        setTimeout(() => {
          saveBtn.textContent = originalText;
          saveBtn.style.background = '#1a2f40';
        }, 2000);
      }

      // ===== ФУНКЦИИ ДЛЯ АНАЛИТИКИ (ЗАГРУЖАЮТСЯ ПО ТРЕБОВАНИЮ) =====
      async function loadAnalyticsModule() {
        if (analyticsLoaded) return;
        
        // Загружаем Chart.js если ещё не загружен
        if (typeof Chart === 'undefined') {
          await new Promise((resolve) => {
            loadScript('https://cdn.jsdelivr.net/npm/chart.js', resolve);
          });
        }
        
        // Загружаем данные для аналитики
        await loadAnalyticsData();
        analyticsLoaded = true;
      }

      async function toggleCharts() {
        const chartsContainer = document.getElementById('chartsContainer');
        const statsContainer = document.getElementById('statsContainer');
        const tableContainer = document.getElementById('tableContainer');
        const yearlyComparisonContainer = document.getElementById('yearlyComparisonContainer');
        
        if (isAnalysisOpen) {
          // Скрываем
          chartsContainer.style.display = 'none';
          statsContainer.style.display = 'none';
          tableContainer.style.display = 'none';
          yearlyComparisonContainer.style.display = 'none';
          isAnalysisOpen = false;
          document.querySelector('.analysis-btn .btn-text').textContent = 'АНАЛИЗ';
        } else {
          // Показываем с загрузкой при необходимости
          document.querySelector('.analysis-btn .btn-text').textContent = 'ЗАГРУЗКА...';
          
          await loadAnalyticsModule();
          
          chartsContainer.style.display = 'grid';
          statsContainer.style.display = 'grid';
          tableContainer.style.display = 'block';
          yearlyComparisonContainer.style.display = 'block';
          
          isAnalysisOpen = true;
          document.querySelector('.analysis-btn .btn-text').textContent = 'СКРЫТЬ АНАЛИЗ';
        }
      }

      async function loadAnalyticsData() {
        try {
          // Загружаем данные таблицы
          await loadTableData();
          
          // Создаем графики
          createCharts();
          await createYearlyComparisonChart();
          updateStats();
        } catch (error) {
          console.error('Ошибка при загрузке аналитики:', error);
        }
      }

      async function loadTableData() {
        try {
          if (dataCache[selectedDate]?.tableData) {
            populateTable(dataCache[selectedDate].tableData);
            return;
          }
          
          // Демо-данные для таблицы
          populateDemoTable();
        } catch (error) {
          populateDemoTable();
        }
      }

      function populateDemoTable() {
        const tableBody = document.getElementById('tableBody');
        if (!tableBody) return;
        
        tableBody.innerHTML = '';
        
        for (let i = 1; i <= 31; i++) {
          const row = document.createElement('tr');
          const dayCell = document.createElement('td');
          dayCell.textContent = i;
          dayCell.style.fontWeight = 'bold';
          row.appendChild(dayCell);
          
          for (let j = 0; j < 14; j++) {
            const dataCell = document.createElement('td');
            const value = Math.floor(Math.random() * 5);
            if (value !== 0) {
              dataCell.textContent = value;
              dataCell.className = 'non-zero';
            }
            row.appendChild(dataCell);
          }
          tableBody.appendChild(row);
        }
      }

      function populateTable(tableData) {
        const tableBody = document.getElementById('tableBody');
        if (!tableBody) return;
        
        tableBody.innerHTML = '';
        
        tableData.forEach(row => {
          if (!row.day && row.errors.every(error => error === 0)) return;
          
          const tr = document.createElement('tr');
          const dayCell = document.createElement('td');
          dayCell.textContent = row.day;
          dayCell.style.fontWeight = 'bold';
          tr.appendChild(dayCell);
          
          row.errors.forEach(error => {
            const errorCell = document.createElement('td');
            if (error !== 0) {
              errorCell.textContent = error;
              errorCell.className = 'non-zero';
            }
            tr.appendChild(errorCell);
          });
          
          tableBody.appendChild(tr);
        });
      }

      function calculateMonthlyErrors() {
        const monthlyErrorsArr = Array(14).fill(0);
        const tableRows = document.querySelectorAll('#tableBody tr');
        
        tableRows.forEach(row => {
          const cells = row.querySelectorAll('td');
          for (let i = 1; i < cells.length; i++) {
            const errorCount = parseInt(cells[i].textContent) || 0;
            monthlyErrorsArr[i - 1] += errorCount;
          }
        });
        
        return monthlyErrorsArr;
      }

      function createCharts() {
        if (typeof Chart === 'undefined') return;
        
        const machineNumbers = Array.from({length: 14}, (_, i) => `${i + 1}`);
        
        if (errorsChart) errorsChart.destroy();
        if (fpsChart) fpsChart.destroy();
        
        const monthlyErrorsData = calculateMonthlyErrors();
        
        const errorsCtx = document.getElementById('errorsChart')?.getContext('2d');
        if (errorsCtx) {
          errorsChart = new Chart(errorsCtx, {
            type: 'bar',
            data: {
              labels: machineNumbers,
              datasets: [{
                data: monthlyErrorsData,
                backgroundColor: 'rgba(220, 20, 60, 0.8)',
                borderColor: 'rgba(220, 20, 60, 1)',
                borderWidth: 1
              }]
            },
            options: {
              responsive: true,
              plugins: { legend: { display: false } }
            }
          });
        }
        
        const fpsCtx = document.getElementById('fpsChart')?.getContext('2d');
        if (fpsCtx) {
          fpsChart = new Chart(fpsCtx, {
            type: 'bar',
            data: {
              labels: machineNumbers,
              datasets: [{
                data: machineFPS,
                backgroundColor: 'rgba(26, 47, 64, 0.8)',
                borderColor: 'rgba(26, 47, 64, 1)',
                borderWidth: 1
              }]
            },
            options: {
              responsive: true,
              plugins: { legend: { display: false } }
            }
          });
        }
      }

      function updateStats() {
        const totalErrorsEl = document.getElementById('totalErrors');
        const totalFPSEl = document.getElementById('totalFPS');
        if (totalErrorsEl) totalErrorsEl.textContent = monthlyErrors;
        if (totalFPSEl) totalFPSEl.textContent = Math.ceil(monthlyFPS);
      }

      async function createYearlyComparisonChart() {
        if (typeof Chart === 'undefined') return;
        
        const yearlyComparisonCtx = document.getElementById('yearlyComparisonChart')?.getContext('2d');
        if (!yearlyComparisonCtx) return;
        
        const currentYear = new Date().getFullYear();
        const demoData = {
          years: [currentYear - 1, currentYear],
          months: ['Янв', 'Фев', 'Мар', 'Апр', 'Май', 'Июн', 'Июл', 'Авг', 'Сен', 'Окт', 'Ноя', 'Дек'],
          data: {
            [currentYear - 1]: [120, 95, 130, 110, 105, 90, 115, 125, 100, 135, 140, 120],
            [currentYear]: [110, 100, 125, 115, 95, 85, 105, 120, 110, 130, 145, 115]
          }
        };
        
        if (yearlyComparisonChart) yearlyComparisonChart.destroy();
        
        yearlyComparisonChart = new Chart(yearlyComparisonCtx, {
          type: 'line',
          data: {
            labels: demoData.months,
            datasets: [
              {
                label: demoData.years[0].toString(),
                data: demoData.data[demoData.years[0]],
                borderColor: 'rgba(220, 20, 60, 0.8)',
                backgroundColor: 'transparent',
                borderWidth: 2
              },
              {
                label: demoData.years[1].toString(),
                data: demoData.data[demoData.years[1]],
                borderColor: 'rgba(26, 47, 64, 0.8)',
                backgroundColor: 'transparent',
                borderWidth: 2
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false
          }
        });
      }

      // ===== ИНИЦИАЛИЗАЦИЯ =====
      function initializeApp() {
        generateMachineCells();
        document.getElementById('date').value = selectedDate;
        loadDataForDate(selectedDate);
      }

      // ===== ОБРАБОТЧИКИ =====
      document.addEventListener('click', function(e) {
        const userDropdown = document.getElementById("userDropdown");
        const userAvatar = document.getElementById("userAvatar");
        
        if (userDropdown.style.display === 'block' && !userAvatar.contains(e.target) && !userDropdown.contains(e.target)) {
          userDropdown.style.display = 'none';
        }
      });

      document.getElementById('date').addEventListener('change', function(e) {
        const hasUnsavedChanges = machineErrors.some((current, index) => current !== originalErrors[index]);
        
        if (hasUnsavedChanges) {
          if (!confirm('У вас есть несохраненные изменения. Перейти к другой дате без сохранения?')) {
            this.value = selectedDate;
            return;
          }
        }
        
        selectedDate = e.target.value;
        analyticsLoaded = false;
        isAnalysisOpen = false;
        document.querySelector('.analysis-btn .btn-text').textContent = 'АНАЛИЗ';
        
        // Скрываем аналитику если она была открыта
        const chartsContainer = document.getElementById('chartsContainer');
        const statsContainer = document.getElementById('statsContainer');
        const tableContainer = document.getElementById('tableContainer');
        const yearlyComparisonContainer = document.getElementById('yearlyComparisonContainer');
        
        if (chartsContainer) {
          chartsContainer.style.display = 'none';
          statsContainer.style.display = 'none';
          tableContainer.style.display = 'none';
          yearlyComparisonContainer.style.display = 'none';
        }
        
        loadDataForDate(selectedDate);
      });

      window.addEventListener('beforeunload', function(e) {
        const hasUnsavedChanges = machineErrors.some((current, index) => current !== originalErrors[index]);
        
        if (hasUnsavedChanges) {
          e.preventDefault();
          e.returnValue = 'У вас есть несохраненные изменения. Вы уверены, что хотите уйти?';
          return e.returnValue;
        }
      });

      // ===== ПРОВЕРКА СОХРАНЕННОЙ СЕССИИ =====
      window.addEventListener('load', function() {
        const isLoggedIn = localStorage.getItem('userLoggedIn') === 'true';
        const email = localStorage.getItem('userEmail');
        const name = localStorage.getItem('userName');
        const pic = localStorage.getItem('userPic');
        
        if (isLoggedIn && email) {
          loginSection.style.display = 'none';
          mainContent.style.display = 'block';
          
          currentUser = { email: email, name: name, picture: pic };
          
          updateUserAvatar(currentUser);
          
          setTimeout(() => {
            loadingScreen.classList.add('fade-out');
          }, 500);
          
          loadRemainingUI();
          initializeApp();
        } else {
          loginSection.style.display = 'flex';
          
          setTimeout(() => {
            loadingScreen.classList.add('fade-out');
          }, 500);
        }
      });

      // Экспорт функций
      window.toggleUserDropdown = toggleUserDropdown;
      window.signOut = signOut;
      window.cancelChanges = cancelChanges;
      window.saveData = saveData;
      window.toggleCharts = toggleCharts;
    })();
  </script>
</body>
</html>
