<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>LUCKY STRIKE KH | Учет</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --primary-bg: #f5f5f7;
      --card-bg: #ffffff;
      --header-bg: rgba(255, 255, 255, 0.8);
      --accent-red: #ff3b30;
      --accent-blue: #007aff;
      --text-main: #1d1d1f;
      --text-secondary: #86868b;
      --radius-lg: 18px;
      --radius-md: 12px;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
      --blur: saturate(180%) blur(20px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--primary-bg);
      color: var(--text-main);
      line-height: 1.4;
    }

    /* --- Header (Apple Style) --- */
    header {
      position: fixed;
      top: 0; width: 100%; height: 60px;
      background: var(--header-bg);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; z-index: 1000;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }

    .logo-container { display: flex; align-items: center; gap: 10px; }
    .logo-container img { width: 32px; height: 32px; border-radius: 8px; }
    .site-title { font-weight: 700; font-size: 17px; letter-spacing: -0.5px; }

    .user-profile {
      width: 32px; height: 32px;
      border-radius: 50%; background: #e5e5e5;
      cursor: pointer; overflow: hidden;
      border: 1px solid rgba(0,0,0,0.05);
    }

    /* --- Layout --- */
    .container {
      max-width: 800px; margin: 80px auto 40px;
      padding: 0 16px;
    }

    .section-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 20px; margin-bottom: 20px;
      box-shadow: var(--shadow);
    }

    /* --- Controls --- */
    .date-picker-wrap {
      display: flex; justify-content: center; margin-bottom: 24px;
    }
    input[type="date"] {
      border: none; background: #e5e5ea;
      padding: 10px 15px; border-radius: 10px;
      font-size: 16px; font-family: inherit; font-weight: 600;
    }

    .grid-container {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px; margin-bottom: 24px;
    }

    .lane-card {
      background: var(--card-bg);
      border-radius: var(--radius-md);
      padding: 15px 10px; text-align: center;
      box-shadow: var(--shadow);
      transition: transform 0.1s ease, border-color 0.2s;
      border: 2px solid transparent;
      cursor: pointer;
    }

    .lane-card:active { transform: scale(0.95); }
    .lane-card.has-errors { border-color: rgba(255, 59, 48, 0.3); }

    .lane-label { font-size: 12px; color: var(--text-secondary); font-weight: 600; margin-bottom: 4px; }
    .lane-count { font-size: 28px; font-weight: 700; }
    .lane-count.val-zero { color: #d1d1d6; }
    .lane-count.val-active { color: var(--accent-red); }

    /* --- Buttons --- */
    .action-group { display: flex; gap: 12px; }
    .btn {
      flex: 1; border: none; padding: 16px;
      border-radius: var(--radius-md);
      font-size: 16px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-save { background: var(--text-main); color: #fff; }
    .btn-cancel { background: #e5e5ea; color: var(--text-main); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* --- Analytics --- */
    .analysis-section { display: none; margin-top: 30px; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;
    }
    .stat-box {
      background: var(--card-bg); padding: 15px;
      border-radius: var(--radius-md); text-align: center;
      box-shadow: var(--shadow);
    }
    .stat-val { display: block; font-size: 24px; font-weight: 700; color: var(--accent-blue); }
    .stat-lab { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; }

    /* --- Loaders --- */
    #global-loader {
      position: fixed; inset: 0; background: #fff;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s;
    }
    .spinner {
      width: 40px; height: 40px; border: 3px solid #f3f3f3;
      border-top: 3px solid var(--accent-blue); border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Mobile Adaptivity */
    @media (max-width: 480px) {
      .grid-container { grid-template-columns: repeat(2, 1fr); }
      .site-title { font-size: 15px; }
    }
  </style>
</head>
<body>

  <div id="global-loader">
    <div class="spinner"></div>
    <p style="margin-top: 15px; font-weight: 600; color: #86868b;">LUCKY STRIKE KH</p>
  </div>

  <header>
    <div class="logo-container">
      <img src="https://i.postimg.cc/dtSpKx0W/1.png" alt="Logo">
      <span class="site-title">LUCKY STRIKE KH</span>
    </div>
    <div class="user-profile" id="userBtn">
      <i class="fas fa-user" style="display: flex; align-items: center; justify-content: center; height: 100%; color: #86868b;"></i>
    </div>
  </header>

  <main class="container">
    <div class="date-picker-wrap">
      <input type="date" id="mainDate">
    </div>

    <div class="grid-container" id="lanesGrid">
      </div>

    <div class="action-group">
      <button class="btn btn-cancel" id="btnCancel">Отмена</button>
      <button class="btn btn-save" id="btnSave">Сохранить</button>
    </div>

    <button class="btn" id="btnToggleAnalysis" style="width: 100%; margin-top: 12px; background: transparent; color: var(--accent-blue);">
      Показать анализ
    </button>

    <div class="analysis-section" id="analysisView">
      <div class="stats-grid">
        <div class="stat-box">
          <span class="stat-val" id="statTotalErrors">0</span>
          <span class="stat-lab">Ошибки / Месяц</span>
        </div>
        <div class="stat-box">
          <span class="stat-val" id="statAvgFps">0</span>
          <span class="stat-lab">Средний FPS</span>
        </div>
      </div>
      
      <div class="section-card">
        <canvas id="chartErrors" height="200"></canvas>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script>
    /**
     * Конфигурация и Состояние
     */
    const CONFIG = {
      BACKEND_URL: 'https://script.google.com/macros/s/AKfycbym_79krm2GhFqOJrq5UwgDXUTQFDnTT-FY67atU3Mpg3Tz2r4qfpBVmvEZ72A4wGMZdQ/exec',
      TOTAL_LANES: 14,
      SAVE_TIMEOUT: 2000
    };

    const state = {
      selectedDate: new Date().toISOString().split('T')[0],
      currentErrors: Array(CONFIG.TOTAL_LANES).fill(0),
      initialErrors: Array(CONFIG.TOTAL_LANES).fill(0),
      isLoading: false,
      isAnalysisVisible: false
    };

    /**
     * Инициализация UI
     */
    const dom = {
      loader: document.getElementById('global-loader'),
      grid: document.getElementById('lanesGrid'),
      dateInput: document.getElementById('mainDate'),
      btnSave: document.getElementById('btnSave'),
      btnCancel: document.getElementById('btnCancel'),
      btnToggleAnalysis: document.getElementById('btnToggleAnalysis'),
      analysisView: document.getElementById('analysisView')
    };

    function init() {
      // Установка даты
      dom.dateInput.value = state.selectedDate;
      
      // Генерация дорожек
      renderLanes();
      
      // Слушатели событий
      dom.dateInput.addEventListener('change', (e) => handleDateChange(e.target.value));
      dom.btnSave.addEventListener('click', () => saveData());
      dom.btnCancel.addEventListener('click', () => resetChanges());
      dom.btnToggleAnalysis.addEventListener('click', toggleAnalysis);

      // Загрузка начальных данных
      fetchData();

      // Скрытие лоадера
      setTimeout(() => dom.loader.style.opacity = '0', 800);
      setTimeout(() => dom.loader.style.display = 'none', 1300);
    }

    function renderLanes() {
      dom.grid.innerHTML = '';
      for (let i = 0; i < CONFIG.TOTAL_LANES; i++) {
        const card = document.createElement('div');
        card.className = 'lane-card';
        card.onclick = () => incrementError(i);
        card.innerHTML = `
          <div class="lane-label">LANE ${i + 1}</div>
          <div class="lane-count val-zero" id="count-${i}">0</div>
        `;
        dom.grid.appendChild(card);
      }
    }

    /**
     * Логика данных
     */
    async function fetchData() {
      setLoading(true);
      try {
        // Здесь эмуляция или реальный fetch
        const response = await fetch(`${CONFIG.BACKEND_URL}?date=${state.selectedDate}&simple=true`);
        const data = await response.json();
        
        if (data.errors) {
          state.currentErrors = [...data.errors];
          state.initialErrors = [...data.errors];
          updateUI();
        }
      } catch (e) {
        console.error("Ошибка загрузки:", e);
      } finally {
        setLoading(false);
      }
    }

    function incrementError(index) {
      state.currentErrors[index]++;
      updateUI();
    }

    function updateUI() {
      state.currentErrors.forEach((val, i) => {
        const el = document.getElementById(`count-${i}`);
        const card = el.parentElement;
        el.innerText = val;
        
        if (val > 0) {
          el.className = 'lane-count val-active';
          card.classList.add('has-errors');
        } else {
          el.className = 'lane-count val-zero';
          card.classList.remove('has-errors');
        }
      });

      const hasChanges = JSON.stringify(state.currentErrors) !== JSON.stringify(state.initialErrors);
      dom.btnSave.disabled = !hasChanges;
    }

    async function saveData() {
      setLoading(true);
      const diff = state.currentErrors.map((val, i) => val - state.initialErrors[i]);
      
      try {
        const formData = new URLSearchParams();
        formData.append('date', state.selectedDate);
        formData.append('errors', JSON.stringify(diff));

        const res = await fetch(CONFIG.BACKEND_URL, {
          method: 'POST',
          body: formData
        });

        if (res.ok) {
          state.initialErrors = [...state.currentErrors];
          alert("Успешно сохранено");
          updateUI();
        }
      } catch (e) {
        alert("Ошибка при сохранении");
      } finally {
        setLoading(false);
      }
    }

    function resetChanges() {
      if (confirm("Сбросить все изменения?")) {
        state.currentErrors = [...state.initialErrors];
        updateUI();
      }
    }

    function handleDateChange(newDate) {
      state.selectedDate = newDate;
      fetchData();
    }

    /**
     * Вспомогательные функции
     */
    function setLoading(val) {
      state.isLoading = val;
      dom.btnSave.innerText = val ? "Загрузка..." : "Сохранить";
    }

    function toggleAnalysis() {
      state.isAnalysisVisible = !state.isAnalysisVisible;
      dom.analysisView.style.display = state.isAnalysisVisible ? 'block' : 'none';
      dom.btnToggleAnalysis.innerText = state.isAnalysisVisible ? 'Скрыть анализ' : 'Показать анализ';
      
      if (state.isAnalysisVisible) initChart();
    }

    function initChart() {
      const ctx = document.getElementById('chartErrors').getContext('2d');
      if (window.myChart) window.myChart.destroy();
      
      window.myChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: Array.from({length: 14}, (_, i) => i + 1),
          datasets: [{
            label: 'Ошибки',
            data: state.currentErrors,
            backgroundColor: '#007aff',
            borderRadius: 6
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, grid: { display: false } } }
        }
      });
    }

    // Запуск
    window.onload = init;
  </script>
</body>
</html>
