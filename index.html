<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>BILLIARD PRO | BOOKING</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #0f172a;
      --glass: rgba(30, 41, 59, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent-neon: #38bdf8;
      --accent-green: #4ade80;
      --accent-red: #fb7185;
      --text-bright: #f8fafc;
      --cell-w: 50px;
      --cell-h: 44px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
      color: var(--text-bright);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 10px;
    }

    /* Заголовок */
    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 30px;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 800;
    }

    /* Основной контейнер таблицы */
    .glass-card {
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 20px;
      width: 100%;
      max-width: 1050px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .table-scroll {
      overflow-x: auto;
      border-radius: 16px;
      position: relative;
    }

    table {
      border-collapse: separate;
      border-spacing: 4px; /* Расстояние между ячейками, чтобы не слипалось */
      width: 100%;
      table-layout: fixed;
    }

    /* Шапка таблицы */
    thead th {
      height: 50px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 800;
      color: var(--accent-neon);
    }

    /* Ячейки */
    td.slot {
      height: var(--cell-h);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid transparent;
    }

    td.slot:hover {
      background: rgba(56, 189, 248, 0.1);
      border-color: var(--accent-neon);
    }

    /* Время (правая колонка) */
    .time-col-header { background: var(--accent-neon) !important; color: var(--bg-dark) !important; }
    .time-right {
      width: 70px;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      text-align: center;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
    }

    /* Состояния выбора */
    td.selected {
      background: var(--accent-neon) !important;
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
    }

    td.start-time-chosen {
      background: transparent !important;
      border: 2px solid var(--accent-neon) !important;
      position: relative;
    }
    td.start-time-chosen::after {
      content: '●';
      color: var(--accent-neon);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 10px;
    }

    /* Ползунки существующих броней */
    #slidersContainer {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 10;
    }
    .existing-slider {
      position: absolute;
      border-radius: 8px;
      pointer-events: auto;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      transition: transform 0.2s;
      background: #475569; /* Цвет по умолчанию */
    }
    .existing-slider.confirmed { background: linear-gradient(135deg, #059669, #10b981); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
    .existing-slider.rejected { background: linear-gradient(135deg, #e11d48, #fb7185); box-shadow: 0 4px 12px rgba(251, 113, 133, 0.3); }

    /* Нижняя панель управления */
    .controls-bar {
      margin-top: 30px;
      display: flex;
      gap: 15px;
      width: 100%;
      max-width: 1050px;
      flex-wrap: wrap;
    }

    #dateInput {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: white;
      padding: 15px 25px;
      border-radius: 16px;
      font-family: inherit;
      font-weight: 600;
      outline: none;
    }

    .btn-main {
      background: var(--accent-neon);
      color: var(--bg-dark);
      border: none;
      padding: 15px 35px;
      border-radius: 16px;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.3s;
      flex-grow: 1;
    }

    .btn-main:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3); }

    /* Модалки */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .modal-content {
      background: #1e293b;
      border: 1px solid var(--glass-border);
      padding: 40px;
      border-radius: 32px;
      width: 100%;
      max-width: 450px;
    }
    .modal-content input, .modal-content textarea {
      width: 100%;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--glass-border);
      color: white;
      padding: 12px;
      border-radius: 12px;
      margin: 10px 0 20px;
    }

    /* Адаптив */
    @media (max-width: 768px) {
      .glass-card { padding: 10px; }
      thead th { font-size: 11px; }
      .time-right { font-size: 10px; width: 55px; }
    }

    /* Оверлей логина */
    #login {
      position: fixed; inset: 0; background: var(--bg-dark);
      display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
    }
  </style>
</head>
<body>

  <div id="login">
    <div class="header-logo">
      <img src="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png" width="50">
      <span>Billiard Control</span>
    </div>
    <div id="g_id_onload" data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
    <div class="g_id_signin" data-type="standard" data-theme="filled_black"></div>
  </div>

  <div id="content" style="display:none; width: 100%; max-width: 1050px;">
    
    <div class="header-logo">
      <img src="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png" width="40">
      <span>Бронирование столов</span>
    </div>

    <div class="glass-card">
      <div class="table-scroll">
        <table id="bookingTable">
          <thead>
            <tr>
              <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th>
              <th>7</th><th>8</th><th>9</th><th>10</th><th>11</th><th>12</th>
              <th class="time-col-header" id="openImage" style="cursor:pointer">MAP</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div id="slidersContainer"></div>
      </div>
    </div>

    <div id="cardsContainer" style="display:flex; flex-wrap:wrap; gap:10px; margin-top:20px;"></div>

    <div class="controls-bar">
      <input type="date" id="dateInput">
      <button class="btn-main" onclick="openModal()">Забронировать сейчас</button>
    </div>

    <div id="modal" class="modal">
      <div class="modal-content">
        <h2 style="margin-bottom:20px; color:var(--accent-neon)">Новая запись</h2>
        <label>ИМЯ КЛИЕНТА</label>
        <input id="nameInput" placeholder="Введите имя...">
        <label>ТЕЛЕФОН</label>
        <input id="phoneInput" type="tel" placeholder="+380...">
        <label>ЗАМЕТКА</label>
        <textarea id="commentInput" rows="2"></textarea>
        <div style="display:flex; gap:10px;">
          <button onclick="submitForm()" class="btn-main" style="background:var(--accent-green)">СОЗДАТЬ</button>
          <button onclick="closeModal()" class="btn-main" style="background:#475569; color:white">ОТМЕНА</button>
        </div>
      </div>
    </div>

    <div id="bookingInfoPopup" class="modal">
      <div class="modal-content" style="text-align:center">
        <h2 id="info-table-title" style="color:var(--accent-neon); margin-bottom:15px"></h2>
        <p id="info-time" style="font-size:18px; margin-bottom:10px"></p>
        <p id="info-name" style="font-weight:bold"></p>
        <p id="info-phone" style="opacity:0.7; margin-bottom:20px"></p>
        <div style="display:flex; gap:10px;">
          <button onclick="confirmBooking(true)" class="btn-main" style="background:var(--accent-green); padding:10px">OK</button>
          <button onclick="confirmBooking(false)" class="btn-main" style="background:var(--accent-red); padding:10px">NO</button>
        </div>
        <button onclick="deleteBooking()" style="margin-top:15px; background:none; border:none; color:var(--accent-red); cursor:pointer">Удалить бронь</button>
        <br>
        <button onclick="closeBookingInfoPopup()" style="margin-top:15px; opacity:0.5; background:none; border:none; color:white; cursor:pointer">Закрыть</button>
      </div>
    </div>

  </div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxfRLDGA29FrqKS61HmYN_FUnDwOydeCaEdeW4oc4wyroQzvb4h1OnwQ5HeotIHhcj9/exec";
  const allowedEmails = ["vadiksss900@gmail.com", "sergey99belov@gmail.com", "popadinecvasil3@gmail.com", "veronicadiakova04@gmail.com", "info.luckystrike.kh@gmail.com", "sashavolobuev123890@gmail.com", "egorgorbushko@gmail.com", "shatrava.o@gmail.com", "Craftmax30@gmail.com", "bowlingblock.b@gmail.com", "lana.arnaut@gmail.com", "polosinnikita1224@gmail.com", "sofialat1506@gmail.com", "ken040888@gmail.com"];

  let currentLane = null, currentStart = null, currentBookingId = null;
  const intervalsByLane = {};
  const timeSlots = [];
  for (let h = 11; h <= 22; h++) {
    timeSlots.push({ display: `${h}:00`, key: h });
    if (h < 22) timeSlots.push({ display: `${h}:30`, key: h + 0.5 });
  }

  function handleCredentialResponse(response) {
    const data = JSON.parse(atob(response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
    if (allowedEmails.includes(data.email)) {
      localStorage.setItem("userEmail", data.email);
      location.reload();
    } else alert("Нет доступа");
  }

  window.onload = () => {
    if (localStorage.getItem("userEmail")) {
      document.getElementById("login").style.display = "none";
      document.getElementById("content").style.display = "block";
      init();
    }
  };

  function init() {
    const tableBody = document.getElementById("tableBody");
    const dateInput = document.getElementById("dateInput");
    dateInput.value = new Date().toISOString().split('T')[0];

    timeSlots.forEach(slot => {
      const row = document.createElement("tr");
      for (let lane = 0; lane < 12; lane++) {
        const cell = document.createElement("td");
        cell.className = "slot";
        cell.dataset.lane = lane;
        cell.dataset.time = slot.key;
        row.appendChild(cell);
      }
      const timeCell = document.createElement("td");
      timeCell.className = "time-right";
      timeCell.textContent = slot.display;
      row.appendChild(timeCell);
      tableBody.appendChild(row);
    });

    loadData();
    
    tableBody.onclick = (e) => {
      const cell = e.target;
      if (cell.classList.contains('slot')) {
        currentLane = +cell.dataset.lane;
        document.querySelectorAll('.slot').forEach(c => c.classList.remove('start-time-chosen'));
        cell.classList.add('start-time-chosen');
      } else if (cell.classList.contains('time-right')) {
        if (currentLane === null) return;
        const time = parseFloat(cell.textContent.includes(":30") ? cell.textContent.replace(":30",".5") : cell.textContent.replace(":00",".0"));
        if (currentStart === null) {
          currentStart = time;
        } else {
          if (time <= currentStart) return alert("Ошибка времени");
          if (!intervalsByLane[currentLane]) intervalsByLane[currentLane] = [];
          intervalsByLane[currentLane].push({ start: currentStart, end: time });
          currentStart = null; currentLane = null;
          renderSelection();
        }
      }
    };
  }

  function renderSelection() {
    document.querySelectorAll('.slot').forEach(c => c.classList.remove('selected', 'start-time-chosen'));
    const container = document.getElementById("cardsContainer");
    container.innerHTML = "";

    for (let lane in intervalsByLane) {
      intervalsByLane[lane].forEach((iv, idx) => {
        document.querySelectorAll(`td[data-lane="${lane}"]`).forEach(cell => {
          const t = parseFloat(cell.dataset.time);
          if (t >= iv.start && t < iv.end) cell.classList.add('selected');
        });
        const tag = document.createElement("div");
        tag.style = "background:var(--accent-neon); color:black; padding:5px 12px; border-radius:20px; font-size:12px; font-weight:bold";
        tag.innerHTML = `Стол ${+lane+1} (${formatTime(iv.start)}-${formatTime(iv.end)}) <span onclick="removeIv(${lane},${idx})" style="cursor:pointer; margin-left:5px">×</span>`;
        container.appendChild(tag);
      });
    }
  }

  async function loadData() {
    const sliders = document.getElementById("slidersContainer");
    sliders.innerHTML = "";
    const res = await fetch(`${GAS_URL}?action=get&date=${document.getElementById("dateInput").value}`);
    const data = await res.json();
    
    data.bookings?.forEach(b => {
      const laneIdx = b.table - 1;
      const startCell = document.querySelector(`td[data-lane="${laneIdx}"][data-time="${b.start}"]`);
      const endCell = document.querySelector(`td[data-lane="${laneIdx}"][data-time="${b.end}"]`);
      
      if (startCell && endCell) {
        const slider = document.createElement("div");
        slider.className = "existing-slider " + (b.confirmed === "Да" ? "confirmed" : b.confirmed === "Нет" ? "rejected" : "");
        slider.style.left = startCell.offsetLeft + "px";
        slider.style.top = startCell.offsetTop + "px";
        slider.style.width = startCell.offsetWidth + "px";
        slider.style.height = (endCell.offsetTop - startCell.offsetTop) + "px";
        slider.innerHTML = b.name.substring(0,5);
        slider.onclick = () => showInfo(b);
        sliders.appendChild(slider);
      }
    });
  }

  function showInfo(b) {
    currentBookingId = b.id;
    document.getElementById('info-table-title').textContent = "Стол №" + b.table;
    document.getElementById('info-time').textContent = `${formatTime(b.start)} - ${formatTime(b.end)}`;
    document.getElementById('info-name').textContent = b.name;
    document.getElementById('info-phone').textContent = b.phone;
    document.getElementById('bookingInfoPopup').style.display = "flex";
  }

  async function confirmBooking(s) {
    await fetch(GAS_URL, { method:"POST", mode:"no-cors", body: JSON.stringify({ action:"confirm", id:currentBookingId, confirmed:s }) });
    location.reload();
  }
  async function deleteBooking() {
    if(confirm("Удалить?")) {
      await fetch(GAS_URL, { method:"POST", mode:"no-cors", body: JSON.stringify({ action:"delete", id:currentBookingId }) });
      location.reload();
    }
  }
  async function submitForm() {
    const bookings = [];
    for(let lane in intervalsByLane) {
      intervalsByLane[lane].forEach(iv => {
        bookings.push({ date: document.getElementById("dateInput").value, tableNumber: +lane+1, start: iv.start, end: iv.end, name: document.getElementById("nameInput").value, phone: document.getElementById("phoneInput").value });
      });
    }
    await fetch(GAS_URL, { method:"POST", mode:"no-cors", body: JSON.stringify({ bookings }) });
    location.reload();
  }

  function openModal() { document.getElementById("modal").style.display="flex"; }
  function closeModal() { document.getElementById("modal").style.display="none"; }
  function closeBookingInfoPopup() { document.getElementById("bookingInfoPopup").style.display="none"; }
  function formatTime(v) { return `${Math.floor(v)}:${v % 1 === 0.5 ? "30" : "00"}`; }
  document.getElementById("dateInput").onchange = loadData;
  function removeIv(l, i) { intervalsByLane[l].splice(i,1); renderSelection(); }
</script>
</body>
</html>
