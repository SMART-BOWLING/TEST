<script>
  // === НАСТРОЙКИ ===
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw-F1Y0RxuTtpCy567mAvvv0gQhHuLMRrnJmOziEQ4p3fGso5fK9JlGz69iM-VdK0Ij/exec";
  const SPREADSHEET_ID = '1v-R394u6sKzSdvmkh9qsbqhfkNZEi5lIXwo8BdT_lhQ';
  const SHEET_NAME = 'KH';
  const API_KEY = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';
  const CURRENT_SITE = 'https://smart-bowling.github.io/PARTS-KH/';

  let currentUser = null;
  let allEntries = [];
  let currentEntries = [];
  let currentPage = 1;
  let totalPages = 1;
  const cardsPerPage = 30;

  const pagination = {
    prevPage: () => { if (currentPage > 1) goToPage(currentPage - 1); },
    nextPage: () => { if (currentPage < totalPages) goToPage(currentPage + 1); }
  };

  function showLoader(show) {
    document.getElementById('loader').style.display = show ? 'flex' : 'none';
  }

  // Функции для выпадающих меню
  function toggleUserDropdown() {
    const menu = document.getElementById("userDropdown");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
  }

  function toggleSitesDropdown(event) {
    event.stopPropagation();
    const dropdown = document.getElementById("sitesDropdown");
    dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
  }

  document.addEventListener('click', function(e) {
    const sitesDropdown = document.getElementById("sitesDropdown");
    const siteName = document.querySelector('.site-name-dropdown');
    const userDropdown = document.getElementById("userDropdown");
    const userAvatar = document.getElementById("userAvatar");
    
    if (sitesDropdown && sitesDropdown.style.display === 'block' && siteName && !siteName.contains(e.target)) {
      sitesDropdown.style.display = 'none';
    }
    if (userDropdown && userDropdown.style.display === 'block' && userAvatar && !userAvatar.contains(e.target) && !userDropdown.contains(e.target)) {
      userDropdown.style.display = 'none';
    }
  });

  // === АВТОРИЗАЦИЯ ===
  function loadSheetsAPI() {
    return new Promise((resolve, reject) => {
      gapi.load('client', {
        callback: resolve,
        onerror: () => reject('Ошибка загрузки Google API'),
        timeout: 10000,
        ontimeout: () => reject('Таймаут загрузки Google API')
      });
    });
  }

  function parseJwt(token) {
    try {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => 
        '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
      return JSON.parse(jsonPayload);
    } catch (e) {
      return {};
    }
  }

  function handleCredentialResponse(response) {
    showLoader(true);
    try {
      const payload = parseJwt(response.credential);
      currentUser = {
        email: payload.email.toLowerCase().trim(),
        name: payload.name,
        picture: payload.picture
      };
      updateUserAvatar(currentUser);
      
      // Показываем шапку
      document.querySelector('header').style.display = 'flex';
      
      initAndCheckEmail();
    } catch (e) {
      showLoader(false);
      alert('Ошибка аутентификации');
    }
  }

  function updateUserAvatar(user) {
    const avatarContainer = document.getElementById('userAvatar');
    if (user?.picture) {
      avatarContainer.innerHTML = `<img src="${user.picture}" alt="Avatar">`;
    } else {
      avatarContainer.innerHTML = '<i class="fas fa-user"></i>';
    }
  }

  async function initAndCheckEmail() {
    try {
      await loadSheetsAPI();
      await gapi.client.init({
        apiKey: API_KEY,
        discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
      });
      await checkEmailInSheet(currentUser.email);
    } catch (error) {
      showLoader(false);
      alert('Ошибка инициализации Google API: ' + error);
    }
  }

  async function checkEmailInSheet(email) {
    try {
      const response = await gapi.client.sheets.spreadsheets.values.get({
        spreadsheetId: '1-yiVdZYa6wJdupTiuiHvI_ht3Vu73RUjyCehZqs2cJ4',
        range: '1!A:Z',
      });
      
      const rows = response.result.values || [];
      let hasAccess = false;
      
      for (let i = 0; i < rows.length; i++) {
        if (!rows[i]?.[0]) continue;
        if (rows[i][0].toLowerCase().trim() === email) {
          for (let j = 1; j < rows[i].length; j++) {
            const siteUrl = rows[i][j]?.trim().split('?')[0].split('#')[0] || '';
            if (siteUrl === CURRENT_SITE || siteUrl.includes('PARTS-KH')) {
              hasAccess = true;
              break;
            }
          }
          break;
        }
      }
      
      if (hasAccess) {
        loginUser(currentUser);
      } else {
        showLoader(false);
        alert('Доступ запрещен');
        signOut();
      }
    } catch (error) {
      showLoader(false);
      alert('Ошибка доступа к таблице');
    }
  }

  function loginUser(payload) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    
    localStorage.setItem('userLoggedIn', 'true');
    localStorage.setItem('userEmail', payload.email.toLowerCase());
    localStorage.setItem('userName', payload.name);
    localStorage.setItem('userPic', payload.picture);
    
    showLoader(false);
    initApp();
  }

  function signOut() {
    localStorage.clear();
    sessionStorage.clear();
    
    // Скрываем шапку и контент
    document.querySelector('header').style.display = 'none';
    document.getElementById('login').style.display = 'flex';
    document.getElementById('content').style.display = 'none';
    
    if (google?.accounts?.id) {
      google.accounts.id.disableAutoSelect();
    }
  }

  window.addEventListener('load', function() {
    const isLoggedIn = localStorage.getItem('userLoggedIn') === 'true';
    const email = localStorage.getItem('userEmail');
    
    if (isLoggedIn && email) {
      document.getElementById('login').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      document.querySelector('header').style.display = 'flex';
      
      currentUser = {
        email: email,
        name: localStorage.getItem('userName'),
        picture: localStorage.getItem('userPic')
      };
      
      updateUserAvatar(currentUser);
      showLoader(true);
      
      loadSheetsAPI()
        .then(() => gapi.client.init({
          apiKey: API_KEY,
          discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
        }))
        .then(() => checkEmailInSheet(email))
        .catch(error => {
          showLoader(false);
          alert('Ошибка восстановления сессии');
          signOut();
        });
    } else {
      document.getElementById('login').style.display = 'flex';
      document.querySelector('header').style.display = 'none';
    }
  });

  // === ОПТИМИЗИРОВАННАЯ ЗАГРУЗКА ДАННЫХ ===
  async function loadAllData() {
    try {
      const response = await gapi.client.sheets.spreadsheets.values.get({
        spreadsheetId: SPREADSHEET_ID,
        range: 'KH!A:I',
      });
      
      const rows = response.result.values || [];
      const entries = [];
      
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        if (!row || !row[0] || row[0].trim() === '') continue;
        
        const partNumber = row[0].trim();
        const quantity = parseInt(row[1]) || 0;
        const fileUrl = row[3] || '';
        const partName = (row[4] && row[4].trim() !== '') ? row[4].trim() : '';
        const added = parseInt(row[6]) || 0;
        const taken = parseInt(row[7]) || 0;
        const minStock = parseInt(row[8]) || 0;
        
        entries.push({
          rowIndex: i + 1,
          partNumber: partNumber,
          quantity: quantity,
          fileUrl: fileUrl,
          partName: partName,
          added: added,
          taken: taken,
          minStock: minStock
        });
      }
      
      return entries;
    } catch (error) {
      console.error('Error loading data:', error);
      throw error;
    }
  }

  async function updateQuantity(partNumber, delta) {
    showLoader(true);
    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?action=updateQuantity&partNumber=${encodeURIComponent(partNumber)}&delta=${delta}`);
      const data = await res.json();
      if (data.status === 'success') {
        allEntries = await loadAllData();
        currentEntries = [...allEntries];
        updateTotalPages();
        renderPage(currentPage);
      }
      return data;
    } finally {
      showLoader(false);
    }
  }

  async function deleteEntry(rowIndex) {
    showLoader(true);
    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?action=deleteEntry&rowIndex=${rowIndex}`);
      const data = await res.json();
      if (data.status === 'success') {
        allEntries = await loadAllData();
        currentEntries = [...allEntries];
        updateTotalPages();
        if (currentPage > totalPages) currentPage = totalPages;
        renderPage(currentPage);
      }
      return data;
    } finally {
      showLoader(false);
    }
  }

  async function getHistory(partNumber) {
    showLoader(true);
    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?action=getHistory&partNumber=${encodeURIComponent(partNumber)}`);
      return await res.text();
    } finally {
      showLoader(false);
    }
  }

  async function getPopularEntries() {
    showLoader(true);
    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?action=getPopularEntries`);
      return await res.json();
    } finally {
      showLoader(false);
    }
  }

  async function getMostPopularEntries() {
    showLoader(true);
    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?action=getMostPopularEntries`);
      return await res.json();
    } finally {
      showLoader(false);
    }
  }

  async function updatePartName(partNumber, newName) {
    showLoader(true);
    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?action=updatePartName&partNumber=${encodeURIComponent(partNumber)}&newName=${encodeURIComponent(newName)}`);
      const data = await res.json();
      if (data.status === 'success') {
        allEntries = await loadAllData();
        currentEntries = [...allEntries];
        renderPage(currentPage);
      }
      return data;
    } finally {
      showLoader(false);
    }
  }

  function showPartPhoto(partNumber) {
    const entry = allEntries.find(e => e.partNumber === partNumber);
    const photoContainer = document.getElementById('photoContainer');
    
    if (entry?.fileUrl) {
      photoContainer.innerHTML = `<img src="${entry.fileUrl}" alt="${partNumber}" onerror="this.onerror=null; this.src='https://via.placeholder.com/400x300?text=No+Image'">`;
    } else {
      photoContainer.innerHTML = `<img src="https://via.placeholder.com/400x300?text=No+Image" alt="Нет фото">`;
    }
    
    document.getElementById('photoModal').style.display = 'flex';
  }

  function copyToClipboard(text, element) {
    navigator.clipboard.writeText(text).then(() => {
      const originalText = element.textContent;
      element.textContent = '✓';
      element.classList.add('copied');
      
      setTimeout(() => {
        element.textContent = originalText;
        element.classList.remove('copied');
      }, 1000);
    }).catch(err => {
      console.error('Ошибка копирования:', err);
    });
  }

  function createCard(entry) {
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.row = entry.rowIndex;
    div.dataset.partNumber = entry.partNumber.toLowerCase();

    const media = document.createElement('div');
    media.className = 'media-block';

    if (entry.fileUrl) {
      if (entry.fileUrl.includes('/preview')) {
        const iframe = document.createElement('iframe');
        iframe.src = entry.fileUrl;
        media.appendChild(iframe);
      } else {
        const img = document.createElement('img');
        img.src = entry.fileUrl;
        img.loading = 'lazy';
        img.decoding = 'async';
        media.appendChild(img);
      }
    }

    const overlay = document.createElement('div');
    overlay.className = 'img-overlay';
    media.appendChild(overlay);

    const rem = document.createElement('div');
    rem.className = 'icon remove';
    rem.textContent = 'Х';
    media.append(rem);
    div.append(media);

    const partNameContainer = document.createElement('div');
    partNameContainer.className = 'part-name-container';
    partNameContainer.dataset.partNumber = entry.partNumber;
    
    const partNameText = document.createElement('div');
    partNameText.className = 'part-name-text';
    partNameText.textContent = entry.partName;
    
    const editButton = document.createElement('button');
    editButton.className = 'part-name-edit-btn';
    editButton.innerHTML = '<i class="fas fa-edit"></i>';
    
    partNameContainer.appendChild(partNameText);
    partNameContainer.appendChild(editButton);
    div.append(partNameContainer);

    const controls = document.createElement('div');
    controls.className = 'controls';

    const pill = document.createElement('div');
    pill.className = 'pill';
    pill.textContent = entry.partNumber;
    pill.addEventListener('click', function() {
      copyToClipboard(entry.partNumber, this);
    });

    const qtyInput = document.createElement('input');
    qtyInput.type = 'text';
    qtyInput.value = entry.quantity;
    qtyInput.readOnly = true;

    const btnAdd = document.createElement('button');
    btnAdd.className = 'btn btn-add';
    btnAdd.innerHTML = '<i class="fas fa-plus-circle"></i> <span>ДОБАВИТЬ</span>';

    const btnInfo = document.createElement('button');
    btnInfo.className = 'btn btn-info';
    btnInfo.innerHTML = '<i class="fas fa-history"></i> <span>ИСТОРИЯ</span>';

    const btnTake = document.createElement('button');
    btnTake.className = 'btn btn-take';
    btnTake.innerHTML = '<i class="fas fa-shopping-cart"></i> <span>ВЗЯТЬ</span>';

    controls.append(pill, qtyInput, btnAdd, btnInfo, btnTake);
    div.append(controls);

    editButton.addEventListener('click', function() {
      const partNumber = partNameContainer.dataset.partNumber;
      const currentName = partNameText.textContent;
      
      partNameContainer.classList.add('editing');
      
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'part-name-input';
      input.value = currentName;
      
      const saveButton = document.createElement('button');
      saveButton.className = 'part-name-save-btn';
      saveButton.innerHTML = '<i class="fas fa-check"></i>';
      
      const cancelButton = document.createElement('button');
      cancelButton.className = 'part-name-cancel-btn';
      cancelButton.innerHTML = '<i class="fas fa-times"></i>';
      
      partNameText.style.display = 'none';
      editButton.style.display = 'none';
      
      partNameContainer.appendChild(input);
      partNameContainer.appendChild(saveButton);
      partNameContainer.appendChild(cancelButton);
      
      input.focus();
      input.select();
      
      const finishEdit = async (save = false) => {
        const newName = save ? input.value.trim() : currentName;
        
        partNameContainer.classList.remove('editing');
        input.remove();
        saveButton.remove();
        cancelButton.remove();
        
        partNameText.style.display = '';
        editButton.style.display = '';
        
        if (save && newName !== currentName) {
          await updatePartName(partNumber, newName);
        }
      };
      
      saveButton.addEventListener('click', () => finishEdit(true));
      cancelButton.addEventListener('click', () => finishEdit(false));
      
      input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') finishEdit(true);
      });
    });

    rem.onclick = async () => {
      if (confirm('Удалить эту запись?')) {
        await deleteEntry(entry.rowIndex);
      }
    };

    btnAdd.onclick = async () => {
      const deltaStr = prompt('Введите число для добавления:');
      const delta = Number(deltaStr);
      if (deltaStr !== null && !isNaN(delta)) {
        await updateQuantity(entry.partNumber, delta);
      }
    };

    btnTake.onclick = async () => {
      const deltaStr = prompt('Введите число для вычитания:');
      
      if (deltaStr === null) return;
      
      const delta = Number(deltaStr);
      
      if (isNaN(delta)) {
        alert('Пожалуйста, введите корректное число');
        return;
      }
      
      if (delta <= 0) {
        alert('Введите положительное число');
        return;
      }
      
      const currentEntry = allEntries.find(e => e.partNumber === entry.partNumber);
      const currentQuantity = currentEntry ? currentEntry.quantity : entry.quantity;
      
      if (delta > currentQuantity) {
        alert('Недостаточно в наличии!');
        return;
      }
      
      await updateQuantity(entry.partNumber, -delta);
    };

    btnInfo.onclick = async () => {
      const hist = await getHistory(entry.partNumber);
      document.getElementById('modalContent').textContent = hist;
      document.getElementById('modalOverlay').style.display = 'flex';
    };

    return div;
  }

  function updateTotalPages() {
    totalPages = Math.ceil(currentEntries.length / cardsPerPage) || 1;
  }

  function renderPage(page) {
    const container = document.getElementById('cardsContainer');
    if (!container) return;
    
    container.innerHTML = '';

    const start = (page - 1) * cardsPerPage;
    const end = start + cardsPerPage;
    const pageData = currentEntries.slice(start, end);

    if (pageData.length === 0) {
      container.innerHTML = '<div class="no-data">Нет данных</div>';
      return;
    }

    pageData.forEach(entry => {
      container.appendChild(createCard(entry));
    });

    renderPageNumbers();
    updatePaginationControls();
    window.scrollTo(0, 0);
  }

  function renderPageNumbers() {
    const pageContainer = document.getElementById('pageNumbers');
    if (!pageContainer) return;
    
    pageContainer.innerHTML = '';
    
    const maxVisiblePages = 5;
    let startPage = Math.max(currentPage - 2, 1);
    let endPage = Math.min(startPage + maxVisiblePages - 1, totalPages);
    
    if (startPage > 1) {
      addPageButton(1);
      if (startPage > 2) addDots();
    }
    
    for (let i = startPage; i <= endPage; i++) addPageButton(i);
    
    if (endPage < totalPages) {
      if (endPage < totalPages - 1) addDots();
      addPageButton(totalPages);
    }
    
    function addPageButton(page) {
      const btn = document.createElement('button');
      btn.textContent = page;
      if (page === currentPage) btn.classList.add('active');
      btn.onclick = () => goToPage(page);
      pageContainer.appendChild(btn);
    }
    
    function addDots() {
      const dots = document.createElement('span');
      dots.textContent = '...';
      dots.style.padding = '0 10px';
      pageContainer.appendChild(dots);
    }
  }

  function goToPage(page) {
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderPage(currentPage);
  }

  function updatePaginationControls() {
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    if (prevBtn) prevBtn.disabled = currentPage <= 1;
    if (nextBtn) nextBtn.disabled = currentPage >= totalPages;
  }

  async function initApp() {
    showLoader(true);
    try {
      allEntries = await loadAllData();
      currentEntries = [...allEntries];
      
      updateTotalPages();
      currentPage = 1;
      renderPage(currentPage);
    } catch (error) {
      console.error('Init error:', error);
      alert('Ошибка загрузки данных: ' + error.message);
    } finally {
      showLoader(false);
    }

    document.getElementById('btnSearch')?.addEventListener('click', () => {
      const term = prompt('Введите номер детали:');
      if (term !== null) {
        const searchTerm = term.toLowerCase().trim();
        currentEntries = searchTerm.length === 0 
          ? [...allEntries] 
          : allEntries.filter(e => e.partNumber.toLowerCase().includes(searchTerm));
        updateTotalPages();
        currentPage = 1;
        renderPage(currentPage);
        document.getElementById('sortSelect').value = 'all';
      }
    });

    document.getElementById('btnReset')?.addEventListener('click', () => {
      currentEntries = [...allEntries];
      updateTotalPages();
      currentPage = 1;
      renderPage(currentPage);
      document.getElementById('sortSelect').value = 'all';
    });

    document.getElementById('sortSelect')?.addEventListener('change', async function() {
      showLoader(true);
      try {
        if (this.value === 'all') {
          currentEntries = [...allEntries];
        } else if (this.value === 'popular') {
          const popular = await getPopularEntries();
          if (popular?.length) {
            currentEntries = popular;
          }
        } else if (this.value === 'mostPopular') {
          const mostPopular = await getMostPopularEntries();
          if (mostPopular?.length) {
            currentEntries = mostPopular;
          } else {
            alert('Нет данных');
            return;
          }
        } else if (this.value === 'sortByQty') {
          currentEntries = [...allEntries].sort((a, b) => a.quantity - b.quantity);
        }
        updateTotalPages();
        currentPage = 1;
        renderPage(currentPage);
      } finally {
        showLoader(false);
      }
    });

    document.getElementById('modalClose')?.addEventListener('click', () => {
      document.getElementById('modalOverlay').style.display = 'none';
    });

    document.getElementById('modalOverlay')?.addEventListener('click', (e) => {
      if (e.target === document.getElementById('modalOverlay')) {
        document.getElementById('modalOverlay').style.display = 'none';
      }
    });

    document.getElementById('photoCloseBtn')?.addEventListener('click', () => {
      document.getElementById('photoModal').style.display = 'none';
    });

    document.getElementById('photoModal')?.addEventListener('click', (e) => {
      if (e.target === document.getElementById('photoModal')) {
        document.getElementById('photoModal').style.display = 'none';
      }
    });
  }

  window.addEventListener('resize', function() {
    const cardsContainer = document.getElementById('cardsContainer');
    if (window.innerWidth > 1024) {
      cardsContainer?.classList.add('desktop-layout');
      document.querySelectorAll('.card').forEach(card => card.classList.add('desktop-layout'));
    } else {
      cardsContainer?.classList.remove('desktop-layout');
      document.querySelectorAll('.card').forEach(card => card.classList.remove('desktop-layout'));
    }
  });
</script>
</body>
