  <style>

<body>
<!-- Индикатор загрузки -->
<div class="loader-container" id="loader">

<!-- Шапка (без кнопки меню и выпадающего списка сайтов) -->
<header>

  </a>
</header>

<!-- Блок авторизации -->
<div id="login">
  <h2>Вход на сайт</h2>
  <div id="g_id_onload"
       data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com"
       data-callback="handleCredentialResponse"
       data-auto_prompt="false">
  </div>
  <div class="g_id_signin" data-type="standard"></div>
</div>

<!-- Контент для авторизованных -->
<div id="content" style="display:none">
  <!-- Новая панель фильтра и поиска (вместо старых кнопок) -->
  <div class="panel">
    <div class="filter">
      <button class="filter-btn" onclick="toggleFilterDropdown()">Фильтр</button>
      <div class="dropdown-filter" id="filterDropdown">
        <div data-filter="all">Все</div>
        <div data-filter="popular">Новые</div>        <!-- соответствует popular (последние взятые) -->
        <div data-filter="mostPopular">В работе</div> <!-- соответствует mostPopular -->
        <div data-filter="sortByQty">Завершено</div>  <!-- соответствует сортировке по остаткам -->
      </div>
    </div>
    <input class="search" type="text" id="searchInput" placeholder="Поиск...">
  </div>

  <div class="cards" id="cardsContainer"></div>

  <div class="pagination">
    <button onclick="pagination.prevPage()" id="prevBtn" disabled><i class="fas fa-arrow-left"></i> Назад</button>
    <div class="page-numbers" id="pageNumbers"></div>
    <button onclick="pagination.nextPage()" id="nextBtn">Вперёд <i class="fas fa-arrow-right"></i></button>
  </div>

  <div id="modalOverlay" class="modal-overlay">
    <div class="modal">
      <div id="modalClose" class="modal-close">×</div>
      <h3>История изменений</h3>
      <pre id="modalContent"></pre>
    </div>
  </div>
</div>

<script>
  // Функция для показа/скрытия индикатора загрузки
  function showLoader(show) {
    document.getElementById('loader').style.display = show ? 'flex' : 'none';
  }

  // Функция для выпадающего списка фильтра (новая)
  function toggleFilterDropdown() {
    const menu = document.getElementById("filterDropdown");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
  }

  // Закрытие выпадающего списка при клике вне его
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.filter')) {
      document.getElementById('filterDropdown').style.display = 'none';
    }
  });

  // Обработка выбора фильтра
  document.addEventListener('click', function(e) {
    const target = e.target.closest('.dropdown-filter div');
    if (!target) return;
    
    const filterValue = target.dataset.filter;
    const sortSelect = document.getElementById('sortSelect'); // скрытый селект для логики
    if (!sortSelect) return;
    
    // Устанавливаем значение селекта и вызываем событие change
    if (filterValue === 'all') sortSelect.value = 'all';
    else if (filterValue === 'popular') sortSelect.value = 'popular';
    else if (filterValue === 'mostPopular') sortSelect.value = 'mostPopular';
    else if (filterValue === 'sortByQty') sortSelect.value = 'sortByQty';
    
    // Триггерим событие change вручную
    const event = new Event('change', { bubbles: true });
    sortSelect.dispatchEvent(event);
    
    // Закрываем дропдаун
    document.getElementById('filterDropdown').style.display = 'none';
  });

  // Поиск по вводу с debounce
  let searchTimeout;
  document.getElementById('searchInput')?.addEventListener('input', function(e) {
    clearTimeout(searchTimeout);
    const term = e.target.value.trim().toLowerCase();
    searchTimeout = setTimeout(() => {
      if (!allEntries) return;
      if (term === '') {
        currentEntries = [...allEntries];
      } else {
        currentEntries = allEntries.filter(entry => 
          entry.partNumber.toLowerCase().includes(term)
        );
      }
      updateTotalPages();
      currentPage = 1;
      renderPage(currentPage);
    }, 300);
  });

  // === НОВАЯ СИСТЕМА АВТОРИЗАЦИИ (без изменений) ===
  const SPREADSHEET_ID = '1-yiVdZYa6wJdupTiuiHvI_ht3Vu73RUjyCehZqs2cJ4';
  const SHEET_NAME = '1';
  const API_KEY = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';
  const CURRENT_SITE = 'https://smart-bowling.github.io/PARTS-KH/';

  let currentUser = null;

  function loadSheetsAPI() {
    return new Promise((resolve, reject) => {
      gapi.load('client', {
        callback: () => resolve(),
        onerror: () => reject('Ошибка загрузки Google API'),
        timeout: 10000,
        ontimeout: () => reject('Таймаут загрузки Google API')
      });
    });
  }

  function parseJwt(token) {
    try {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
      return JSON.parse(jsonPayload);
    } catch (e) {
      console.error('Error parsing JWT:', e);
      return {};
    }
  }

  function handleCredentialResponse(response) {
    console.log("Google response received");
    showLoader(true);
    try {
      const payload = parseJwt(response.credential);
      console.log("User email:", payload.email);
      currentUser = {
        email: payload.email.toLowerCase().trim(),
        name: payload.name,
        picture: payload.picture
      };
      initAndCheckEmail();
    } catch (e) {
      console.error("Error parsing Google response:", e);
      showLoader(false);
      alert('Ошибка аутентификации');
    }
  }

  async function initAndCheckEmail() {
    try {
      await loadSheetsAPI();
      await gapi.client.init({
        apiKey: API_KEY,
        discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
      });
      await checkEmailInSheet(currentUser.email);
    } catch (error) {
      console.error('API initialization error:', error);
      showLoader(false);
      alert('Ошибка инициализации Google API: ' + error);
    }
  }

  async function checkEmailInSheet(email) {
    try {
      const response = await gapi.client.sheets.spreadsheets.values.get({
        spreadsheetId: SPREADSHEET_ID,
        range: `${SHEET_NAME}!A:Z`,
      });
      
      const rows = response.result.values;
      if (!rows || rows.length === 0) {
        showLoader(false);
        alert('Таблица пуста');
        return;
      }
      
      let hasAccess = false;
      let userRow = null;
      
      for (let i = 0; i < rows.length; i++) {
        if (!rows[i][0]) continue;
        const rowEmail = rows[i][0].toLowerCase().trim();
        if (rowEmail === email) {
          userRow = rows[i];
          break;
        }
      }
      
      if (userRow) {
        for (let j = 1; j < userRow.length; j++) {
          const cellValue = userRow[j];
          if (!cellValue || cellValue.trim() === '') continue;
          const siteUrl = cellValue.trim().split('?')[0].split('#')[0];
          if (siteUrl === CURRENT_SITE || siteUrl.includes('PARTS-KH')) {
            hasAccess = true;
            break;
          }
        }
      }
      
      if (hasAccess) {
        loginUser(currentUser);
      } else {
        showLoader(false);
        alert('Доступ запрещен: Ваш email не имеет доступа к этому сайту');
      }
    } catch (error) {
      console.error('Sheets API error:', error);
      showLoader(false);
      let errorMessage = 'Ошибка доступа к таблице';
      if (error.result && error.result.error && error.result.error.message) {
        errorMessage += ': ' + error.result.error.message;
      }
      alert(errorMessage);
    }
  }

  function loginUser(payload) {
    console.log("Logging in user:", payload.email);
    document.getElementById('login').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    localStorage.setItem('userLoggedIn', 'true');
    localStorage.setItem('userEmail', payload.email.toLowerCase());
    localStorage.setItem('userName', payload.name);
    localStorage.setItem('userPic', payload.picture);
    showLoader(false);
    initApp();
  }

  function signOut() {
    console.log("Signing out");
    localStorage.clear();
    sessionStorage.clear();
    location.reload();
  }

  window.addEventListener('load', function() {
    console.log("Page loaded, checking localStorage...");
    const isLoggedIn = localStorage.getItem('userLoggedIn') === 'true';
    const email = localStorage.getItem('userEmail');
    if (isLoggedIn && email) {
      console.log("Found stored session for:", email);
      document.getElementById('login').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      currentUser = {
        email: email,
        name: localStorage.getItem('userName'),
        picture: localStorage.getItem('userPic')
      };
      showLoader(true);
      loadSheetsAPI()
        .then(() => gapi.client.init({
          apiKey: API_KEY,
          discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
        }))
        .then(() => checkEmailInSheet(email))
        .catch(error => {
          console.error('Session restore error:', error);
          showLoader(false);
          alert('Ошибка восстановления сессии');
          signOut();
        });
    } else {
      console.log("No stored session, showing login button");
      document.getElementById('login').style.display = 'block';
    }
  });

  // Глобальные переменные для пагинации и данных
  let allEntries = [];
  let currentEntries = [];
  let currentPage = 1;
  let totalPages = 1;
  const cardsPerPage = 30;

  const pagination = {
    prevPage: function() { if (currentPage > 1) goToPage(currentPage - 1); },
    nextPage: function() { if (currentPage < totalPages) goToPage(currentPage + 1); }
  };

  function goToPage(page) {
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderPage(currentPage);
    updatePaginationControls();
  }

  function updateTotalPages() {
    totalPages = Math.ceil(currentEntries.length / cardsPerPage) || 1;
  }

  function updatePaginationControls() {
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    if (prevBtn) prevBtn.disabled = currentPage <= 1;
    if (nextBtn) nextBtn.disabled = currentPage >= totalPages;
  }

  function renderPageNumbers() {
    const pageContainer = document.getElementById('pageNumbers');
    if (!pageContainer) return;
    pageContainer.innerHTML = '';
    
    const maxVisiblePages = 5;
    let startPage = Math.max(currentPage - 2, 1);
    let endPage = Math.min(startPage + maxVisiblePages - 1, totalPages);
    
    if (startPage > 1) {
      addPageButton(1);
      if (startPage > 2) addDots();
    }
    
    for (let i = startPage; i <= endPage; i++) {
      addPageButton(i);
    }
    
    if (endPage < totalPages) {
      if (endPage < totalPages - 1) addDots();
      addPageButton(totalPages);
    }
    
    function addPageButton(page) {
      const btn = document.createElement('button');
      btn.textContent = page;
      if (page === currentPage) btn.classList.add('active');
      btn.onclick = () => goToPage(page);
      pageContainer.appendChild(btn);
    }
    
    function addDots() {
      const dots = document.createElement('span');
      dots.textContent = '...';
      dots.style.padding = '0 10px';
      pageContainer.appendChild(dots);
    }
  }

  function renderPage(page) {
    const container = document.getElementById('cardsContainer');
    if (!container) return;
    container.innerHTML = '';
    
    const start = (page - 1) * cardsPerPage;
    const end = start + cardsPerPage;
    const pageData = currentEntries.slice(start, end);
    
    if (pageData.length === 0) {
      container.innerHTML = '<div class="no-data">Нет данных для отображения</div>';
      return;
    }
    
    pageData.forEach(entry => {
      const card = createCard(entry);
      container.appendChild(card);
    });
    
    renderPageNumbers();
    updatePaginationControls();
    window.scrollTo(0, 0);
    if (window.innerWidth > 1024) toggleDesktopLayout(true);
  }

  function toggleDesktopLayout(enable) {
    const cardsContainer = document.getElementById('cardsContainer');
    const cards = document.querySelectorAll('.card');
    if (!cardsContainer) return;
    if (enable) {
      cardsContainer.classList.add('desktop-layout');
      cards.forEach(c => c.classList.add('desktop-layout'));
    } else {
      cardsContainer.classList.remove('desktop-layout');
      cards.forEach(c => c.classList.remove('desktop-layout'));
    }
  }

  // Функции работы с API (без изменений)
  async function getEntries() {
    showLoader(true);
    try {
      const res = await fetch('https://script.google.com/macros/s/AKfycbyB1F0bZXsnfoxqrzWWH-C4bGmuUDfaLdi_n_PqhHQNYLWHqwB_O4iGDI1yFXfnFSo4/exec?action=getEntries');
      return await res.json();
    } finally {
      showLoader(false);
    }
  }

  async function updateQuantity(partNumber, delta) {
    showLoader(true);
    try {
      const res = await fetch(`https://script.google.com/macros/s/AKfycbyB1F0bZXsnfoxqrzWWH-C4bGmuUDfaLdi_n_PqhHQNYLWHqwB_O4iGDI1yFXfnFSo4/exec?action=updateQuantity&partNumber=${encodeURIComponent(partNumber)}&delta=${delta}`);
      return await res.json();
    } finally {
      showLoader(false);
    }
  }

  async function deleteEntry(rowIndex) {
    showLoader(true);
    try {
      const res = await fetch(`https://script.google.com/macros/s/AKfycbyB1F0bZXsnfoxqrzWWH-C4bGmuUDfaLdi_n_PqhHQNYLWHqwB_O4iGDI1yFXfnFSo4/exec?action=deleteEntry&rowIndex=${rowIndex}`);
      return await res.json();
    } finally {
      showLoader(false);
    }
  }

  async function getHistory(partNumber) {
    showLoader(true);
    try {
      const res = await fetch(`https://script.google.com/macros/s/AKfycbyB1F0bZXsnfoxqrzWWH-C4bGmuUDfaLdi_n_PqhHQNYLWHqwB_O4iGDI1yFXfnFSo4/exec?action=getHistory&partNumber=${encodeURIComponent(partNumber)}`);
      return await res.text();
    } finally {
      showLoader(false);
    }
  }

  async function getPopularEntries() {
    showLoader(true);
    try {
      const res = await fetch('https://script.google.com/macros/s/AKfycbyB1F0bZXsnfoxqrzWWH-C4bGmuUDfaLdi_n_PqhHQNYLWHqwB_O4iGDI1yFXfnFSo4/exec?action=getPopularEntries');
      return await res.json();
    } finally {
      showLoader(false);
    }
  }

  async function getMostPopularEntries() {
    showLoader(true);
    try {
      const res = await fetch('https://script.google.com/macros/s/AKfycbyB1F0bZXsnfoxqrzWWH-C4bGmuUDfaLdi_n_PqhHQNYLWHqwB_O4iGDI1yFXfnFSo4/exec?action=getMostPopularEntries');
      return await res.json();
    } finally {
      showLoader(false);
    }
  }

  async function updatePartName(partNumber, newName) {
    showLoader(true);
    try {
      const res = await fetch(`https://script.google.com/macros/s/AKfycbyB1F0bZXsnfoxqrzWWH-C4bGmuUDfaLdi_n_PqhHQNYLWHqwB_O4iGDI1yFXfnFSo4/exec?action=updatePartName&partNumber=${encodeURIComponent(partNumber)}&newName=${encodeURIComponent(newName)}`);
      return await res.json();
    } finally {
      showLoader(false);
    }
  }

  function createCard(entry) {
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.row = entry.rowIndex;
    div.dataset.partNumber = entry.partNumber.toLowerCase();

    const media = document.createElement('div');
    media.className = 'media-block';

    if (entry.fileUrl && entry.fileUrl.includes('/preview')) {
      const iframe = document.createElement('iframe');
      iframe.src = entry.fileUrl;
      media.appendChild(iframe);
    } else if (entry.fileUrl) {
      const img = document.createElement('img');
      img.src = entry.fileUrl;
      img.loading = 'lazy';
      img.decoding = 'async';
      media.appendChild(img);
    }

    const overlay = document.createElement('div');
    overlay.className = 'img-overlay';
    media.appendChild(overlay);

    const rem = document.createElement('div');
    rem.className = 'icon remove';
    rem.textContent = 'Х';
    media.append(rem);

    div.append(media);

    const partNameContainer = document.createElement('div');
    partNameContainer.className = 'part-name-container';
    partNameContainer.dataset.partNumber = entry.partNumber;
    
    const partNameText = document.createElement('div');
    partNameText.className = 'part-name-text';
    partNameText.textContent = entry.partName || 'Название детали';
    
    const editButton = document.createElement('button');
    editButton.className = 'part-name-edit-btn';
    editButton.innerHTML = '<i class="fas fa-edit"></i>';
    editButton.title = 'Редактировать название';
    
    partNameContainer.appendChild(partNameText);
    partNameContainer.appendChild(editButton);
    div.append(partNameContainer);

    const controls = document.createElement('div');
    controls.className = 'controls';

    const pill = document.createElement('div');
    pill.className = 'pill';
    pill.textContent = entry.partNumber;

    const qtyInput = document.createElement('input');
    qtyInput.type = 'text';
    qtyInput.value = entry.quantity;
    qtyInput.readOnly = true;

    const btnAdd = document.createElement('button');
    btnAdd.className = 'btn btn-add';
    btnAdd.innerHTML = '<i class="fas fa-plus-circle"></i> <span>ДОБАВИТЬ</span>';

    const btnInfo = document.createElement('button');
    btnInfo.className = 'btn btn-info';
    btnInfo.innerHTML = '<i class="fas fa-history"></i> <span>ИСТОРИЯ</span>';

    const btnTake = document.createElement('button');
    btnTake.className = 'btn btn-take';
    btnTake.innerHTML = '<i class="fas fa-shopping-cart"></i> <span>ВЗЯТЬ</span>';

    controls.append(pill, qtyInput, btnAdd, btnInfo, btnTake);
    div.append(controls);

    editButton.addEventListener('click', function() {
      const partNumber = partNameContainer.dataset.partNumber;
      const currentName = partNameText.textContent;
      
      partNameContainer.classList.add('editing');
      
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'part-name-input';
      input.value = currentName;
      
      const saveButton = document.createElement('button');
      saveButton.className = 'part-name-save-btn';
      saveButton.innerHTML = '<i class="fas fa-check"></i>';
      saveButton.title = 'Сохранить';
      
      const cancelButton = document.createElement('button');
      cancelButton.className = 'part-name-cancel-btn';
      cancelButton.innerHTML = '<i class="fas fa-times"></i>';
      cancelButton.title = 'Отменить';
      
      partNameText.style.display = 'none';
      editButton.style.display = 'none';
      
      partNameContainer.appendChild(input);
      partNameContainer.appendChild(saveButton);
      partNameContainer.appendChild(cancelButton);
      
      input.focus();
      input.select();
      
      const finishEdit = async (save = false) => {
        const newName = save ? input.value.trim() : currentName;
        
        partNameContainer.classList.remove('editing');
        input.remove();
        saveButton.remove();
        cancelButton.remove();
        
        partNameText.style.display = '';
        editButton.style.display = '';
        
        if (save && newName && newName !== currentName) {
          const res = await updatePartName(partNumber, newName);
          if (res.status === 'success') {
            partNameText.textContent = newName;
            const updatedEntry = allEntries.find(e => e.partNumber === partNumber);
            if (updatedEntry) updatedEntry.partName = newName;
          } else {
            alert(res.message || 'Ошибка при обновлении названия');
          }
        }
      };
      
      saveButton.addEventListener('click', () => finishEdit(true));
      cancelButton.addEventListener('click', () => finishEdit(false));
      
      input.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') finishEdit(true);
      });
    });

    rem.onclick = async () => {
      if (confirm('Удалить эту запись?')) {
        await deleteEntry(entry.rowIndex);
        allEntries = allEntries.filter(e => e.rowIndex !== entry.rowIndex);
        currentEntries = currentEntries.filter(e => e.rowIndex !== entry.rowIndex);
        updateTotalPages();
        if (currentPage > totalPages) currentPage = totalPages;
        renderPage(currentPage);
      }
    };

    btnAdd.onclick = async () => {
      const deltaStr = prompt('Введите число для добавления:');
      const delta = Number(deltaStr);
      if (deltaStr !== null && !isNaN(delta)) {
        const res = await updateQuantity(entry.partNumber, delta);
        if (res.status === 'success') {
          qtyInput.value = res.quantity;
          entry.quantity = res.quantity;
        } else {
          alert(res.message);
        }
      }
    };

    btnTake.onclick = async () => {
      const deltaStr = prompt('Введите число для вычитания:');
      const delta = Number(deltaStr);
      if (deltaStr !== null && !isNaN(delta)) {
        const res = await updateQuantity(entry.partNumber, -delta);
        if (res.status === 'success') {
          qtyInput.value = res.quantity;
          entry.quantity = res.quantity;
        } else {
          alert(res.message);
        }
      }
    };

    btnInfo.onclick = async () => {
      const hist = await getHistory(entry.partNumber);
      document.getElementById('modalContent').textContent = hist;
      document.getElementById('modalOverlay').style.display = 'flex';
    };

    return div;
  }

  // Инициализация приложения
  function initApp() {
    // Создаём скрытый select для сохранения логики сортировки (он не отображается)
    const hiddenSelect = document.createElement('select');
    hiddenSelect.id = 'sortSelect';
    hiddenSelect.style.display = 'none';
    hiddenSelect.innerHTML = `
      <option value="all">Все детали</option>
      <option value="popular">Пос. взят. за 30 дней</option>
      <option value="mostPopular">Популярные</option>
      <option value="sortByQty">Остатки</option>
    `;
    document.getElementById('content').prepend(hiddenSelect);

    // Вешаем обработчик change на скрытый select
    document.getElementById('sortSelect').addEventListener('change', async function() {
      showLoader(true);
      try {
        if (this.value === 'all') {
          currentEntries = [...allEntries];
        } else if (this.value === 'popular') {
          currentEntries = await getPopularEntries();
          if (currentEntries && currentEntries[0]?.lastChangeDate) {
            currentEntries.sort((a, b) => new Date(b.lastChangeDate) - new Date(a.lastChangeDate));
          }
        } else if (this.value === 'mostPopular') {
          currentEntries = await getMostPopularEntries();
          if (!currentEntries?.length) {
            alert('Нет данных для сортировки "всё время"');
            return;
          }
        } else if (this.value === 'sortByQty') {
          currentEntries = [...allEntries].sort((a, b) => a.quantity - b.quantity);
        }
        updateTotalPages();
        currentPage = 1;
        renderPage(currentPage);
      } finally {
        showLoader(false);
      }
    });

    document.getElementById('modalClose')?.addEventListener('click', () => {
      document.getElementById('modalOverlay').style.display = 'none';
    });

    document.getElementById('modalOverlay')?.addEventListener('click', (e) => {
      if (e.target === document.getElementById('modalOverlay')) {
        document.getElementById('modalOverlay').style.display = 'none';
      }
    });

    async function loadData() {
      showLoader(true);
      try {
        allEntries = await getEntries();
        currentEntries = [...allEntries];
        updateTotalPages();
        renderPage(currentPage);
      } finally {
        showLoader(false);
      }
    }

    loadData();
  }

  window.addEventListener('resize', function() {
    const cardsContainer = document.getElementById('cardsContainer');
    if (!cardsContainer) return;
    if (window.innerWidth > 1024) {
      toggleDesktopLayout(true);
    } else {
      toggleDesktopLayout(false);
    }
  });
</script>
