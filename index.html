<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>LUCKY STRIKE KH – Данные по дорожкам</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --accent: #dc143c;
            --primary-dark: #1f2937;
            --secondary-dark: #2c3e50;
            --bg-light: #f4f6fa;
            --border-light: #e2e8f0;
            --white: #ffffff;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-light);
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        /* ЭКРАНЫ ЗАГРУЗКИ */
        .loading-screen, .loader-container {
            position: fixed;
            inset: 0;
            background: var(--primary-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.3s ease;
        }
        .loader-container {
            z-index: 100000;
            display: none;
            background: rgba(31, 41, 55, 0.96);
            backdrop-filter: blur(4px);
        }
        .loader-container.active { display: flex; }
        .loading-screen.fade-out { opacity: 0; pointer-events: none; }
        .logo-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .glow-ring {
            position: absolute;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: conic-gradient(var(--accent), transparent 70%);
            animation: spin 4s linear infinite;
            filter: blur(16px);
        }
        .logo-wrapper img { width: 85px; z-index: 2; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* АВТОРИЗАЦИЯ */
        #login-section {
            display: none;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
        }
        #login-container {
            background: var(--white);
            padding: 28px 24px;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 380px;
            width: 100%;
        }
        #login-container h2 {
            color: var(--primary-dark);
            margin: 12px 0 6px;
            font-size: 24px;
            font-weight: 700;
        }
        .login-subtitle {
            color: #475569;
            font-size: 13px;
            margin-bottom: 24px;
        }
        .login-icon {
            width: 56px;
            height: 56px;
            background: #fff0f2;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        .login-icon i { font-size: 28px; color: var(--accent); }

        /* КНОПКА ВЫХОДА */
        .logout-btn {
            position: fixed;
            bottom: 16px;
            right: 16px;
            background: rgba(31, 41, 55, 0.92);
            backdrop-filter: blur(8px);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: all 0.2s;
            font-family: inherit;
        }
        .logout-btn:active { transform: scale(0.96); background: var(--accent); }

        /* ОСНОВНОЙ КОНТЕЙНЕР */
        #main-content {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-light);
        }

        .table-container {
            flex: 1;
            min-height: 0;
            width: 100%;
            padding: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .table-wrapper {
            flex: 1;
            min-height: 0;
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid var(--border-light);
        }

        /* ТАБЛИЦА — ФИКСИРОВАННАЯ ВЫСОТА, ШИРИНА АВТО */
        #main-table {
            border-collapse: collapse;
            table-layout: auto;
            width: auto;
            min-width: 100%;
            font-size: 11px;
        }

        td, th {
            text-align: center;
            border: 1px solid var(--border-light);
            white-space: nowrap;
            vertical-align: middle;
            padding: 0 6px;
            height: 32px;
        }

        th {
            background-color: #f1f5f9;
            font-weight: 600;
            color: #1e293b;
        }

        /* ФИКСАЦИЯ ПЕРВЫХ ДВУХ КОЛОНОК (горизонтальный скролл) */
        #main-table th:nth-child(1),
        #main-table td:nth-child(1),
        #main-table th:nth-child(2),
        #main-table td:nth-child(2) {
            position: sticky;
            background-clip: padding-box;
        }
        #main-table th:nth-child(1),
        #main-table td:nth-child(1) {
            left: 0;
            z-index: 12;
            background-color: var(--accent);
            color: white;
            font-weight: 700;
            width: 45px;
            min-width: 45px;
        }
        #main-table th:nth-child(2),
        #main-table td:nth-child(2) {
            left: 45px;
            z-index: 11;
            background-color: var(--secondary-dark);
            color: white;
            font-weight: 600;
            width: 85px;
            min-width: 85px;
        }

        #letter-row th:nth-child(1),
        #letter-row th:nth-child(2),
        #time-row th:nth-child(1),
        #time-row th:nth-child(2) {
            background-color: #eef2ff !important;
            color: var(--secondary-dark) !important;
        }

        #letter-row th:nth-child(n+3) {
            background: #f8fafc;
            position: sticky;
            top: 0;
            z-index: 10;
            width: 26px;
            min-width: 26px;
        }

        #time-row th:nth-child(n+3) {
            position: sticky;
            top: 32px;
            z-index: 9;
            background: #f1f5f9;
            padding: 2px 1px;
            width: 26px;
            min-width: 26px;
        }
        #time-row th div {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.15;
        }
        #time-row th .hour { font-size: 9px; font-weight: 700; }
        #time-row th .minute { font-size: 8px; opacity: 0.8; }

        .toggle-btn {
            cursor: pointer;
            background-color: #475569;
            border-radius: 20px;
            font-weight: bold;
            font-size: 9px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            color: white;
            margin-left: 4px;
            transition: 0.1s;
        }
        .toggle-btn:active { background-color: var(--accent); transform: scale(0.95); }
        .hidden-column { display: none !important; }

        .active-cell {
            background-color: var(--secondary-dark);
            color: white;
            font-weight: 700;
        }

        td.hover-row, th.hover-row,
        td.hover-col, th.hover-col {
            background-color: #fecdd3 !important;
        }

        #date-picker {
            width: 100%;
            padding: 6px 8px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            background: white;
            cursor: pointer;
            font-family: inherit;
            text-align: center;
        }
        .logo-cell img {
            width: 28px;
            height: 28px;
            object-fit: contain;
            cursor: pointer;
        }
        #overall-total {
            font-weight: 800;
            font-size: 11px;
        }

        /* АДАПТАЦИЯ ВЫСОТЫ ПОД ЭКРАН — динамическая настройка размеров ячеек */
        @media (orientation: landscape) {
            .table-container {
                padding: 8px;
            }
            td, th {
                height: 28px;
                padding: 0 4px;
            }
            #time-row th {
                top: 28px;
            }
            #letter-row th:nth-child(n+3),
            #time-row th:nth-child(n+3) {
                width: 24px;
                min-width: 24px;
            }
            #main-table th:nth-child(1),
            #main-table td:nth-child(1) {
                width: 42px;
                min-width: 42px;
            }
            #main-table th:nth-child(2),
            #main-table td:nth-child(2) {
                left: 42px;
                width: 78px;
                min-width: 78px;
            }
        }

        @media (max-width: 600px) and (orientation: landscape) {
            td, th {
                height: 26px;
                font-size: 10px;
            }
            #time-row th {
                top: 26px;
            }
            #letter-row th:nth-child(n+3),
            #time-row th:nth-child(n+3) {
                width: 22px;
                min-width: 22px;
            }
        }

        /* Динамическая настройка высоты таблицы под экран */
        .table-wrapper {
            display: flex;
            flex-direction: column;
        }
        
        #main-table {
            display: table;
        }

        .table-wrapper::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .table-wrapper::-webkit-scrollbar-track { background: #eef2ff; border-radius: 8px; }
        .table-wrapper::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 8px; }
    </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
    <div class="logo-wrapper"><div class="glow-ring"></div><img src="https://i.postimg.cc/wjGzSY92/1.png" alt="Logo"></div>
</div>
<div class="loader-container" id="loader"><div class="logo-wrapper"><div class="glow-ring"></div><img src="https://i.postimg.cc/wjGzSY92/1.png" alt="Loading"></div></div>

<div id="login-section">
    <div id="login-container">
        <div class="login-icon"><i class="fas fa-bowling-ball"></i></div>
        <h2>LUCKY STRIKE KH</h2>
        <div class="login-subtitle">Войдите через Google для доступа</div>
        <div id="g_id_onload" data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
        <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-text="signin_with" data-size="large"></div>
    </div>
</div>

<div id="main-content">
    <button class="logout-btn" onclick="signOut()"><i class="fas fa-sign-out-alt"></i> Выйти</button>
    <div class="table-container">
        <div class="table-wrapper">
            <table id="main-table">
                <thead>
                    <tr id="letter-row">
                        <th class="logo-cell"><img src="https://i.postimg.cc/SQ3RgNsQ/image.png" alt="logo"></th>
                        <th><input type="date" id="date-picker" /></th>
                    </tr>
                    <tr id="time-row">
                        <th>LANE</th>
                        <th id="overall-total">0ч 0м</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ========== АВТОРИЗАЦИЯ ==========
    const AUTH_SPREADSHEET_ID = '1-yiVdZYa6wJdupTiuiHvI_ht3Vu73RUjyCehZqs2cJ4';
    const AUTH_SHEET_NAME = '1';
    const AUTH_API_KEY = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';
    const CURRENT_SITE = window.location.href.split('?')[0].split('#')[0];
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbwJcg8Ov4_-ijxTLQxJDjm2-IKCmI8l0AAsDo4sMeU-avSQp3F_E54gyB7f26z_KaE0FA/exec';

    let currentUser = null, currentUserNameFromSheet = null, isLoadingData = false;
    let fetchControllers = new Map();
    const totalMinutes = 1440, groupInterval = 15, groupSize = 14;
    let allGroups = [], allDataCells = [];
    const letterRow = document.getElementById('letter-row'), timeRow = document.getElementById('time-row');
    const overallTotal = document.getElementById('overall-total'), tableBody = document.getElementById('table-body'), datePicker = document.getElementById('date-picker');
    const tableWrapper = document.querySelector('.table-wrapper');

    // ========== ДИНАМИЧЕСКАЯ НАСТРОЙКА ВЫСОТЫ ==========
    function fitHeightToScreen() {
        if (!tableWrapper) return;
        // Получаем доступную высоту контейнера
        const container = document.querySelector('.table-container');
        if (!container) return;
        
        const availableHeight = container.clientHeight;
        // Получаем количество строк в таблице (16 дорожек + 2 строки заголовка = 18)
        const rows = document.querySelectorAll('#main-table tbody tr').length;
        const headerRows = 2;
        const totalRows = rows + headerRows;
        
        // Вычисляем оптимальную высоту ячейки
        let optimalCellHeight = Math.floor(availableHeight / totalRows);
        // Ограничиваем минимальную и максимальную высоту
        optimalCellHeight = Math.min(Math.max(optimalCellHeight, 24), 38);
        
        // Применяем высоту ко всем ячейкам
        const allCells = document.querySelectorAll('#main-table td, #main-table th');
        allCells.forEach(cell => {
            cell.style.height = `${optimalCellHeight}px`;
        });
        
        // Обновляем sticky позицию для второй строки заголовка
        const firstRowHeight = document.querySelector('#letter-row th')?.offsetHeight || optimalCellHeight;
        const timeRowHeaders = document.querySelectorAll('#time-row th');
        timeRowHeaders.forEach(th => {
            th.style.top = `${firstRowHeight}px`;
        });
    }

    // Наблюдатель за изменением размера и ориентации
    let resizeTimeout;
    function handleResize() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
            fitHeightToScreen();
        }, 50);
    }

    // ========== ФУНКЦИИ ТАБЛИЦЫ ==========
    function formatMinutes(mins) { return `${Math.floor(mins/60)}ч ${mins%60}м`; }
    function toggleGroup(idxs) {
        idxs.forEach(i => {
            [timeRow, letterRow].forEach(row => { if(row.children[i+2]) row.children[i+2].classList.toggle('hidden-column'); });
            tableBody.querySelectorAll('tr').forEach(tr => { if(tr.children[i+2]) tr.children[i+2].classList.toggle('hidden-column'); });
        });
        setTimeout(fitHeightToScreen, 50);
    }
    function areAllHidden() { return allGroups.every(g => timeRow.children[g[0]+2]?.classList.contains('hidden-column')); }
    function toggleAll(forceHide = null) {
        const shouldHide = forceHide !== null ? forceHide : !areAllHidden();
        allGroups.forEach(g => { const el = timeRow.children[g[0]+2]; if(el && el.classList.contains('hidden-column') !== shouldHide) toggleGroup(g); });
        document.querySelectorAll('.toggle-btn').forEach(b => b.textContent = shouldHide ? '+' : '–');
        setTimeout(fitHeightToScreen, 50);
    }
    function makeBtn(idxs) {
        const btn = document.createElement('div'); btn.className = 'toggle-btn'; btn.textContent = '+';
        let last = 0;
        btn.onclick = (e) => {
            e.stopPropagation(); const now = Date.now();
            if(now - last < 300) toggleAll(!areAllHidden());
            else { toggleGroup(idxs); btn.textContent = timeRow.children[idxs[0]+2].classList.contains('hidden-column') ? '+' : '–'; }
            last = now;
        };
        return btn;
    }
    function buildHeaders() {
        const fragL = document.createDocumentFragment(), fragT = document.createDocumentFragment();
        for (let i = 1; i <= totalMinutes; i++) {
            const thL = document.createElement('th'); fragL.appendChild(thL);
            const h = Math.floor((i-1)/60), m = (i-1)%60;
            const thT = document.createElement('th');
            thT.innerHTML = `<div><span class="hour">${String(h).padStart(2,'0')}</span><span class="minute">${String(m).padStart(2,'0')}</span></div>`;
            fragT.appendChild(thT);
            if ((h*60+m) % groupInterval === 0) {
                const start = (h*60+m)===0 ? 1 : (h*60+m)+1;
                const end = Math.min(start+groupSize-1, totalMinutes-1);
                const idxs = []; for (let j=start; j<=end; j++) idxs.push(j);
                if (idxs.length) { fragL.lastChild.appendChild(makeBtn(idxs)); allGroups.push(idxs); }
            }
        }
        letterRow.appendChild(fragL); timeRow.appendChild(fragT);
    }
    function buildBody() {
        const frag = document.createDocumentFragment();
        for (let lane=0; lane<16; lane++) {
            const tr = document.createElement('tr');
            const thLane = document.createElement('th'); thLane.textContent = lane+1; tr.appendChild(thLane);
            const thCount = document.createElement('th'); tr.appendChild(thCount);
            const cells = [];
            for (let i=0; i<totalMinutes; i++) { const td = document.createElement('td'); tr.appendChild(td); cells.push(td); }
            frag.appendChild(tr);
            allDataCells.push({ header: thCount, cells });
        }
        tableBody.appendChild(frag);
    }
    function clearRows() {
        fetchControllers.forEach(c => c.abort()); fetchControllers.clear();
        overallTotal.textContent = '0ч 0м';
        allDataCells.forEach(r => { r.header.textContent = ''; r.cells.forEach(c => { c.classList.remove('active-cell'); c.textContent = ''; c.style.color = ''; }); });
    }
    async function loadLaneData(idx, date) {
        const controller = new AbortController(); fetchControllers.set(idx, controller);
        try {
            const res = await fetch(`${BACKEND_URL}?action=getData&index=${idx}&date=${date}&t=${Date.now()}`, { signal: controller.signal });
            return await res.json();
        } finally { fetchControllers.delete(idx); }
    }
    async function loadData() {
        if (!datePicker.value || isLoadingData) return;
        isLoadingData = true; clearRows();
        const selectedDate = datePicker.value;
        let sumAll = 0;
        const promises = [];
        for (let idx=0; idx<allDataCells.length; idx++) {
            promises.push(loadLaneData(idx, selectedDate).then(data => {
                const row = allDataCells[idx]; let sum=0;
                row.cells.forEach((cell,i) => {
                    const time = `${String(Math.floor(i/60)).padStart(2,'0')}:${String(i%60).padStart(2,'0')}`;
                    cell.classList.remove('active-cell');
                    if (data.c && data.c.includes(time)) { cell.classList.add('active-cell'); cell.textContent = '🎳'; sum++; }
                    else if (data.b && data.b.includes(time)) { cell.textContent = ''; cell.style.color = '#475569'; }
                    else { cell.textContent = '⚡'; cell.style.color = '#dc143c'; }
                });
                row.header.textContent = formatMinutes(sum);
                sumAll += sum;
            }).catch(err => console.warn(`Лейн ${idx+1} ошибка`)));
        }
        await Promise.allSettled(promises);
        overallTotal.textContent = formatMinutes(sumAll);
        isLoadingData = false;
        setTimeout(fitHeightToScreen, 100);
    }
    function initTableEvents() {
        datePicker.addEventListener('change', loadData);
        document.addEventListener('mouseover', e => {
            if (e.target.tagName === 'TD' || e.target.tagName === 'TH') {
                const ci = e.target.cellIndex, row = e.target.parentElement;
                if (row && row.tagName === 'TR') row.querySelectorAll('td,th').forEach(c => c.classList.add('hover-row'));
                if (ci >= 0) document.querySelectorAll('#main-table tr').forEach(r => { if(r.children[ci]) r.children[ci].classList.add('hover-col'); });
            }
        });
        document.addEventListener('mouseout', () => document.querySelectorAll('.hover-row, .hover-col').forEach(el => el.classList.remove('hover-row','hover-col')));
        document.querySelector('.logo-cell')?.addEventListener('click', () => datePicker.click());
        let lastTouch = 0;
        document.addEventListener('touchend', e => { const now = Date.now(); if(now - lastTouch <= 300) e.preventDefault(); lastTouch = now; }, false);
        const today = new Date(); datePicker.value = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
        setTimeout(() => { toggleAll(true); loadData(); }, 150);
        
        window.addEventListener('resize', handleResize);
        window.addEventListener('orientationchange', handleResize);
    }
    function initializeTableApp() {
        buildHeaders();
        buildBody();
        initTableEvents();
        setTimeout(fitHeightToScreen, 200);
        // Наблюдатель за изменением содержимого
        const observer = new MutationObserver(() => setTimeout(fitHeightToScreen, 50));
        observer.observe(tableBody, { childList: true, subtree: true, attributes: true });
    }

    // ========== АВТОРИЗАЦИЯ (сокращённая версия) ==========
    function showLoaderUI(show) { document.getElementById('loader').classList.toggle('active', show); }
    function parseJwt(t) { try { const b = t.split('.')[1]; return JSON.parse(atob(b.replace(/-/g, '+').replace(/_/g, '/'))); } catch(e) { return {}; } }
    function loadSheetsAPI() { return new Promise((res, rej) => gapi.load('client', { callback: res, onerror: rej, timeout: 10000 })); }
    async function checkEmailInSheet(email) {
        try {
            const resp = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId: AUTH_SPREADSHEET_ID, range: `${AUTH_SHEET_NAME}!A:Z` });
            const rows = resp.result.values;
            let hasAccess = false, foundName = null;
            for (let i = 0; i < rows.length; i++) {
                if (!rows[i]?.[0]) continue;
                if (rows[i][0].toLowerCase().trim() === email) {
                    for (let j = 1; j < rows[i].length; j++) {
                        const siteUrl = rows[i][j]?.trim().split('?')[0].split('#')[0] || '';
                        if (siteUrl === CURRENT_SITE || siteUrl.includes('SMB-LS-KH') || siteUrl.includes('smart-bowling')) { hasAccess = true; break; }
                    }
                    if (rows[i].length > 1 && rows[i][1]) foundName = rows[i][1].trim();
                    break;
                }
            }
            if (hasAccess) { currentUserNameFromSheet = foundName || currentUser.name; loginUser(currentUser); }
            else { alert('Доступ запрещён'); showLoaderUI(false); }
        } catch(e) { alert('Ошибка проверки доступа'); showLoaderUI(false); }
    }
    function loginUser(user) {
        localStorage.setItem('userLoggedIn', 'true'); localStorage.setItem('userEmail', user.email.toLowerCase());
        localStorage.setItem('userName', user.name); localStorage.setItem('userNameFromSheet', currentUserNameFromSheet || user.name);
        localStorage.setItem('userPic', user.picture);
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('main-content').style.display = 'flex';
        setTimeout(() => document.getElementById('loadingScreen').classList.add('fade-out'), 300);
        initializeTableApp();
    }
    async function initAndCheckEmail(email) {
        await loadSheetsAPI(); await gapi.client.init({ apiKey: AUTH_API_KEY, discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'] });
        await checkEmailInSheet(email);
    }
    function handleCredentialResponse(response) {
        const payload = parseJwt(response.credential);
        currentUser = { email: payload.email.toLowerCase().trim(), name: payload.name, picture: payload.picture };
        showLoaderUI(true); initAndCheckEmail(currentUser.email).catch(e => { alert('Ошибка'); showLoaderUI(false); });
    }
    function signOut() { localStorage.clear(); if (google?.accounts?.id) google.accounts.id.disableAutoSelect(); location.reload(); }

    window.addEventListener('load', () => {
        const isLoggedIn = localStorage.getItem('userLoggedIn') === 'true';
        const email = localStorage.getItem('userEmail'), name = localStorage.getItem('userName'), nameFromSheet = localStorage.getItem('userNameFromSheet'), pic = localStorage.getItem('userPic');
        if (isLoggedIn && email) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
            currentUser = { email, name, picture: pic };
            currentUserNameFromSheet = nameFromSheet || name;
            setTimeout(() => document.getElementById('loadingScreen').classList.add('fade-out'), 200);
            initializeTableApp();
        } else {
            document.getElementById('login-section').style.display = 'flex';
            document.getElementById('main-content').style.display = 'none';
            setTimeout(() => document.getElementById('loadingScreen').classList.add('fade-out'), 500);
        }
    });
    window.handleCredentialResponse = handleCredentialResponse;
    window.signOut = signOut;
</script>
</body>
</html>
