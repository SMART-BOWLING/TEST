<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SMB</title>

    <link rel="icon" type="image/png" sizes="192x192" href="https://i.postimg.cc/QNkbRTbS/1.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0f172a;
            --accent: #e11d48;
            --accent-hover: #be123c;
            --bg: #1f2937;
            --white: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
            --shadow-hover: 0 20px 25px -5px rgba(0, 0, 0, 0.4), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
            --transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            padding: 15px;
            color: var(--text-dark);
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }

        #login, #user-info, #access-denied {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            text-align: center;
            width: 100%;
            max-width: 420px;
            border: none;
        }

        #user-info {
            display: none;
            flex-direction: row;
            align-items: center;
            gap: 12px;
            text-align: left;
            padding: 12px 15px;
            max-width: 100%;
            background: var(--card-bg);
            border: none;
        }

        #user-pic {
            border-radius: 12px;
            width: 44px;
            height: 44px;
            object-fit: cover;
            border: none;
        }

        .user-details p { margin: 0; font-size: 14px; font-weight: 700; color: var(--text-dark); }
        #user-email { font-weight: 400; color: var(--text-muted); font-size: 12px; }

        #logout-btn {
            background: #f1f5f9;
            color: var(--text-muted);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        #logout-btn:hover { background: var(--accent); color: white; }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }

        .action-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: visible;
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: relative;
            border: none;
        }

        .action-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .action-btn {
            width: 100%;
            aspect-ratio: 1 / 1;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            text-decoration: none;
            color: inherit;
            border-radius: 20px;
            position: relative;
            z-index: 2;
        }

        .action-btn i {
            font-size: 26px;
            color: #1f2937;
            transition: var(--transition);
        }

        .action-btn span {
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
            color: var(--text-dark);
        }

        .action-card:hover .action-btn i {
            color: var(--accent);
            transform: scale(1.1);
        }

        .sheet-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
            z-index: 100;
        }

        .sheet-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--card-bg);
            border-radius: 28px 28px 0 0;
            box-shadow: 0 -5px 30px rgba(0, 0, 0, 0.3);
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 200;
            max-height: 70vh;
            overflow-y: auto;
            padding: 20px;
        }

        .bottom-sheet.active {
            transform: translateY(0);
        }

        .sheet-handle {
            width: 40px;
            height: 5px;
            background: var(--text-muted);
            border-radius: 10px;
            margin: 0 auto 20px auto;
            opacity: 0.5;
        }

        .sheet-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-dark);
            text-align: center;
        }

        .sheet-clubs-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
        }

        .club-sheet-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: #f8fafc;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            transition: background-color 0.15s ease, border-color 0.15s ease;
            border: 1px solid #e2e8f0;
            transform: none !important;
            cursor: pointer;
        }

        .club-sheet-btn:hover {
            background: #1f2937;
            color: white;
            border-color: #1f2937;
        }

        .club-sheet-btn i {
            color: #1f2937;
            font-size: 14px;
            transition: color 0.15s ease;
        }

        .club-sheet-btn:hover i {
            color: white;
        }

        .close-sheet-btn {
            width: 100%;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
            display: block;
            padding: 16px;
            background: none;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }

        .close-sheet-btn:hover {
            background: #f1f5f9;
            border-color: var(--text-muted);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(225, 29, 72, 0); }
            100% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); }
        }

        .action-card.pulse {
            animation: pulse 0.8s ease;
        }

        .action-card.loading {
            opacity: 0.7;
            pointer-events: none;
            position: relative;
        }

        .action-card.loading::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            z-index: 3;
        }

        .action-card.loading .action-btn i {
            color: var(--text-muted);
        }

        .disabled { 
            opacity: 0.4; 
            pointer-events: none; 
            filter: grayscale(1);
        }

        .disabled .action-btn i {
            color: var(--text-muted);
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(225, 29, 72, 0.2);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 0.8s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .action-grid {
                grid-template-columns: 1fr 1fr !important;
                gap: 12px;
            }
            .action-btn { padding: 10px; }
            .action-btn i { font-size: 24px; }
            .action-btn span { font-size: 10px; }
            
            .sheet-clubs-list {
                max-width: 100%;
            }
            .close-sheet-btn {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login">
        <div style="width: 50px; height: 50px; background: #f1f5f9; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
            <i class="fas fa-shield-halved" style="font-size: 24px; color: var(--accent);"></i>
        </div>
        <h2 style="margin: 0 0 5px; font-weight: 800; font-size: 20px;">SMB Dashboard</h2>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 20px;">Sign in to access</p>
        <div id="g_id_onload" 
             data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com" 
             data-callback="handleCredentialResponse" 
             data-auto_prompt="false"
             data-auto_select="false">
        </div>
        <div class="g_id_signin" 
             data-type="standard" 
             data-shape="pill" 
             data-theme="outline" 
             data-text="signin_with" 
             data-size="large" 
             data-logo_alignment="left">
        </div>
    </div>

    <div id="user-info">
        <img id="user-pic" src="" alt="Profile">
        <div class="user-details" style="flex-grow:1">
            <p id="user-name"></p>
            <p id="user-email"></p>
        </div>
        <button id="logout-btn" onclick="signOut()"><i class="fas fa-power-off"></i></button>
    </div>

    <div class="main-content" id="main-content" style="display:none; width: 100%;">
        <div class="action-grid">
            <div class="action-card" id="manuals-btn">
                <button class="action-btn" onclick="handleGeneralLink('manuals', 'https://smart-bowling.github.io/MANUALS-SMART/')">
                    <i class="fas fa-book-open"></i>
                    <span>Manuals</span>
                </button>
            </div>
            <div class="action-card" id="store-btn">
                <button class="action-btn" onclick="handleGeneralLink('store', 'https://smart-bowling.github.io/PARTS-STORE/')">
                    <i class="fas fa-bag-shopping"></i>
                    <span>Store</span>
                </button>
            </div>
            <div class="action-card" id="card-parts">
                <button class="action-btn" onclick="handleAction('parts', this)">
                    <i class="fas fa-gears"></i>
                    <span>Parts</span>
                </button>
            </div>
            <div class="action-card" id="card-maintenance">
                <button class="action-btn" onclick="handleAction('maintenance', this)">
                    <i class="fas fa-screwdriver-wrench"></i>
                    <span>Maintenance</span>
                </button>
            </div>
            <div class="action-card" id="card-fps">
                <button class="action-btn" onclick="handleAction('fps', this)">
                    <i class="fas fa-chart-line"></i>
                    <span>FPS</span>
                </button>
            </div>
            <div class="action-card" id="card-analysis">
                <button class="action-btn" onclick="handleAction('analysis', this)">
                    <i class="fas fa-bowling-ball"></i>
                    <span>Analysis</span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Bottom Sheet для выбора клуба -->
<div class="sheet-overlay" id="sheetOverlay"></div>
<div class="bottom-sheet" id="clubSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle">Выберите клуб</div>
    <div class="sheet-clubs-list" id="sheetClubsList"></div>
    <button class="close-sheet-btn" onclick="closeClubSheet()">Закрыть</button>
</div>

<script>
// Конфигурация
const SPREADSHEET_ID = '1-yiVdZYa6wJdupTiuiHvI_ht3Vu73RUjyCehZqs2cJ4';
const SHEET_NAME = '1'; 
const API_KEY = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';

// ТОЧНАЯ КАРТА СООТВЕТСТВИЙ ССЫЛОК КЛУБАМ И РАЗДЕЛАМ
const LINK_PATTERNS = {
    'https://smart-bowling.github.io/PARTS-KH/': { club: 'luckyStrike', type: 'parts' },
    'https://smart-bowling.github.io/SMB-LS-KH/': { club: 'luckyStrike', type: 'maintenance' },
    'https://smart-bowling.github.io/PS-STOP-KH/': { club: 'luckyStrike', type: 'fps' },
    
    'https://smart-bowling.github.io/PARTS-BB/': { club: 'blockbuster', type: 'parts' },
    'https://smart-bowling.github.io/SMB-BB/': { club: 'blockbuster', type: 'maintenance' },
    'https://smart-bowling.github.io/PS-STOP-BB/': { club: 'blockbuster', type: 'fps' },
    'https://smart-bowling.github.io/ANALYSIS-BB/': { club: 'blockbuster', type: 'analysis' },
    
    'https://smart-bowling.github.io/PARTS-SKYMALL/': { club: 'skymall', type: 'parts' },
    'https://smart-bowling.github.io/SMB-SKYMALL/': { club: 'skymall', type: 'maintenance' },
    'https://smart-bowling.github.io/PS-STOP-SKYMALL/': { club: 'skymall', type: 'fps' },
    'https://smart-bowling.github.io/ANALYSIS-SM/': { club: 'skymall', type: 'analysis' },
    
    'https://smart-bowling.github.io/MANUALS-SMART/': { type: 'manuals' },
    'https://smart-bowling.github.io/PARTS-STORE/': { type: 'store' }
};

// Карта ссылок для отображения в Bottom Sheet
const linksMap = {
    parts: [
        {name:'Lucky Strike KH', url:'https://smart-bowling.github.io/PARTS-KH/', key:'luckyStrike'},
        {name:'Blockbuster', url:'https://smart-bowling.github.io/PARTS-BB/', key:'blockbuster'},
        {name:'Skymall', url:'https://smart-bowling.github.io/PARTS-SKYMALL/', key:'skymall'}
    ],
    maintenance: [
        {name:'Lucky Strike KH', url:'https://smart-bowling.github.io/SMB-LS-KH/', key:'luckyStrike'},
        {name:'Blockbuster', url:'https://smart-bowling.github.io/SMB-BB/', key:'blockbuster'},
        {name:'Skymall', url:'https://smart-bowling.github.io/SMB-SKYMALL/', key:'skymall'}
    ],
    fps: [
        {name:'Lucky Strike KH', url:'https://smart-bowling.github.io/PS-STOP-KH/', key:'luckyStrike'},
        {name:'Blockbuster', url:'https://smart-bowling.github.io/PS-STOP-BB/', key:'blockbuster'},
        {name:'Skymall', url:'https://smart-bowling.github.io/PS-STOP-SKYMALL/', key:'skymall'}
    ],
    analysis: [
        {name:'Blockbuster', url:'https://smart-bowling.github.io/ANALYSIS-BB/', key:'blockbuster'},
        {name:'Skymall', url:'https://smart-bowling.github.io/ANALYSIS-SM/', key:'skymall'}
    ]
};

// Структура разрешений пользователей
let userPermissions = {};
let currentUser = null;
let permissionsLoading = false;

// Кэш разрешений из localStorage
const PERMISSIONS_CACHE_KEY = 'userPermissionsCache';
const CACHE_EXPIRY_KEY = 'permissionsCacheExpiry';
const CACHE_DURATION = 5 * 60 * 1000; // 5 минут

// Загружаем Google API
function loadSheetsAPI() {
    return new Promise((resolve, reject) => {
        gapi.load('client', {
            callback: () => resolve(),
            onerror: () => reject('Ошибка загрузки Google API'),
            timeout: 8000,
            ontimeout: () => reject('Таймаут загрузки Google API')
        });
    });
}

// Сохранить разрешения в кэш
function cachePermissions(email, permissions) {
    try {
        const cacheData = {
            email: email,
            permissions: permissions,
            timestamp: Date.now()
        };
        localStorage.setItem(PERMISSIONS_CACHE_KEY, JSON.stringify(cacheData));
        localStorage.setItem(CACHE_EXPIRY_KEY, Date.now() + CACHE_DURATION);
    } catch (e) {
        console.warn('Failed to cache permissions:', e);
    }
}

// Загрузить разрешения из кэша
function loadCachedPermissions(email) {
    try {
        const cached = localStorage.getItem(PERMISSIONS_CACHE_KEY);
        const expiry = localStorage.getItem(CACHE_EXPIRY_KEY);
        
        if (cached && expiry && Date.now() < parseInt(expiry)) {
            const data = JSON.parse(cached);
            if (data.email === email) {
                console.log('Loaded permissions from cache for:', email);
                return data.permissions;
            }
        }
    } catch (e) {
        console.warn('Failed to load cached permissions:', e);
    }
    return null;
}

// Обработка ответа Google
function handleCredentialResponse(response) {
    console.log("Google response received");
    
    try {
        const payload = parseJwt(response.credential);
        console.log("User email:", payload.email);
        
        currentUser = {
            email: payload.email.toLowerCase().trim(),
            name: payload.name,
            picture: payload.picture
        };
        
        // Сначала пробуем загрузить из кэша
        const cachedPerms = loadCachedPermissions(currentUser.email);
        if (cachedPerms) {
            userPermissions[currentUser.email] = cachedPerms;
            loginUser(currentUser, true); // true = из кэша
        }
        
        // Затем загружаем свежие данные
        showLoading(true);
        initAndCheckEmail();
        
    } catch (e) {
        console.error("Error parsing Google response:", e);
        showLoading(false);
        alert('Ошибка аутентификации');
    }
}

// Инициализация API и проверка email
async function initAndCheckEmail() {
    try {
        await loadSheetsAPI();
        await gapi.client.init({
            apiKey: API_KEY,
            discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
        });
        
        await checkEmailInSheet(currentUser.email);
        
    } catch (error) {
        console.error('API initialization error:', error);
        showLoading(false);
        
        // Если есть кэш, продолжаем работу с ним
        const cached = loadCachedPermissions(currentUser.email);
        if (cached) {
            console.log('Using cached permissions after API error');
            userPermissions[currentUser.email] = cached;
            loginUser(currentUser, true);
        } else {
            alert('Ошибка инициализации Google API: ' + error);
        }
    }
}

// Проверка email в Google Sheets
async function checkEmailInSheet(email) {
    try {
        const response = await gapi.client.sheets.spreadsheets.values.get({
            spreadsheetId: SPREADSHEET_ID,
            range: `${SHEET_NAME}!A:Z`,
        });
        
        const rows = response.result.values;
        if (!rows || rows.length === 0) {
            showLoading(false);
            alert('Таблица пуста');
            return;
        }
        
        // Ищем email в колонке A
        let foundRow = null;
        
        for (let i = 0; i < rows.length; i++) {
            if (!rows[i][0]) continue;
            
            const rowEmail = rows[i][0].toLowerCase().trim();
            if (rowEmail === email) {
                foundRow = rows[i];
                break;
            }
        }
        
        if (foundRow) {
            // Создаем структуру разрешений
            const permissions = {
                manuals: false,
                store: false,
                luckyStrike: { parts: false, maintenance: false, fps: false, analysis: false },
                blockbuster: { parts: false, maintenance: false, fps: false, analysis: false },
                skymall: { parts: false, maintenance: false, fps: false, analysis: false }
            };
            
            // ТОЧНОЕ СКАНИРОВАНИЕ ССЫЛОК
            for (let j = 1; j < foundRow.length; j++) {
                const cellValue = foundRow[j];
                if (!cellValue || cellValue.trim() === '') continue;
                
                const cleanUrl = cellValue.trim().split('?')[0].split('#')[0];
                console.log(`Scanning URL: ${cleanUrl}`);
                
                // Проверяем точное соответствие с паттернами
                if (LINK_PATTERNS[cleanUrl]) {
                    const match = LINK_PATTERNS[cleanUrl];
                    
                    if (match.type === 'manuals') {
                        permissions.manuals = true;
                        console.log(`✅ Matched: manuals`);
                    } else if (match.type === 'store') {
                        permissions.store = true;
                        console.log(`✅ Matched: store`);
                    } else if (match.club) {
                        permissions[match.club][match.type] = true;
                        console.log(`✅ Matched: ${match.club} - ${match.type}`);
                    }
                } else {
                    console.log(`❌ No exact match for: ${cleanUrl}`);
                }
            }
            
            // Сохраняем в кэш
            cachePermissions(email, permissions);
            
            // Обновляем разрешения
            userPermissions[email] = permissions;
            console.log('Final permissions:', permissions);
            
            // Если пользователь уже залогинен (из кэша), обновляем разрешения
            if (document.getElementById('main-content').style.display === 'block') {
                applyPermissions(email);
            } else {
                loginUser(currentUser);
            }
            
            showLoading(false);
        } else {
            showLoading(false);
            
            // Проверяем кэш на случай ошибки
            const cached = loadCachedPermissions(email);
            if (cached) {
                console.log('Email not found but using cached permissions');
                userPermissions[email] = cached;
                loginUser(currentUser, true);
            } else {
                alert('Доступ запрещен: Ваш email не найден в таблице');
            }
        }
        
    } catch (error) {
        console.error('Sheets API error:', error);
        showLoading(false);
        
        // При ошибке API используем кэш
        const cached = loadCachedPermissions(email);
        if (cached) {
            console.log('Using cached permissions after API error');
            userPermissions[email] = cached;
            loginUser(currentUser, true);
        } else {
            let errorMessage = 'Ошибка доступа к таблице';
            if (error.result && error.result.error && error.result.error.message) {
                errorMessage += ': ' + error.result.error.message;
            }
            alert(errorMessage);
        }
    }
}

// Функция входа пользователя
function loginUser(payload, fromCache = false) {
    console.log("Logging in user:", payload.email, fromCache ? '(from cache)' : '');
    
    document.getElementById('login').style.display = 'none';
    document.getElementById('user-info').style.display = 'flex';
    document.getElementById('main-content').style.display = 'block';
    
    document.getElementById('user-pic').src = payload.picture;
    document.getElementById('user-name').textContent = payload.name;
    document.getElementById('user-email').textContent = payload.email;
    
    localStorage.setItem('userLoggedIn', 'true');
    localStorage.setItem('userEmail', payload.email.toLowerCase());
    localStorage.setItem('userName', payload.name);
    localStorage.setItem('userPic', payload.picture);
    
    // Мгновенно применяем разрешения
    applyPermissions(payload.email.toLowerCase());
    
    if (!fromCache) {
        showLoading(false);
    }
}

// Показать/скрыть индикатор загрузки
function showLoading(show) {
    const loginDiv = document.getElementById('login');
    permissionsLoading = show;
    
    if (show) {
        if (!loginDiv.hasAttribute('data-original')) {
            loginDiv.setAttribute('data-original', loginDiv.innerHTML);
        }
        loginDiv.innerHTML = '<div style="padding: 40px; text-align: center;"><div class="loading-spinner"></div><br><span style="color: var(--text-muted); margin-top: 15px; display: block;">Проверка доступа...</span></div>';
    } else {
        if (loginDiv.getAttribute('data-original') && document.getElementById('login').style.display !== 'none') {
            loginDiv.innerHTML = loginDiv.getAttribute('data-original');
            
            if (window.google && google.accounts && google.accounts.id) {
                google.accounts.id.renderButton(
                    document.querySelector('.g_id_signin'),
                    { 
                        type: 'standard', 
                        shape: 'pill', 
                        theme: 'outline', 
                        text: 'signin_with', 
                        size: 'large', 
                        logo_alignment: 'left' 
                    }
                );
            }
        }
    }
}

// Применение разрешений
function applyPermissions(email) {
    const p = userPermissions[email];
    if (!p) {
        // Если разрешений нет, показываем кнопки как недоступные
        document.querySelectorAll('.action-card').forEach(card => {
            card.classList.add('loading');
        });
        return;
    }
    
    // Убираем состояние загрузки
    document.querySelectorAll('.action-card').forEach(card => {
        card.classList.remove('loading');
    });
    
    // Применяем разрешения
    document.getElementById('manuals-btn').classList.toggle('disabled', !p.manuals);
    document.getElementById('store-btn').classList.toggle('disabled', !p.store);
    
    Object.keys(linksMap).forEach(type => {
        const hasAccess = linksMap[type].some(item => p[item.key] && p[item.key][type]);
        document.getElementById(`card-${type}`).classList.toggle('disabled', !hasAccess);
    });
}

// Обработка общих ссылок (Manuals и Store)
function handleGeneralLink(type, url) {
    const email = localStorage.getItem('userEmail');
    const p = userPermissions[email];
    
    if (!p) {
        if (permissionsLoading) {
            alert('Пожалуйста, подождите, проверка доступа...');
        } else {
            alert('Ошибка: разрешения не найдены');
        }
        return;
    }
    
    if ((type === 'manuals' && p.manuals) || (type === 'store' && p.store)) {
        window.location.href = url;
    }
}

// Обработка действия для Parts, Maintenance, FPS, Analysis
function handleAction(type, buttonElement) {
    const email = localStorage.getItem('userEmail');
    const p = userPermissions[email];
    
    if (!p) {
        if (permissionsLoading) {
            alert('Пожалуйста, подождите, проверка доступа...');
        } else {
            alert('Ошибка: разрешения не найдены');
        }
        return;
    }
    
    const available = linksMap[type].filter(item => p[item.key] && p[item.key][type]);
    
    if (available.length === 0) {
        alert('Нет доступных ресурсов для этого раздела');
        return;
    }
    
    if (available.length === 1) {
        window.location.href = available[0].url;
    } else if (available.length > 1) {
        const card = buttonElement.closest('.action-card');
        
        card.classList.add('pulse');
        setTimeout(() => card.classList.remove('pulse'), 800);
        
        showClubSheet(type, available);
    }
}

// Показать Bottom Sheet
function showClubSheet(type, clubs) {
    const sheet = document.getElementById('clubSheet');
    const overlay = document.getElementById('sheetOverlay');
    const title = document.getElementById('sheetTitle');
    const listContainer = document.getElementById('sheetClubsList');
    
    let typeName = {
        parts: 'Запчасти',
        maintenance: 'Обслуживание',
        fps: 'FPS',
        analysis: 'Аналитика'
    }[type] || type;
    
    title.textContent = `Выберите клуб: ${typeName}`;
    
    listContainer.innerHTML = '';
    clubs.forEach(club => {
        const btn = document.createElement('button');
        btn.className = 'club-sheet-btn';
        btn.innerHTML = `${club.name} <i class="fas fa-arrow-right"></i>`;
        btn.onclick = function() {
            window.location.href = club.url;
        };
        listContainer.appendChild(btn);
    });
    
    sheet.classList.add('active');
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
}

// Закрыть Bottom Sheet
function closeClubSheet() {
    document.getElementById('clubSheet').classList.remove('active');
    document.getElementById('sheetOverlay').classList.remove('active');
    document.body.style.overflow = '';
}

// Парсинг JWT
function parseJwt(token) {
    try {
        const base64Url = token.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
    } catch (e) {
        console.error('Error parsing JWT:', e);
        return {};
    }
}

// Выход
function signOut() { 
    console.log("Signing out");
    localStorage.clear();
    sessionStorage.clear();
    location.reload(); 
}

// Проверка сессии при загрузке
window.addEventListener('load', function() {
    console.log("Page loaded, checking localStorage...");
    
    const isLoggedIn = localStorage.getItem('userLoggedIn') === 'true';
    const email = localStorage.getItem('userEmail');
    const name = localStorage.getItem('userName');
    const pic = localStorage.getItem('userPic');
    
    if (isLoggedIn && email) {
        console.log("Found stored session for:", email);
        
        document.getElementById('login').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('user-info').style.display = 'flex';
        
        document.getElementById('user-name').textContent = name || 'User';
        document.getElementById('user-email').textContent = email;
        if (pic) document.getElementById('user-pic').src = pic;
        
        currentUser = {
            email: email,
            name: name,
            picture: pic
        };
        
        // Сначала пробуем загрузить из кэша
        const cachedPerms = loadCachedPermissions(email);
        if (cachedPerms) {
            userPermissions[email] = cachedPerms;
            applyPermissions(email);
        } else {
            // Показываем кнопки в состоянии загрузки
            document.querySelectorAll('.action-card').forEach(card => {
                card.classList.add('loading');
            });
        }
        
        // Затем загружаем свежие данные
        showLoading(true);
        
        loadSheetsAPI()
            .then(() => gapi.client.init({
                apiKey: API_KEY,
                discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
            }))
            .then(() => checkEmailInSheet(email))
            .catch(error => {
                console.error('Session restore error:', error);
                showLoading(false);
                
                // Если есть кэш, продолжаем работу с ним
                if (cachedPerms) {
                    console.log('Using cached permissions after error');
                } else {
                    alert('Ошибка восстановления сессии');
                    signOut();
                }
            });
        
    } else {
        console.log("No stored session, showing login button");
        document.getElementById('login').style.display = 'block';
    }
});

// Закрытие по клику на overlay
document.getElementById('sheetOverlay').addEventListener('click', closeClubSheet);
</script>
