    <!-- ОСНОВНОЙ КОНТЕНТ -->

        <header>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/ru.js"></script>
    
    <script>
        // ===== КОНСТАНТЫ АВТОРИЗАЦИИ =====
        const AUTH_SPREADSHEET_ID = '1-yiVdZYa6wJdupTiuiHvI_ht3Vu73RUjyCehZqs2cJ4';
        const AUTH_SHEET_NAME = '1';
        const AUTH_API_KEY = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';
        
        const CURRENT_SITE = 'https://smart-bowling.github.io/SMB-LS-KH/';
        
        // ОСНОВНОЙ URL BACKEND
        const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbyBiibLN40TjLDo1pz69ogyUgERUBhuCcmmkXDCgvS3fUGbt6ifyt_Lh9f3gg8yXZOA/exec';
        const CARDS_PER_PAGE = 6;

        // Переменные состояния
        let currentUser = null;
        let journalData = null;      // МЕХАНИК
        let instructorData = null;   // ИНСТРУКТОР
        let engineerData = null;     // ИНЖЕНЕР
        let originalJournalData = null;
        
        let currentJournalPage = 1;
        let currentInstructorPage = 1;
        let currentEngineerPage = 1;
        let totalJournalPages = 1;
        let totalInstructorPages = 1;
        let totalEngineerPages = 1;

        let isFilterActive = false;
        let currentFilterDate = '';
        let filterType = 'journal'; // 'journal', 'instructor', 'engineer'
        let datePicker = null;
        let isInitialLoad = true;

        // Флаг для отслеживания завершения загрузки всех данных
        let dataLoadComplete = false;
        let loadedCount = 0;
        const totalDataLoads = 3; // journal, instructor, engineer

        const loadingScreen = document.getElementById("loadingScreen");
        const loginSection = document.getElementById("login-section");
        const mainContent = document.getElementById("main-content");
        const loader = document.getElementById("loader");

        // ===== ФУНКЦИИ АВТОРИЗАЦИИ =====
        function toggleUserDropdown() {
            const menu = document.getElementById("userDropdown");
            menu.style.display = menu.style.display === "block" ? "none" : "block";
        }

        function updateUserAvatar(user) {
            const avatarContainer = document.getElementById('userAvatar');
            if (user?.picture) {
                avatarContainer.innerHTML = `<img src="${user.picture}" alt="Avatar">`;
            } else {
                avatarContainer.innerHTML = '<i class="fas fa-user"></i>';
            }
        }

        function showLoader() { loader.classList.add('active'); }
        function hideLoader() { loader.classList.remove('active'); }

        function loadSheetsAPI() {
            return new Promise((resolve, reject) => {
                gapi.load('client', {
                    callback: () => resolve(),
                    onerror: () => reject('Ошибка загрузки Google API'),
                    timeout: 10000,
                    ontimeout: () => reject('Таймаут загрузки Google API')
                });
            });
        }

        function handleCredentialResponse(response) {
            try {
                const payload = parseJwt(response.credential);
                currentUser = {
                    email: payload.email.toLowerCase().trim(),
                    name: payload.name,
                    picture: payload.picture
                };
                showLoading(true);
                initAndCheckEmail();
            } catch (e) {
                console.error('Ошибка аутентификации:', e);
                showLoading(false);
                alert('Ошибка аутентификации');
            }
        }

        function showLoading(show) {
            const loginDiv = document.getElementById('login-container');
            if (show) {
                if (!loginDiv.hasAttribute('data-original')) {
                    loginDiv.setAttribute('data-original', loginDiv.innerHTML);
                }
                loginDiv.innerHTML = '<div style="padding: 40px; text-align: center;"><div class="loading-spinner"></div><br><span style="color: #64748b; margin-top: 15px; display: block;">Проверка доступа...</span></div>';
            } else {
                if (loginDiv.getAttribute('data-original') && loginSection.style.display !== 'none') {
                    loginDiv.innerHTML = loginDiv.getAttribute('data-original');
                    if (window.google && google.accounts && google.accounts.id) {
                        google.accounts.id.renderButton(
                            document.querySelector('.g_id_signin'),
                            { type: 'standard', shape: 'pill', theme: 'outline', text: 'signin_with', size: 'large', logo_alignment: 'left' }
                        );
                    }
                }
            }
        }

        async function initAndCheckEmail() {
            try {
                await loadSheetsAPI();
                await gapi.client.init({ apiKey: AUTH_API_KEY, discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'] });
                await checkEmailInSheet(currentUser.email);
            } catch (error) {
                console.error('Ошибка инициализации:', error);
                showLoading(false);
                alert('Ошибка инициализации Google API');
            }
        }

        async function checkEmailInSheet(email) {
            try {
                const response = await gapi.client.sheets.spreadsheets.values.get({
                    spreadsheetId: AUTH_SPREADSHEET_ID,
                    range: `${AUTH_SHEET_NAME}!A:Z`,
                });
                const rows = response.result.values;
                if (!rows || rows.length === 0) {
                    showLoading(false);
                    alert('Таблица пуста');
                    return;
                }
                let hasAccess = false;
                for (let i = 0; i < rows.length; i++) {
                    if (!rows[i]?.[0]) continue;
                    const rowEmail = rows[i][0].toLowerCase().trim();
                    if (rowEmail === email) {
                        for (let j = 1; j < rows[i].length; j++) {
                            const siteUrl = rows[i][j]?.trim().split('?')[0].split('#')[0] || '';
                            if (siteUrl === CURRENT_SITE || siteUrl.includes('SMB-LS-KH')) {
                                hasAccess = true;
                                break;
                            }
                        }
                        break;
                    }
                }
                if (hasAccess) {
                    loginUser(currentUser);
                } else {
                    showLoading(false);
                    alert('Доступ запрещен');
                }
            } catch (error) {
                console.error('Ошибка доступа к таблице:', error);
                showLoading(false);
                alert('Ошибка доступа к таблице');
            }
        }

        function loginUser(payload) {
            loginSection.style.display = 'none';
            mainContent.style.display = 'block';
            updateUserAvatar(payload);
            localStorage.setItem('userLoggedIn', 'true');
            localStorage.setItem('userEmail', payload.email.toLowerCase());
            localStorage.setItem('userName', payload.name);
            localStorage.setItem('userPic', payload.picture);
            showLoading(false);
            // Запускаем загрузку данных, после которой скроем экран загрузки
            initializeApp();
        }

        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) { return {}; }
        }

        function signOut() {
            localStorage.clear();
            sessionStorage.clear();
            if (google && google.accounts && google.accounts.id) google.accounts.id.disableAutoSelect();
            mainContent.style.display = 'none';
            loginSection.style.display = 'flex';
            const loginDiv = document.getElementById('login-container');
            if (loginDiv.getAttribute('data-original')) {
                loginDiv.innerHTML = loginDiv.getAttribute('data-original');
                if (window.google && google.accounts && google.accounts.id) {
                    google.accounts.id.renderButton(
                        document.querySelector('.g_id_signin'),
                        { type: 'standard', shape: 'pill', theme: 'outline', text: 'signin_with', size: 'large', logo_alignment: 'left' }
                    );
                }
            }
        }

        // ===== ОБЩИЕ УТИЛИТЫ =====
        function convertGoogleDriveLink(driveLink) {
            if (!driveLink) return null;
            if (driveLink.includes('drive.google.com/file/d/')) {
                const match = driveLink.match(/\/d\/([^\/]+)/);
                if (match && match[1]) return `https://drive.google.com/uc?export=view&id=${match[1]}`;
            }
            if (driveLink.includes('uc?export=view')) return driveLink;
            return null;
        }

        function openDriveLink(driveLink) {
            if (!driveLink) return;
            const viewLink = convertGoogleDriveLink(driveLink);
            window.open(viewLink || driveLink, '_blank');
        }

        async function makeRequest(url, options = {}) {
            try {
                if (!options.method || options.method === 'GET') {
                    const separator = url.includes('?') ? '&' : '?';
                    url = `${url}${separator}_=${Date.now()}`;
                }
                const response = await fetch(url, options);
                return await response.json();
            } catch (error) { throw error; }
        }

        function scrollToTop() {
            const activeTab = document.querySelector('.tab-content.active');
            if (activeTab) activeTab.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goToPage(type, pageNumber) {
            if (type === 'journal') {
                if (pageNumber >= 1 && pageNumber <= totalJournalPages && pageNumber !== currentJournalPage) {
                    currentJournalPage = pageNumber;
                    renderJournalCards(journalData);
                    updatePagination('journal', currentJournalPage, totalJournalPages);
                    scrollToTop();
                }
            } else if (type === 'instructor') {
                if (pageNumber >= 1 && pageNumber <= totalInstructorPages && pageNumber !== currentInstructorPage) {
                    currentInstructorPage = pageNumber;
                    renderInstructorCards(instructorData);
                    updatePagination('instructor', currentInstructorPage, totalInstructorPages);
                    scrollToTop();
                }
            } else if (type === 'engineer') {
                if (pageNumber >= 1 && pageNumber <= totalEngineerPages && pageNumber !== currentEngineerPage) {
                    currentEngineerPage = pageNumber;
                    renderEngineerCards(engineerData);
                    updatePagination('engineer', currentEngineerPage, totalEngineerPages);
                    scrollToTop();
                }
            }
        }

        function updatePagination(type, currentPage, totalPages) {
            const pagination = document.getElementById(`${type}-pagination`);
            if (!pagination) return;
            const currentPageSpan = document.getElementById(`${type}-current-page`);
            const totalPagesSpan = document.getElementById(`${type}-total-pages`);
            const firstBtn = pagination.querySelector('.first-btn');
            const prevBtn = pagination.querySelector('.prev-btn');
            const nextBtn = pagination.querySelector('.next-btn');
            const lastBtn = pagination.querySelector('.last-btn');
            currentPageSpan.textContent = currentPage;
            totalPagesSpan.textContent = totalPages;
            firstBtn.disabled = currentPage === 1;
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages;
            lastBtn.disabled = currentPage === totalPages;
            lastBtn.onclick = () => goToPage(type, totalPages);
            pagination.style.display = totalPages > 1 ? 'flex' : 'none';
        }

        function changePage(type, direction) {
            if (type === 'journal') goToPage('journal', currentJournalPage + direction);
            else if (type === 'instructor') goToPage('instructor', currentInstructorPage + direction);
            else if (type === 'engineer') goToPage('engineer', currentEngineerPage + direction);
        }

        function getCurrentPageData(data, currentPage) {
            const start = (currentPage - 1) * CARDS_PER_PAGE;
            return data.slice(start, start + CARDS_PER_PAGE);
        }

        function filterTasksByTitle(tasks, keywords) {
            if (!tasks) return [];
            return tasks.filter(task => {
                const title = task.task ? task.task.toLowerCase() : '';
                return keywords.some(kw => title.includes(kw.toLowerCase()));
            });
        }

        // ===== ЗАГРУЗКА ДАННЫХ =====
        async function loadJournal() {
            try {
                if (journalData && !isInitialLoad) { renderJournalCards(journalData); return; }
                const journal = await makeRequest(`${BACKEND_URL}?action=getJournal`);
                originalJournalData = [...journal];
                const filtered = filterTasksByTitle(originalJournalData, ['PS', 'МЕХ', 'ps', 'мех']);
                journalData = [...filtered];
                renderJournalCards(journalData);
                updateCounterLabel();
                return true;
            } catch (error) {
                console.error(error);
                document.getElementById('journal-cards').innerHTML = `<div class="task-card error">Ошибка загрузки</div>`;
                return false;
            }
        }

        async function loadInstructorTasks() {
            try {
                if (instructorData && !isInitialLoad) { renderInstructorCards(instructorData); return; }
                const journal = await makeRequest(`${BACKEND_URL}?action=getJournal`);
                if (!originalJournalData) originalJournalData = [...journal];
                const filtered = filterTasksByTitle(journal, ['ИНСТ', 'инст']);
                instructorData = [...filtered];
                renderInstructorCards(instructorData);
                updateCounterLabel();
                return true;
            } catch (error) {
                console.error(error);
                document.getElementById('instructor-cards').innerHTML = `<div class="task-card error">Ошибка загрузки</div>`;
                return false;
            }
        }

        async function loadEngineerTasks() {
            try {
                if (engineerData && !isInitialLoad) { renderEngineerCards(engineerData); return; }
                const journal = await makeRequest(`${BACKEND_URL}?action=getJournal`);
                if (!originalJournalData) originalJournalData = [...journal];
                const filtered = filterTasksByTitle(journal, ['ИНЖЕНЕР', 'инженер']);
                engineerData = [...filtered];
                renderEngineerCards(engineerData);
                updateCounterLabel();
                return true;
            } catch (error) {
                console.error(error);
                document.getElementById('engineer-cards').innerHTML = `<div class="task-card error">Ошибка загрузки</div>`;
                return false;
            }
        }

        // Функция, которая вызывается после загрузки каждого раздела
        function onDataLoaded() {
            loadedCount++;
            if (loadedCount === totalDataLoads) {
                // Все данные загружены, скрываем экран загрузки
                setTimeout(() => {
                    loadingScreen.classList.add('fade-out');
                }, 300); // небольшая задержка для плавности
                dataLoadComplete = true;
                hideLoader(); // если был показан локальный лоадер
            }
        }

        // ===== ФИЛЬТРАЦИЯ ПО ДАТЕ =====
        function initDatePicker() {
            if (datePicker) datePicker.destroy();
            const dateInput = document.getElementById('date-filter-input');
            datePicker = flatpickr(dateInput, {
                locale: "ru",
                dateFormat: "d.m.Y",
                allowInput: false,
                clickOpens: true,
                disableMobile: false,

                        else if (activeTab && activeTab.id === 'tab2') filterInstructorByDate(dateStr);

        function filterJournalByDate(date) {
            if (!date) {
                isFilterActive = false;
                currentFilterDate = '';
                filterType = 'journal';
                journalData = originalJournalData ? filterTasksByTitle([...originalJournalData], ['PS', 'МЕХ', 'ps', 'мех']) : [];
                currentJournalPage = 1;
                renderJournalCards(journalData);
                updateCounterLabel();
                document.getElementById('date-filter-input').value = '';
                return;
            }
            isFilterActive = true;
            currentFilterDate = date;
            filterType = 'journal';
            const filtered = originalJournalData.filter(task => {
                const titleMatch = ['PS', 'МЕХ', 'ps', 'мех'].some(kw => (task.task || '').toLowerCase().includes(kw.toLowerCase()));
                return task.completedDate === date && titleMatch;
            });
            journalData = filtered;
            currentJournalPage = 1;
            renderJournalCards(journalData);
            updateCounterLabel();
        }

        function updateCounterLabel() {
            const openTasksCounter = document.getElementById('open-tasks-counter');
            const labelSpan = openTasksCounter.querySelector('.label');
            const countSpan = openTasksCounter.querySelector('.count');
            const activeTab = document.querySelector('.tab-content.active');
            if (isFilterActive && currentFilterDate) {
                let count = 0;
                if (activeTab && activeTab.id === 'tab1') count = journalData ? journalData.length : 0;
                else if (activeTab && activeTab.id === 'tab2') count = instructorData ? instructorData.length : 0;
                else if (activeTab && activeTab.id === 'tab3') count = engineerData ? engineerData.length : 0;
                labelSpan.innerHTML = `Задачи за ${currentFilterDate} (${activeTab ? (activeTab.id === 'tab1' ? 'МЕХАНИК' : activeTab.id === 'tab2' ? 'ИНСТРУКТОР' : 'ИНЖЕНЕР') : ''})`;
                countSpan.textContent = count;
            } else {
                let openCount = 0;
                if (activeTab && activeTab.id === 'tab1') openCount = journalData ? journalData.filter(t => !t.isCompleted).length : 0;
                else if (activeTab && activeTab.id === 'tab2') openCount = instructorData ? instructorData.filter(t => !t.isCompleted).length : 0;
                else if (activeTab && activeTab.id === 'tab3') openCount = engineerData ? engineerData.filter(t => !t.isCompleted).length : 0;
                labelSpan.innerHTML = 'КОЛИЧЕСТВО НЕВЫПОЛНЕННЫХ ЗАДАЧ:';
                countSpan.textContent = openCount;

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        function attachExecutorEvents(tabSelector) {
            document.querySelectorAll(`${tabSelector} .executor-select`).forEach(select => {
                select.removeEventListener('change', handleExecutorChange);
                select.addEventListener('change', handleExecutorChange);
            });
        }

        function handleExecutorChange(e) {
            const card = e.target.closest('.task-card');
            const submitBtn = card.querySelector('.submit-btn');
            if (submitBtn) submitBtn.disabled = !e.target.value;
            e.stopPropagation();
        }

        async function completeTask(taskId, executor, rowIndex) {
            showLoader();
            try {
                const updateUrl = `${BACKEND_URL}?action=updateCell&sheetName=B&column=E&row=${rowIndex}&value=${encodeURIComponent(executor)}`;
                await makeRequest(updateUrl);
                await makeRequest(`${BACKEND_URL}?action=updateFromRowNumber&rowNumber=${rowIndex}`);
                journalData = instructorData = engineerData = originalJournalData = null;
                const wasFilter = isFilterActive;
                const savedDate = currentFilterDate;
                const savedType = filterType;
                await Promise.all([loadJournal(), loadInstructorTasks(), loadEngineerTasks()]);
                if (wasFilter && savedDate) {
                    if (savedType === 'journal') filterJournalByDate(savedDate);
                    else if (savedType === 'instructor') filterInstructorByDate(savedDate);
                    else if (savedType === 'engineer') filterEngineerByDate(savedDate);
                }
                hideLoader();
            } catch (error) {
                console.error(error);
                hideLoader();
            }
        }

        function submitTask(event, taskId, rowIndex) {
            const btn = event.currentTarget;
            if (btn.disabled) return;
            const card = btn.closest('.task-card');
            const select = card.querySelector('.executor-select');
            if (!select || !select.value) return;
            completeTask(taskId, select.value, rowIndex);
            event.stopPropagation();
        }

        function initializeApp() {
            const tabBtns = document.querySelectorAll('.tab-btn');
            const tabContents = document.querySelectorAll('.tab-content');
            document.getElementById('open-tasks-counter').addEventListener('click', toggleDateFilter);
            document.getElementById('clear-filter-btn').addEventListener('click', clearDateFilter);
            
            // Загружаем все данные и отслеживаем завершение
            loadedCount = 0;
            Promise.all([
                loadJournal().then(() => onDataLoaded()),
                loadInstructorTasks().then(() => onDataLoaded()),
                loadEngineerTasks().then(() => onDataLoaded())
            ]).catch(err => {
                console.error('Ошибка загрузки данных:', err);
                onDataLoaded(); // чтобы не зависнуть
            });
            
            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    tabBtns.forEach(b => b.classList.remove('active'));
                    tabContents.forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    const tabId = btn.getAttribute('data-tab');
                    document.getElementById(tabId).classList.add('active');
                    if (tabId === 'tab1') { currentJournalPage = 1; loadJournal(); }
                    else if (tabId === 'tab2') { currentInstructorPage = 1; loadInstructorTasks(); }
                    else if (tabId === 'tab3') { currentEngineerPage = 1; loadEngineerTasks(); }
                    if (isFilterActive && currentFilterDate) {
                        if (tabId === 'tab1') filterJournalByDate(currentFilterDate);
                        else if (tabId === 'tab2') filterInstructorByDate(currentFilterDate);
                        else if (tabId === 'tab3') filterEngineerByDate(currentFilterDate);
                    } else updateCounterLabel();
                    scrollToTop();
                });
            });
            
            setInterval(() => {
                const active = document.querySelector('.tab-content.active');
                if (active && active.id === 'tab1') loadJournal();
                else if (active && active.id === 'tab2') loadInstructorTasks();
                else if (active && active.id === 'tab3') loadEngineerTasks();
            }, 30000);
            isInitialLoad = false;
        }

        window.addEventListener('load', function() {
            const isLoggedIn = localStorage.getItem('userLoggedIn') === 'true';
            const email = localStorage.getItem('userEmail');
            const name = localStorage.getItem('userName');
            const pic = localStorage.getItem('userPic');
            if (isLoggedIn && email) {
                loginSection.style.display = 'none';
                mainContent.style.display = 'block';
                currentUser = { email, name, picture: pic };
                updateUserAvatar(currentUser);
                showLoading(true);
                loadSheetsAPI()
                    .then(() => gapi.client.init({ apiKey: AUTH_API_KEY, discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'] }))
                    .then(() => checkEmailInSheet(email))
                    .catch(() => signOut());
            } else {
                loginSection.style.display = 'flex';
                mainContent.style.display = 'none';
                setTimeout(() => loadingScreen.classList.add('fade-out'), 500);
            }
        });

        window.onload = function() {
            if (google && google.accounts && google.accounts.id) {
                google.accounts.id.initialize({ client_id: '328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com', callback: handleCredentialResponse });
                google.accounts.id.renderButton(document.querySelector('.g_id_signin'), { type: 'standard', shape: 'pill', theme: 'outline', text: 'signin_with', size: 'large', logo_alignment: 'left' });
            }
        };
    </script>
    <script>
        (function fixButtonsOnAllPages() {
            let lastTouchEnd = 0;
            document.addEventListener('touchend', function(e) {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) e.preventDefault();
                lastTouchEnd = now;
            }, { passive: false });
            function forceButtonHandlers() {
                document.querySelectorAll('.schema-button, .submit-btn, .executor-select').forEach(el => {
                    if (!el.hasAttribute('data-handler-fixed')) {
                        el.setAttribute('data-handler-fixed', 'true');
                        if (el.classList.contains('executor-select')) {
                            el.removeEventListener('change', handleExecutorChange);
                            el.addEventListener('change', handleExecutorChange);
                        }
                    }
                });
            }
            function handleExecutorChange(e) { e.stopPropagation(); }
            const observer = new MutationObserver(() => setTimeout(forceButtonHandlers, 50));
            observer.observe(document.getElementById('tab1'), { childList: true, subtree: true });
            observer.observe(document.getElementById('tab2'), { childList: true, subtree: true });
            observer.observe(document.getElementById('tab3'), { childList: true, subtree: true });
            setTimeout(forceButtonHandlers, 100);
        })();
    </script>
