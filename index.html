<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BILLIARD PRO | ENTERPRISE CONTROL</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --text-gold: #fbbf24;
            --success: #10b981;
            --danger: #f43f5e;
            --border: #334155;
        }

        body {
            background-color: var(--bg-dark);
            color: #f8fafc;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Боковая панель управления */
        .sidebar {
            width: 260px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .logo {
            font-weight: 700;
            font-size: 20px;
            color: var(--accent);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item {
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 5px;
            color: #94a3b8;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
        }

        /* Основная область */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 30px;
        }

        /* Заголовок и фильтры */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .date-picker-custom {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: 'Roboto Mono', monospace;
        }

        /* Сетка таймлайна */
        .timeline-container {
            background: var(--panel-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        table {
            border-collapse: collapse;
            width: 100%;
            table-layout: fixed;
        }

        th {
            background: rgba(15, 23, 42, 0.5);
            padding: 15px;
            font-size: 12px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            color: #64748b;
        }

        td {
            height: 50px;
            border: 0.5px solid var(--border);
            position: relative;
            cursor: crosshair;
        }

        /* Стилизация времени */
        .time-label {
            width: 80px;
            background: rgba(15, 23, 42, 0.8);
            color: var(--accent);
            font-family: 'Roboto Mono', monospace;
            font-weight: bold;
            text-align: center;
        }

        /* Оживление ячеек */
        td:hover {
            background: rgba(255,255,255,0.05);
        }

        /* Пример активной брони */
        .booking-slot {
            position: absolute;
            inset: 4px;
            background: linear-gradient(90deg, #0369a1, #0ea5e9);
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 10px;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 4px 12px var(--accent-glow);
            border-left: 3px solid var(--text-gold);
            cursor: pointer;
            z-index: 10;
        }

        .booking-slot:hover {
            transform: scale(1.02);
            filter: brightness(1.2);
        }

        /* Кнопка действия */
        .btn-primary {
            background: var(--accent);
            color: #0f172a;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-primary:hover {
            background: white;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        /* Скроллбар */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">
            <div style="width:12px; height:12px; background:var(--accent); border-radius:50%"></div>
            BILLIARD PRO
        </div>
        <nav>
            <div class="nav-item active">📅 Расписание</div>
            <div class="nav-item">🗺️ Карта залов</div>
            <div class="nav-item">👤 Клиенты</div>
            <div class="nav-item">📊 Отчеты</div>
            <div class="nav-item">⚙️ Настройки</div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header-actions">
            <div>
                <h1 style="margin:0; font-size: 24px;">Панель управления</h1>
                <p style="color: #64748b; margin: 5px 0 0 0;">Клуб: "Lucky Strike" • Смена: Иван Иванов</p>
            </div>
            <div style="display:flex; gap:15px; align-items:center;">
                <input type="date" class="date-picker-custom" id="mainDate">
                <button class="btn-primary">+ НОВАЯ БРОНЬ</button>
            </div>
        </header>

        <div class="timeline-container">
            <table>
                <thead>
                    <tr>
                        <th style="width:80px">Время</th>
                        <th>Стол 1</th>
                        <th>Стол 2</th>
                        <th>Стол 3</th>
                        <th>Стол 4</th>
                        <th>Стол 5</th>
                        <th>Стол 6</th>
                        <th>Стол 7</th>
                        <th>Стол 8</th>
                    </tr>
                </thead>
                <tbody id="gridBody">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        const gridBody = document.getElementById('gridBody');
        const startH = 11;
        const endH = 23;

        // Генерация сетки
        for(let h = startH; h <= endH; h++) {
            [0, 30].forEach(m => {
                const row = document.createElement('tr');
                const timeCell = document.createElement('td');
                timeCell.className = 'time-label';
                timeCell.textContent = `${h}:${m === 0 ? '00' : '30'}`;
                row.appendChild(timeCell);

                for(let s = 1; s <= 8; s++) {
                    const cell = document.createElement('td');
                    
                    // Пример вставки брони для теста (на 14:00 стол 3)
                    if(h === 14 && m === 0 && s === 3) {
                        cell.innerHTML = `
                            <div class="booking-slot">
                                <div style="color:var(--text-gold)">МАРК А.</div>
                                <div style="opacity:0.8">+380 99...</div>
                            </div>
                        `;
                    }
                    row.appendChild(cell);
                }
                gridBody.appendChild(row);
            });
        }

        // Установка текущей даты
        document.getElementById('mainDate').valueAsDate = new Date();
    </script>
</body>
</html>
