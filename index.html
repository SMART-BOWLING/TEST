    // ===== НОВЫЕ ФУНКЦИИ ДЛЯ ПРЯМОГО ЧТЕНИЯ ИЗ SHEETS =====
    function initSheetsAPI() {
      return new Promise((resolve, reject) => {
        if (sheetsApiInitialized) {
          resolve();
          return;
        }
        
        gapi.load('client', {
          callback: async () => {
            try {

                apiKey: SHEETS_CONFIG.API_KEY,
                discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],

              resolve();
            } catch (error) {
              reject(error);
            }
          },
          onerror: () => reject('Ошибка загрузки Google API'),
          timeout: 10000,
          ontimeout: () => reject('Таймаут загрузки Google API')
        });
      });
    }

    // Функция для получения имени листа (9.25 вместо 9.2025)
    function getSheetName(date) {
      const month = date.getMonth() + 1;
      const year = date.getFullYear().toString().slice(-2);
      return month + '.' + year;
    }

    // Прямое чтение данных из Google Sheets
    async function readDataFromSheet(dateString) {
      try {
        await initSheetsAPI();
        
        const date = new Date(dateString);
        const day = date.getDate();
        const sheetName = getSheetName(date);
        
        // Проверяем существование листа
        const sheets = await gapi.client.sheets.spreadsheets.get({
          spreadsheetId: SHEETS_CONFIG.SPREADSHEET_ID
        });
        
        const sheetExists = sheets.result.sheets.some(s => 
          s.properties.title === sheetName
        );
        
        if (!sheetExists) {
          return {
            errors: Array(14).fill(0),
            chartData: { errors: Array(14).fill(0), fps: Array(14).fill(0) },
            totalStats: { errors: 0, fps: 0 },
            tableData: []
          };
        }
        
        // Формируем диапазоны для чтения
        const row = SHEETS_CONFIG.START_ROW + day - 1;
        
        // 1. Читаем ошибки для текущего дня
        const errorRanges = Object.values(SHEETS_CONFIG.COLUMN_MAPPING)
          .map(col => `${sheetName}!${col}${row}`);
        
        // 2. Читаем данные для графиков
        const chartRanges = [];
        for (let i = 0; i < 14; i++) {
          const col = Object.values(SHEETS_CONFIG.COLUMN_MAPPING)[i];
          chartRanges.push(`${sheetName}!${col}${SHEETS_CONFIG.CHART_ROWS.ERRORS}`);
          chartRanges.push(`${sheetName}!${col}${SHEETS_CONFIG.CHART_ROWS.FPS}`);
        }
        
        // 3. Читаем общую статистику
        chartRanges.push(`${sheetName}!${SHEETS_CONFIG.TOTAL_STATS_COLUMNS.ERRORS}${SHEETS_CONFIG.CHART_ROWS.ERRORS}`);
        chartRanges.push(`${sheetName}!${SHEETS_CONFIG.TOTAL_STATS_COLUMNS.FPS}${SHEETS_CONFIG.CHART_ROWS.ERRORS}`);
        
        // 4. Читаем данные для таблицы (все дни месяца)
        const tableRange = `${sheetName}!B${SHEETS_CONFIG.START_ROW}:BF34`;
        
        // Объединяем все запросы в один batchGet для производительности
        const batchResponse = await gapi.client.sheets.spreadsheets.values.batchGet({
          spreadsheetId: SHEETS_CONFIG.SPREADSHEET_ID,
          ranges: [...errorRanges, ...chartRanges, tableRange],
          valueRenderOption: 'UNFORMATTED_VALUE'
        });
        
        const valueRanges = batchResponse.result.valueRanges;
        let index = 0;
        
        // Парсим ошибки текущего дня
        const errors = [];
        for (let i = 0; i < 14; i++) {
          const value = valueRanges[index++]?.values?.[0]?.[0];
          errors.push(Math.ceil(Number(value)) || 0);
        }
        
        // Парсим данные графиков
        const chartErrors = [];
        const chartFPS = [];
        for (let i = 0; i < 14; i++) {
          const errorValue = valueRanges[index++]?.values?.[0]?.[0];
          const fpsValue = valueRanges[index++]?.values?.[0]?.[0];
          chartErrors.push(Math.ceil(Number(errorValue)) || 0);
          chartFPS.push(Math.ceil(Number(fpsValue)) || 0);
        }
        
        // Парсим общую статистику
        const totalErrors = Math.ceil(Number(valueRanges[index++]?.values?.[0]?.[0])) || 0;
        const totalFPS = Math.ceil(Number(valueRanges[index++]?.values?.[0]?.[0])) || 0;
        
        // Парсим данные таблицы
        const tableValues = valueRanges[index]?.values || [];
        const tableData = [];
        
        for (let i = 0; i < tableValues.length; i++) {
          const rowData = tableValues[i];
          if (!rowData || !rowData[0]) continue;
          
          const rowErrors = [];
          for (let j = 4; j < 58; j += 4) { // Индексы для F, J, N, R...
            const val = rowData[j];
            rowErrors.push(Math.ceil(Number(val)) || 0);
          }
          
          tableData.push({
            day: rowData[0].toString(),
            errors: rowErrors
          });
        }
        
        return {
          errors: errors,
          chartData: {
            errors: chartErrors,
            fps: chartFPS
          },
          totalStats: {
            errors: totalErrors,
            fps: totalFPS
          },
          tableData: tableData
        };
        
      } catch (error) {
        console.error('Ошибка при чтении из Sheets:', error);
        // Возвращаем пустые данные при ошибке
        return {
          errors: Array(14).fill(0),
          chartData: { errors: Array(14).fill(0), fps: Array(14).fill(0) },
          totalStats: { errors: 0, fps: 0 },
          tableData: []
        };
      }
    }

    // Чтение данных для сравнения по годам
    async function readYearlyComparisonData() {
      try {
        await initSheetsAPI();
        
        const summaryRange = 'ИТОГОВАЯ!A4:H15';
        const response = await gapi.client.sheets.spreadsheets.values.get({
          spreadsheetId: SHEETS_CONFIG.SPREADSHEET_ID,
          range: summaryRange,
          valueRenderOption: 'UNFORMATTED_VALUE'
        });
        
        const values = response.result.values || [];
        
        const result = {
          years: [],
          months: [],
          data: {}
        };
        
        // Получаем месяцы (первый столбец)
        result.months = values.map(row => row[0]?.toString() || '');
        
        // Маппинг столбцов к годам
        const yearColumns = [
          { col: 1, year: 2023 }, // B
          { col: 3, year: 2024 }, // D
          { col: 5, year: 2025 }, // F
          { col: 7, year: 2026 }  // H
        ];
        
        yearColumns.forEach(({col, year}) => {
          const yearData = values.map(row => {
            const val = row[col];
            return Math.ceil(Number(val)) || 0;
          });
          
          // Проверяем, есть ли данные
          const hasData = yearData.some(v => v > 0);
          if (hasData) {
            result.years.push(year);
            result.data[year] = yearData;
          }
        });
        
        result.years.sort((a, b) => a - b);
        
        return result;
        
      } catch (error) {
        console.error('Ошибка при чтении данных сравнения:', error);
        // Возвращаем демо-данные
        const currentYear = new Date().getFullYear();
        return {
          years: [currentYear - 1, currentYear],
          months: ['Янв', 'Фев', 'Мар', 'Апр', 'Май', 'Июн', 'Июл', 'Авг', 'Сен', 'Окт', 'Ноя', 'Дек'],
          data: {
            [currentYear - 1]: [120, 95, 130, 110, 105, 90, 115, 125, 100, 135, 140, 120],
            [currentYear]: [110, 100, 125, 115, 95, 85, 105, 120, 110, 130, 145, 115]
          }
        };
      }
    }

    function parseJwt(token) {
      try {
        const base64Url = token.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
      } catch (e) {
        console.error('Ошибка парсинга JWT:', e);
        return {};
      }
    }

          email: email,
          name: name,
          picture: pic
        };
        
        updateUserAvatar(currentUser);
        showLoading(true);
        
        initSheetsAPI()
          .then(() => checkEmailAccess())
          .catch(() => signOut());
      } else {
        loginSection.style.display = 'flex';
        mainContent.style.display = 'none';
        
        setTimeout(() => {
          loadingScreen.classList.add('fade-out');
        }, 500);
      }
    });

    window.onload = function() {
      if (google && google.accounts && google.accounts.id) {
        google.accounts.id.initialize({
          client_id: '328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com',
          callback: handleCredentialResponse
        });
        
        google.accounts.id.renderButton(
          document.querySelector('.g_id_signin'),
          { 
            type: 'standard', 
            shape: 'pill', 
            theme: 'outline', 
            text: 'signin_with', 
            size: 'large',
            logo_alignment: 'left'
          }
        );
      }
    };

    // ===== ФУНКЦИИ ПРИЛОЖЕНИЯ =====
    function initializeApp() {
      console.log('Инициализация приложения после авторизации');
      
      generateMachineCells();
      document.getElementById('date').value = selectedDate;
      loadDataForDate(selectedDate);
      loadFontsAsync();
    }

    function loadFontsAsync() {
      const link = document.createElement('link');
      link.href = 'https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap';
      link.rel = 'stylesheet';
      link.onload = function() {
        document.documentElement.classList.add('fonts-loaded');
      };
      document.head.appendChild(link);
    }

    function showLoader() {
      document.getElementById("loader").style.display = "flex";
    }

    function hideLoader() {
      document.getElementById("loader").style.display = "none";
    }

    function generateMachineCells() {
      const grid = document.getElementById('machinesGrid');
      let html = '';
      
      for (let i = 0; i < 14; i++) {
        html += `
          <div class="machine-cell" onclick="incrementMachine(${i})">
            <div class="machine-number">LANE ${i + 1}</div>
            <div class="error-count zero">0</div>
          </div>
        `;
      }
      grid.innerHTML = html;
    }

    function forceDisplayUpdate() {
      const cells = document.querySelectorAll('.machine-cell');
      cells.forEach((cell, index) => {
        const countElement = cell.querySelector('.error-count');
        const errorCount = machineErrors[index];
        
        countElement.textContent = errorCount;
        countElement.classList.remove('zero', 'non-zero');
        countElement.classList.add(errorCount === 0 ? 'zero' : 'non-zero');
      });
    }

    function updateDisplay() {
      forceDisplayUpdate();
    }

    function incrementMachine(index) {
      machineErrors[index]++;
      updateDisplay();
      
      if (errorsChart && analyticsLoaded && isAnalysisOpen) {
        updateCharts();
      }
    }

    // Загрузка данных с прямым чтением из Sheets
    async function loadDataForDate(date, retryCount = 0) {
      const MAX_RETRIES = 3;
      
      if (dataCache[date]) {
        applyCachedData(dataCache[date]);
        return;
      }
      
      showLoader();
      
      try {
        const data = await readDataFromSheet(date);
        
        dataCache[date] = data;
        applyCachedData(data);
        
      } catch (error) {
        console.error('Ошибка загрузки данных:', error);
        
        if (retryCount < MAX_RETRIES) {
          setTimeout(() => {
            loadDataForDate(date, retryCount + 1);
          }, 1000 * (retryCount + 1));
        } else {
          applyDefaultData();
        }
      } finally {
        hideLoader();
      }
    }

    function applyCachedData(data) {
      if (data.errors) {
        machineErrors = data.errors;
        originalErrors = [...data.errors];
        forceDisplayUpdate();
      }
      
      if (data.chartData) {
        machineFPS = data.chartData.fps || Array(14).fill(0);
      }
      
      if (data.totalStats) {
        monthlyErrors = data.totalStats.errors || 0;
        monthlyFPS = data.totalStats.fps || 0;
        updateStats();
      }
      
      isDataLoaded = true;
    }

    function applyDefaultData() {
      machineErrors = Array(14).fill(0);
      originalErrors = Array(14).fill(0);
      forceDisplayUpdate();
      isDataLoaded = true;
    }

    function cancelChanges() {
      if (confirm('Отменить все несохраненные изменения?')) {
        machineErrors = [...originalErrors];
        forceDisplayUpdate();
        
        if (analyticsLoaded && isAnalysisOpen) {
          if (errorsChart && fpsChart) updateCharts();
          updateStats();
        }
      }
    }

    function updateAnalysisButtonState(state) {
      const analysisBtn = document.getElementById('analysisBtn');
      analysisBtn.classList.remove('loading', 'success', 'pulse');
      
      switch(state) {
        case 'loading':
          analysisBtn.classList.add('loading');
          break;
        case 'success':
          analysisBtn.classList.add('success');
          setTimeout(() => {
            if (isAnalysisOpen) {
              analysisBtn.classList.remove('success');
              analysisBtn.innerHTML = '<span class="btn-text">СКРЫТЬ АНАЛИЗ</span>';
            }
          }, 2000);
          break;
        case 'pulse':
          analysisBtn.classList.add('pulse');
          break;
        default:
          analysisBtn.innerHTML = isAnalysisOpen ? 
            '<span class="btn-text">СКРЫТЬ АНАЛИЗ</span>' : 
            '<span class="btn-text">АНАЛИЗ</span>';
      }
    }

    function hideAnalyticsElements() {
      const chartsContainer = document.getElementById('chartsContainer');
      const statsContainer = document.getElementById('statsContainer');
      const tableContainer = document.getElementById('tableContainer');
      const yearlyComparisonContainer = document.getElementById('yearlyComparisonContainer');
      
      chartsContainer.classList.remove('loaded');
      statsContainer.classList.remove('loaded');
      tableContainer.classList.remove('loaded');
      yearlyComparisonContainer.classList.remove('loaded');
      
      setTimeout(() => {
        chartsContainer.style.display = 'none';
        statsContainer.style.display = 'none';
        tableContainer.style.display = 'none';
        yearlyComparisonContainer.style.display = 'none';
      }, 300);
    }

    function showAnalyticsElements() {
      const chartsContainer = document.getElementById('chartsContainer');
      const statsContainer = document.getElementById('statsContainer');
      const tableContainer = document.getElementById('tableContainer');
      const yearlyComparisonContainer = document.getElementById('yearlyComparisonContainer');
      
      chartsContainer.style.display = 'grid';
      statsContainer.style.display = 'grid';
      tableContainer.style.display = 'block';
      yearlyComparisonContainer.style.display = 'block';
      
      setTimeout(() => {
        chartsContainer.classList.add('loaded');
        statsContainer.classList.add('loaded');
        tableContainer.classList.add('loaded');
        yearlyComparisonContainer.classList.add('loaded');
        
        const chartWrappers = document.querySelectorAll('.chart-wrapper');
        const statCards = document.querySelectorAll('.stat-card');
        const dataTable = document.getElementById('dataTable');
        
        chartWrappers.forEach(wrapper => wrapper.classList.remove('loaded'));
        statCards.forEach(card => card.classList.remove('loaded'));
        dataTable.classList.remove('loaded');
        
        chartWrappers.forEach((wrapper, index) => {
          setTimeout(() => wrapper.classList.add('loaded'), index * 200);
        });
        
        statCards.forEach((card, index) => {
          setTimeout(() => card.classList.add('loaded'), index * 200);
        });
        
        setTimeout(() => dataTable.classList.add('loaded'), 400);
      }, 50);
    }

    async function loadAnalyticsData() {
      if (analyticsLoaded && isAnalysisOpen) {
        showAnalyticsElements();
        return;
      }
      
      updateAnalysisButtonState('loading');
      
      try {
        if (!analyticsLoaded) {
          await loadTableData();
          await createYearlyComparisonChart();
          createCharts();
          updateStats();
        }
        
        analyticsLoaded = true;
        updateAnalysisButtonState('success');
        showAnalyticsElements();
      } catch (error) {
        console.error('Ошибка при загрузке аналитических данных:', error);
        analyticsLoaded = true;
        updateAnalysisButtonState('pulse');
        showAnalyticsElements();
      }
    }

    async function toggleCharts() {
      if (isAnalysisOpen) {
        hideAnalyticsElements();
        isAnalysisOpen = false;
        updateAnalysisButtonState('default');
      } else {
        updateAnalysisButtonState('pulse');
        isAnalysisOpen = true;
        await loadAnalyticsData();
      }
    }

    function updateStats() {
      document.getElementById('totalErrors').textContent = monthlyErrors;
      document.getElementById('totalFPS').textContent = Math.ceil(monthlyFPS);
    }

    function calculateMonthlyErrors() {
      if (!analyticsLoaded) return Array(14).fill(0);
      
      const monthlyErrors = Array(14).fill(0);
      const tableRows = document.querySelectorAll('#tableBody tr');
      
      tableRows.forEach(row => {
        const cells = row.querySelectorAll('td');
        for (let i = 1; i < cells.length; i++) {
          const errorCount = parseInt(cells[i].textContent) || 0;
          monthlyErrors[i - 1] += errorCount;
        }
      });
      
      return monthlyErrors;
    }

    async function loadTableData() {
      try {
        const data = await readDataFromSheet(selectedDate);
        
        if (data.tableData && data.tableData.length > 0) {
          populateTable(data.tableData);
        } else {
          populateDemoTable();
        }
        
        if (data.chartData) {
          machineFPS = data.chartData.fps || Array(14).fill(0);
        }
        
        if (data.totalStats) {
          monthlyErrors = data.totalStats.errors || 0;
          monthlyFPS = data.totalStats.fps || 0;
        }
      } catch (error) {
        console.error('Ошибка при загрузке данных таблицы:', error);
        populateDemoTable();
      }
    }

    function populateTable(tableData) {
      const tableBody = document.getElementById('tableBody');
      tableBody.innerHTML = '';
      
      tableData.forEach(row => {
        if (!row.day && row.errors.every(error => error === 0)) return;
        
        const tr = document.createElement('tr');
        const dayCell = document.createElement('td');
        dayCell.textContent = row.day;
        dayCell.style.fontWeight = 'bold';
        tr.appendChild(dayCell);
        
        row.errors.forEach(error => {
          const errorCell = document.createElement('td');
          if (error !== 0) {
            errorCell.textContent = error;
            errorCell.className = 'non-zero';
          }
          tr.appendChild(errorCell);
        });
        
        tableBody.appendChild(tr);
      });
    }

    function populateDemoTable() {
      const tableBody = document.getElementById('tableBody');
      tableBody.innerHTML = '';
      
      for (let i = 1; i <= 31; i++) {
        const row = document.createElement('tr');
        const dayCell = document.createElement('td');
        dayCell.textContent = i;
        dayCell.style.fontWeight = 'bold';
        row.appendChild(dayCell);
        
        for (let j = 0; j < 14; j++) {
          const dataCell = document.createElement('td');
          const value = Math.floor(Math.random() * 10);
          if (value !== 0) {
            dataCell.textContent = value;
            dataCell.className = 'non-zero';
          }
          row.appendChild(dataCell);
        }
        tableBody.appendChild(row);
      }
    }

    function createCharts() {
      const machineNumbers = Array.from({length: 14}, (_, i) => `${i + 1}`);
      
      if (errorsChart) errorsChart.destroy();
      if (fpsChart) fpsChart.destroy();
      
      const monthlyErrorsData = calculateMonthlyErrors();
      
      const errorsCtx = document.getElementById('errorsChart').getContext('2d');
      errorsChart = new Chart(errorsCtx, {
        type: 'bar',
        data: {
          labels: machineNumbers,
          datasets: [{
            data: monthlyErrorsData,
            backgroundColor: 'rgba(220, 20, 60, 0.8)',
            borderColor: 'rgba(220, 20, 60, 1)',
            borderWidth: 1,
            borderRadius: 5,
            barPercentage: 0.7,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, grid: { color: 'rgba(0, 0, 0, 0.05)' }, ticks: { display: false } },
            x: { grid: { display: false } }
          },
          animation: { duration: 1000, easing: 'easeOutQuart' }
        }
      });
      
      const fpsCtx = document.getElementById('fpsChart').getContext('2d');
      fpsChart = new Chart(fpsCtx, {
        type: 'bar',
        data: {
          labels: machineNumbers,
          datasets: [{
            data: machineFPS,
            backgroundColor: 'rgba(26, 47, 64, 0.8)',
            borderColor: 'rgba(26, 47, 64, 1)',
            borderWidth: 1,
            borderRadius: 5,
            barPercentage: 0.7,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, grid: { color: 'rgba(0, 0, 0, 0.05)' }, ticks: { display: false } },
            x: { grid: { display: false } }
          },
          animation: { duration: 1000, easing: 'easeOutQuart' }
        }
      });
    }

    async function createYearlyComparisonChart() {
      const yearlyComparisonCtx = document.getElementById('yearlyComparisonChart');
      yearlyComparisonCtx.style.width = '100%';
      yearlyComparisonCtx.style.height = '100%';
      
      const yearlyData = await readYearlyComparisonData();
      
      const datasets = yearlyData.years.map((year, index) => {
        const hue = index * 60 % 360;
        const dataWithNulls = (yearlyData.data[year] || Array(12).fill(0)).map(value => 
          value === 0 ? null : value
        );
        
        return {
          label: year.toString(),
          data: dataWithNulls,
          borderColor: `hsl(${hue}, 70%, 50%)`,
          backgroundColor: `hsla(${hue}, 70%, 50%, 0.2)`,
          borderWidth: 2,
          fill: false,
          tension: 0.4,
          spanGaps: false
        };
      });
      
      if (yearlyComparisonChart) yearlyComparisonChart.destroy();
      
      yearlyComparisonChart = new Chart(yearlyComparisonCtx, {
        type: 'line',
        data: { labels: yearlyData.months, datasets: datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          layout: { padding: { bottom: 30 } },
          plugins: {
            legend: { position: 'top' },
            tooltip: {
              callbacks: {
                label: function(context) {
                  return context.raw === null ? 'Нет данных' : ` ${context.raw}`;
                }
              }
            }
          },
          scales: {
            x: { ticks: { padding: 10, maxRotation: 45, autoSkip: true } },
            y: { 
              beginAtZero: true,
              ticks: { callback: function(value) { return value === 0 ? '' : value; } }
            }
          },
          elements: {
            point: {
              radius: function(context) { return context.raw === null ? 0 : 3; },
              hoverRadius: function(context) { return context.raw === null ? 0 : 5; }
            }
          }
        }
      });
    }

    function updateCharts() {
      if (errorsChart) {
        errorsChart.data.datasets[0].data = calculateMonthlyErrors();
        errorsChart.update();
      }
      
      if (fpsChart) {
        fpsChart.data.datasets[0].data = machineFPS;
        fpsChart.update();
      }
    }

    // Сохранение данных через Apps Script
    async function saveData() {
      const now = Date.now();
      if (now - lastSaveTime < SAVE_DEBOUNCE_TIME) {
        return;
      }
      lastSaveTime = now;
      
      showLoader();
      
      try {
        const changes = machineErrors.map((current, index) => current - originalErrors[index]);
        const hasChanges = changes.some(change => change !== 0);
        
        if (!hasChanges) {
          hideLoader();
          return;
        }
        
        const formData = new URLSearchParams();
        formData.append('date', selectedDate);
        formData.append('errors', JSON.stringify(changes));
        
        const response = await fetch(BACKEND_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: formData
        });
        
        const text = await response.text();
        let result;
        try {
          result = JSON.parse(text);
        } catch (e) {
          throw new Error('Неверный формат ответа');
        }
        
        if (result.success) {
          originalErrors = [...machineErrors];
          
          // Очищаем кэш для этой даты, чтобы при следующем чтении получить свежие данные
          delete dataCache[selectedDate];
          
          forceDisplayUpdate();
          
          if (analyticsLoaded && isAnalysisOpen) {
            if (errorsChart && fpsChart) updateCharts();
            await loadTableData();
            updateStats();
          }
          
          showSaveNotification();
        } else {
          throw new Error(result.error || 'Ошибка при сохранении');
        }
      } catch (error) {
        console.error('Ошибка:', error);
        alert('Ошибка при сохранении: ' + error.message);
      } finally {
        hideLoader();
      }
    }

    function showSaveNotification() {
      const saveBtn = document.querySelector('.save-btn');
      const originalText = saveBtn.textContent;
      
      saveBtn.textContent = '✓ СОХРАНЕНО';
      saveBtn.style.background = '#28a745';
      
      setTimeout(() => {
        saveBtn.textContent = originalText;
        saveBtn.style.background = '#1a2f40';
      }, 2000);
    }

    // Обработчик изменения даты
    document.getElementById('date').addEventListener('change', function(e) {
      const hasUnsavedChanges = machineErrors.some((current, index) => current !== originalErrors[index]);
      
      if (hasUnsavedChanges) {
        if (!confirm('У вас есть несохраненные изменения. Перейти к другой дате без сохранения?')) {
          this.value = selectedDate;
          return;
        }
      }
      
      selectedDate = e.target.value;
      analyticsLoaded = false;
      isAnalysisOpen = false;
      updateAnalysisButtonState('default');
      hideAnalyticsElements();
      loadDataForDate(selectedDate);
    });

    // Предупреждение при закрытии страницы
    window.addEventListener('beforeunload', function(e) {
      const hasUnsavedChanges = machineErrors.some((current, index) => current !== originalErrors[index]);
      
      if (hasUnsavedChanges) {
        e.preventDefault();
        e.returnValue = 'У вас есть несохраненные изменения. Вы уверены, что хотите уйти?';
        return e.returnValue;
      }
    });

    // Обработка глобальных ошибок
    window.addEventListener('error', function(e) {
      console.error('Global error:', e.error);
    });
  </script>
