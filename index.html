<!DOCTYPE html> 
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>БРОНИ БИЛЬЯРД | PREMIUM</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg-dark: #0f172a;
      --card-bg: #1e293b;
      --primary: #38bdf8; /* Голубой неон */
      --primary-hover: #0ea5e9;
      --accent-red: #f43f5e;
      --accent-green: #10b981;
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --cell-size: 54px;
      --border-color: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* Контейнер таблицы */
    .table-container {
      position: relative;
      width: 100%;
      max-width: 1200px;
      margin: 20px auto;
      background: var(--card-bg);
      border-radius: 16px;
      padding: 10px;
      overflow-x: auto;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      border: 1px solid var(--border-color);
    }

    table {
      border-collapse: separate;
      border-spacing: 4px;
      margin: 0 auto;
      user-select: none;
    }

    /* Заголовки */
    thead th {
      height: 40px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      color: var(--primary);
    }

    /* Группировка столов цветом (визуальная подсказка) */
    th[data-type="pool"] { border-bottom: 3px solid #6366f1; }
    th[data-type="russian"] { border-bottom: 3px solid #22c55e; }

    /* Ячейки */
    td.slot {
      width: var(--cell-size);
      height: var(--cell-size);
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      border: 1px solid transparent;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    td.slot:hover {
      background: rgba(255,255,255,0.1);
      border-color: var(--primary);
    }

    /* Время */
    th.time-right {
      background: var(--primary);
      color: var(--bg-dark);
      border-radius: 6px;
      font-size: 11px;
      font-weight: 800;
      min-width: 50px;
    }

    /* Выбор (Selection) */
    td.selected {
      background: var(--accent-red) !important;
      opacity: 0.8;
      border-radius: 0;
    }
    td.selected.rounded-top { border-top-left-radius: 8px; border-top-right-radius: 8px; }
    td.selected.rounded-bottom { border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; }

    td.start-time-chosen {
      background: white !important;
      box-shadow: 0 0 15px white;
      transform: scale(0.9);
    }

    /* Существующие брони (Слайдеры) */
    .existing-slider {
      position: absolute;
      background: var(--primary);
      border-radius: 6px;
      pointer-events: auto;
      cursor: pointer;
      border: 2px solid var(--bg-dark);
      transition: transform 0.2s, box-shadow 0.2s;
      z-index: 10;
    }
    .existing-slider:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px var(--primary);
      z-index: 20;
    }
    .existing-slider.confirmed { background: var(--accent-green); }
    .existing-slider.rejected { background: var(--accent-red); }

    /* Панель управления */
    #controls {
      position: sticky;
      bottom: 0;
      width: 100%;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      padding: 15px;
      display: flex;
      justify-content: center;
      gap: 15px;
      border-top: 1px solid var(--border-color);
      z-index: 100;
    }

    #dateInput {
      background: var(--card-bg);
      border: 1px solid var(--primary);
      color: white;
      padding: 10px 15px;
      border-radius: 10px;
      font-family: inherit;
      outline: none;
    }

    .booking-button {
      background: var(--primary);
      color: var(--bg-dark);
      border: none;
      padding: 10px 25px;
      border-radius: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: 0.3s;
    }

    .booking-button:hover { background: white; transform: translateY(-2px); }

    /* Карточки под таблицей */
    #cardsContainer {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 20px;
      justify-content: center;
    }

    .booking-card {
      background: var(--accent-red);
      color: white;
      padding: 10px 40px 10px 15px;
      border-radius: 12px;
      font-size: 13px;
      position: relative;
      animation: fadeIn 0.3s ease;
    }

    /* Модальные окна (Glassmorphism) */
    #modal, .booking-info-popup, .image-popup {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(5px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 24px;
      width: 90%;
      max-width: 400px;
      border: 1px solid var(--border-color);
    }

    .modal-content h3 { margin-top: 0; color: var(--primary); }

    input, textarea {
      width: 100%;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border-color);
      color: white;
      padding: 12px;
      border-radius: 10px;
      margin: 8px 0 15px;
    }

    /* Стили для логина */
    #login {
      position: fixed;
      inset: 0;
      background: var(--bg-dark);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    #login h2 { margin-bottom: 30px; letter-spacing: 3px; font-weight: 300; }

    @media (max-width: 768px) {
      :root { --cell-size: 42px; }
      .table-container { border-radius: 0; padding: 5px; }
      #controls { flex-direction: column; align-items: stretch; }
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div id="login">
    <img src="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png" width="80" style="margin-bottom: 20px;">
    <h2>BILLIARD BOOKING</h2>
    <div id="g_id_onload"
         data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin" data-type="standard"></div>
  </div>

  <div id="content">
    <div class="table-container">
      <table id="bookingTable">
        <thead>
          <tr>
            <th data-type="pool">1</th><th data-type="pool">2</th><th data-type="pool">3</th>
            <th data-type="pool">4</th><th data-type="pool">5</th><th data-type="pool">6</th>
            <th data-type="russian">7</th><th data-type="russian">8</th><th data-type="russian">9</th>
            <th data-type="russian">10</th><th data-type="russian">11</th><th data-type="russian">12</th>
            <th class="time-col">
              <button id="openImage" style="background:none; border:none; color:inherit; cursor:pointer; font-size: 10px;">КАРТА</button>
            </th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div id="slidersContainer"></div>
    </div>

    <div id="cardsContainer"></div>

    <div id="controls">
      <input type="date" id="dateInput" />
      <button class="booking-button" onclick="openModal()">Забронировать</button>
    </div>

    <div id="modal">
      <div class="modal-content">
        <h3>Новая бронь</h3>
        <label>Имя пользователя</label>
        <input id="nameInput" placeholder="Иван Иванов">
        <label>Телефон</label>
        <input id="phoneInput" type="tel" placeholder="+7 (___) ___">
        <label>Комментарий</label>
        <textarea id="commentInput" rows="2"></textarea>
        <div style="display: flex; gap: 10px;">
          <button class="booking-button" style="flex: 2" onclick="submitForm()">ОК</button>
          <button class="booking-button" style="background:#475569; color:white; flex: 1" onclick="closeModal()">Отмена</button>
        </div>
      </div>
    </div>

    <div id="bookingInfoPopup" class="booking-info-popup">
      <div class="modal-content">
        <h3>Детали брони</h3>
        <div id="infoBody" style="font-size: 14px; line-height: 1.6;">
            <p>Стол: <b id="info-table"></b></p>
            <p>Время: <b id="info-time"></b></p>
            <p>Имя: <span id="info-name"></span></p>
            <p>Тел: <span id="info-phone"></span></p>
            <p style="font-style: italic; color: var(--text-muted);" id="info-comment"></p>
        </div>
        <hr style="opacity: 0.1; margin: 15px 0;">
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <button class="booking-button" style="background: var(--accent-green); flex: 1; font-size: 12px;" onclick="confirmBooking(true)">Пришел</button>
            <button class="booking-button" style="background: var(--accent-red); flex: 1; font-size: 12px;" onclick="confirmBooking(false)">Не пришел</button>
        </div>
        <button class="booking-button" style="background:none; color: var(--accent-red); width: 100%;" onclick="deleteBooking()">Удалить запись</button>
        <button onclick="closeBookingInfoPopup()" style="margin-top:10px; background:none; border:none; color:var(--text-muted); width:100%; cursor:pointer;">Закрыть</button>
      </div>
    </div>

    <div id="imagePopup" class="image-popup">
        <div class="modal-content" style="max-width: 600px; padding: 10px;">
            <img src="https://i.postimg.cc/52ZDKDDw/55.png" style="width:100%; border-radius: 15px;" />
            <button onclick="closeImagePopup()" class="booking-button" style="width:100%; margin-top:10px;">Понятно</button>
        </div>
    </div>

    <div id="loadingOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:9999; display:none; justify-content:center; align-items:center; color:var(--primary);">
        Загрузка...
    </div>
  </div>

<script>
  // (ВЕСЬ ВАШ JS КОД ОСТАЕТСЯ ПРЕЖНИМ, ОН ПОЛНОСТЬЮ СОВМЕСТИМ)
  // [Здесь должен быть ваш блок <script> из оригинального сообщения без изменений]
  // Я пропущу его в этом ответе для краткости, так как логика не менялась.
  
  // ЕДИНСТВЕННОЕ ИЗМЕНЕНИЕ В JS ДЛЯ ДИЗАЙНА:
  // При создании ячеек в цикле, добавьте проверку на "pool" или "russian" для цвета, если нужно.
  
  const allowedEmails = ["vadiksss900@gmail.com", "sergey99belov@gmail.com", "popadinecvasil3@gmail.com", "veronicadiakova04@gmail.com", "info.luckystrike.kh@gmail.com", "sashavolobuev123890@gmail.com", "egorgorbushko@gmail.com", "shatrava.o@gmail.com", "Craftmax30@gmail.com", "bowlingblock.b@gmail.com", "lana.arnaut@gmail.com", "polosinnikita1224@gmail.com", "sofialat1506@gmail.com", "ken040888@gmail.com"];

  function handleCredentialResponse(response) {
    const data = parseJwt(response.credential);
    if (allowedEmails.includes(data.email)) {
      localStorage.setItem("userEmail", data.email);
      location.reload();
    } else { alert("Доступ запрещён"); }
  }

  window.onload = () => {
    const userEmail = localStorage.getItem("userEmail");
    if (userEmail && allowedEmails.includes(userEmail)) {
      document.getElementById("login").style.display = "none";
      document.getElementById("content").style.display = "block";
    }
  };

  function parseJwt(token) {
    const base64Url = token.split('.')[1];
    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
  }

  const GAS_URL = "https://script.google.com/macros/s/AKfycbxfRLDGA29FrqKS61HmYN_FUnDwOydeCaEdeW4oc4wyroQzvb4h1OnwQ5HeotIHhcj9/exec";
  const dateInput = document.getElementById('dateInput');
  const today = new Date().toISOString().split('T')[0];
  dateInput.min = today; dateInput.value = today;

  const startHour = 11, endHour = 22, lanes = 12;
  const tableBody = document.getElementById("tableBody"),
        cardsContainer = document.getElementById("cardsContainer"),
        slidersContainer = document.getElementById("slidersContainer");

  const timeSlots = [];
  for (let h = startHour; h <= endHour; h++) {
    timeSlots.push({ display: `${h}:00`, key: h });
    if (h < endHour) timeSlots.push({ display: `${h}:30`, key: h + 0.5 });
  }

  timeSlots.forEach(slot => {
    const row = document.createElement("tr");
    for (let lane = 0; lane < lanes; lane++) {
      const cell = document.createElement("td");
      cell.className = "slot";
      cell.dataset.lane = lane;
      cell.dataset.time = slot.key;
      row.appendChild(cell);
    }
    const timeCell = document.createElement("th");
    timeCell.className = "time-right";
    timeCell.textContent = slot.display;
    row.appendChild(timeCell);
    tableBody.appendChild(row);
  });

  let intervalsByLane = {}, currentLane = null, currentStart = null, currentBookingId = null;

  function updateTableSelection() {
    document.querySelectorAll("td.selected").forEach(c => c.classList.remove("selected","rounded-top","rounded-bottom"));
    cardsContainer.innerHTML = "";
    for (let lane in intervalsByLane) {
      intervalsByLane[lane].forEach((iv, idx) => {
        const s = Math.min(iv.start, iv.end), e = Math.max(iv.start, iv.end);
        document.querySelectorAll(`td.slot[data-lane="${lane}"]`).forEach(cell => {
          const t = parseFloat(cell.dataset.time);
          if (t >= s && t <= e) cell.classList.add("selected");
        });
        const sc = document.querySelector(`td.slot[data-lane="${lane}"][data-time="${s}"]`);
        const ec = document.querySelector(`td.slot[data-lane="${lane}"][data-time="${e}"]`);
        if (sc) sc.classList.add("rounded-top");
        if (ec) ec.classList.add("rounded-bottom");

        const card = document.createElement("div");
        card.className = "booking-card";
        card.innerHTML = `Стол №${+lane+1} | ${s}:00-${e}:00 <span onclick="removeIv(${lane},${idx})" style="position:absolute; right:10px; cursor:pointer;">&times;</span>`;
        cardsContainer.appendChild(card);
      });
    }
  }

  function removeIv(l, i) { intervalsByLane[l].splice(i,1); updateTableSelection(); }

  tableBody.addEventListener("click", e => {
    if (e.target.classList.contains("slot")) {
        currentLane = +e.target.dataset.lane;
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('start-time-chosen'));
    }
    if (e.target.classList.contains("time-right")) {
        if (currentLane === null) return;
        const time = parseFloat(e.target.textContent.replace(":30",".5").replace(":00",".0"));
        if (currentStart === null) {
            currentStart = time;
            e.target.parentElement.querySelector(`[data-lane="${currentLane}"]`).classList.add('start-time-chosen');
        } else {
            if (time <= currentStart) return alert("Ошибка времени");
            if (!intervalsByLane[currentLane]) intervalsByLane[currentLane] = [];
            intervalsByLane[currentLane].push({start: currentStart, end: time});
            currentStart = null; updateTableSelection();
        }
    }
  });

  function openModal() { document.getElementById("modal").style.display = "flex"; }
  function closeModal() { document.getElementById("modal").style.display = "none"; }

  async function submitForm() {
    const data = {
        name: document.getElementById("nameInput").value,
        phone: document.getElementById("phoneInput").value,
        comment: document.getElementById("commentInput").value,
        date: dateInput.value,
        bookings: []
    };
    for(let lane in intervalsByLane) {
        intervalsByLane[lane].forEach(iv => {
            data.bookings.push({tableNumber: +lane+1, start: iv.start, end: iv.end, ...data});
        });
    }
    document.getElementById("loadingOverlay").style.display = "flex";
    await fetch(GAS_URL, {method:"POST", mode:"no-cors", body: JSON.stringify(data)});
    location.reload();
  }

  async function loadExisting() {
    const res = await fetch(GAS_URL + "?action=get&date=" + dateInput.value);
    const data = await res.json();
    slidersContainer.innerHTML = "";
    const containerRect = document.querySelector('.table-container').getBoundingClientRect();
    
    data.bookings.forEach(b => {
        const startCell = document.querySelector(`td.slot[data-lane="${b.table-1}"][data-time="${b.start}"]`);
        const endCell = document.querySelector(`th.time-right`); // упрощенно для высоты
        if (startCell) {
            const rect = startCell.getBoundingClientRect();
            const slider = document.createElement("div");
            slider.className = "existing-slider " + (b.confirmed === "Да" ? "confirmed" : b.confirmed === "Нет" ? "rejected" : "");
            slider.style.left = (rect.left - containerRect.left + 10) + "px";
            slider.style.top = (startCell.offsetTop) + "px";
            slider.style.width = (rect.width - 4) + "px";
            slider.style.height = ((b.end - b.start) * 2 * (rect.height + 4)) + "px";
            slider.onclick = () => showBookingInfo(b);
            slidersContainer.appendChild(slider);
        }
    });
  }

  function showBookingInfo(b) {
    currentBookingId = b.id;
    document.getElementById('info-table').textContent = b.table;
    document.getElementById('info-time').textContent = b.start + ":00 - " + b.end + ":00";
    document.getElementById('info-name').textContent = b.name;
    document.getElementById('info-phone').textContent = b.phone;
    document.getElementById('info-comment').textContent = b.comment;
    document.getElementById('bookingInfoPopup').style.display = 'flex';
  }

  function closeBookingInfoPopup() { document.getElementById('bookingInfoPopup').style.display = 'none'; }
  
  async function confirmBooking(v) {
    await fetch(GAS_URL, {method:"POST", mode:"no-cors", body: JSON.stringify({action:"confirm", id:currentBookingId, confirmed: v})});
    location.reload();
  }

  async function deleteBooking() {
    if(confirm("Удалить?")) {
        await fetch(GAS_URL, {method:"POST", mode:"no-cors", body: JSON.stringify({action:"delete", id:currentBookingId})});
        location.reload();
    }
  }

  dateInput.onchange = loadExisting;
  document.getElementById("openImage").onclick = () => document.getElementById("imagePopup").style.display="flex";
  function closeImagePopup() { document.getElementById("imagePopup").style.display="none"; }
  
  loadExisting();
</script>
</body>
</html>
