        function updateTabBadges() {
            const mechanicCount = journalData ? journalData.filter(t => !t.isCompleted).length : 0;
            const instructorCount = instructorData ? instructorData.filter(t => !t.isCompleted).length : 0;
            const engineerCount = engineerData ? engineerData.filter(t => !t.isCompleted).length : 0;
            
            updateBadge('badgeMechanic', mechanicCount);
            updateBadge('badgeInstructor', instructorCount);
            updateBadge('badgeEngineer', engineerCount);
        }
        
        function updateBadge(elementId, count) {
            const badge = document.getElementById(elementId);
            if (badge) {
                badge.textContent = count;
                if (count === 0) {
                    badge.classList.add('zero');
                } else {
                    badge.classList.remove('zero');
                }
            }
        }

        function updateUserAvatar(user) { const container = document.getElementById('userAvatar'); if (user?.picture) container.innerHTML = `<img src="${user.picture}" alt="Avatar">`; else container.innerHTML = '<i class="fas fa-user"></i>'; }
        function showLoader() { loader.classList.add('active'); }
        function hideLoader() { loader.classList.remove('active'); }
        
        function loadSheetsAPI() { return new Promise((resolve, reject) => { gapi.load('client', { callback: resolve, onerror: () => reject('Ошибка загрузки Google API'), timeout: 10000 }); }); }
        
        function handleCredentialResponse(response) {
            try { const payload = parseJwt(response.credential); currentUser = { email: payload.email.toLowerCase().trim(), name: payload.name, picture: payload.picture }; showLoading(true); initAndCheckEmail(); } 
            catch (e) { console.error(e); showLoading(false); alert('Ошибка аутентификации'); }
        }
        
        function showLoading(show) {
            const loginDiv = document.getElementById('login-container');
            if (show) { if (!loginDiv.hasAttribute('data-original')) loginDiv.setAttribute('data-original', loginDiv.innerHTML); loginDiv.innerHTML = '<div style="padding:40px;text-align:center;"><div class="loading-spinner"></div><br><span>Проверка доступа...</span></div>'; } 
            else { if (loginDiv.getAttribute('data-original') && loginSection.style.display !== 'none') { loginDiv.innerHTML = loginDiv.getAttribute('data-original'); if (window.google?.accounts?.id) google.accounts.id.renderButton(document.querySelector('.g_id_signin'), { type: 'standard', shape: 'pill', theme: 'outline', text: 'signin_with', size: 'large' }); } } }
        
        async function initAndCheckEmail() { try { await loadSheetsAPI(); await gapi.client.init({ apiKey: AUTH_API_KEY, discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'] }); await checkEmailInSheet(currentUser.email); } catch (error) { console.error(error); showLoading(false); alert('Ошибка инициализации'); } }
        
        async function checkEmailInSheet(email) {
            try { const response = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId: AUTH_SPREADSHEET_ID, range: `${AUTH_SHEET_NAME}!A:Z` }); const rows = response.result.values; if (!rows) { showLoading(false); alert('Таблица пуста'); return; } let hasAccess = false; for (let i = 0; i < rows.length; i++) { if (!rows[i]?.[0]) continue; if (rows[i][0].toLowerCase().trim() === email) { for (let j = 1; j < rows[i].length; j++) { const siteUrl = rows[i][j]?.trim().split('?')[0].split('#')[0] || ''; if (siteUrl === CURRENT_SITE || siteUrl.includes('SMB-LS-KH')) { hasAccess = true; break; } } break; } } if (hasAccess) loginUser(currentUser); else { showLoading(false); alert('Доступ запрещен'); } } catch (error) { console.error(error); showLoading(false); alert('Ошибка доступа к таблице'); } }
        
        function loginUser(payload) { loginSection.style.display = 'none'; mainContent.style.display = 'block'; updateUserAvatar(payload); localStorage.setItem('userLoggedIn', 'true'); localStorage.setItem('userEmail', payload.email); localStorage.setItem('userName', payload.name); localStorage.setItem('userPic', payload.picture); showLoading(false); setTimeout(() => loadingScreen.classList.add('fade-out'), 500); initializeApp(); }
        
        function parseJwt(token) { try { const base64Url = token.split('.')[1]; const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/'); const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')); return JSON.parse(jsonPayload); } catch (e) { return {}; } }
        
        function signOut() { localStorage.clear(); sessionStorage.clear(); if (google?.accounts?.id) google.accounts.id.disableAutoSelect(); mainContent.style.display = 'none'; loginSection.style.display = 'flex'; const loginDiv = document.getElementById('login-container'); if (loginDiv.getAttribute('data-original')) { loginDiv.innerHTML = loginDiv.getAttribute('data-original'); if (window.google?.accounts?.id) google.accounts.id.renderButton(document.querySelector('.g_id_signin'), { type: 'standard', shape: 'pill', theme: 'outline', text: 'signin_with', size: 'large' }); } }
        
        function convertGoogleDriveLink(link) { if (!link) return null; if (link.includes('drive.google.com/file/d/')) { const match = link.match(/\/d\/([^\/]+)/); if (match) return `https://drive.google.com/uc?export=view&id=${match[1]}`; } return link; }
        function openDriveLink(link) { const viewLink = convertGoogleDriveLink(link); window.open(viewLink || link, '_blank'); }
        async function makeRequest(url, options = {}) { const separator = url.includes('?') ? '&' : '?'; const finalUrl = `${url}${separator}_=${Date.now()}`; const response = await fetch(finalUrl, options); return response.json(); }
        function scrollToTop() { const activeTab = document.querySelector('.tab-content.active'); if (activeTab) activeTab.scrollTo({ top: 0, behavior: 'smooth' }); }
        
        function goToPage(type, pageNumber) {
            if (type === 'journal' && pageNumber >= 1 && pageNumber <= totalJournalPages && pageNumber !== currentJournalPage) { currentJournalPage = pageNumber; renderJournalCards(journalData); updatePagination('journal', currentJournalPage, totalJournalPages); scrollToTop(); }
            else if (type === 'instructor' && pageNumber >= 1 && pageNumber <= totalInstructorPages && pageNumber !== currentInstructorPage) { currentInstructorPage = pageNumber; renderInstructorCards(instructorData); updatePagination('instructor', currentInstructorPage, totalInstructorPages); scrollToTop(); }
            else if (type === 'engineer' && pageNumber >= 1 && pageNumber <= totalEngineerPages && pageNumber !== currentEngineerPage) { currentEngineerPage = pageNumber; renderEngineerCards(engineerData); updatePagination('engineer', currentEngineerPage, totalEngineerPages); scrollToTop(); }
        }
        
        function changePage(type, direction) { if (type === 'journal') goToPage('journal', currentJournalPage + direction); else if (type === 'instructor') goToPage('instructor', currentInstructorPage + direction); else if (type === 'engineer') goToPage('engineer', currentEngineerPage + direction); }
        
        function updatePagination(type, currentPage, totalPages) {
            const pagination = document.getElementById(`${type}-pagination`); if (!pagination) return;
            document.getElementById(`${type}-current-page`).textContent = currentPage;
            document.getElementById(`${type}-total-pages`).textContent = totalPages;
            const firstBtn = pagination.querySelector('.first-btn'), prevBtn = pagination.querySelector('.prev-btn'), nextBtn = pagination.querySelector('.next-btn'), lastBtn = pagination.querySelector('.last-btn');
            if (firstBtn) firstBtn.disabled = currentPage === 1;
            if (prevBtn) prevBtn.disabled = currentPage === 1;
            if (nextBtn) nextBtn.disabled = currentPage === totalPages;
            if (lastBtn) { lastBtn.disabled = currentPage === totalPages; lastBtn.onclick = () => goToPage(type, totalPages); }
            pagination.style.display = totalPages > 1 ? 'flex' : 'none';
        }
        
        function getCurrentPageData(data, page) { const start = (page - 1) * CARDS_PER_PAGE; return data.slice(start, start + CARDS_PER_PAGE); }
        
        function toggleDateFilter() { const container = document.getElementById('date-filter-container'); container.classList.toggle('show'); if (container.classList.contains('show')) initDatePicker(); }
        function initDatePicker() { if (datePicker) datePicker.destroy(); const input = document.getElementById('date-filter-input'); datePicker = flatpickr(input, { locale: "ru", dateFormat: "d.m.Y", onChange: (dates, dateStr) => { if (dateStr) { const activeTab = document.querySelector('.tab-content.active'); if (activeTab?.id === 'tab1') filterJournalByDate(dateStr); else if (activeTab?.id === 'tab2') filterInstructorByDate(dateStr); else if (activeTab?.id === 'tab3') filterEngineerByDate(dateStr); } } }); input.value = ''; }
        
        function filterJournalByDate(date) { if (!date) { isFilterActive = false; currentFilterDate = ''; journalData = originalJournalData ? filterTasksByTitle([...originalJournalData], ['PS', 'МЕХ', 'ps', 'мех']) : []; currentJournalPage = 1; renderJournalCards(journalData); updateCounterLabel(); document.getElementById('date-filter-input').value = ''; return; } isFilterActive = true; currentFilterDate = date; filterType = 'journal'; journalData = originalJournalData.filter(t => t.completedDate === date && ['PS', 'МЕХ', 'ps', 'мех'].some(k => (t.task || '').toLowerCase().includes(k.toLowerCase()))); currentJournalPage = 1; renderJournalCards(journalData); updateCounterLabel(); }
        function filterInstructorByDate(date) { if (!date) { isFilterActive = false; currentFilterDate = ''; instructorData = originalJournalData ? filterTasksByTitle([...originalJournalData], ['ИНСТ', 'инст']) : []; currentInstructorPage = 1; renderInstructorCards(instructorData); updateCounterLabel(); document.getElementById('date-filter-input').value = ''; return; } isFilterActive = true; currentFilterDate = date; filterType = 'instructor'; instructorData = originalJournalData.filter(t => t.completedDate === date && ['ИНСТ', 'инст'].some(k => (t.task || '').toLowerCase().includes(k.toLowerCase()))); currentInstructorPage = 1; renderInstructorCards(instructorData); updateCounterLabel(); }
        function filterEngineerByDate(date) { if (!date) { isFilterActive = false; currentFilterDate = ''; engineerData = originalJournalData ? filterTasksByTitle([...originalJournalData], ['ИНЖ', 'инж', 'ENG', 'eng']) : []; currentEngineerPage = 1; renderEngineerCards(engineerData); updateCounterLabel(); document.getElementById('date-filter-input').value = ''; return; } isFilterActive = true; currentFilterDate = date; filterType = 'engineer'; engineerData = originalJournalData.filter(t => t.completedDate === date && ['ИНЖ', 'инж', 'ENG', 'eng'].some(k => (t.task || '').toLowerCase().includes(k.toLowerCase()))); currentEngineerPage = 1; renderEngineerCards(engineerData); updateCounterLabel(); }
        
        function updateCounterLabel() {
            const labelSpan = document.querySelector('#open-tasks-counter .label');
            const countSpan = document.querySelector('#open-tasks-counter .count');
            const activeTab = document.querySelector('.tab-content.active');
            if (isFilterActive && currentFilterDate) {
                let cnt = 0;
                if (activeTab?.id === 'tab1') cnt = journalData?.length || 0;
                else if (activeTab?.id === 'tab2') cnt = instructorData?.length || 0;
                else if (activeTab?.id === 'tab3') cnt = engineerData?.length || 0;
                labelSpan.innerHTML = `Задачи за ${currentFilterDate} (${activeTab?.id === 'tab1' ? 'МЕХАНИК' : activeTab?.id === 'tab2' ? 'ИНСТРУКТОР' : 'ИНЖЕНЕР'})`;
                countSpan.textContent = cnt;
            } else {
                let openCount = 0;
                if (activeTab?.id === 'tab1') openCount = journalData?.filter(t => !t.isCompleted).length || 0;
                else if (activeTab?.id === 'tab2') openCount = instructorData?.filter(t => !t.isCompleted).length || 0;
                else if (activeTab?.id === 'tab3') openCount = engineerData?.filter(t => !t.isCompleted).length || 0;
                labelSpan.innerHTML = 'КОЛИЧЕСТВО НЕВЫПОЛНЕННЫХ ЗАДАЧ:';
                countSpan.textContent = openCount;
            }
        }
        
        function clearDateFilter() { document.getElementById('date-filter-input').value = ''; const active = document.querySelector('.tab-content.active'); if (active?.id === 'tab1') filterJournalByDate(''); else if (active?.id === 'tab2') filterInstructorByDate(''); else if (active?.id === 'tab3') filterEngineerByDate(''); }
        function filterTasksByTitle(tasks, keywords) { return tasks.filter(t => keywords.some(k => (t.task || '').toLowerCase().includes(k.toLowerCase()))); }
        
        async function loadJournal() { try { if (journalData && !isInitialLoad) { renderJournalCards(journalData); return; } const journal = await makeRequest(`${BACKEND_URL}?action=getJournal`); originalJournalData = [...journal]; journalData = filterTasksByTitle(originalJournalData, ['PS', 'МЕХ', 'ps', 'мех']); renderJournalCards(journalData); updateCounterLabel(); updateTabBadges(); } catch(e) { console.error(e); document.getElementById('journal-cards').innerHTML = `<div class="task-card error">Ошибка</div>`; } }
        async function loadInstructorTasks() { try { if (instructorData && !isInitialLoad) { renderInstructorCards(instructorData); return; } const journal = await makeRequest(`${BACKEND_URL}?action=getJournal`); if (!originalJournalData) originalJournalData = [...journal]; instructorData = filterTasksByTitle(journal, ['ИНСТ', 'инст']); renderInstructorCards(instructorData); updateCounterLabel(); updateTabBadges(); } catch(e) { console.error(e); } }
        async function loadEngineerTasks() { try { if (engineerData && !isInitialLoad) { renderEngineerCards(engineerData); return; } const journal = await makeRequest(`${BACKEND_URL}?action=getJournal`); if (!originalJournalData) originalJournalData = [...journal]; engineerData = filterTasksByTitle(journal, ['ИНЖ', 'инж', 'ENG', 'eng']); renderEngineerCards(engineerData); updateCounterLabel(); updateTabBadges(); } catch(e) { console.error(e); } }
        
        async function completeTask(taskId, executor, rowIndex) { showLoader(); try { const result = await makeRequest(`${BACKEND_URL}?action=updateCell&sheetName=B&column=E&row=${rowIndex}&value=${encodeURIComponent(executor)}`); if (result.success) { await makeRequest(`${BACKEND_URL}?action=updateFromRowNumber&rowNumber=${rowIndex}`); journalData = instructorData = engineerData = originalJournalData = null; const wasFilter = isFilterActive, savedDate = currentFilterDate, savedType = filterType; await Promise.all([loadJournal(), loadInstructorTasks(), loadEngineerTasks()]); if (wasFilter && savedDate) { if (savedType === 'journal') filterJournalByDate(savedDate); else if (savedType === 'instructor') filterInstructorByDate(savedDate); else if (savedType === 'engineer') filterEngineerByDate(savedDate); } updateTabBadges(); } hideLoader(); } catch(e) { console.error(e); hideLoader(); } }
        
        function renderJournalCards(journal) { const container = document.getElementById('journal-cards'); if (!journal?.length) { container.innerHTML = '<div class="task-card"><div class="loading-container">Нет данных</div></div>'; updatePagination('journal', 1, 1); return; } const sorted = [...journal]; totalJournalPages = Math.ceil(sorted.length / CARDS_PER_PAGE); if (currentJournalPage > totalJournalPages) currentJournalPage = 1; const current = getCurrentPageData(sorted, currentJournalPage); let html = ''; current.forEach((task, idx) => { const row = task.rowIndex || (idx + 2); const hasLink = task.driveLink?.trim(); const tid = task.id || task.driveLink || ''; if (!task.isCompleted) { html += `<div class="task-card pending" data-task-id="${tid}" data-row-index="${row}"><div class="task-header"><div class="task-title">${task.task}</div></div><div class="card-content"><div class="content-row"><span class="row-label">Дата появления:</span><span class="row-value">${task.createdDate}</span></div><div class="content-row"><span class="row-label">Дата выполнения:</span><span class="row-value">${task.completedDate || '-'}</span></div><div class="content-row"><span class="row-label">Выполнил:</span><span class="row-value"><select class="executor-select"><option value="" selected disabled></option><option value="Вадим">Вадим</option><option value="Гена">Гена</option><option value="Саша">Саша</option><option value="Данил">Данил</option></select></span></div></div><div class="buttons-container">${hasLink ? `<a href="#" onclick="openDriveLink('${task.driveLink}')" class="schema-button"><i class="fas fa-file-alt"></i>ОТКРЫТЬ</a>` : '<div class="no-open">Недоступно</div>'}<button class="submit-btn" onclick="submitTask(event, '${tid}', ${row})" disabled><i class="fas fa-paper-plane"></i>ОТПРАВИТЬ</button></div></div>`; } else { html += `<div class="task-card completed"><div class="task-header"><div class="task-title">${task.task}</div></div><div class="card-content"><div class="content-row"><span class="row-label">Дата появления:</span><span class="row-value">${task.createdDate}</span></div><div class="content-row"><span class="row-label">Дата выполнения:</span><span class="row-value">${task.completedDate}</span></div><div class="content-row"><span class="row-label">Выполнил:</span><span class="row-value">${task.executor}</span></div></div><div class="buttons-container">${hasLink ? `<a href="#" onclick="openDriveLink('${task.driveLink}')" class="schema-button"><i class="fas fa-file-alt"></i>ОТКРЫТЬ</a>` : '<div class="no-open">Недоступно</div>'}<div class="submitted-text"><i class="fas fa-check-circle"></i>ОТПРАВЛЕНО</div></div></div>`; } }); container.innerHTML = html; attachEvents(); updatePagination('journal', currentJournalPage, totalJournalPages); }
        
        function renderInstructorCards(instructor) { const container = document.getElementById('instructor-cards'); if (!instructor?.length) { container.innerHTML = '<div class="task-card"><div class="loading-container">Нет данных</div></div>'; updatePagination('instructor', 1, 1); return; } const sorted = [...instructor]; totalInstructorPages = Math.ceil(sorted.length / CARDS_PER_PAGE); if (currentInstructorPage > totalInstructorPages) currentInstructorPage = 1; const current = getCurrentPageData(sorted, currentInstructorPage); let html = ''; current.forEach((task, idx) => { const row = task.rowIndex || (idx + 2); const hasLink = task.driveLink?.trim(); const tid = task.id || task.driveLink || ''; if (!task.isCompleted) { html += `<div class="task-card pending"><div class="task-header"><div class="task-title">${task.task}</div></div><div class="card-content"><div class="content-row"><span class="row-label">Дата появления:</span><span class="row-value">${task.createdDate}</span></div><div class="content-row"><span class="row-label">Дата выполнения:</span><span class="row-value">${task.completedDate || '-'}</span></div><div class="content-row"><span class="row-label">Выполнил:</span><span class="row-value"><select class="executor-select"><option value="" selected disabled></option><option value="Вадим">Вадим</option><option value="Гена">Гена</option><option value="Саша">Саша</option><option value="Данил">Данил</option></select></span></div></div><div class="buttons-container">${hasLink ? `<a href="#" onclick="openDriveLink('${task.driveLink}')" class="schema-button">ОТКРЫТЬ</a>` : '<div class="no-open">Недоступно</div>'}<button class="submit-btn" onclick="submitTask(event, '${tid}', ${row})" disabled>ОТПРАВИТЬ</button></div></div>`; } else { html += `<div class="task-card completed"><div class="task-header"><div class="task-title">${task.task}</div></div><div class="card-content"><div class="content-row"><span class="row-label">Дата появления:</span><span class="row-value">${task.createdDate}</span></div><div class="content-row"><span class="row-label">Дата выполнения:</span><span class="row-value">${task.completedDate}</span></div><div class="content-row"><span class="row-label">Выполнил:</span><span class="row-value">${task.executor}</span></div></div><div class="buttons-container">${hasLink ? `<a href="#" onclick="openDriveLink('${task.driveLink}')" class="schema-button">ОТКРЫТЬ</a>` : '<div class="no-open">Недоступно</div>'}<div class="submitted-text">ОТПРАВЛЕНО</div></div></div>`; } }); container.innerHTML = html; attachEvents(); updatePagination('instructor', currentInstructorPage, totalInstructorPages); }
        
        function renderEngineerCards(engineer) { const container = document.getElementById('engineer-cards'); if (!engineer?.length) { container.innerHTML = '<div class="task-card"><div class="loading-container">Нет данных</div></div>'; updatePagination('engineer', 1, 1); return; } const sorted = [...engineer]; totalEngineerPages = Math.ceil(sorted.length / CARDS_PER_PAGE); if (currentEngineerPage > totalEngineerPages) currentEngineerPage = 1; const current = getCurrentPageData(sorted, currentEngineerPage); let html = ''; current.forEach((task, idx) => { const row = task.rowIndex || (idx + 2); const hasLink = task.driveLink?.trim(); const tid = task.id || task.driveLink || ''; if (!task.isCompleted) { html += `<div class="task-card pending"><div class="task-header"><div class="task-title">${task.task}</div></div><div class="card-content"><div class="content-row"><span class="row-label">Дата появления:</span><span class="row-value">${task.createdDate}</span></div><div class="content-row"><span class="row-label">Дата выполнения:</span><span class="row-value">${task.completedDate || '-'}</span></div><div class="content-row"><span class="row-label">Выполнил:</span><span class="row-value"><select class="executor-select"><option value="" selected disabled></option><option value="Вадим">Вадим</option><option value="Гена">Гена</option><option value="Саша">Саша</option><option value="Данил">Данил</option></select></span></div></div><div class="buttons-container">${hasLink ? `<a href="#" onclick="openDriveLink('${task.driveLink}')" class="schema-button">ОТКРЫТЬ</a>` : '<div class="no-open">Недоступно</div>'}<button class="submit-btn" onclick="submitTask(event, '${tid}', ${row})" disabled>ОТПРАВИТЬ</button></div></div>`; } else { html += `<div class="task-card completed"><div class="task-header"><div class="task-title">${task.task}</div></div><div class="card-content"><div class="content-row"><span class="row-label">Дата появления:</span><span class="row-value">${task.createdDate}</span></div><div class="content-row"><span class="row-label">Дата выполнения:</span><span class="row-value">${task.completedDate}</span></div><div class="content-row"><span class="row-label">Выполнил:</span><span class="row-value">${task.executor}</span></div></div><div class="buttons-container">${hasLink ? `<a href="#" onclick="openDriveLink('${task.driveLink}')" class="schema-button">ОТКРЫТЬ</a>` : '<div class="no-open">Недоступно</div>'}<div class="submitted-text">ОТПРАВЛЕНО</div></div></div>`; } }); container.innerHTML = html; attachEvents(); updatePagination('engineer', currentEngineerPage, totalEngineerPages); }
        
        function attachEvents() { document.querySelectorAll('.executor-select').forEach(sel => { sel.removeEventListener('change', handleSelectChange); sel.addEventListener('change', handleSelectChange); }); }
        function handleSelectChange(e) { const btn = e.target.closest('.task-card')?.querySelector('.submit-btn'); if (btn) btn.disabled = !e.target.value; }
        function submitTask(event, taskId, rowIndex) { const btn = event.currentTarget; if (btn.disabled) return; const select = btn.closest('.task-card')?.querySelector('.executor-select'); if (select?.value) completeTask(taskId, select.value, rowIndex); else alert('Выберите исполнителя'); event.stopPropagation(); }
        
        function initializeApp() {
            showLoader();
            document.getElementById('open-tasks-counter').addEventListener('click', toggleDateFilter);
            document.getElementById('clear-filter-btn').addEventListener('click', clearDateFilter);
            Promise.all([loadJournal(), loadInstructorTasks(), loadEngineerTasks()]).then(() => { setTimeout(() => hideLoader(), 100); updateTabBadges(); }).catch(() => hideLoader());
            document.querySelectorAll('.tab-btn').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); btn.classList.add('active'); const tabId = btn.getAttribute('data-tab'); document.getElementById(tabId).classList.add('active'); if (tabId === 'tab1') { currentJournalPage = 1; loadJournal(); } else if (tabId === 'tab2') { currentInstructorPage = 1; loadInstructorTasks(); } else if (tabId === 'tab3') { currentEngineerPage = 1; loadEngineerTasks(); } if (isFilterActive && currentFilterDate) { if (tabId === 'tab1') filterJournalByDate(currentFilterDate); else if (tabId === 'tab2') filterInstructorByDate(currentFilterDate); else if (tabId === 'tab3') filterEngineerByDate(currentFilterDate); } else updateCounterLabel(); scrollToTop(); }); });
            setInterval(() => { const active = document.querySelector('.tab-content.active'); if (active?.id === 'tab1') loadJournal(); else if (active?.id === 'tab2') loadInstructorTasks(); else if (active?.id === 'tab3') loadEngineerTasks(); }, 30000);
            setTimeout(() => { isInitialLoad = false; }, 1000);
        }
        
        window.addEventListener('load', () => { const logged = localStorage.getItem('userLoggedIn') === 'true'; const email = localStorage.getItem('userEmail'); if (logged && email) { loginSection.style.display = 'none'; mainContent.style.display = 'block'; currentUser = { email, name: localStorage.getItem('userName'), picture: localStorage.getItem('userPic') }; updateUserAvatar(currentUser); showLoading(true); loadSheetsAPI().then(() => gapi.client.init({ apiKey: AUTH_API_KEY, discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'] })).then(() => checkEmailInSheet(email)).catch(() => signOut()); } else { loginSection.style.display = 'flex'; mainContent.style.display = 'none'; setTimeout(() => loadingScreen.classList.add('fade-out'), 500); } });
        window.onload = function() { if (google?.accounts?.id) google.accounts.id.initialize({ client_id: '328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com', callback: handleCredentialResponse }); };
