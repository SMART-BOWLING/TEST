<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">

  <title>Lucky Strike · Бильярд Бронирование</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    input, textarea, .f-input, .info-list strong, .info-list span {
      user-select: text;
      -webkit-user-select: text;
    }
    
    :root {
      --bg: #f2f2f2;
      --surface-primary: #ffffff;
      --surface-secondary: #f8f8f8;
      --border-subtle: #e5e5e5;
      --border-strong: #cccccc;
      --label-dark: #1e1e1e;
      --label-secondary: #4a4a4a;
      --label-tertiary: #7c7c7c;
      --accent-blue: #3b6e8f;
      --accent-blue-hover: #2c5a77;
      --accent-green: #4f6b4e;
      --accent-red: #b33f3f;
      --radius-card: 8px;
      --cell-height: 58px;
      --cell-width: 74px;
      --lane-width: 104px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      background: var(--bg);
      color: var(--label-dark);
      min-height: 100vh;
    }

      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 9999;
      padding: 32px;
    }
    
    #content { 
      display: none; 
      min-height: 100vh; 
    }

    .user-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(28px);
      padding: 6px 16px 6px 12px;
      border-radius: 8px;
      border: 0.5px solid var(--border-subtle);
    }
    
    .user-pic {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      object-fit: cover;
    }
    
    .user-email {
      font-size: 13px;

    }
    
    .logout-btn {
      background: none;
      border: none;

    }

    .nav {

      align-items: center;

    .nav-title {

      font-weight: 600; 
      letter-spacing: -0.4px;

      align-items: center;
      gap: 8px;
    }

    .page {

    }

    .ctrl {

    }
  </style>

<script>
// ==================== КОНФИГУРАЦИЯ ====================
const GAS_URL = "https://script.google.com/macros/s/AKfycbzGssUCnowZh6OHk5v_7F3ZvxWe71XpkYmz6ZRhwYeJ-RY1cnFZAaA85ynN-CjOl_jo/exec";

let currentUser = null;
let bookings = [];
let tempBookings = [];
let nextTempId = 1;
let dragModeEnabled = false;
let currentBooking = null;

// Настройки времени (11:00 до 22:00 с интервалом 30 мин)
const LANES = 12, SH = 11, EH = 22;
const slots = [];
for(let h = SH; h <= EH; h++) {
  slots.push({ label: `${h}:00`, key: h, hour: h, minute: 0 });
  if(h < EH) slots.push({ label: `${h}:30`, key: h + 0.5, hour: h, minute: 30 });
}

function getGroupIndex(lane) {
  let n = lane + 1;
  if(n <= 3) return 0;
  if(n === 4) return 1;
  if(n <= 6) return 0;
  return 2;
}

const GRP_CLASS = ['group-blue', 'group-green', 'group-red'];

const $ = id => document.getElementById(id);

// ==================== РАБОТА С GAS ЧЕРЕЗ JSONP ====================
function callGAS(params, callback) {
  const script = document.createElement('script');
  const callbackName = 'jsonp_callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
  
  window[callbackName] = function(data) {
    delete window[callbackName];
    document.body.removeChild(script);
    callback(data);
  };
  
  let url = GAS_URL + '?callback=' + callbackName;
  for (let key in params) {
    url += '&' + encodeURIComponent(key) + '=' + encodeURIComponent(params[key]);
  }
  url += '&_=' + Date.now();
  
  script.src = url;
  document.body.appendChild(script);
}

function callGASPost(data, callback) {
  // Для POST используем fetch с режимом no-cors
  fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    cache: 'no-cache',
    headers: {
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(data)
  }).then(() => {
    // При no-cors мы не можем прочитать ответ, поэтому просто вызываем callback с успехом
    callback({ success: true });
  }).catch(error => {
    console.error('POST error:', error);
    callback({ success: false, message: error.message });
  });
}

// ==================== АВТОРИЗАЦИЯ ====================
function parseJwt(token) {
  try {
    const base64Url = token.split('.')[1];
    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    return JSON.parse(atob(base64));
  } catch(e) {
    return {};
  }
}

async function handleCredentialResponse(response) {
  try {
    showLoad();
    const payload = parseJwt(response.credential);
    const email = payload.email.toLowerCase().trim();
    
    console.log("User logged in:", email);
    
    currentUser = {
      email: email,
      name: payload.name,
      picture: payload.picture,
      role: "пользователь"
    };
    
    localStorage.setItem('billiardUser', JSON.stringify(currentUser));
    
    document.getElementById('login').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    
    const userInfo = document.getElementById('userInfo');
    userInfo.style.display = 'flex';
    document.getElementById('userPic').src = currentUser.picture;
    document.getElementById('userEmail').textContent = currentUser.email;
    
    hideLoad();
    initApplication();
    
  } catch(e) {
    console.error("Auth error:", e);
    alert("Ошибка авторизации: " + e.message);
    hideLoad();
  }
}

function signOut() {
  localStorage.removeItem('billiardUser');
  location.reload();
}

// ==================== ОСНОВНАЯ ЛОГИКА ====================
function fmtFromSlotIdx(startSlotIdx, endSlotIdx = null) {
  let s = slots[startSlotIdx];
  let endIdx = (endSlotIdx !== null) ? endSlotIdx + 1 : startSlotIdx + 1;
  let e = slots[endIdx];
  if (!e) {
    let nextHour = Math.floor(s.key) + 1;
    return `${s.label}–${nextHour}:00`;
  }
  return `${s.label}–${e.label}`;
}

function formatDateForDisplay(dateStr) {
  if (!dateStr) return "Выбрать дату";
  const date = new Date(dateStr);
  const today = new Date();
  today.setHours(0,0,0,0);
  if (date.getTime() === today.getTime()) return "Сегодня";
  const tomorrow = new Date(today);
  tomorrow.setDate(tomorrow.getDate() + 1);
  if (date.getTime() === tomorrow.getTime()) return "Завтра";
  return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
}

function buildDesktopTable() {
  let headRow = document.querySelector("#dtHead tr");
  slots.forEach(sl => {
    let th = document.createElement("th");
    th.className = "th-time";
    th.textContent = sl.label;
    headRow.appendChild(th);
  });
  
  let body = $("dtBody");
  for(let lane = 0; lane < LANES; lane++) {
    let tr = document.createElement("tr");
    tr.dataset.lane = lane;
    let group = getGroupIndex(lane);
    let lhdr = document.createElement("td");
    lhdr.className = `lane-hdr ${GRP_CLASS[group]}`;
    lhdr.textContent = `№ ${lane + 1}`;
    tr.appendChild(lhdr);
    slots.forEach((sl, si) => {
      let td = document.createElement("td");
      td.className = "slot";
      td.dataset.lane = lane;
      td.dataset.slotIdx = si;
      tr.appendChild(td);
    });
    body.appendChild(tr);
  }
}

function getSlotCell(lane, slotIdx) {
  return $("dtBody")?.rows[lane]?.cells[slotIdx + 1];
}

function updateCellsHighlight() {
  for(let row of $("dtBody").rows) {
    for(let i = 1; i < row.cells.length; i++) {
      row.cells[i].classList.remove("booking-pending", "booking-confirmed", "booking-rejected", "temp-highlight");
    }
  }
  
  for(let b of bookings) {
    let si = b.startSlotIdx, ei = b.endSlotIdx;
    if(si !== undefined && ei !== undefined) {
      for(let i = si; i <= ei; i++) {
        let cell = getSlotCell(b.lane, i);
        if(cell) cell.classList.add(b.confirmed === true ? "booking-confirmed" : (b.confirmed === false ? "booking-rejected" : "booking-pending"));
      }
    }
  }
  
  for(let t of tempBookings) {
    let si = t.startSlotIdx, ei = t.endSlotIdx;
    if(si !== undefined && ei !== undefined) {
      for(let i = si; i <= ei; i++) {
        let cell = getSlotCell(t.lane, i);
        if(cell) cell.classList.add("temp-highlight");
      }
    }
  }
}

function renderAllSliders() {
  let container = $("slidersLayer");
  if(!container) return;
  container.innerHTML = "";
  let rows = Array.from($("dtBody")?.querySelectorAll("tr") || []);
  if(rows.length === 0) return;
  
  [...bookings, ...tempBookings.map(t => ({...t, isTemp: true}))].forEach(item => {
    let startIdx = item.startSlotIdx, endIdx = item.endSlotIdx;
    if(startIdx === undefined || endIdx === undefined) return;
    let row = rows[item.lane];
    if(!row) return;
    let sc = row.cells[startIdx + 1], ec = row.cells[endIdx + 1];
    if(!sc || !ec) return;
    
    let left = sc.offsetLeft + 1;
    let top = row.offsetTop + 1;
    let width = (ec.offsetLeft + ec.offsetWidth) - sc.offsetLeft - 2;
    let height = row.offsetHeight - 2;
    
    let slider = document.createElement("div");
    let status = item.isTemp ? "temp" : (item.confirmed === true ? "confirmed" : (item.confirmed === false ? "rejected" : "pending"));
    slider.className = `slider ${status}`;
    slider.style.cssText = `left:${left}px;top:${top}px;width:${width}px;height:${height}px;`;
    
    let nameDiv = document.createElement("div");
    nameDiv.className = "sl-name";
    nameDiv.textContent = item.isTemp ? "Ожидает брони" : (item.name || "Бронь");
    let timeDiv = document.createElement("div");
    timeDiv.className = "sl-time";
    timeDiv.textContent = fmtFromSlotIdx(startIdx, endIdx);
    slider.append(nameDiv, timeDiv);
    
    slider.onclick = () => {
      if(!item.isTemp && item.id) showInfoModal(item);
      else if(!item.isTemp && !item.id) alert("Загрузка данных...");
      else alert("Временная бронь — сохраните для просмотра.");
    };
    
    container.appendChild(slider);
  });
}

function hasConflict(lane, startSlotIdx, endSlotIdx, excludeId = null) {
  let startTime = slots[startSlotIdx].key;
  let endTime = slots[endSlotIdx + 1]?.key || (slots[endSlotIdx].key + 0.5);
  return bookings.some(b => {
    if(excludeId !== null && b.id === excludeId) return false;
    if(b.lane !== lane) return false;
    let bStart = b.start, bEnd = b.end;
    return !(endTime <= bStart || startTime >= bEnd);
  });
}

// Drag and drop для выбора времени
let isDragging = false, dragStartCell = null, dragInterval = null;

function onMouseDown(e) {
  if(dragModeEnabled) return;
  let t = e.target;
  if(t.classList?.contains("slot")) {
    e.preventDefault();
    let lane = parseInt(t.dataset.lane), si = parseInt(t.dataset.slotIdx);
    isDragging = true;
    dragStartCell = { lane, si };
    dragInterval = { lane, startIdx: si, endIdx: si };
    highlightDragInterval(lane, si, si);
  }
}

function onMouseMove(e) {
  if(!dragModeEnabled && isDragging && dragStartCell) {
    let el = document.elementsFromPoint(e.clientX, e.clientY).find(el => el.classList?.contains("slot"));
    if(el) {
      let lane = parseInt(el.dataset.lane), idx = parseInt(el.dataset.slotIdx);
      if(lane === dragStartCell.lane) {
        let ns = Math.min(dragStartCell.si, idx), ne = Math.max(dragStartCell.si, idx);
        dragInterval = { lane, startIdx: ns, endIdx: ne };
        highlightDragInterval(lane, ns, ne);
      }
    }
  }
}

function highlightDragInterval(lane, si, ei) {
  document.querySelectorAll("#tableDesktop td.slot.drag-over").forEach(td => td.classList.remove("drag-over"));
  for(let i = si; i <= ei; i++) {
    let cell = getSlotCell(lane, i);
    if(cell) cell.classList.add("drag-over");
  }
}

function onMouseUp() {
  if(!dragModeEnabled && isDragging && dragInterval) {
    let { lane, startIdx, endIdx } = dragInterval;
    if(hasConflict(lane, startIdx, endIdx)) {
      alert("Это время уже занято другой броней");
    } else {
      tempBookings.push({
        id: nextTempId++,
        lane,
        startSlotIdx: startIdx,
        endSlotIdx: endIdx
      });
      renderInlineTempCards();
      renderAllSliders();
      updateCellsHighlight();
    }
  }
  isDragging = false;
  dragInterval = null;
  dragStartCell = null;
  document.querySelectorAll("#tableDesktop td.slot.drag-over").forEach(td => td.classList.remove("drag-over"));
}

function renderInlineTempCards() {
  const container = $("inlineTempContainer");
  if(!container) return;
  if(tempBookings.length === 0) {
    container.innerHTML = "";
    return;
  }
  container.innerHTML = "";
  tempBookings.forEach((tb, idx) => {
    let card = document.createElement("div");
    card.className = "temp-card-inline";
    let timeStr = fmtFromSlotIdx(tb.startSlotIdx, tb.endSlotIdx);
    card.innerHTML = `<strong>Стол ${tb.lane+1}</strong><span class="temp-time">${timeStr}</span><button class="temp-rm" data-idx="${idx}"><i class="fas fa-times"></i></button>`;
    card.querySelector(".temp-rm").onclick = () => {
      tempBookings.splice(idx, 1);
      renderInlineTempCards();
      renderAllSliders();
      updateCellsHighlight();
      updatePreviewTimes();
    };
    container.appendChild(card);
  });
  updatePreviewTimes();
}

function updatePreviewTimes() {
  const span = document.getElementById("previewTimes");
  if(span) {
    span.innerText = tempBookings.length ? tempBookings.map(tb => {
      return `Стол ${tb.lane+1} (${fmtFromSlotIdx(tb.startSlotIdx, tb.endSlotIdx)})`;
    }).join("; ") : "—";
  }
}

function openBookModal() {
  if(tempBookings.length === 0) {
    alert("Сначала выделите интервал на столе");
    return;
  }
  $("nameInput").value = "";
  $("phoneInput").value = "";
  $("commentInput").value = "";
  updatePreviewTimes();
  $("bookModal").classList.add("open");
}

function closeBookModal() {
  $("bookModal").classList.remove("open");
}

function clearTempSelections() {
  tempBookings = [];
  renderInlineTempCards();
  renderAllSliders();
  updateCellsHighlight();
}

async function submitTempBookings() {
  if(!currentUser) {
    alert("Пожалуйста, авторизуйтесь");
    return;
  }
  
  let name = $("nameInput").value.trim();
  if(!name) return alert("Введите имя");
  if(tempBookings.length === 0) return;
  
  showLoad();
  try {
    const dateValue = new Date().toISOString().split('T')[0];
    
    const requestData = {
      action: "createBookings",
      date: dateValue,
      bookings: tempBookings.map(tb => ({
        tableNumber: tb.lane + 1,
        start: slots[tb.startSlotIdx].key,
        end: slots[tb.endSlotIdx + 1]?.key || (slots[tb.endSlotIdx].key + 0.5),
        name: name,
        phone: $("phoneInput").value.trim(),
        comment: $("commentInput").value.trim()
      }))
    };
    
    console.log("Sending:", requestData);
    
    callGASPost(requestData, (result) => {
      console.log("Result:", result);
      if(result && result.success !== false) {
        clearTempSelections();
        loadFromServer();
        closeBookModal();
        alert("Бронь успешно создана!");
      } else {
        alert("Ошибка при сохранении: " + (result?.message || "Неизвестная ошибка"));
      }
      hideLoad();
    });
    
  } catch(e) {
    console.error("Submit error:", e);
    alert("Ошибка: " + e.message);
    hideLoad();
  }
}

function loadFromServer() {
  if(!currentUser) return;
  showLoad();
  try {
    const dateVal = new Date().toISOString().split('T')[0];
    
    callGAS({ action: 'get', date: dateVal }, (result) => {
      console.log("Load result:", result);
      if(result && result.bookings) {
        bookings = result.bookings.map(b => {
          let startKey = parseFloat(b.start);
          let endKey = parseFloat(b.end);
          let startSlotIdx = slots.findIndex(s => s.key === startKey);
          let endSlotIdx = slots.findIndex(s => s.key === endKey) - 1;
          if(endSlotIdx < 0) endSlotIdx = slots.length - 1;
          return {
            id: b.id,
            lane: b.table - 1,
            start: startKey,
            end: endKey,
            startSlotIdx: startSlotIdx,
            endSlotIdx: endSlotIdx,
            name: b.name,
            phone: b.phone,
            comment: b.comment,
            confirmed: b.confirmed === "Да" ? true : (b.confirmed === "Нет" ? false : null)
          };
        });
        renderAllSliders();
        updateCellsHighlight();
      }
      hideLoad();
    });
  } catch(e) {
    console.error("Load error:", e);
    hideLoad();
  }
}

function showInfoModal(b) {
  currentBooking = b;
  $("i-table").textContent = "№ " + (b.lane + 1);
  $("i-time").textContent = fmtFromSlotIdx(b.startSlotIdx, b.endSlotIdx);
  $("i-name").textContent = b.name;
  $("i-phone").textContent = b.phone || "—";
  $("i-comment").textContent = b.comment || "—";
  let statusText = b.confirmed === true ? "✅ Пришли" : (b.confirmed === false ? "❌ Не пришли" : "⏳ Ожидание");
  $("i-status").textContent = statusText;
  $("infoModal").classList.add("open");
}

function closeInfoModal() {
  $("infoModal").classList.remove("open");
  currentBooking = null;
}

function confirmBooking(yes) {
  if(!currentBooking) return;
  showLoad();
  callGASPost({ action: "confirm", id: currentBooking.id, confirmed: yes }, () => {
    closeInfoModal();
    loadFromServer();
    hideLoad();
  });
}

function deleteBooking() {
  if(!currentBooking || !confirm("Удалить бронь?")) return;
  showLoad();
  callGASPost({ action: "delete", id: currentBooking.id }, () => {
    closeInfoModal();
    loadFromServer();
    hideLoad();
  });
}

// ==================== АДМИН-ПАНЕЛЬ ====================
function openAdminPanel() {
  if(!currentUser) return;
  showLoad();
  $("adminModal").classList.add("open");
  loadUsersList();
}

function closeAdminModal() {
  $("adminModal").classList.remove("open");
}

function loadUsersList() {
  callGAS({ action: 'getUsers' }, (result) => {
    const container = document.getElementById("usersList");
    
    if(result && result.users && result.users.length) {
      let html = '<table style="width:100%; border-collapse: collapse;"><tr><th>Email</th><th>Имя</th><th>Должность</th><th>Действия</th></tr>';
      result.users.forEach(user => {
        html += `<tr>
          <td>${escapeHtml(user.email)}</td>
          <td>${escapeHtml(user.name || '-')}</td>
          <td>${escapeHtml(user.role || '-')}</td>
          <td>
            <button onclick="editUser(${user.row}, '${escapeHtml(user.email)}', '${escapeHtml(user.name || '')}', '${escapeHtml(user.role || '')}')">✏️</button>
            <button onclick="deleteUser(${user.row})">🗑️</button>
          </td>
        </tr>`;
      });
      html += '</table>';
      container.innerHTML = html;
    } else {
      container.innerHTML = '<p>Нет пользователей</p>';
    }
    hideLoad();
  });
}

function showAddUserForm() {
  document.getElementById("userFormTitle").innerHTML = "Добавить сотрудника";
  document.getElementById("editRow").value = "";
  document.getElementById("userEmailInput").value = "";
  document.getElementById("userNameInput").value = "";
  document.getElementById("userRoleInput").value = "";
  document.getElementById("userFormModal").classList.add("open");
}

function editUser(row, email, name, role) {
  document.getElementById("userFormTitle").innerHTML = "Редактировать сотрудника";
  document.getElementById("editRow").value = row;
  document.getElementById("userEmailInput").value = email;
  document.getElementById("userNameInput").value = name;
  document.getElementById("userRoleInput").value = role;
  document.getElementById("userFormModal").classList.add("open");
}

function closeUserFormModal() {
  document.getElementById("userFormModal").classList.remove("open");
}

function saveUser(event) {
  event.preventDefault();
  const row = document.getElementById("editRow").value;
  const email = document.getElementById("userEmailInput").value.trim();
  const name = document.getElementById("userNameInput").value.trim();
  const role = document.getElementById("userRoleInput").value.trim();
  
  if(!email) return alert("Введите email");
  
  showLoad();
  
  if(row) {
    callGAS({ action: 'updateUser', row: row, email: email, name: name, role: role }, (result) => {
      if(result && result.success) {
        closeUserFormModal();
        loadUsersList();
        alert("Пользователь обновлен");
      } else {
        alert("Ошибка: " + (result?.message || "Неизвестная ошибка"));
      }
      hideLoad();
    });
  } else {
    callGAS({ action: 'addUser', email: email, name: name, role: role }, (result) => {
      if(result && result.success) {
        closeUserFormModal();
        loadUsersList();
        alert("Пользователь добавлен");
      } else {
        alert("Ошибка: " + (result?.message || "Неизвестная ошибка"));
      }
      hideLoad();
    });
  }
}

function deleteUser(row) {
  if(!confirm("Удалить пользователя?")) return;
  showLoad();
  callGAS({ action: 'deleteUser', row: row }, (result) => {
    if(result && result.success) {
      loadUsersList();
      alert("Пользователь удален");
    } else {
      alert("Ошибка: " + (result?.message || "Неизвестная ошибка"));
      hideLoad();
    }
  });
}

function escapeHtml(str) {
  if(!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if(m === '&') return '&amp;';
    if(m === '<') return '&lt;';
    if(m === '>') return '&gt;';
    return m;
  });
}

function showLoad() {
  $("loader").style.display = "flex";
}

function hideLoad() {
  $("loader").style.display = "none";
}

// ==================== ИНИЦИАЛИЗАЦИЯ ====================
function initApplication() {
  buildDesktopTable();
  
  // Календарь
  const calendarBtn = document.getElementById("calendarButton");
  const hiddenPicker = document.getElementById("hiddenDatePicker");
  const displaySpan = document.getElementById("displayDateText");
  const todayStr = new Date().toISOString().split('T')[0];
  
  if(hiddenPicker) {
    hiddenPicker.value = todayStr;
    displaySpan.innerText = formatDateForDisplay(todayStr);
  }
  
  if(calendarBtn && hiddenPicker) {
    calendarBtn.addEventListener("click", () => {
      if(hiddenPicker.showPicker) hiddenPicker.showPicker();
      else hiddenPicker.click();
    });
    hiddenPicker.addEventListener("change", (e) => {
      displaySpan.innerText = formatDateForDisplay(e.target.value);
      loadFromServer();
      clearTempSelections();
    });
  }
  
  loadFromServer();
  
  const toggleBtn = $("dragToggleBtn");
  toggleBtn.addEventListener("click", () => {
    dragModeEnabled = !dragModeEnabled;
    toggleBtn.innerHTML = dragModeEnabled ? '<i class="fas fa-arrows-alt"></i> Режим перетяжки: ВКЛ' : '<i class="fas fa-arrows-alt"></i> Режим перетяжки: ВЫКЛ';
    toggleBtn.classList.toggle("active", dragModeEnabled);
    renderAllSliders();
  });
  
  $("tableDesktop").addEventListener("mousedown", onMouseDown);
  document.body.addEventListener("mousemove", onMouseMove);
  document.body.addEventListener("mouseup", onMouseUp);
  
  // Закрытие модалок по клику на оверлей
  ["bookModal","infoModal","adminModal","userFormModal"].forEach(id => {
    $(id)?.addEventListener("click", e => {
      if(e.target === $(id)) $(id).classList.remove("open");
    });
  });
}

// Запуск
window.addEventListener('load', () => {
  const cached = localStorage.getItem('billiardUser');
  if(cached) {
    try {
      currentUser = JSON.parse(cached);
      if(currentUser && currentUser.email) {
        document.getElementById('login').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        document.getElementById('userInfo').style.display = 'flex';
        document.getElementById('userPic').src = currentUser.picture || '';
        document.getElementById('userEmail').textContent = currentUser.email;
        initApplication();
      }
    } catch(e) {}
  }
});
