<!DOCTYPE html>

  <!-- Критические стили встроены для быстрого первого рендера -->
  <style>
    /* КРИТИЧЕСКИЕ СТИЛИ - минимизированы для скорости */

    header{background-color:#1f2937;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;position:fixed;top:0;left:0;right:0;box-shadow:0 2px 4px rgba(0,0,0,.2);user-select:none;z-index:1000}

    .logo-wrapper{position:relative;width:160px;height:160px;display:flex;justify-content:center;align-items:center}
    .glow-ring{position:absolute;width:80px;height:80px;border-radius:100%;background:conic-gradient(#dc143c,transparent 100%);animation:spin 5s linear infinite;filter:blur(20px)}
    .logo-wrapper img{width:120px;z-index:2}

    .container{max-width:100%;margin:80px auto 20px;padding:15px}
    .date-input-container{margin:0 auto 20px;max-width:400px}

    .machines-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}

  <!-- Основной скрипт с полной функциональностью -->
  <script>
    (function() {
      // ===== КОНСТАНТЫ =====
      const CONFIG = {
        AUTH_SPREADSHEET_ID: '1-yiVdZYa6wJdupTiuiHvI_ht3Vu73RUjyCehZqs2cJ4',
        AUTH_SHEET_NAME: '1',
        AUTH_API_KEY: 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0',
        CURRENT_SITE: 'https://smart-bowling.github.io/PS-STOP-KH/',
        SHEETS_CONFIG: {
          apiKey: 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0',
          spreadsheetId: '1F4zy9OcSesAeWktCXsPZdBD4796MbAnOZDXGMqY7zBg',
          columnMapping: {1:'F',2:'J',3:'N',4:'R',5:'V',6:'Z',7:'AD',8:'AH',9:'AL',10:'AP',11:'AT',12:'AX',13:'BB',14:'BF'},
          startRow: 4
        },
        BACKEND_URL: 'https://script.google.com/macros/s/AKfycbym_79krm2GhFqOJrq5UwgDXUTQFDnTT-FY67atU3Mpg3Tz2r4qfpBVmvEZ72A4wGMZdQ/exec'
      };

      // ===== СОСТОЯНИЕ ПРИЛОЖЕНИЯ =====
      let currentUser = null;
      let machineErrors = Array(14).fill(0);
      let machineFPS = Array(14).fill(0);
      let selectedDate = new Date().toISOString().split('T')[0];
      let originalErrors = Array(14).fill(0);
      let errorsChart = null;
      let fpsChart = null;
      let yearlyComparisonChart = null;
      let monthlyErrors = 0;
      let monthlyFPS = 0;
      let analyticsLoaded = false;
      let isAnalysisOpen = false;
      let dataCache = {};
      let lastSaveTime = 0;
      const SAVE_DEBOUNCE_TIME = 1000;
      let sheetsAPIPromise = null;

      // ===== DOM ЭЛЕМЕНТЫ =====
      const loadingScreen = document.getElementById('loadingScreen');
      const loginSection = document.getElementById('login-section');
      const mainContent = document.getElementById('main-content');
      const loader = document.getElementById('loader');
      const lazyContent = document.getElementById('lazy-content');

      // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
      function showLoader() { loader.classList.add('active'); }
      function hideLoader() { loader.classList.remove('active'); }

      function parseJwt(token) {
        try {
          const base64Url = token.split('.')[1];
          const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
          const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
          return JSON.parse(jsonPayload);
        } catch (e) {
          console.error('Ошибка парсинга JWT:', e);
          return {};
        }
      }

      function getSheetNameFromDate(date) {
        const month = date.getMonth() + 1;
        const year = date.getFullYear().toString().slice(-2);
        return month + '.' + year;
      }

      // ===== ФУНКЦИИ ДЛЯ UI =====
      function toggleUserDropdown() {
        const menu = document.getElementById('userDropdown');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
      }

      function updateUserAvatar(user) {
        const avatarContainer = document.getElementById('userAvatar');
        if (user?.picture) {
          avatarContainer.innerHTML = `<img src="${user.picture}" alt="Avatar">`;
        } else {
          avatarContainer.innerHTML = '<i class="fas fa-user"></i>';
        }
      }

      function generateMachineCells() {
        const grid = document.getElementById('machinesGrid');
        if (!grid) return;
        
        let html = '';
        for (let i = 0; i < 14; i++) {
          html += `
            <div class="machine-cell" onclick="incrementMachine(${i})">
              <div class="machine-number">LANE ${i + 1}</div>
              <div class="error-count zero">0</div>
            </div>
          `;
        }
        grid.innerHTML = html;
        console.log('Карточки машин сгенерированы');
      }

      function updateDisplay() {
        const cells = document.querySelectorAll('.machine-cell .error-count');
        for (let i = 0; i < cells.length; i++) {
          cells[i].textContent = machineErrors[i];
          cells[i].className = machineErrors[i] === 0 ? 'error-count zero' : 'error-count non-zero';
        }
      }

      window.incrementMachine = function(index) {
        machineErrors[index]++;
        updateDisplay();
        if (errorsChart && analyticsLoaded && isAnalysisOpen) {
          updateCharts();
        }
      };

      function forceDisplayUpdate() {
        updateDisplay();
      }

      // ===== ФУНКЦИИ АВТОРИЗАЦИИ =====
      function loadSheetsAPI() {
        return new Promise((resolve, reject) => {
          if (!window.gapi) {
            reject('gapi не загружен');
            return;
          }
          gapi.load('client', {
            callback: () => resolve(),
            onerror: () => reject('Ошибка загрузки Google API'),
            timeout: 10000,
            ontimeout: () => reject('Таймаут загрузки Google API')
          });
        });
      }

      window.handleCredentialResponse = function(response) {
        try {
          const payload = parseJwt(response.credential);
          
          currentUser = {
            email: payload.email.toLowerCase().trim(),
            name: payload.name,
            picture: payload.picture
          };
          
          showLoading(true);
          initAndCheckEmail();
        } catch (e) {
          console.error('Ошибка аутентификации:', e);
          showLoading(false);
          alert('Ошибка аутентификации');
        }
      };

      function showLoading(show) {
        const loginDiv = document.getElementById('login-container');
        if (show) {
          if (!loginDiv.hasAttribute('data-original')) {
            loginDiv.setAttribute('data-original', loginDiv.innerHTML);
          }
          loginDiv.innerHTML = '<div style="padding:40px;text-align:center;"><div class="loading-spinner" style="display:inline-block;width:40px;height:40px;border:4px solid rgba(220,20,60,0.2);border-radius:50%;border-top-color:#dc143c;animation:spin 1s ease-in-out infinite;"></div><br><span style="color:#64748b;margin-top:15px;display:block;">Проверка доступа...</span></div>';
        } else {
          if (loginDiv.getAttribute('data-original') && loginSection.style.display !== 'none') {
            loginDiv.innerHTML = loginDiv.getAttribute('data-original');
            
            if (window.google && google.accounts && google.accounts.id) {
              google.accounts.id.renderButton(
                document.querySelector('.g_id_signin'),
                { 
                  type: 'standard', 
                  shape: 'pill', 
                  theme: 'outline', 
                  text: 'signin_with', 
                  size: 'large', 
                  logo_alignment: 'left' 
                }
              );
            }
          }
        }
      }

      async function initAndCheckEmail() {
        try {
          await loadSheetsAPI();
          await gapi.client.init({
            apiKey: CONFIG.AUTH_API_KEY,
            discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
          });
          
          await checkEmailInSheet(currentUser.email);
        } catch (error) {
          console.error('Ошибка инициализации:', error);
          showLoading(false);
          alert('Ошибка инициализации Google API');
        }
      }

      async function checkEmailInSheet(email) {
        try {
          const response = await gapi.client.sheets.spreadsheets.values.get({
            spreadsheetId: CONFIG.AUTH_SPREADSHEET_ID,
            range: `${CONFIG.AUTH_SHEET_NAME}!A:Z`,
          });
          
          const rows = response.result.values;
          if (!rows || rows.length === 0) {
            showLoading(false);
            alert('Таблица пуста');
            return;
          }
          
          let hasAccess = false;
          
          for (let i = 0; i < rows.length; i++) {
            if (!rows[i]?.[0]) continue;
            
            const rowEmail = rows[i][0].toLowerCase().trim();
            if (rowEmail === email) {
              for (let j = 1; j < rows[i].length; j++) {
                const siteUrl = rows[i][j]?.trim().split('?')[0].split('#')[0] || '';
                if (siteUrl === CONFIG.CURRENT_SITE || siteUrl.includes('PS-STOP-KH')) {
                  hasAccess = true;
                  break;
                }
              }
              break;
            }
          }
          
          if (hasAccess) {
            loginUser(currentUser);
          } else {
            showLoading(false);
            alert('Доступ запрещен: Ваш email не найден в таблице или нет прав для этого сайта');
          }
        } catch (error) {
          console.error('Ошибка доступа к таблице:', error);
          showLoading(false);
          alert('Ошибка доступа к таблице');
        }
      }

      function loginUser(user) {
        loginSection.style.display = 'none';
        mainContent.style.display = 'block';
        
        updateUserAvatar(user);
        
        localStorage.setItem('userLoggedIn', 'true');
        localStorage.setItem('userEmail', user.email.toLowerCase());
        localStorage.setItem('userName', user.name);
        localStorage.setItem('userPic', user.picture);
        
        showLoading(false);
        
        setTimeout(() => {
          loadingScreen.classList.add('fade-out');
        }, 500);
        
        // Инициализация приложения
        initializeApp();
      }

      function signOut() {
        localStorage.clear();
        sessionStorage.clear();
        
        if (google && google.accounts && google.accounts.id) {
          google.accounts.id.disableAutoSelect();
        }
        
        mainContent.style.display = 'none';
        loginSection.style.display = 'flex';
        
        const loginDiv = document.getElementById('login-container');
        if (loginDiv.getAttribute('data-original')) {
          loginDiv.innerHTML = loginDiv.getAttribute('data-original');
          
          if (window.google && google.accounts && google.accounts.id) {
            google.accounts.id.renderButton(
              document.querySelector('.g_id_signin'),
              { 
                type: 'standard', 
                shape: 'pill', 
                theme: 'outline', 
                text: 'signin_with', 
                size: 'large', 
                logo_alignment: 'left' 
              }
            );
          }
        }
      }

      // ===== ФУНКЦИИ ЗАГРУЗКИ ДАННЫХ =====
      function ensureSheetsAPI() {
        if (sheetsAPIPromise) return sheetsAPIPromise;
        
        sheetsAPIPromise = new Promise((resolve, reject) => {
          if (window.gapi?.client?.sheets) {
            resolve();
            return;
          }
          
          gapi.load('client', async () => {
            try {
              await gapi.client.init({
                apiKey: CONFIG.SHEETS_CONFIG.apiKey,
                discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
              });
              resolve();
            } catch (error) {
              reject(error);
            }
          });
        });
        
        return sheetsAPIPromise;
      }

      async function loadTableDataFromSheets(sheetName) {
        try {
          const response = await gapi.client.sheets.spreadsheets.values.get({
            spreadsheetId: CONFIG.SHEETS_CONFIG.spreadsheetId,
            range: `'${sheetName}'!B4:BF34`,
            valueRenderOption: 'FORMATTED_VALUE'
          });
          
          const rows = response.result.values || [];
          const tableData = [];
          const errorIndices = [4, 8, 12, 16, 20, 24, 28, 32, 36, 40, 44, 48, 52, 56];
          
          rows.forEach(row => {
            if (!row[0]) return;
            
            const dayValue = row[0];
            let dayNumber;
            
            if (typeof dayValue === 'string') {
              const match = dayValue.match(/^(\d+)/);
              dayNumber = match ? parseInt(match[1]) : dayValue;
            } else {
              dayNumber = dayValue;
            }
            
            const rowData = { day: dayNumber, errors: [] };
            
            errorIndices.forEach(index => {
              const value = row[index] || 0;
              rowData.errors.push(Math.ceil(Number(value)) || 0);
            });
            
            tableData.push(rowData);
          });
          
          tableData.sort((a, b) => (parseInt(a.day) || 0) - (parseInt(b.day) || 0));
          return tableData;
        } catch (error) {
          console.error('Ошибка при чтении таблицы:', error);
          return [];
        }
      }

      async function loadDataDirectlyFromSheets(date) {
        console.log('Чтение напрямую из Sheets для даты:', date);
        
        try {
          const dateObj = new Date(date);
          const sheetName = getSheetNameFromDate(dateObj);
          const day = dateObj.getDate();
          const row = CONFIG.SHEETS_CONFIG.startRow + day - 1;
          
          await ensureSheetsAPI();
          
          // Читаем данные для всех машин
          const ranges = [];
          for (let i = 1; i <= 14; i++) {
            ranges.push(`'${sheetName}'!${CONFIG.SHEETS_CONFIG.columnMapping[i]}${row}`);
          }
          
          const response = await gapi.client.sheets.spreadsheets.values.batchGet({
            spreadsheetId: CONFIG.SHEETS_CONFIG.spreadsheetId,
            ranges: ranges,
            valueRenderOption: 'UNFORMATTED_VALUE'
          });
          
          const errors = response.result.valueRanges.map(range => {
            const value = range.values?.[0]?.[0] || 0;
            return Math.ceil(Number(value)) || 0;
          });
          
          // Читаем данные для графиков
          const chartRanges = [];
          for (let i = 1; i <= 14; i++) {
            chartRanges.push(`'${sheetName}'!${CONFIG.SHEETS_CONFIG.columnMapping[i]}35`);
            chartRanges.push(`'${sheetName}'!${CONFIG.SHEETS_CONFIG.columnMapping[i]}36`);
          }
          
          const chartResponse = await gapi.client.sheets.spreadsheets.values.batchGet({
            spreadsheetId: CONFIG.SHEETS_CONFIG.spreadsheetId,
            ranges: chartRanges,
            valueRenderOption: 'UNFORMATTED_VALUE'
          });
          
          const chartErrors = [];
          const chartFPS = [];
          for (let i = 0; i < 14; i++) {
            const errorValue = chartResponse.result.valueRanges[i*2]?.values?.[0]?.[0] || 0;
            const fpsValue = chartResponse.result.valueRanges[i*2 + 1]?.values?.[0]?.[0] || 0;
            chartErrors.push(Math.ceil(Number(errorValue)) || 0);
            chartFPS.push(Math.ceil(Number(fpsValue)) || 0);
          }
          
          // Читаем общую статистику
          const statsResponse = await gapi.client.sheets.spreadsheets.values.batchGet({
            spreadsheetId: CONFIG.SHEETS_CONFIG.spreadsheetId,
            ranges: [
              `'${sheetName}'!BO35`,
              `'${sheetName}'!BP35`
            ],
            valueRenderOption: 'UNFORMATTED_VALUE'
          });
          
          const totalErrors = Math.ceil(Number(statsResponse.result.valueRanges[0]?.values?.[0]?.[0])) || 0;
          const totalFPS = Math.ceil(Number(statsResponse.result.valueRanges[1]?.values?.[0]?.[0])) || 0;
          
          // Читаем данные для таблицы
          const tableData = await loadTableDataFromSheets(sheetName);
          
          return {
            errors: errors,
            exists: true,
            chartData: { errors: chartErrors, fps: chartFPS },
            totalStats: { errors: totalErrors, fps: totalFPS },
            tableData: tableData
          };
        } catch (error) {
          console.error('Ошибка при чтении из Sheets:', error);
          if (error.status === 404 || error.status === 400) {
            return {
              errors: Array(14).fill(0),
              exists: false,
              chartData: { errors: Array(14).fill(0), fps: Array(14).fill(0) },
              totalStats: { errors: 0, fps: 0 },
              tableData: []
            };
          }
          throw error;
        }
      }

      async function loadDataViaAppsScript(date) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 8000);
        
        try {
          const response = await fetch(`${CONFIG.BACKEND_URL}?date=${encodeURIComponent(date)}&simple=true`, {
            signal: controller.signal,
            headers: { 'Accept': 'application/json' },
          });
          
          clearTimeout(timeoutId);
          
          if (!response.ok) throw new Error(`Ошибка сервера: ${response.status}`);
          return await response.json();
        } catch (error) {
          clearTimeout(timeoutId);
          throw error;
        }
      }

      async function loadDataForDate(date, retryCount = 0) {
        const MAX_RETRIES = 3;
        console.log('Загрузка данных для даты:', date, 'попытка:', retryCount + 1);
        
        if (dataCache[date]) {
          console.log('Используем кэшированные данные');
          applyCachedData(dataCache[date]);
          return;
        }
        
        showLoader();
        
        try {
          let data;
          
          if (window.gapi?.client?.sheets) {
            try {
              data = await loadDataDirectlyFromSheets(date);
              console.log('Данные получены напрямую из Sheets');
            } catch (sheetsError) {
              console.warn('Не удалось прочитать напрямую, пробуем через Apps Script:', sheetsError);
              data = await loadDataViaAppsScript(date);
            }
          } else {
            data = await loadDataViaAppsScript(date);
          }
          
          dataCache[date] = data;
          applyCachedData(data);
        } catch (error) {
          console.error('Ошибка загрузки данных:', error);
          
          if (retryCount < MAX_RETRIES) {
            console.log(`Повторная попытка через ${1000 * (retryCount + 1)}мс`);
            setTimeout(() => {
              loadDataForDate(date, retryCount + 1);
            }, 1000 * (retryCount + 1));
          } else {
            console.log('Все попытки исчерпаны, используем данные по умолчанию');
            applyDefaultData();
          }
        } finally {
          hideLoader();
        }
      }

      function applyCachedData(data) {
        if (data.errors) {
          machineErrors = data.errors;
          originalErrors = [...data.errors];
          forceDisplayUpdate();
        }
        
        if (data.chartData) {
          machineFPS = data.chartData.fps || Array(14).fill(0);
        }
        
        if (data.totalStats) {
          monthlyErrors = data.totalStats.errors || 0;
          monthlyFPS = data.totalStats.fps || 0;
          updateStats();
        }
        
        if (data.tableData && data.tableData.length > 0) {
          populateTable(data.tableData);
        }
      }

      function applyDefaultData() {
        machineErrors = Array(14).fill(0);
        originalErrors = Array(14).fill(0);
        forceDisplayUpdate();
      }

      // ===== ФУНКЦИИ ДЛЯ ТАБЛИЦ И ГРАФИКОВ =====
      function populateTable(tableData) {
        const tableBody = document.getElementById('tableBody');
        if (!tableBody) return;
        
        tableBody.innerHTML = '';
        
        tableData.forEach(row => {
          if (!row.day && row.errors.every(error => error === 0)) return;
          
          const tr = document.createElement('tr');
          const dayCell = document.createElement('td');
          dayCell.textContent = row.day;
          dayCell.style.fontWeight = 'bold';
          tr.appendChild(dayCell);
          
          row.errors.forEach(error => {
            const errorCell = document.createElement('td');
            if (error !== 0) {
              errorCell.textContent = error;
              errorCell.className = 'non-zero';
            }
            tr.appendChild(errorCell);
          });
          
          tableBody.appendChild(tr);
        });
      }

      function populateDemoTable() {
        const tableBody = document.getElementById('tableBody');
        if (!tableBody) return;
        
        tableBody.innerHTML = '';
        
        for (let i = 1; i <= 31; i++) {
          const row = document.createElement('tr');
          const dayCell = document.createElement('td');
          dayCell.textContent = i;
          dayCell.style.fontWeight = 'bold';
          row.appendChild(dayCell);
          
          for (let j = 0; j < 14; j++) {
            const dataCell = document.createElement('td');
            const value = Math.floor(Math.random() * 10);
            if (value !== 0) {
              dataCell.textContent = value;
              dataCell.className = 'non-zero';
            }
            row.appendChild(dataCell);
          }
          tableBody.appendChild(row);
        }
      }

      function calculateMonthlyErrors() {
        const monthlyErrorsArr = Array(14).fill(0);
        const tableRows = document.querySelectorAll('#tableBody tr');
        
        tableRows.forEach(row => {
          const cells = row.querySelectorAll('td');
          for (let i = 1; i < cells.length; i++) {
            const errorCount = parseInt(cells[i].textContent) || 0;
            monthlyErrorsArr[i - 1] += errorCount;
          }
        });
        
        return monthlyErrorsArr;
      }

      function updateStats() {
        const totalErrorsEl = document.getElementById('totalErrors');
        const totalFPSEl = document.getElementById('totalFPS');
        if (totalErrorsEl) totalErrorsEl.textContent = monthlyErrors;
        if (totalFPSEl) totalFPSEl.textContent = Math.ceil(monthlyFPS);
      }

      function createCharts() {
        if (!window.Chart) return;
        
        const machineNumbers = Array.from({length: 14}, (_, i) => `${i + 1}`);
        
        if (errorsChart) errorsChart.destroy();
        if (fpsChart) fpsChart.destroy();
        
        const monthlyErrorsData = calculateMonthlyErrors();
        
        const errorsCtx = document.getElementById('errorsChart')?.getContext('2d');
        if (errorsCtx) {
          errorsChart = new Chart(errorsCtx, {
            type: 'bar',
            data: {
              labels: machineNumbers,
              datasets: [{
                data: monthlyErrorsData,
                backgroundColor: 'rgba(220, 20, 60, 0.8)',
                borderColor: 'rgba(220, 20, 60, 1)',
                borderWidth: 1,
                borderRadius: 5,
                barPercentage: 0.7,
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: true,
              plugins: { legend: { display: false } },
              scales: {
                y: { beginAtZero: true, grid: { color: 'rgba(0, 0, 0, 0.05)' }, ticks: { display: false } },
                x: { grid: { display: false } }
              }
            }
          });
        }
        
        const fpsCtx = document.getElementById('fpsChart')?.getContext('2d');
        if (fpsCtx) {
          fpsChart = new Chart(fpsCtx, {
            type: 'bar',
            data: {
              labels: machineNumbers,
              datasets: [{
                data: machineFPS,
                backgroundColor: 'rgba(26, 47, 64, 0.8)',
                borderColor: 'rgba(26, 47, 64, 1)',
                borderWidth: 1,
                borderRadius: 5,
                barPercentage: 0.7,
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: true,
              plugins: { legend: { display: false } },
              scales: {
                y: { beginAtZero: true, grid: { color: 'rgba(0, 0, 0, 0.05)' }, ticks: { display: false } },
                x: { grid: { display: false } }
              }
            }
          });
        }
      }

      function updateCharts() {
        if (errorsChart) {
          errorsChart.data.datasets[0].data = calculateMonthlyErrors();
          errorsChart.update();
        }
        
        if (fpsChart) {
          fpsChart.data.datasets[0].data = machineFPS;
          fpsChart.update();
        }
      }

      async function createYearlyComparisonChart() {
        if (!window.Chart) return;
        
        const yearlyComparisonCtx = document.getElementById('yearlyComparisonChart')?.getContext('2d');
        if (!yearlyComparisonCtx) return;
        
        const yearlyComparisonContainer = document.getElementById('yearlyComparisonContainer');
        yearlyComparisonCtx.canvas.style.width = '100%';
        yearlyComparisonCtx.canvas.style.height = '100%';
        
        try {
          const response = await fetch(`${CONFIG.BACKEND_URL}?yearlyComparison=true`, {
            method: 'GET',
            headers: { 'Accept': 'application/json' },
          });
          
          let yearlyData;
          if (response.ok) {
            const text = await response.text();
            yearlyData = JSON.parse(text);
          } else {
            throw new Error('Ошибка сети');
          }
          
          const datasets = yearlyData.years.map((year, index) => {
            const hue = index * 60 % 360;
            const dataWithNulls = (yearlyData.data[year] || Array(12).fill(0)).map(value => 
              value === 0 ? null : value
            );
            
            return {
              label: year.toString(),
              data: dataWithNulls,
              borderColor: `hsl(${hue}, 70%, 50%)`,
              backgroundColor: `hsla(${hue}, 70%, 50%, 0.2)`,
              borderWidth: 2,
              fill: false,
              tension: 0.4,
              spanGaps: false
            };
          });
          
          if (yearlyComparisonChart) yearlyComparisonChart.destroy();
          
          yearlyComparisonChart = new Chart(yearlyComparisonCtx, {
            type: 'line',
            data: { labels: yearlyData.months, datasets: datasets },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              layout: { padding: { bottom: 30 } },
              plugins: {
                legend: { position: 'top' },
                tooltip: {
                  callbacks: {
                    label: function(context) {
                      return context.raw === null ? 'Нет данных' : ` ${context.raw}`;
                    }
                  }
                }
              },
              scales: {
                x: { ticks: { padding: 10, maxRotation: 45, autoSkip: true } },
                y: { beginAtZero: true }
              },
              elements: {
                point: {
                  radius: function(context) { return context.raw === null ? 0 : 3; },
                  hoverRadius: function(context) { return context.raw === null ? 0 : 5; }
                }
              }
            }
          });
        } catch (error) {
          console.error('Ошибка при создании графика сравнения:', error);
        }
      }

      // ===== ФУНКЦИИ ДЛЯ АНАЛИТИКИ =====
      function updateAnalysisButtonState(state) {
        const analysisBtn = document.getElementById('analysisBtn');
        if (!analysisBtn) return;
        
        analysisBtn.classList.remove('loading', 'success', 'pulse');
        
        switch(state) {
          case 'loading':
            analysisBtn.classList.add('loading');
            break;
          case 'success':
            analysisBtn.classList.add('success');
            setTimeout(() => {
              if (isAnalysisOpen) {
                analysisBtn.classList.remove('success');
                analysisBtn.innerHTML = '<span class="btn-text">СКРЫТЬ АНАЛИЗ</span>';
              }
            }, 2000);
            break;
          case 'pulse':
            analysisBtn.classList.add('pulse');
            break;
          default:
            if (isAnalysisOpen) {
              analysisBtn.innerHTML = '<span class="btn-text">СКРЫТЬ АНАЛИЗ</span>';
            } else {
              analysisBtn.innerHTML = '<span class="btn-text">АНАЛИЗ</span>';
            }
        }
      }

      function hideAnalyticsElements() {
        const chartsContainer = document.getElementById('chartsContainer');
        const statsContainer = document.getElementById('statsContainer');
        const tableContainer = document.getElementById('tableContainer');
        const yearlyComparisonContainer = document.getElementById('yearlyComparisonContainer');
        
        if (chartsContainer) {
          chartsContainer.classList.remove('loaded');
          setTimeout(() => { chartsContainer.style.display = 'none'; }, 300);
        }
        if (statsContainer) {
          statsContainer.classList.remove('loaded');
          setTimeout(() => { statsContainer.style.display = 'none'; }, 300);
        }
        if (tableContainer) {
          tableContainer.classList.remove('loaded');
          setTimeout(() => { tableContainer.style.display = 'none'; }, 300);
        }
        if (yearlyComparisonContainer) {
          yearlyComparisonContainer.classList.remove('loaded');
          setTimeout(() => { yearlyComparisonContainer.style.display = 'none'; }, 300);
        }
      }

      function showAnalyticsElements() {
        const chartsContainer = document.getElementById('chartsContainer');
        const statsContainer = document.getElementById('statsContainer');
        const tableContainer = document.getElementById('tableContainer');
        const yearlyComparisonContainer = document.getElementById('yearlyComparisonContainer');
        
        if (chartsContainer) {
          chartsContainer.style.display = 'grid';
          setTimeout(() => chartsContainer.classList.add('loaded'), 50);
        }
        if (statsContainer) {
          statsContainer.style.display = 'grid';
          setTimeout(() => statsContainer.classList.add('loaded'), 50);
        }
        if (tableContainer) {
          tableContainer.style.display = 'block';
          setTimeout(() => tableContainer.classList.add('loaded'), 50);
        }
        if (yearlyComparisonContainer) {
          yearlyComparisonContainer.style.display = 'block';
          setTimeout(() => yearlyComparisonContainer.classList.add('loaded'), 50);
        }
      }

      async function loadAnalyticsData() {
        if (analyticsLoaded && isAnalysisOpen) {
          showAnalyticsElements();
          return;
        }
        
        updateAnalysisButtonState('loading');
        
        try {
          if (!analyticsLoaded) {
            if (!dataCache[selectedDate]?.tableData) {
              await loadTableData();
            }
            await createYearlyComparisonChart();
            createCharts();
            updateStats();
          }
          
          analyticsLoaded = true;
          updateAnalysisButtonState('success');
          showAnalyticsElements();
        } catch (error) {
          console.error('Ошибка при загрузке аналитических данных:', error);
          analyticsLoaded = true;
          updateAnalysisButtonState('pulse');
          showAnalyticsElements();
        }
      }

      async function toggleCharts() {
        if (isAnalysisOpen) {
          hideAnalyticsElements();
          isAnalysisOpen = false;
          updateAnalysisButtonState('default');
        } else {
          updateAnalysisButtonState('pulse');
          isAnalysisOpen = true;
          await loadAnalyticsData();
        }
      }

      async function loadTableData() {
        try {
          if (dataCache[selectedDate]?.tableData) {
            populateTable(dataCache[selectedDate].tableData);
            return;
          }
          
          if (window.gapi?.client?.sheets) {
            const dateObj = new Date(selectedDate);
            const sheetName = getSheetNameFromDate(dateObj);
            const tableData = await loadTableDataFromSheets(sheetName);
            if (tableData.length > 0) {
              populateTable(tableData);
              return;
            }
          }
          
          const response = await fetch(`${CONFIG.BACKEND_URL}?date=${encodeURIComponent(selectedDate)}&table=true`, {
            method: 'GET',
            headers: { 'Accept': 'application/json' },
          });
          
          if (!response.ok) throw new Error('Ошибка сети');
          
          const text = await response.text();
          let data;
          try {
            data = JSON.parse(text);
          } catch (e) {
            throw new Error('Неверный формат ответа');
          }
          
          if (data.tableData) {
            populateTable(data.tableData);
          } else {
            populateDemoTable();
          }
          
          if (data.chartData) {
            machineFPS = data.chartData.fps || Array(14).fill(0);
          }
          
          if (data.totalStats) {
            monthlyErrors = data.totalStats.errors || 0;
            monthlyFPS = data.totalStats.fps || 0;
          }
        } catch (error) {
          console.error('Ошибка при загрузке данных таблицы:', error);
          populateDemoTable();
        }
      }

      // ===== ФУНКЦИИ СОХРАНЕНИЯ =====
      async function saveData() {
        const now = Date.now();
        if (now - lastSaveTime < SAVE_DEBOUNCE_TIME) return;
        lastSaveTime = now;
        
        showLoader();
        
        try {
          const changes = machineErrors.map((current, index) => current - originalErrors[index]);
          const hasChanges = changes.some(change => change !== 0);
          
          if (!hasChanges) {
            hideLoader();
            return;
          }
          
          const formData = new URLSearchParams();
          formData.append('date', selectedDate);
          formData.append('errors', JSON.stringify(changes));
          
          const response = await fetch(CONFIG.BACKEND_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData
          });
          
          const text = await response.text();
          let result;
          try {
            result = JSON.parse(text);
          } catch (e) {
            throw new Error('Неверный формат ответа');
          }
          
          if (result.success) {
            originalErrors = [...machineErrors];
            
            if (dataCache[selectedDate]) {
              dataCache[selectedDate].errors = [...machineErrors];
            }
            
            forceDisplayUpdate();
            
            if (analyticsLoaded && isAnalysisOpen) {
              if (errorsChart && fpsChart) updateCharts();
              await loadTableData();
              updateStats();
            }
            
            showSaveNotification();
          } else {
            throw new Error(result.error || 'Ошибка при сохранении');
          }
        } catch (error) {
          console.error('Ошибка:', error);
          alert('Ошибка при сохранении: ' + error.message);
        } finally {
          hideLoader();
        }
      }

      function showSaveNotification() {
        const saveBtn = document.querySelector('.save-btn');
        if (!saveBtn) return;
        
        const originalText = saveBtn.textContent;
        
        saveBtn.textContent = '✓ СОХРАНЕНО';
        saveBtn.style.background = '#28a745';
        
        setTimeout(() => {
          saveBtn.textContent = originalText;
          saveBtn.style.background = '#1a2f40';
        }, 2000);
      }

      // ===== ОСНОВНЫЕ ФУНКЦИИ =====
      function cancelChanges() {
        if (confirm('Отменить все несохраненные изменения?')) {
          machineErrors = [...originalErrors];
          forceDisplayUpdate();
          
          if (analyticsLoaded && isAnalysisOpen) {
            if (errorsChart && fpsChart) updateCharts();
            updateStats();
          }
        }
      }

      function initializeApp() {
        console.log('Инициализация приложения после авторизации');
        
        generateMachineCells();
        
        const dateInput = document.getElementById('date');
        if (dateInput) {
          dateInput.value = selectedDate;
        }
        
        // Показываем ленивый контент
        if (lazyContent) {
          lazyContent.style.display = 'block';
        }
        
        // Загружаем Chart.js асинхронно
        const chartScript = document.createElement('script');
        chartScript.src = 'https://cdn.jsdelivr.net/npm/chart.js';
        chartScript.async = true;
        chartScript.defer = true;
        chartScript.onload = function() {
          console.log('Chart.js загружен');
        };
        document.body.appendChild(chartScript);
        
        // Загружаем данные
        loadDataForDate(selectedDate);
      }

      // ===== ОБРАБОТЧИКИ СОБЫТИЙ =====
      document.addEventListener('click', function(e) {
        const userDropdown = document.getElementById('userDropdown');
        const userAvatar = document.getElementById('userAvatar');
        
        if (userDropdown && userAvatar && userDropdown.style.display === 'block' && 
            !userAvatar.contains(e.target) && !userDropdown.contains(e.target)) {
          userDropdown.style.display = 'none';
        }
      });

      document.getElementById('date')?.addEventListener('change', function(e) {
        const hasUnsavedChanges = machineErrors.some((current, index) => current !== originalErrors[index]);
        
        if (hasUnsavedChanges) {
          if (!confirm('У вас есть несохраненные изменения. Перейти к другой дате без сохранения?')) {
            this.value = selectedDate;
            return;
          }
        }
        
        selectedDate = e.target.value;
        analyticsLoaded = false;
        isAnalysisOpen = false;
        updateAnalysisButtonState('default');
        hideAnalyticsElements();
        loadDataForDate(selectedDate);
      });

      window.addEventListener('beforeunload', function(e) {
        const hasUnsavedChanges = machineErrors.some((current, index) => current !== originalErrors[index]);
        
        if (hasUnsavedChanges) {
          e.preventDefault();
          e.returnValue = 'У вас есть несохраненные изменения. Вы уверены, что хотите уйти?';
          return e.returnValue;
        }
      });

      // ===== ЭКСПОРТ ФУНКЦИЙ В ГЛОБАЛЬНУЮ ОБЛАСТЬ =====
      window.toggleUserDropdown = toggleUserDropdown;
      window.signOut = signOut;
      window.cancelChanges = cancelChanges;
      window.saveData = saveData;
      window.toggleCharts = toggleCharts;

      // ===== ПРОВЕРКА СОХРАНЕННОЙ СЕССИИ =====
      const isLoggedIn = localStorage.getItem('userLoggedIn') === 'true';
      const email = localStorage.getItem('userEmail');
      const name = localStorage.getItem('userName');
      const pic = localStorage.getItem('userPic');
      
      if (isLoggedIn && email) {
        loginSection.style.display = 'none';
        mainContent.style.display = 'block';
        
        currentUser = { email: email, name: name, picture: pic };
        
        updateUserAvatar(currentUser);
        
        // Показываем ленивый контент
        if (lazyContent) {
          lazyContent.style.display = 'block';
        }
        
        setTimeout(() => {
          loadingScreen.classList.add('fade-out');
        }, 500);
        
        generateMachineCells();
        document.getElementById('date').value = selectedDate;
        
        // Загружаем Chart.js асинхронно
        const chartScript = document.createElement('script');
        chartScript.src = 'https://cdn.jsdelivr.net/npm/chart.js';
        chartScript.async = true;
        chartScript.defer = true;
        document.body.appendChild(chartScript);
        
        // Загружаем данные
        loadDataForDate(selectedDate);
      } else {
        loginSection.style.display = 'flex';
        
        setTimeout(() => {
          loadingScreen.classList.add('fade-out');
        }, 500);
      }

      // Инициализация Google Sign-In при загрузке
      window.onload = function() {
        if (window.google && google.accounts && google.accounts.id) {
          google.accounts.id.initialize({
            client_id: '328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com',
            callback: handleCredentialResponse
          });
          
          google.accounts.id.renderButton(
            document.querySelector('.g_id_signin'),
            { 
              type: 'standard', 
              shape: 'pill', 
              theme: 'outline', 
              text: 'signin_with', 
              size: 'large',
              logo_alignment: 'left'
            }
          );
        }
      };
    })();
  </script>
