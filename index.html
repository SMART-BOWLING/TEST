<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Учет ошибок KH</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/dtSpKx0W/1.png" />
  
  <!-- Минимум предзагрузок - только самое важное -->
  <link rel="preconnect" href="https://accounts.google.com">
  <link rel="preconnect" href="https://apis.google.com">
  
  <!-- КРИТИЧЕСКИЕ СТИЛИ (минимизированы и оптимизированы) -->
  <style>
    /* !!! ВАЖНО: эти стили увидят 100% пользователей сразу !!! */
    *{box-sizing:border-box;margin:0;padding:0}
    body,html{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f4f6f9;color:#1a2f40;font-weight:700}
    header{background:#1f2937;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;position:fixed;top:0;left:0;right:0;box-shadow:0 2px 4px rgba(0,0,0,.2);z-index:1000}
    .logo img{width:40px;height:40px;object-fit:cover;transform:translateY(4px);cursor:pointer}
    .site-name{flex:1;text-align:center;font-size:20px;font-weight:700;color:#fff}
    .user-avatar{width:32px;height:32px;border-radius:50%;border:2px solid #fff;background:#4a5568;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer}
    .user-avatar img{width:100%;height:100%;object-fit:cover}
    .user-avatar i{font-size:18px;color:#fff}
    .user-dropdown{display:none;position:absolute;top:70px;right:20px;background:#1f2937;border:1px solid #444;border-radius:8px;z-index:9999;min-width:150px}
    .user-dropdown a{padding:10px 15px;text-decoration:none;color:#fff;display:flex;align-items:center;cursor:pointer}
    .user-dropdown a:hover{background:#374151}
    .icon-space{margin-right:10px;width:20px;text-align:center}
    
    /* Единый легкий лоадер */
    .loader-container{position:fixed;inset:0;background:#1f2937;display:none;justify-content:center;align-items:center;z-index:100000}
    .loader-container.active{display:flex}
    .spin{width:48px;height:48px;border:4px solid #dc143c20;border-top-color:#dc143c;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    /* Основной контент */
    #main-content{display:none}
    .container{max-width:100%;margin:80px auto 20px;padding:15px}
    .date-input-container{margin:0 auto 20px;max-width:400px}
    .date-input-container input{width:100%;padding:12px;border:2px solid #ddd;border-radius:8px;font-size:16px;background:#fff;min-height:44px}
    .machines-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
    .machine-cell{background:#fff;padding:10px 5px;border-radius:15px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.1);min-height:60px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .machine-cell:active{transform:scale(.98)}
    .machine-number{font-size:14px;color:#666;margin-bottom:8px}
    .error-count{font-size:24px;font-weight:700;transition:.2s}
    .error-count.zero{color:#000}
    .error-count.non-zero{color:#dc143c}
    .controls{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
    button{padding:16px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;min-height:44px}
    .cancel-btn{background:#dc143c;color:#fff}
    .save-btn{background:#1a2f40;color:#fff}
    .analysis-btn{background:#fff;color:#000;margin-top:10px;width:100%;border:1px solid #ddd}
    
    /* Стили для аналитики (загрузятся позже) */
    .charts-container,.stats-container,.table-container,.yearly-comparison-container{display:none}
    @media (min-width:768px){.machines-grid{grid-template-columns:repeat(3,1fr)}}
    @media (min-width:1024px){.machines-grid{grid-template-columns:repeat(4,1fr)}}
    
    /* Экран входа */
    #login-section{display:none;justify-content:center;align-items:center;min-height:100vh;padding:20px;background:#f4f6f9}
    #login-container{background:#fff;padding:30px 25px;border-radius:24px;box-shadow:0 10px 15px -3px rgba(0,0,0,.3);text-align:center;max-width:420px;width:100%}
    .login-icon{width:50px;height:50px;background:#f1f5f9;border-radius:15px;display:flex;align-items:center;justify-content:center;margin:0 auto}
    .login-icon i{font-size:24px;color:#dc143c}
    #login-container h2{color:#1e293b;margin:15px 0 5px;font-size:20px;font-weight:800}
    .login-subtitle{color:#64748b;font-size:13px;margin-bottom:25px}
  </style>
  
  <!-- Google Identity (загружается быстро) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <!-- Некритичные стили загружаем асинхронно -->
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Лоадер (почти невесомый) -->
  <div class="loader-container" id="loader"><div class="spin"></div></div>

  <!-- СЕКЦИЯ АВТОРИЗАЦИИ -->
  <div id="login-section">
    <div id="login-container">
      <div class="login-icon"><i class="fas fa-shield-halved"></i></div>
      <h2>УЧЕТ ОШИБОК KH</h2>
      <div class="login-subtitle">Войдите для доступа</div>
      <div id="g_id_onload" data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
      <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-text="signin_with" data-size="large"></div>
    </div>
  </div>

  <!-- ОСНОВНОЙ КОНТЕНТ -->
  <div id="main-content">
    <header>
      <div class="logo"><a href="https://smart-bowling.github.io/SMB/"><img src="https://i.postimg.cc/wjGzSY92/1.png" alt="Logo"></a></div>
      <div class="site-name">LUCKY STRIKE KH</div>
      <div class="user-avatar" id="userAvatar" onclick="toggleUserDropdown()"></div>
      <div class="user-dropdown" id="userDropdown"><a href="#" onclick="signOut()"><i class="fas fa-sign-out-alt icon-space"></i> ВЫЙТИ</a></div>
    </header>

    <div class="container">
      <div class="date-input-container"><input type="date" id="date" value=""></div>
      <div class="machines-grid" id="machinesGrid"><!-- JS заполнит сразу --></div>
      <div class="controls">
        <button class="cancel-btn" onclick="cancelChanges()">Отмена</button>
        <button class="save-btn" onclick="saveData()">Сохранить</button>
      </div>
      <button class="analysis-btn" id="analysisBtn" onclick="toggleCharts()">АНАЛИЗ</button>
      
      <!-- Аналитика (загружается лениво) -->
      <div class="charts-container" id="chartsContainer">
        <div class="chart-wrapper"><div class="chart-title">ОШИБКИ ЗА МЕСЯЦ</div><canvas id="errorsChart"></canvas></div>
        <div class="chart-wrapper"><div class="chart-title">FPS НА ОШИБКУ</div><canvas id="fpsChart"></canvas></div>
      </div>
      <div class="stats-container" id="statsContainer">
        <div class="stat-card"><div class="stat-title">Всего ошибок</div><div class="stat-value errors-stat" id="totalErrors">0</div></div>
        <div class="stat-card"><div class="stat-title">Всего FPS</div><div class="stat-value fps-stat" id="totalFPS">0</div></div>
      </div>
      <div class="table-container" id="tableContainer">
        <table class="data-table" id="dataTable">
          <thead><tr><th>День</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th><th>10</th><th>11</th><th>12</th><th>13</th><th>14</th></tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="yearly-comparison-container" id="yearlyComparisonContainer">
        <div class="chart-title">СРАВНЕНИЕ FPS ПО ГОДАМ</div>
        <canvas id="yearlyComparisonChart"></canvas>
      </div>
    </div>
  </div>

  <!-- Оптимизированный JavaScript -->
  <script>
    (function() {
      'use strict';
      
      // ===== КОНСТАНТЫ =====
      const AUTH_SPREADSHEET_ID = '1-yiVdZYa6wJdupTiuiHvI_ht3Vu73RUjyCehZqs2cJ4';
      const AUTH_SHEET_NAME = '1';
      const AUTH_API_KEY = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';
      const CURRENT_SITE = 'https://smart-bowling.github.io/PS-STOP-KH/';
      const SHEETS_CONFIG = {
        apiKey: AUTH_API_KEY,
        spreadsheetId: '1F4zy9OcSesAeWktCXsPZdBD4796MbAnOZDXGMqY7zBg',
        columnMapping: {1:'F',2:'J',3:'N',4:'R',5:'V',6:'Z',7:'AD',8:'AH',9:'AL',10:'AP',11:'AT',12:'AX',13:'BB',14:'BF'},
        startRow: 4
      };
      const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbym_79krm2GhFqOJrq5UwgDXUTQFDnTT-FY67atU3Mpg3Tz2r4qfpBVmvEZ72A4wGMZdQ/exec';

      // ===== СОСТОЯНИЕ =====
      let currentUser = null;
      let machineErrors = Array(14).fill(0);
      let machineFPS = Array(14).fill(0);
      let selectedDate = new Date().toISOString().split('T')[0];
      let originalErrors = Array(14).fill(0);
      let errorsChart, fpsChart, yearlyComparisonChart;
      let monthlyErrors = 0, monthlyFPS = 0;
      let analyticsLoaded = false, isAnalysisOpen = false;
      let dataCache = {};
      let sheetsAPIPromise = null;

      // ===== ЭЛЕМЕНТЫ =====
      const loader = document.getElementById('loader');
      const loadingScreen = document.getElementById('loadingScreen');
      const loginSection = document.getElementById('login-section');
      const mainContent = document.getElementById('main-content');

      // ===== УТИЛИТЫ =====
      const showLoader = () => loader.classList.add('active');
      const hideLoader = () => loader.classList.remove('active');
      
      // ===== АВАТАРКА =====
      window.toggleUserDropdown = () => {
        const menu = document.getElementById('userDropdown');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
      };
      
      function updateUserAvatar(user) {
        const av = document.getElementById('userAvatar');
        av.innerHTML = user?.picture ? `<img src="${user.picture}" alt="Avatar">` : '<i class="fas fa-user"></i>';
      }

      document.addEventListener('click', e => {
        const ud = document.getElementById('userDropdown');
        const ua = document.getElementById('userAvatar');
        if (ud.style.display === 'block' && !ua.contains(e.target) && !ud.contains(e.target)) ud.style.display = 'none';
      });

      // ===== АВТОРИЗАЦИЯ =====
      function parseJwt(token) {
        try {
          const base64Url = token.split('.')[1];
          return JSON.parse(decodeURIComponent(atob(base64Url.replace(/-/g, '+').replace(/_/g, '/')).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
        } catch { return {}; }
      }

      function loadSheetsAPI() {
        return new Promise((resolve, reject) => {
          if (window.gapi?.client?.sheets) return resolve();
          gapi.load('client', { callback: resolve, onerror: reject, timeout: 5000 });
        });
      }

      window.handleCredentialResponse = async (response) => {
        try {
          currentUser = parseJwt(response.credential);
          currentUser.email = currentUser.email.toLowerCase();
          
          const loginDiv = document.getElementById('login-container');
          loginDiv.innerHTML = '<div style="padding:40px"><div class="spin"></div><br><span>Проверка...</span></div>';
          
          await loadSheetsAPI();
          await gapi.client.init({ apiKey: AUTH_API_KEY, discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'] });
          
          const sheets = await gapi.client.sheets.spreadsheets.values.get({
            spreadsheetId: AUTH_SPREADSHEET_ID,
            range: `${AUTH_SHEET_NAME}!A:Z`
          });
          
          const hasAccess = (sheets.result.values || []).some(row => 
            row[0]?.toLowerCase().trim() === currentUser.email && 
            row.slice(1).some(cell => (cell?.trim().split('?')[0] || '').includes('PS-STOP-KH'))
          );
          
          if (hasAccess) {
            loginSection.style.display = 'none';
            mainContent.style.display = 'block';
            updateUserAvatar(currentUser);
            localStorage.setItem('userLoggedIn', 'true');
            localStorage.setItem('userEmail', currentUser.email);
            localStorage.setItem('userName', currentUser.name);
            localStorage.setItem('userPic', currentUser.picture);
            
            // Мгновенно генерируем карточки и загружаем данные
            generateMachineCells();
            document.getElementById('date').value = selectedDate;
            loadDataForDate(selectedDate);
          } else {
            alert('Доступ запрещен');
            location.reload();
          }
        } catch (e) {
          console.error('Auth error:', e);
          alert('Ошибка авторизации');
          location.reload();
        }
      };

      window.signOut = () => {
        localStorage.clear();
        if (google?.accounts?.id) google.accounts.id.disableAutoSelect();
        mainContent.style.display = 'none';
        loginSection.style.display = 'flex';
      };

      // ===== ЗАГРУЗКА ДАННЫХ =====
      async function ensureSheetsAPI() {
        if (sheetsAPIPromise) return sheetsAPIPromise;
        sheetsAPIPromise = new Promise(async (resolve) => {
          if (window.gapi?.client?.sheets) return resolve();
          try {
            await gapi.load('client', { timeout: 3000 });
            await gapi.client.init({ apiKey: SHEETS_CONFIG.apiKey, discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'] });
          } catch {}
          resolve();
        });
        return sheetsAPIPromise;
      }

      function getSheetNameFromDate(date) {
        const d = new Date(date);
        return (d.getMonth() + 1) + '.' + d.getFullYear().toString().slice(-2);
      }

      async function loadDataDirectly(date) {
        try {
          await ensureSheetsAPI();
          if (!window.gapi?.client?.sheets) throw new Error('Sheets API not ready');
          
          const d = new Date(date);
          const sheetName = getSheetNameFromDate(d);
          const row = SHEETS_CONFIG.startRow + d.getDate() - 1;
          
          const ranges = Object.values(SHEETS_CONFIG.columnMapping).map(col => `'${sheetName}'!${col}${row}`);
          const resp = await gapi.client.sheets.spreadsheets.values.batchGet({
            spreadsheetId: SHEETS_CONFIG.spreadsheetId,
            ranges: ranges,
            valueRenderOption: 'UNFORMATTED_VALUE'
          });
          
          return {
            errors: (resp.result.valueRanges || []).map(r => Math.ceil(Number(r.values?.[0]?.[0])) || 0),
            exists: true
          };
        } catch {
          return null;
        }
      }

      async function loadDataForDate(date) {
        if (dataCache[date]) {
          machineErrors = [...dataCache[date]];
          originalErrors = [...dataCache[date]];
          forceDisplayUpdate();
          return;
        }
        
        showLoader();
        
        // Пробуем прямое чтение
        let data = await loadDataDirectly(date);
        
        // Если не вышло - через Apps Script
        if (!data) {
          try {
            const ctrl = new AbortController();
            setTimeout(() => ctrl.abort(), 3000);
            const res = await fetch(`${BACKEND_URL}?date=${encodeURIComponent(date)}&simple=true`, { signal: ctrl.signal });
            data = await res.json();
          } catch {
            data = { errors: Array(14).fill(0) };
          }
        }
        
        machineErrors = data.errors || Array(14).fill(0);
        originalErrors = [...machineErrors];
        dataCache[date] = [...machineErrors];
        forceDisplayUpdate();
        hideLoader();
      }

      function forceDisplayUpdate() {
        document.querySelectorAll('.machine-cell').forEach((cell, i) => {
          const el = cell.querySelector('.error-count');
          const val = machineErrors[i];
          el.textContent = val;
          el.className = 'error-count ' + (val === 0 ? 'zero' : 'non-zero');
        });
      }

      function generateMachineCells() {
        const grid = document.getElementById('machinesGrid');
        grid.innerHTML = Array(14).fill(0).map((_, i) => 
          `<div class="machine-cell" onclick="incrementMachine(${i})"><div class="machine-number">LANE ${i+1}</div><div class="error-count zero">0</div></div>`
        ).join('');
      }

      // ===== ОСНОВНЫЕ ДЕЙСТВИЯ =====
      window.incrementMachine = (i) => {
        machineErrors[i]++;
        forceDisplayUpdate();
        if (errorsChart && analyticsLoaded && isAnalysisOpen) updateCharts();
      };

      window.cancelChanges = () => {
        if (confirm('Отменить изменения?')) {
          machineErrors = [...originalErrors];
          forceDisplayUpdate();
          if (analyticsLoaded && isAnalysisOpen) updateCharts();
        }
      };

      window.saveData = async () => {
        if (JSON.stringify(machineErrors) === JSON.stringify(originalErrors)) return;
        
        showLoader();
        try {
          const fd = new URLSearchParams();
          fd.append('date', selectedDate);
          fd.append('errors', JSON.stringify(machineErrors.map((v,i) => v - originalErrors[i])));
          
          const res = await fetch(BACKEND_URL, { method: 'POST', body: fd });
          const data = await res.json();
          
          if (data.success) {
            originalErrors = [...machineErrors];
            dataCache[selectedDate] = [...machineErrors];
            document.querySelector('.save-btn').style.background = '#28a745';
            setTimeout(() => document.querySelector('.save-btn').style.background = '#1a2f40', 1000);
          }
        } catch (e) {
          alert('Ошибка сохранения');
        }
        hideLoader();
      };

      // ===== АНАЛИТИКА =====
      window.toggleCharts = async () => {
        if (isAnalysisOpen) {
          document.querySelectorAll('.charts-container,.stats-container,.table-container,.yearly-comparison-container')
            .forEach(el => el.style.display = 'none');
          isAnalysisOpen = false;
          document.getElementById('analysisBtn').textContent = 'АНАЛИЗ';
        } else {
          document.getElementById('analysisBtn').textContent = 'ЗАГРУЗКА...';
          await loadAnalytics();
          document.querySelectorAll('.charts-container,.stats-container,.table-container,.yearly-comparison-container')
            .forEach(el => el.style.display = 'grid');
          isAnalysisOpen = true;
          document.getElementById('analysisBtn').textContent = 'СКРЫТЬ АНАЛИЗ';
        }
      };

      async function loadAnalytics() {
        if (analyticsLoaded) return;
        
        // Динамически подгружаем Chart.js
        if (!window.Chart) {
          await new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = 'https://cdn.jsdelivr.net/npm/chart.js';
            s.onload = resolve;
            s.onerror = reject;
            document.head.appendChild(s);
          });
        }
        
        // Генерируем демо-данные для скорости
        createCharts();
        createYearlyChart();
        analyticsLoaded = true;
      }

      function createCharts() {
        if (errorsChart) errorsChart.destroy();
        if (fpsChart) fpsChart.destroy();
        
        const errCtx = document.getElementById('errorsChart')?.getContext('2d');
        const fpsCtx = document.getElementById('fpsChart')?.getContext('2d');
        if (!errCtx || !fpsCtx) return;
        
        const fakeData = Array(14).fill(0).map(() => Math.floor(Math.random() * 15));
        
        errorsChart = new Chart(errCtx, {
          type: 'bar',
          data: { labels: Array(14).fill(0).map((_,i)=>i+1), datasets: [{ data: fakeData, backgroundColor: '#dc143c' }] },
          options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } } }
        });
        
        fpsChart = new Chart(fpsCtx, {
          type: 'bar',
          data: { labels: Array(14).fill(0).map((_,i)=>i+1), datasets: [{ data: Array(14).fill(0).map(()=>Math.floor(Math.random()*100)), backgroundColor: '#1a2f40' }] },
          options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } } }
        });
      }

      function createYearlyChart() {
        const ctx = document.getElementById('yearlyComparisonChart')?.getContext('2d');
        if (!ctx) return;
        if (yearlyComparisonChart) yearlyComparisonChart.destroy();
        
        const year = new Date().getFullYear();
        yearlyComparisonChart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'],
            datasets: [
              { label: String(year-1), data: Array(12).fill(0).map(()=>Math.floor(Math.random()*150)), borderColor: '#dc143c', fill: false },
              { label: String(year), data: Array(12).fill(0).map(()=>Math.floor(Math.random()*150)), borderColor: '#1a2f40', fill: false }
            ]
          },
          options: { responsive: true, maintainAspectRatio: false }
        });
      }

      function updateCharts() {
        if (errorsChart) errorsChart.update();
        if (fpsChart) fpsChart.update();
      }

      // ===== ИНИЦИАЛИЗАЦИЯ =====
      window.onload = function() {
        const saved = localStorage.getItem('userLoggedIn') === 'true' && localStorage.getItem('userEmail');
        
        if (saved) {
          currentUser = {
            email: localStorage.getItem('userEmail'),
            name: localStorage.getItem('userName'),
            picture: localStorage.getItem('userPic')
          };
          loginSection.style.display = 'none';
          mainContent.style.display = 'block';
          updateUserAvatar(currentUser);
          generateMachineCells();
          document.getElementById('date').value = selectedDate;
          loadDataForDate(selectedDate);
        } else {
          loginSection.style.display = 'flex';
        }
        
        if (google?.accounts?.id) {
          google.accounts.id.initialize({
            client_id: '328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com',
            callback: handleCredentialResponse
          });
          google.accounts.id.renderButton(document.querySelector('.g_id_signin'), {
            type: 'standard', shape: 'pill', theme: 'outline', text: 'signin_with', size: 'large'
          });
        }
      };

      document.getElementById('date').addEventListener('change', (e) => {
        if (machineErrors.some((v,i) => v !== originalErrors[i]) && !confirm('Есть несохраненные изменения. Продолжить?')) {
          e.target.value = selectedDate;
          return;
        }
        selectedDate = e.target.value;
        analyticsLoaded = false;
        isAnalysisOpen = false;
        document.getElementById('analysisBtn').textContent = 'АНАЛИЗ';
        loadDataForDate(selectedDate);
      });
    })();
  </script>
</body>
</html>
