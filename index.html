  <!-- Основной скрипт приложения с async -->
  <script async>
    // Обёртка для всего кода приложения, чтобы не блокировать загрузку
    (function() {
      // Все переменные и функции из оригинального скрипта
      // ===== КОНСТАНТЫ =====
      const AUTH_SPREADSHEET_ID = '1-yiVdZYa6wJdupTiuiHvI_ht3Vu73RUjyCehZqs2cJ4';
      const AUTH_SHEET_NAME = '1';
      const AUTH_API_KEY = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';
      
      const CURRENT_SITE = 'https://smart-bowling.github.io/PS-STOP-KH/';
      
      const SHEETS_CONFIG = {
        apiKey: AUTH_API_KEY,
        spreadsheetId: '1F4zy9OcSesAeWktCXsPZdBD4796MbAnOZDXGMqY7zBg',
        columnMapping: {
          1: 'F', 2: 'J', 3: 'N', 4: 'R', 5: 'V', 6: 'Z', 
          7: 'AD', 8: 'AH', 9: 'AL', 10: 'AP', 11: 'AT', 
          12: 'AX', 13: 'BB', 14: 'BF'
        },
        startRow: 4
      };
      
      const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbym_79krm2GhFqOJrq5UwgDXUTQFDnTT-FY67atU3Mpg3Tz2r4qfpBVmvEZ72A4wGMZdQ/exec';

      // Переменные состояния
      let currentUser = null;
      let machineErrors = Array(14).fill(0);
      let machineFPS = Array(14).fill(0);
      let selectedDate = new Date().toISOString().split('T')[0];
      let originalErrors = Array(14).fill(0);
      
      let errorsChart = null;
      let fpsChart = null;
      let yearlyComparisonChart = null;
      
      let monthlyErrors = 0;
      let monthlyFPS = 0;
      
      let analyticsLoaded = false;
      let isAnalysisOpen = false;
      let isDataLoaded = false;
      
      let dataCache = {};
      let lastSaveTime = 0;
      const SAVE_DEBOUNCE_TIME = 1000;

      // Получаем элементы
      const loadingScreen = document.getElementById("loadingScreen");
      const loginSection = document.getElementById("login-section");
      const mainContent = document.getElementById("main-content");
      const loader = document.getElementById("loader");

      // ===== ФУНКЦИИ =====
      function showLoader() {
        loader.style.display = 'flex';
      }

      function hideLoader() {
        loader.style.display = 'none';
      }

      function toggleUserDropdown() {
        const menu = document.getElementById("userDropdown");
        menu.style.display = menu.style.display === "block" ? "none" : "block";
      }

      function updateUserAvatar(user) {
        const avatarContainer = document.getElementById('userAvatar');
        if (user?.picture) {
          avatarContainer.innerHTML = `<img src="${user.picture}" alt="Avatar">`;
        } else {
          avatarContainer.innerHTML = '<i class="fas fa-user"></i>';
        }
      }

      document.addEventListener('click', function(e) {
        const userDropdown = document.getElementById("userDropdown");
        const userAvatar = document.getElementById("userAvatar");
        
        if (userDropdown.style.display === 'block' && !userAvatar.contains(e.target) && !userDropdown.contains(e.target)) {
          userDropdown.style.display = 'none';
        }
      });

      function parseJwt(token) {
        try {
          const base64Url = token.split('.')[1];
          const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
          const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
          }).join(''));
          return JSON.parse(jsonPayload);
        } catch (e) {
          console.error('Ошибка парсинга JWT:', e);
          return {};
        }
      }

      function handleCredentialResponse(response) {
        try {
          const payload = parseJwt(response.credential);
          
          currentUser = {
            email: payload.email.toLowerCase().trim(),
            name: payload.name,
            picture: payload.picture
          };
          
          showLoading(true);
          initAndCheckEmail();
          
        } catch (e) {
          console.error('Ошибка аутентификации:', e);
          showLoading(false);
          alert('Ошибка аутентификации');
        }
      }

      function showLoading(show) {
        const loginDiv = document.getElementById('login-container');
        if (show) {
          if (!loginDiv.hasAttribute('data-original')) {
            loginDiv.setAttribute('data-original', loginDiv.innerHTML);
          }
          loginDiv.innerHTML = '<div style="padding: 40px; text-align: center;"><div class="loading-spinner" style="display:inline-block; width:40px; height:40px; border:4px solid rgba(220,20,60,0.2); border-radius:50%; border-top-color:#dc143c; animation:spin 1s ease-in-out infinite;"></div><br><span style="color: #64748b; margin-top: 15px; display: block;">Проверка доступа...</span></div>';
        } else {
          if (loginDiv.getAttribute('data-original') && loginSection.style.display !== 'none') {
            loginDiv.innerHTML = loginDiv.getAttribute('data-original');
            
            if (window.google && google.accounts && google.accounts.id) {
              google.accounts.id.renderButton(
                document.querySelector('.g_id_signin'),
                { 
                  type: 'standard', 
                  shape: 'pill', 
                  theme: 'outline', 
                  text: 'signin_with', 
                  size: 'large', 
                  logo_alignment: 'left' 
                }
              );
            }
          }
        }
      }

      function loadSheetsAPI() {
        return new Promise((resolve, reject) => {
          if (window.gapi && gapi.load) {
            gapi.load('client', {
              callback: () => resolve(),
              onerror: () => reject('Ошибка загрузки Google API'),
              timeout: 10000,
              ontimeout: () => reject('Таймаут загрузки Google API')
            });
          } else {
            reject('gapi не доступен');
          }
        });
      }

      async function initAndCheckEmail() {
        try {
          await loadSheetsAPI();
          await gapi.client.init({
            apiKey: AUTH_API_KEY,
            discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
          });
          
          await checkEmailInSheet(currentUser.email);
          
        } catch (error) {
          console.error('Ошибка инициализации:', error);
          showLoading(false);
          alert('Ошибка инициализации Google API');
        }
      }

      async function checkEmailInSheet(email) {
        try {
          const response = await gapi.client.sheets.spreadsheets.values.get({
            spreadsheetId: AUTH_SPREADSHEET_ID,
            range: `${AUTH_SHEET_NAME}!A:Z`,
          });
          
          const rows = response.result.values;
          if (!rows || rows.length === 0) {
            showLoading(false);
            alert('Таблица пуста');
            return;
          }
          
          let hasAccess = false;
          
          for (let i = 0; i < rows.length; i++) {
            if (!rows[i]?.[0]) continue;
            
            const rowEmail = rows[i][0].toLowerCase().trim();
            if (rowEmail === email) {
              for (let j = 1; j < rows[i].length; j++) {
                const siteUrl = rows[i][j]?.trim().split('?')[0].split('#')[0] || '';
                if (siteUrl === CURRENT_SITE || siteUrl.includes('PS-STOP-KH')) {
                  hasAccess = true;
                  break;
                }
              }
              break;
            }
          }
          
          if (hasAccess) {
            loginUser(currentUser);
          } else {
            showLoading(false);
            alert('Доступ запрещен: Ваш email не найден в таблице или нет прав для этого сайта');
          }
          
        } catch (error) {
          console.error('Ошибка доступа к таблице:', error);
          showLoading(false);
          alert('Ошибка доступа к таблице');
        }
      }

      function loginUser(payload) {
        loginSection.style.display = 'none';
        mainContent.style.display = 'block';
        
        updateUserAvatar(payload);
        
        localStorage.setItem('userLoggedIn', 'true');
        localStorage.setItem('userEmail', payload.email.toLowerCase());
        localStorage.setItem('userName', payload.name);
        localStorage.setItem('userPic', payload.picture);
        
        showLoading(false);
        
        setTimeout(() => {
          loadingScreen.classList.add('fade-out');
        }, 500);
        
        // Инициализация приложения
        initializeApp();
      }

      function signOut() {
        localStorage.clear();
        sessionStorage.clear();
        
        if (google && google.accounts && google.accounts.id) {
          google.accounts.id.disableAutoSelect();

      function getSheetNameFromDate(date) {
        const month = date.getMonth() + 1;
        const year = date.getFullYear().toString().slice(-2);
        return month + '.' + year;
      }

      async function loadTableDataFromSheets(sheetName) {
        try {
          const response = await gapi.client.sheets.spreadsheets.values.get({
            spreadsheetId: SHEETS_CONFIG.spreadsheetId,
            range: `'${sheetName}'!B4:BF34`,
            valueRenderOption: 'FORMATTED_VALUE'
          });
          
          const rows = response.result.values || [];
          const tableData = [];
          
          const errorIndices = [4, 8, 12, 16, 20, 24, 28, 32, 36, 40, 44, 48, 52, 56];
          
          rows.forEach(row => {
            if (!row[0]) return;
            
            const dayValue = row[0];
            let dayNumber;
            
            if (typeof dayValue === 'string') {
              const match = dayValue.match(/^(\d+)/);
              dayNumber = match ? parseInt(match[1]) : dayValue;
            } else {
              dayNumber = dayValue;
            }
            
            const rowData = {
              day: dayNumber,
              errors: []
            };
            
            errorIndices.forEach(index => {
              const value = row[index] || 0;
              rowData.errors.push(Math.ceil(Number(value)) || 0);
            });
            
            tableData.push(rowData);
          });
          
          tableData.sort((a, b) => {
            const dayA = parseInt(a.day) || 0;
            const dayB = parseInt(b.day) || 0;
            return dayA - dayB;
          });
          
          return tableData;
          
        } catch (error) {
          console.error('Ошибка при чтении таблицы:', error);
          return [];
        }
      }

      async function loadDataDirectlyFromSheets(date) {
        console.log('Чтение напрямую из Sheets для даты:', date);
        
        try {
          const dateObj = new Date(date);
          const sheetName = getSheetNameFromDate(dateObj);
          const day = dateObj.getDate();
          const row = SHEETS_CONFIG.startRow + day - 1;
          
          if (!window.gapi?.client?.sheets) {
            throw new Error('Sheets API не инициализирован');
          }
          
          const ranges = [];
          for (let i = 1; i <= 14; i++) {
            ranges.push(`'${sheetName}'!${SHEETS_CONFIG.columnMapping[i]}${row}`);
          }
          
          const response = await gapi.client.sheets.spreadsheets.values.batchGet({
            spreadsheetId: SHEETS_CONFIG.spreadsheetId,
            ranges: ranges,
            valueRenderOption: 'UNFORMATTED_VALUE'
          });
          
          const errors = response.result.valueRanges.map(range => {
            const value = range.values?.[0]?.[0] || 0;
            return Math.ceil(Number(value)) || 0;
          });
          
          const chartRanges = [];
          for (let i = 1; i <= 14; i++) {
            chartRanges.push(`'${sheetName}'!${SHEETS_CONFIG.columnMapping[i]}35`);
            chartRanges.push(`'${sheetName}'!${SHEETS_CONFIG.columnMapping[i]}36`);
          }
          
          const chartResponse = await gapi.client.sheets.spreadsheets.values.batchGet({
            spreadsheetId: SHEETS_CONFIG.spreadsheetId,
            ranges: chartRanges,
            valueRenderOption: 'UNFORMATTED_VALUE'
          });
          
          const chartErrors = [];
          const chartFPS = [];
          for (let i = 0; i < 14; i++) {
            const errorValue = chartResponse.result.valueRanges[i*2]?.values?.[0]?.[0] || 0;
            const fpsValue = chartResponse.result.valueRanges[i*2 + 1]?.values?.[0]?.[0] || 0;
            chartErrors.push(Math.ceil(Number(errorValue)) || 0);
            chartFPS.push(Math.ceil(Number(fpsValue)) || 0);
          }
          
          const statsResponse = await gapi.client.sheets.spreadsheets.values.batchGet({
            spreadsheetId: SHEETS_CONFIG.spreadsheetId,
            ranges: [
              `'${sheetName}'!BO35`,
              `'${sheetName}'!BP35`
            ],
            valueRenderOption: 'UNFORMATTED_VALUE'
          });
          
          const totalErrors = Math.ceil(Number(statsResponse.result.valueRanges[0]?.values?.[0]?.[0])) || 0;
          const totalFPS = Math.ceil(Number(statsResponse.result.valueRanges[1]?.values?.[0]?.[0])) || 0;
          
          const tableData = await loadTableDataFromSheets(sheetName);
          
          return {
            errors: errors,
            exists: true,
            chartData: {
              errors: chartErrors,
              fps: chartFPS
            },
            totalStats: {
              errors: totalErrors,
              fps: totalFPS
            },
            tableData: tableData
          };
          
        } catch (error) {
          console.error('Ошибка при чтении из Sheets:', error);
          if (error.status === 404 || error.status === 400) {
            return {
              errors: Array(14).fill(0),
              exists: false,
              chartData: {
                errors: Array(14).fill(0),
                fps: Array(14).fill(0)
              },
              totalStats: {
                errors: 0,
                fps: 0
              },
              tableData: []
            };
          }
          throw error;
        }
      }

      async function loadDataViaAppsScript(date) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => {
          console.log('Таймаут загрузки данных');
          controller.abort();
        }, 8000);
        
        const response = await fetch(`${BACKEND_URL}?date=${encodeURIComponent(date)}&simple=true`, {
          signal: controller.signal,
          headers: { 'Accept': 'application/json' },
        });
        
        clearTimeout(timeoutId);
        
        if (!response.ok) {
          throw new Error(`Ошибка сервера: ${response.status}`);
        }
        
        return await response.json();
      }

      async function loadDataForDate(date, retryCount = 0) {
        const MAX_RETRIES = 3;
        console.log('Загрузка данных для даты:', date, 'попытка:', retryCount + 1);
        
        if (dataCache[date]) {
          console.log('Используем кэшированные данные');
          applyCachedData(dataCache[date]);
          return;
        }
        
        showLoader();
        
        try {
          let data;
          
          if (window.gapi?.client?.sheets) {
            try {
              data = await loadDataDirectlyFromSheets(date);
              console.log('Данные получены напрямую из Sheets');
            } catch (sheetsError) {
              console.warn('Не удалось прочитать напрямую, пробуем через Apps Script:', sheetsError);
              data = await loadDataViaAppsScript(date);
            }
          } else {
            data = await loadDataViaAppsScript(date);
          }
          
          dataCache[date] = data;
          applyCachedData(data);
          
        } catch (error) {
          console.error('Ошибка загрузки данных:', error);
          
          if (retryCount < MAX_RETRIES) {
            console.log(`Повторная попытка через ${1000 * (retryCount + 1)}мс`);
            setTimeout(() => {
              loadDataForDate(date, retryCount + 1);
            }, 1000 * (retryCount + 1));
          } else {
            console.log('Все попытки исчерпаны, используем данные по умолчанию');
            applyDefaultData();
          }
        } finally {
          hideLoader();
        }
      }

      function applyCachedData(data) {
        if (data.errors) {
          machineErrors = data.errors;
          originalErrors = [...data.errors];
          console.log('Применяем кэшированные ошибки:', machineErrors);
          forceDisplayUpdate();
        }
        
        if (data.chartData) {
          machineFPS = data.chartData.fps || Array(14).fill(0);
        }
        
        if (data.totalStats) {
          monthlyErrors = data.totalStats.errors || 0;
          monthlyFPS = data.totalStats.fps || 0;
          updateStats();
        }
        
        if (data.tableData && data.tableData.length > 0) {
          populateTable(data.tableData);
        }
        
        isDataLoaded = true;
      }

      function applyDefaultData() {
        machineErrors = Array(14).fill(0);
        originalErrors = Array(14).fill(0);

        isDataLoaded = true;

      function calculateMonthlyErrors() {
        const monthlyErrors = Array(14).fill(0);
        const tableRows = document.querySelectorAll('#tableBody tr');
        
        tableRows.forEach(row => {
          const cells = row.querySelectorAll('td');
          for (let i = 1; i < cells.length; i++) {
            const errorCount = parseInt(cells[i].textContent) || 0;
            monthlyErrors[i - 1] += errorCount;
          }
        });
        
        return monthlyErrors;
      }

        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';
        
        tableData.forEach(row => {
          if (!row.day && row.errors.every(error => error === 0)) return;
          
          const tr = document.createElement('tr');
          const dayCell = document.createElement('td');
          dayCell.textContent = row.day;
          dayCell.style.fontWeight = 'bold';
          tr.appendChild(dayCell);
          
          row.errors.forEach(error => {
            const errorCell = document.createElement('td');
            if (error !== 0) {
              errorCell.textContent = error;
              errorCell.className = 'non-zero';
            }
            tr.appendChild(errorCell);
          });
          
          tableBody.appendChild(tr);
        });
      }

      async function loadTableData() {
        try {
          if (dataCache[selectedDate]?.tableData) {
            populateTable(dataCache[selectedDate].tableData);
            return;
          }
          
          if (window.gapi?.client?.sheets) {
            const dateObj = new Date(selectedDate);
            const sheetName = getSheetNameFromDate(dateObj);
            const tableData = await loadTableDataFromSheets(sheetName);
            if (tableData.length > 0) {
              populateTable(tableData);
              return;
            }
          }
          
          const response = await fetch(`${BACKEND_URL}?date=${encodeURIComponent(selectedDate)}&table=true`, {
            method: 'GET',
            headers: { 'Accept': 'application/json' },
          });
          
          if (!response.ok) throw new Error('Ошибка сети');
          
          const text = await response.text();
          let data;
          try {
            data = JSON.parse(text);
          } catch (e) {
            throw new Error('Неверный формат ответа');
          }
          
          if (data.tableData) {
            populateTable(data.tableData);
          } else {
            populateDemoTable();
          }
          
          if (data.chartData) {
            machineFPS = data.chartData.fps || Array(14).fill(0);
          }
          
          if (data.totalStats) {
            monthlyErrors = data.totalStats.errors || 0;
            monthlyFPS = data.totalStats.fps || 0;
          }
        } catch (error) {
          console.error('Ошибка при загрузке данных таблицы:', error);
          populateDemoTable();
        }
      }

      window.saveData = async function() {
        const now = Date.now();
        if (now - lastSaveTime < SAVE_DEBOUNCE_TIME) {
          return;
        }
        lastSaveTime = now;
        
        showLoader();
        
        try {
          const changes = machineErrors.map((current, index) => current - originalErrors[index]);
          const hasChanges = changes.some(change => change !== 0);
          
          if (!hasChanges) {
            hideLoader();
            return;
          }
          
          const formData = new URLSearchParams();
          formData.append('date', selectedDate);
          formData.append('errors', JSON.stringify(changes));
          
          const response = await fetch(BACKEND_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData
          });
          
          const text = await response.text();
          let result;
          try {
            result = JSON.parse(text);
          } catch (e) {
            throw new Error('Неверный формат ответа');
          }
          
          if (result.success) {
            originalErrors = [...machineErrors];
            
            if (dataCache[selectedDate]) {
              dataCache[selectedDate].errors = [...machineErrors];
            }
            
            forceDisplayUpdate();
            
            if (analyticsLoaded && isAnalysisOpen) {
              if (errorsChart && fpsChart) updateCharts();
              await loadTableData();
              updateStats();
            }
            
            showSaveNotification();
            
          } else {
            throw new Error(result.error || 'Ошибка при сохранении');
          }
        } catch (error) {
          console.error('Ошибка:', error);
          alert('Ошибка при сохранении: ' + error.message);
        } finally {
          hideLoader();
        }
      };

      document.getElementById('date')?.addEventListener('change', function(e) {
        const hasUnsavedChanges = machineErrors.some((current, index) => current !== originalErrors[index]);
        
        if (hasUnsavedChanges) {
          if (!confirm('У вас есть несохраненные изменения. Перейти к другой дате без сохранения?')) {
            this.value = selectedDate;
            return;
          }
        }
        
        selectedDate = e.target.value;
        analyticsLoaded = false;
        isAnalysisOpen = false;
        
        const analysisBtn = document.getElementById('analysisBtn');
        analysisBtn.innerHTML = '<span class="btn-text">АНАЛИЗ</span>';
        
        hideAnalyticsElements();
        loadDataForDate(selectedDate);
      });

      // Обработчик перед уходом со страницы
      window.addEventListener('beforeunload', function(e) {
        const hasUnsavedChanges = machineErrors.some((current, index) => current !== originalErrors[index]);
        
        if (hasUnsavedChanges) {
          e.preventDefault();
          e.returnValue = 'У вас есть несохраненные изменения. Вы уверены, что хотите уйти?';
          return e.returnValue;
        }
      });

      // Проверка авторизации при загрузке
      window.addEventListener('load', function() {
        const isLoggedIn = localStorage.getItem('userLoggedIn') === 'true';
        const email = localStorage.getItem('userEmail');
        const name = localStorage.getItem('userName');
        const pic = localStorage.getItem('userPic');
        
        if (isLoggedIn && email) {
          loginSection.style.display = 'none';
          mainContent.style.display = 'block';
          
          currentUser = {
            email: email,
            name: name,
            picture: pic
          };
          
          updateUserAvatar(currentUser);
          showLoading(true);
          
          loadSheetsAPI()
            .then(() => gapi.client.init({
              apiKey: AUTH_API_KEY,
              discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
            }))
            .then(() => checkEmailInSheet(email))
            .catch(() => {
              signOut();
            });
        } else {
          loginSection.style.display = 'flex';
          mainContent.style.display = 'none';
        }
      });

      // Инициализация Google Identity Services
      window.onload = function() {
        if (google && google.accounts && google.accounts.id) {
          google.accounts.id.initialize({
            client_id: '328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com',
            callback: handleCredentialResponse
          });
          
          google.accounts.id.renderButton(
            document.querySelector('.g_id_signin'),
            { 
              type: 'standard', 
              shape: 'pill', 
              theme: 'outline', 
              text: 'signin_with', 
              size: 'large',
              logo_alignment: 'left'
            }
          );
        }
      };

      // Экспортируем функции в глобальную область
      window.toggleUserDropdown = toggleUserDropdown;
      window.signOut = signOut;
      window.handleCredentialResponse = handleCredentialResponse;
    })();
  </script>
  
  <!-- Добавляем стили для анимации загрузки, если их нет -->
  <style>
    .loader-container {
      display: none;
    }
    .loader-container.active {
      display: flex;
    }
    .loading-spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(220, 20, 60, 0.2);
      border-radius: 50%;
      border-top-color: #dc143c;
      animation: spin 1s ease-in-out infinite;
    }
    .analysis-btn.loading {
      color: transparent;
      pointer-events: none;
      position: relative;
    }
    .analysis-btn.loading::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 20px;
      margin: -10px 0 0 -10px;
      border: 2px solid transparent;
      border-top: 2px solid #dc143c;
      border-radius: 50%;
      animation: buttonSpin 0.8s linear infinite;
    }
    @keyframes buttonSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .analysis-btn.pulse {
      animation: pulse 0.5s ease-in-out;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    .charts-container, .stats-container, .table-container, .yearly-comparison-container {
      transition: opacity 0.5s ease-in-out;
    }
    .chart-wrapper, .stat-card, .data-table {
      transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
    }
  </style>
