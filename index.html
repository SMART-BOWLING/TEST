<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>БРОНИ БИЛЬЯРД | ПАНЕЛЬ</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --primary: #0f172a;
      --accent: #3b82f6;
      --success: #10b981;
      --danger: #ef4444;
      --bg-main: #f1f5f9;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --cell-size: 45px;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* Таблица и Контейнер */
    .table-outer-wrapper {
      width: 100%;
      max-width: 1000px;
      background: var(--card-bg);
      padding: 15px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      position: relative;
    }

    .table-container {
      position: relative;
      overflow-x: auto;
      border-radius: 8px;
      scrollbar-width: thin;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      table-layout: fixed;
      background: white;
    }

    th, td {
      border: 1px solid #e2e8f0;
      text-align: center;
      height: var(--cell-size);
      font-size: 13px;
      position: relative;
    }

    /* Заголовки */
    thead th {
      background: var(--primary);
      color: white;
      font-weight: 700;
      border: none;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .time-col, .time-right {
      background: #f8fafc;
      font-weight: 700;
      color: var(--primary);
      width: 60px !important;
      border-left: 2px solid #cbd5e1;
    }

    /* Сетка и слоты */
    td.slot {
      cursor: pointer;
      transition: background 0.15s;
    }

    /* Цветовое кодирование зон столов */
    td.slot[data-lane="0"], td.slot[data-lane="1"], td.slot[data-lane="2"],
    td.slot[data-lane="4"], td.slot[data-lane="5"] { background: #f0f7ff; }
    td.slot[data-lane="3"] { background: #f0fdf4; }
    td.slot[data-lane] { background: #fff1f2; }

    /* Выделение */
    td.selected {
      background: var(--accent) !important;
      opacity: 0.7;
      color: white;
    }

    td.start-time-chosen {
      background: var(--accent) !important;
      box-shadow: inset 0 0 0 3px white;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    /* Ползунки существующих броней */
    #slidersContainer {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 5;
    }

    .existing-slider {
      position: absolute;
      background: var(--primary);
      border-radius: 4px;
      pointer-events: auto;
      cursor: pointer;
      opacity: 0.85;
      border: 1px solid rgba(255,255,255,0.2);
      transition: transform 0.1s;
    }

    .existing-slider.confirmed { background: var(--success); }
    .existing-slider.rejected { background: var(--danger); }
    .existing-slider:hover { transform: scale(1.02); z-index: 20; opacity: 1; }

    /* Панель управления */
    #controls {
      margin-top: 25px;
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 600px;
    }

    #dateInput {
      flex: 1;
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: var(--radius);
      font-family: inherit;
      font-weight: 600;
    }

    .booking-button {
      flex: 1;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .booking-button:hover { background: #2563eb; transform: translateY(-1px); }

    /* Карточки выбранного */
    #cardsContainer {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 15px 0;
      justify-content: center;
    }

    .booking-card {
      background: #e0f2fe;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--accent);
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--danger);
      font-size: 18px;
      cursor: pointer;
      padding: 0;
    }

    /* Модальные окна */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(4px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal-content {
      background: white;
      width: 100%;
      max-width: 400px;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
    }

    .modal-content h3 { margin: 0 0 20px; color: var(--primary); text-align: center; }

    .input-group { margin-bottom: 15px; }
    .input-group label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; color: #64748b; }
    .input-group input, .input-group textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-family: inherit;
    }

    /* Адаптивность */
    @media (max-width: 600px) {
      :root { --cell-size: 40px; }
      body { padding: 10px; }
      .table-outer-wrapper { padding: 5px; }
      #controls { flex-direction: column; }
    }

    /* Login Screen */
    #login {
      position: fixed;
      inset: 0;
      background: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }
  </style>
</head>
<body>

  <div id="login">
    <img src="https://i.postimg.cc/Z5Vszw0h/STATS-GOOGLE-1.png" width="80" style="margin-bottom: 20px;">
    <h2 style="color: var(--primary); margin-bottom: 30px;">БРОНИ БИЛЬЯРД</h2>
    <div id="g_id_onload"
         data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin" data-type="standard"></div>
  </div>

  <div id="content" style="display:none; width: 100%; max-width: 1000px;">
    
    <div class="table-outer-wrapper">
      <div class="table-container">
        <table id="bookingTable">
          <thead>
            <tr>
              <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th>
              <th>7</th><th>8</th><th>9</th><th>10</th><th>11</th><th>12</th>
              <th class="time-col" id="openImage" style="cursor:pointer; background: var(--accent);">🗺️</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div id="slidersContainer"></div>
      </div>
    </div>

    <div id="cardsContainer"></div>

    <div id="controls">
      <input type="date" id="dateInput" />
      <button class="booking-button" onclick="openModal()">Забронировать</button>
    </div>

    <div id="modal" class="modal-overlay">
      <div class="modal-content">
        <h3>Новая бронь</h3>
        <div class="input-group">
          <label>ВАШЕ ИМЯ</label>
          <input id="nameInput" placeholder="Иван Иванов">
        </div>
        <div class="input-group">
          <label>ТЕЛЕФОН</label>
          <input id="phoneInput" type="tel" placeholder="+380...">
        </div>
        <div class="input-group">
          <label>КОММЕНТАРИЙ</label>
          <textarea id="commentInput" rows="3"></textarea>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
          <button onclick="submitForm()" style="flex: 2; background: var(--success); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer;">ПОДТВЕРДИТЬ</button>
          <button onclick="closeModal()" style="flex: 1; background: #f1f5f9; border: none; padding: 12px; border-radius: 10px; cursor: pointer;">ОТМЕНА</button>
        </div>
      </div>
    </div>

    <div id="bookingInfoPopup" class="modal-overlay">
      <div class="modal-content" style="max-width: 350px;">
        <h3 id="info-table-title">Стол №</h3>
        <div style="font-size: 14px; line-height: 1.6;">
          <p><strong>Время:</strong> <span id="info-time"></span></p>
          <p><strong>Имя:</strong> <span id="info-name"></span></p>
          <p><strong>Тел:</strong> <span id="info-phone"></span></p>
          <p><strong>Пришел?</strong> <span id="info-confirmed"></span></p>
        </div>
        <div style="display: flex; gap: 8px; margin-top: 20px;">
          <button onclick="confirmBooking(true)" style="flex:1; background: var(--success); color: white; border:none; padding: 10px; border-radius: 8px;">ДА</button>
          <button onclick="confirmBooking(false)" style="flex:1; background: var(--danger); color: white; border:none; padding: 10px; border-radius: 8px;">НЕТ</button>
        </div>
        <button onclick="deleteBooking()" style="width:100%; margin-top: 10px; background: #64748b; color: white; border:none; padding: 10px; border-radius: 8px;">УДАЛИТЬ</button>
        <button onclick="closeBookingInfoPopup()" style="width:100%; margin-top: 10px; background: none; border: 1px solid #ccc; padding: 8px; border-radius: 8px;">ЗАКРЫТЬ</button>
      </div>
    </div>

    <div id="imagePopup" class="modal-overlay" onclick="closeImagePopup()">
      <div style="max-width: 90vw; background: white; padding: 10px; border-radius: 15px;">
        <img src="https://i.postimg.cc/52ZDKDKw/55.png" style="width: 100%; height: auto; border-radius: 10px;" />
      </div>
    </div>

    <div id="loadingOverlay" style="display:none; position: fixed; inset: 0; background: rgba(255,255,255,0.7); z-index: 3000; justify-content: center; align-items: center;">
       <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite;"></div>
    </div>

  </div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxfRLDGA29FrqKS61HmYN_FUnDwOydeCaEdeW4oc4wyroQzvb4h1OnwQ5HeotIHhcj9/exec";
  const allowedEmails = ["vadiksss900@gmail.com", "sergey99belov@gmail.com", "popadinecvasil3@gmail.com", "veronicadiakova04@gmail.com", "info.luckystrike.kh@gmail.com", "sashavolobuev123890@gmail.com", "egorgorbushko@gmail.com", "shatrava.o@gmail.com", "Craftmax30@gmail.com", "bowlingblock.b@gmail.com", "lana.arnaut@gmail.com", "polosinnikita1224@gmail.com", "sofialat1506@gmail.com", "ken040888@gmail.com"];

  // Auth logic
  function handleCredentialResponse(response) {
    const data = parseJwt(response.credential);
    if (allowedEmails.includes(data.email)) {
      localStorage.setItem("userEmail", data.email);
      location.reload();
    } else { alert("Доступ запрещён: " + data.email); }
  }

  function parseJwt(token) {
    return JSON.parse(decodeURIComponent(escape(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')))));
  }

  window.onload = () => {
    const email = localStorage.getItem("userEmail");
    if (email && allowedEmails.includes(email)) {
      document.getElementById("login").style.display = "none";
      document.getElementById("content").style.display = "block";
      initApp();
    }
  };

  // App Logic
  let currentLane = null, currentStart = null, currentBookingId = null;
  const intervalsByLane = {};
  const timeSlots = [];
  for (let h = 11; h <= 22; h++) {
    timeSlots.push({ display: `${h}:00`, key: h });
    if (h < 22) timeSlots.push({ display: `${h}:30`, key: h + 0.5 });
  }

  function initApp() {
    const tableBody = document.getElementById("tableBody");
    const dateInput = document.getElementById('dateInput');
    dateInput.value = new Date().toISOString().split('T')[0];

    timeSlots.forEach(slot => {
      const row = document.createElement("tr");
      for (let lane = 0; lane < 12; lane++) {
        const cell = document.createElement("td");
        cell.className = "slot";
        cell.dataset.lane = lane;
        cell.dataset.time = slot.key;
        row.appendChild(cell);
      }
      const timeCell = document.createElement("th");
      timeCell.className = "time-right";
      timeCell.textContent = slot.display;
      row.appendChild(timeCell);
      tableBody.appendChild(row);
    });

    loadExisting();
    
    tableBody.onclick = (e) => {
      const cell = e.target.closest('td.slot, th.time-right');
      if (!cell) return;

      if (cell.classList.contains('slot')) {
        currentLane = +cell.dataset.lane;
        document.querySelectorAll('.slot').forEach(c => c.classList.remove('start-time-chosen'));
        document.querySelectorAll(`td[data-lane="${currentLane}"]`).forEach(c => c.style.borderLeft = "2px solid var(--accent)");
      } else if (cell.classList.contains('time-right')) {
        if (currentLane === null) return;
        const time = parseFloat(cell.textContent.includes(":30") ? cell.textContent.replace(":30",".5") : cell.textContent.replace(":00",".0"));
        
        if (currentStart === null) {
          currentStart = time;
          const sc = document.querySelector(`td[data-lane="${currentLane}"][data-time="${time}"]`);
          if (sc) sc.classList.add('start-time-chosen');
        } else {
          if (time <= currentStart) return alert("Конец должен быть позже начала");
          if (!intervalsByLane[currentLane]) intervalsByLane[currentLane] = [];
          intervalsByLane[currentLane].push({ start: currentStart, end: time });
          currentStart = null;
          currentLane = null;
          updateUI();
        }
      }
    };
  }

  function updateUI() {
    document.querySelectorAll('.slot').forEach(c => {
      c.classList.remove('selected', 'start-time-chosen');
      c.style.borderLeft = "";
    });
    
    const container = document.getElementById("cardsContainer");
    container.innerHTML = "";

    for (let lane in intervalsByLane) {
      intervalsByLane[lane].forEach((iv, idx) => {
        document.querySelectorAll(`td[data-lane="${lane}"]`).forEach(cell => {
          const t = parseFloat(cell.dataset.time);
          if (t >= iv.start && t < iv.end) cell.classList.add('selected');
        });

        const card = document.createElement("div");
        card.className = "booking-card";
        card.innerHTML = `Стол ${+lane+1} | ${formatTime(iv.start)}-${formatTime(iv.end)} <button class="close-btn" onclick="removeIv(${lane}, ${idx})">&times;</button>`;
        container.appendChild(card);
      });
    }
  }

  function removeIv(lane, idx) {
    intervalsByLane[lane].splice(idx, 1);
    updateUI();
  }

  async function loadExisting() {
    const loader = document.getElementById("loadingOverlay");
    loader.style.display = "flex";
    const sliders = document.getElementById("slidersContainer");
    sliders.innerHTML = "";
    
    try {
      const res = await fetch(`${GAS_URL}?action=get&date=${document.getElementById('dateInput').value}`);
      const data = await res.json();
      
      data.bookings?.forEach(b => {
        const laneIdx = b.table - 1;
        const startCell = document.querySelector(`td[data-lane="${laneIdx}"][data-time="${b.start}"]`);
        const endCell = document.querySelector(`td[data-lane="${laneIdx}"][data-time="${b.end}"]`);
        
        if (startCell && endCell) {
          const rect = startCell.getBoundingClientRect();
          const parentRect = document.querySelector('.table-container').getBoundingClientRect();
          const slider = document.createElement("div");
          slider.className = "existing-slider " + (b.confirmed === "Да" ? "confirmed" : b.confirmed === "Нет" ? "rejected" : "");
          
          slider.style.left = (startCell.offsetLeft) + "px";
          slider.style.top = (startCell.offsetTop) + "px";
          slider.style.width = startCell.offsetWidth + "px";
          slider.style.height = (endCell.offsetTop - startCell.offsetTop) + "px";
          
          slider.onclick = () => showBookingInfo(b);
          sliders.appendChild(slider);
        }
      });
    } finally { loader.style.display = "none"; }
  }

  function showBookingInfo(b) {
    currentBookingId = b.id;
    document.getElementById('info-table-title').textContent = "Стол №" + b.table;
    document.getElementById('info-time').textContent = `${formatTime(b.start)} - ${formatTime(b.end)}`;
    document.getElementById('info-name').textContent = b.name;
    document.getElementById('info-phone').textContent = b.phone;
    document.getElementById('info-confirmed').textContent = b.confirmed || "Ожидание";
    document.getElementById('bookingInfoPopup').style.display = "flex";
  }

  async function confirmBooking(status) {
    const loader = document.getElementById("loadingOverlay");
    loader.style.display = "flex";
    await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "confirm", id: currentBookingId, confirmed: status }) });
    closeBookingInfoPopup();
    loadExisting();
  }

  async function deleteBooking() {
    if (!confirm("Удалить?")) return;
    const loader = document.getElementById("loadingOverlay");
    loader.style.display = "flex";
    await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "delete", id: currentBookingId }) });
    closeBookingInfoPopup();
    loadExisting();
  }

  async function submitForm() {
    const name = document.getElementById("nameInput").value;
    const phone = document.getElementById("phoneInput").value;
    const date = document.getElementById("dateInput").value;
    const bookings = [];
    
    for (let lane in intervalsByLane) {
      intervalsByLane[lane].forEach(iv => {
        bookings.push({ date, tableNumber: +lane+1, start: iv.start, end: iv.end, name, phone, comment: document.getElementById("commentInput").value });
      });
    }
    
    if (!bookings.length) return alert("Выберите время");
    
    document.getElementById("loadingOverlay").style.display = "flex";
    await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ bookings }) });
    location.reload();
  }

  function openModal() { document.getElementById("modal").style.display = "flex"; }
  function closeModal() { document.getElementById("modal").style.display = "none"; }
  function closeBookingInfoPopup() { document.getElementById("bookingInfoPopup").style.display = "none"; }
  function formatTime(v) { return `${Math.floor(v)}:${v % 1 === 0.5 ? "30" : "00"}`; }
  document.getElementById("openImage").onclick = () => document.getElementById("imagePopup").style.display = "flex";
  function closeImagePopup() { document.getElementById("imagePopup").style.display = "none"; }
  document.getElementById("dateInput").onchange = loadExisting;
</script>

<style> @keyframes spin { 100% { transform: rotate(360deg); } } </style>
</body>
</html>
