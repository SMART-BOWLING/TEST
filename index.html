<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>SMB-LS-KH | Мульти-выполнение</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        :root {
            --bg-page: #f4f6f9;
            --card-white: #ffffff;
            --accent-red: #dc143c;
            --accent-dark: #1a2f40;
            --border-light: #e9eef2;
            --text-dark: #1e2a3a;
            --text-muted: #5c6f87;
            --shadow-sm: 0 2px 6px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
            --shadow-md: 0 6px 14px rgba(0,0,0,0.05);
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-dark);
            min-height: 100vh;
            padding: 0;
            margin: 0;
            font-weight: 500;
        }

        /* header фиксированный */
        header {
            background-color: #1f2937;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            backdrop-filter: blur(0px);
            padding-top: max(10px, env(safe-area-inset-top));
        }

        .logo img { width: 40px; height: 40px; object-fit: cover; cursor: pointer; }
        .site-name { flex: 1; text-align: center; font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: #4a5568; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid rgba(255,255,255,0.6); }
        .user-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .user-dropdown { display: none; position: absolute; top: 70px; right: 20px; background: #1f2937; border-radius: 12px; overflow: hidden; z-index: 9999; min-width: 150px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .user-dropdown a { padding: 12px 16px; color: white; text-decoration: none; display: flex; align-items: center; gap: 10px; transition: 0.2s; cursor: pointer; }
        .user-dropdown a:hover { background: #374151; }

        /* основной контент */
        .main-container { max-width: 1400px; margin: 0 auto; padding: 80px 20px 30px; }
        
        /* вкладки */
        .tabs-wrapper { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; border-bottom: 1px solid var(--border-light); padding-bottom: 12px; }
        .tab-btn { background: transparent; border: none; padding: 10px 20px; font-size: 15px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-radius: 40px; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .tab-btn i { font-size: 16px; }
        .tab-btn.active { background: var(--accent-red); color: white; box-shadow: 0 2px 6px rgba(220,20,60,0.2); }
        .tab-badge { background: #dc143c; color: white; border-radius: 30px; padding: 2px 8px; font-size: 12px; font-weight: 700; margin-left: 8px; }
        
        /* панель даты и мульти-действия */
        .action-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin: 20px 0 24px; background: white; padding: 12px 18px; border-radius: 60px; box-shadow: var(--shadow-sm); }
        .date-picker-mini { position: relative; display: flex; align-items: center; gap: 8px; background: #f8fafc; padding: 5px 16px; border-radius: 40px; border: 1px solid #e2e8f0; }
        .date-picker-mini i { color: var(--accent-red); font-size: 14px; }
        #date-filter-input { border: none; background: transparent; font-weight: 500; font-size: 14px; padding: 8px 0; width: 140px; cursor: pointer; outline: none; }
        .multi-select-panel { display: flex; align-items: center; gap: 12px; background: #f1f5f9; padding: 5px 16px; border-radius: 40px; }
        .multi-select-panel span { font-size: 13px; font-weight: 500; color: #1e293b; }
        .batch-submit-btn { background: var(--accent-red); border: none; padding: 8px 18px; border-radius: 32px; color: white; font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .batch-submit-btn:disabled { background: #94a3b8; cursor: not-allowed; opacity: 0.6; }
        .clear-selection { background: #e2e8f0; border: none; padding: 6px 12px; border-radius: 30px; font-size: 12px; font-weight: 500; cursor: pointer; }
        
        /* сетка карточек */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 10px; }
        .task-card { background: var(--card-white); border-radius: 20px; box-shadow: var(--shadow-md); overflow: hidden; transition: all 0.2s; border: 1px solid var(--border-light); position: relative; }
        .task-card.selected { border: 2px solid var(--accent-red); background: #fffafb; box-shadow: 0 8px 20px rgba(220,20,60,0.12); }
        .card-checkbox { position: absolute; top: 16px; left: 16px; z-index: 5; }
        .card-checkbox input { width: 22px; height: 22px; cursor: pointer; accent-color: var(--accent-red); transform: scale(1); margin: 0; }
        .task-header { padding: 16px 16px 12px 48px; border-bottom: 2px solid var(--accent-red); }
        .task-title { font-size: 16px; font-weight: 700; color: #000; }
        .card-content { padding: 0; }
        .content-row { display: flex; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #f0f2f5; }
        .row-label { font-weight: 700; color: #1f2a3e; font-size: 13px; }
        .row-value { font-weight: 600; color: #0f172a; text-align: right; }
        .buttons-container { display: flex; gap: 10px; padding: 14px 16px; border-top: 1px solid #edf2f7; background: #fafcff; }
        .schema-button, .submit-btn, .submitted-text { flex: 1; text-align: center; padding: 10px 6px; border-radius: 14px; font-size: 13px; font-weight: 600; transition: 0.2s; cursor: pointer; border: none; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .schema-button { background: #1e293b; color: white; text-decoration: none; }
        .submit-btn { background: var(--accent-red); color: white; }
        .submitted-text { background: #eef2ff; color: #1e293b; }
        .no-open { background: #f1f5f9; color: #64748b; flex: 1; border-radius: 14px; padding: 10px; font-size: 12px; text-align: center; }
        .pagination { display: flex; justify-content: center; gap: 10px; margin: 30px 0 20px; flex-wrap: wrap; }
        .page-btn { background: white; border: 1px solid #cbd5e1; padding: 8px 14px; border-radius: 30px; font-weight: 600; cursor: pointer; transition: 0.1s; }
        .page-btn.active { background: var(--accent-red); color: white; border-color: var(--accent-red); }
        
        /* модалка подтверждения массового выполнения */
        .confirm-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 20000; backdrop-filter: blur(4px); }
        .confirm-modal-content { background: white; border-radius: 28px; padding: 28px 24px; max-width: 340px; width: 90%; text-align: center; box-shadow: 0 20px 35px rgba(0,0,0,0.2); }
        .confirm-modal-icon { width: 56px; height: 56px; background: #dc143c; border-radius: 60px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
        .confirm-modal-icon i { font-size: 28px; color: white; }
        .confirm-modal-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 24px; }
        .confirm-modal-btn { padding: 10px 22px; border-radius: 40px; font-weight: 600; border: none; cursor: pointer; }
        .confirm-modal-btn.confirm { background: #dc143c; color: white; }
        .confirm-modal-btn.cancel { background: #e2e8f0; color: #1e293b; }
        
        .loader-container { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 30000; }
        .loader-container.active { display: flex; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.3); border-top: 5px solid #dc143c; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @media (max-width: 640px) {
            .action-bar { flex-direction: column; align-items: stretch; border-radius: 24px; }
            .multi-select-panel { justify-content: space-between; }
            .cards-grid { grid-template-columns: 1fr; }
        }
        .loading-screen { position: fixed; inset:0; background:#1f2937; display:flex; align-items:center; justify-content:center; z-index:40000; transition:0.5s; }
        .fade-out { opacity:0; pointer-events:none; }
        #login-section { display: none; justify-content: center; align-items: center; min-height: 100vh; background: #f4f6f9; }
        #login-container { background: white; border-radius: 32px; padding: 32px; text-align: center; max-width: 400px; width: 90%; }
    </style>
</head>
<body>
<div class="loading-screen" id="loadingScreen"><div class="spinner"></div></div>
<div class="loader-container" id="loader"><div class="spinner"></div></div>
<div id="login-section"><div id="login-container"><div style="margin-bottom:16px;"><i class="fas fa-bowling-ball" style="font-size:40px;color:#dc143c;"></i></div><h2 style="color:#1e293b;">LUCKY STRIKE KH</h2><div class="login-subtitle" style="margin:10px 0 20px;">Доступ по авторизации</div><div id="g_id_onload" data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div><div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-text="signin_with" data-size="large"></div></div></div>
<div id="main-content" style="display:none;">
    <header><div class="logo"><a href="https://smart-bowling.github.io/SMB/"><img src="https://i.postimg.cc/wjGzSY92/1.png" alt="Logo"></a></div><div class="site-name">LUCKY STRIKE KH</div><div class="user-avatar" id="userAvatar" onclick="toggleUserDropdown()"><i class="fas fa-user"></i></div><div class="user-dropdown" id="userDropdown"><a href="#" onclick="signOut()"><i class="fas fa-sign-out-alt"></i> Выйти</a></div></header>
    <div class="main-container">
        <div class="tabs-wrapper">
            <button class="tab-btn active" data-tab="tab1"><i class="fas fa-wrench"></i> МЕХАНИК <span class="tab-badge" id="mechanic-badge">0</span></button>
            <button class="tab-btn" data-tab="tab2"><i class="fas fa-user-tie"></i> ИНСТРУКТОР <span class="tab-badge" id="instructor-badge">0</span></button>
            <button class="tab-btn" data-tab="tab3"><i class="fas fa-bowling-ball"></i> КЛУБ <span class="tab-badge" id="club-badge">0</span></button>
        </div>
        <div class="action-bar">
            <div class="date-picker-mini"><i class="fas fa-calendar-alt"></i><input type="text" id="date-filter-input" placeholder="Все даты" readonly></div>
            <div class="multi-select-panel"><span><i class="far fa-check-square"></i> Мульти-выбор</span><button id="clearSelectionBtn" class="clear-selection">Снять все</button><button id="batchCompleteBtn" class="batch-submit-btn"><i class="fas fa-tasks"></i> Выполнить выбранные (<span id="selectedCount">0</span>)</button></div>
        </div>
        <div id="tab1" class="tab-content active"><div class="cards-grid" id="journal-cards"></div><div class="pagination" id="journal-pagination"></div></div>
        <div id="tab2" class="tab-content"><div class="cards-grid" id="instructor-cards"></div><div class="pagination" id="instructor-pagination"></div></div>
        <div id="tab3" class="tab-content"><div class="cards-grid" id="engineer-cards"></div><div class="pagination" id="engineer-pagination"></div></div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://npmcdn.com/flatpickr/dist/l10n/ru.js"></script>
<script>
    // ---- КОНФИГУРАЦИЯ (полностью рабочая) ----
    const AUTH_SPREADSHEET_ID = '1-yiVdZYa6wJdupTiuiHvI_ht3Vu73RUjyCehZqs2cJ4';
    const AUTH_SHEET_NAME = '1';
    const AUTH_API_KEY = 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0';
    const CURRENT_SITE = 'https://smart-bowling.github.io/SMB-LS-KH/';
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbyBiibLN40TjLDo1pz69ogyUgERUBhuCcmmkXDCgvS3fUGbt6ifyt_Lh9f3gg8yXZOA/exec';
    const CARDS_PER_PAGE = 50;
    let currentUser = null, currentUserNameFromSheet = null;
    let originalJournalData = null;
    let journalData = [], instructorData = [], engineerData = [];
    let currentJournalPage=1, currentInstructorPage=1, currentEngineerPage=1;
    let totalJournalPages=1, totalInstructorPages=1, totalEngineerPages=1;
    let isFilterActive=false, currentFilterDate='', filterType='journal';
    let datePicker = null;
    // Хранилище выбранных задач (ключ: `${tabType}_${rowIndex}`)
    let selectedTasksMap = new Map(); // key -> { tabType, rowIndex, taskId }
    
    const loadingScreen = document.getElementById("loadingScreen");
    const loginSection = document.getElementById("login-section");
    const mainContent = document.getElementById("main-content");
    const loader = document.getElementById("loader");
    
    function showLoader() { loader.classList.add('active'); }
    function hideLoader() { loader.classList.remove('active'); }
    function updateBadges() {
        document.getElementById('mechanic-badge').innerText = journalData.filter(t=>!t.isCompleted).length;
        document.getElementById('instructor-badge').innerText = instructorData.filter(t=>!t.isCompleted).length;
        document.getElementById('club-badge').innerText = engineerData.filter(t=>!t.isCompleted).length;
    }
    function toggleUserDropdown() { const d=document.getElementById("userDropdown"); d.style.display = d.style.display==="block"?"none":"block"; }
    function updateUserAvatar(u) { const a=document.getElementById('userAvatar'); if(u?.picture) a.innerHTML=`<img src="${u.picture}">`; else a.innerHTML='<i class="fas fa-user"></i>'; }
    
    // Google auth
    function handleCredentialResponse(resp) { try { const p=JSON.parse(atob(resp.credential.split('.')[1])); currentUser={ email:p.email.toLowerCase(), name:p.name, picture:p.picture }; showLoading(true); initAndCheckEmail(); } catch(e){ alert('Ошибка входа'); } }
    function showLoading(show){ const c=document.getElementById('login-container'); if(show) c.innerHTML='<div class="spinner" style="margin:20px auto;"></div><div>Проверка...</div>'; else if(c.getAttribute('data-original')) c.innerHTML=c.getAttribute('data-original'); }
    async function initAndCheckEmail(){ await loadSheetsAPI(); await gapi.client.init({ apiKey:AUTH_API_KEY, discoveryDocs:['https://sheets.googleapis.com/$discovery/rest?version=v4'] }); await checkEmailInSheet(currentUser.email); }
    async function loadSheetsAPI(){ return new Promise((res,rej)=>{ gapi.load('client',{callback:res,onerror:()=>rej()}); }); }
    async function checkEmailInSheet(email){ try{ const resp=await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId:AUTH_SPREADSHEET_ID, range:`${AUTH_SHEET_NAME}!A:Z` }); const rows=resp.result.values; let ok=false,foundName=null; for(let r of rows){ if(r[0]?.toLowerCase().trim()===email){ for(let j=1;j<r.length;j++) if(r[j]?.trim().split('?')[0]===CURRENT_SITE) ok=true; if(r[1]) foundName=r[1]; break; } } if(ok){ currentUserNameFromSheet=foundName||currentUser.name; loginUser(currentUser); } else { showLoading(false); alert('Доступ запрещён'); } } catch(e){ alert('Ошибка верификации'); } }
    function loginUser(payload){ loginSection.style.display='none'; mainContent.style.display='block'; updateUserAvatar(payload); localStorage.setItem('userLoggedIn','true'); localStorage.setItem('userEmail',payload.email); localStorage.setItem('userNameFromSheet',currentUserNameFromSheet); initializeApp(); setTimeout(()=>loadingScreen.classList.add('fade-out'),300); }
    function signOut(){ localStorage.clear(); mainContent.style.display='none'; loginSection.style.display='flex'; if(google?.accounts?.id) google.accounts.id.disableAutoSelect(); }
    
    // API
    async function makeRequest(url,options={}){ const res=await fetch(url+(url.includes('?')?'&':'?')+'_='+Date.now(),options); return res.json(); }
    async function completeTask(taskId, executorName, rowIndex){ const updateUrl=`${BACKEND_URL}?action=updateCell&sheetName=B&column=E&row=${rowIndex}&value=${encodeURIComponent(executorName)}`; const result=await makeRequest(updateUrl); if(result.success){ await makeRequest(`${BACKEND_URL}?action=updateFromRowNumber&rowNumber=${rowIndex}`); return true; } return false; }
    
    // Загрузка данных
    async function loadAllData(){ const journal=await makeRequest(`${BACKEND_URL}?action=getJournal`); originalJournalData=[...journal]; journalData=journal.filter(t=>['PS','МЕХ','ps','мех'].some(k=>(t.task||'').toLowerCase().includes(k.toLowerCase()))); instructorData=journal.filter(t=>['ИНСТ','инст'].some(k=>(t.task||'').toLowerCase().includes(k.toLowerCase()))); engineerData=journal.filter(t=>(t.task||'').toLowerCase().includes('клуб')); if(isFilterActive && currentFilterDate){ if(filterType==='journal') journalData=journalData.filter(t=>t.completedDate===currentFilterDate); else if(filterType==='instructor') instructorData=instructorData.filter(t=>t.completedDate===currentFilterDate); else engineerData=engineerData.filter(t=>t.completedDate===currentFilterDate); } updateBadges(); }
    
    // Отрисовка с поддержкой чекбоксов (только для незавершённых)
    function renderCards(containerId, data, type, pageVar, totalVarSetter, paginationId) {
        let page = (type==='journal'?currentJournalPage:(type==='instructor'?currentInstructorPage:currentEngineerPage));
        const totalPages = Math.ceil(data.length/CARDS_PER_PAGE)||1;
        if(type==='journal'){ totalJournalPages=totalPages; if(currentJournalPage>totalPages) currentJournalPage=1; page=currentJournalPage; }
        else if(type==='instructor'){ totalInstructorPages=totalPages; if(currentInstructorPage>totalPages) currentInstructorPage=1; page=currentInstructorPage; }
        else { totalEngineerPages=totalPages; if(currentEngineerPage>totalPages) currentEngineerPage=1; page=currentEngineerPage; }
        const start=(page-1)*CARDS_PER_PAGE;
        const pageData=data.slice(start, start+CARDS_PER_PAGE);
        const container=document.getElementById(containerId);
        if(!pageData.length){ container.innerHTML='<div class="task-card"><div style="padding:20px;text-align:center;">Нет задач</div></div>'; updatePagination(paginationId,type); return; }
        let html='';
        pageData.forEach(t=>{
            const row=t.rowIndex;
            const hasLink=t.driveLink?.trim();
            const taskId=t.id||t.driveLink||`row_${row}`;
            const isCompleted=t.isCompleted;
            const selectedKey=`${type}_${row}`;
            const isSelected=selectedTasksMap.has(selectedKey) && !isCompleted;
            const checkedAttr = (isSelected && !isCompleted) ? 'checked' : '';
            const disabledAttr = isCompleted ? 'disabled' : '';
            const cardClass = `task-card ${isSelected ? 'selected' : ''} ${isCompleted ? 'completed' : 'pending'}`;
            html+=`<div class="${cardClass}" data-row="${row}" data-type="${type}" data-taskid="${taskId}">`;
            if(!isCompleted){ html+=`<div class="card-checkbox"><input type="checkbox" class="task-selector" data-row="${row}" data-type="${type}" data-taskid="${taskId}" ${checkedAttr}></div>`; }
            html+=`<div class="task-header"><div class="task-title">${t.task}</div></div><div class="card-content">`;
            html+=`<div class="content-row"><span class="row-label">Дата появления:</span><span class="row-value">${t.createdDate}</span></div>`;
            html+=`<div class="content-row"><span class="row-label">Дата выполнения:</span><span class="row-value">${t.completedDate||'-'}</span></div>`;
            html+=`<div class="content-row"><span class="row-label">Выполнил:</span><span class="row-value">${isCompleted ? `<span class="executor-name">${t.executor}</span>` : '-'}</span></div>`;
            html+=`</div><div class="buttons-container">`;
            if(hasLink) html+=`<a href="#" onclick="openDriveLink('${t.driveLink}')" class="schema-button"><i class="fas fa-file-alt"></i> ОТКРЫТЬ</a>`;
            else html+=`<div class="no-open">Недоступно</div>`;
            if(!isCompleted) html+=`<button class="submit-btn" onclick="submitSingleTask(event,'${taskId}',${row},'${type}')"><i class="fas fa-paper-plane"></i> ВЫПОЛНИТЬ</button>`;
            else html+=`<div class="submitted-text"><i class="fas fa-check-circle"></i> ВЫПОЛНЕНО</div>`;
            html+=`</div></div>`;
        });
        container.innerHTML=html;
        updatePagination(paginationId,type);
        attachCheckboxEvents();
        updateSelectedCounter();
    }
    
    function attachCheckboxEvents(){ document.querySelectorAll('.task-selector').forEach(cb=>{ cb.removeEventListener('change', handleCheckboxChange); cb.addEventListener('change', handleCheckboxChange); }); }
    function handleCheckboxChange(e){ const cb=e.target; const row=parseInt(cb.dataset.row); const type=cb.dataset.type; const taskId=cb.dataset.taskid; const key=`${type}_${row}`; if(cb.checked) selectedTasksMap.set(key,{ tabType:type, rowIndex:row, taskId }); else selectedTasksMap.delete(key); updateSelectedHighlight(key, cb.checked, type, row); updateSelectedCounter(); }
    function updateSelectedHighlight(key, isChecked, type, row){ const cardDiv=document.querySelector(`.task-card[data-row="${row}"][data-type="${type}"]`); if(cardDiv){ if(isChecked) cardDiv.classList.add('selected'); else cardDiv.classList.remove('selected'); } }
    function updateSelectedCounter(){ document.getElementById('selectedCount').innerText=selectedTasksMap.size; const batchBtn=document.getElementById('batchCompleteBtn'); if(batchBtn) batchBtn.disabled=selectedTasksMap.size===0; }
    function clearSelection(){ selectedTasksMap.clear(); renderCurrentTab(); }
    
    async function submitSingleTask(event, taskId, rowIndex, tabType){ event.stopPropagation(); showConfirmModal([{rowIndex, tabType, taskId}], true); }
    async function submitBatchTasks(){ if(selectedTasksMap.size===0) return; const tasks=[...selectedTasksMap.values()]; showConfirmModal(tasks, false); }
    
    function showConfirmModal(tasks, isSingle){ const modal=document.createElement('div'); modal.className='confirm-modal'; const count=tasks.length; const msg=isSingle ? 'Выполнить эту задачу?' : `Вы уверены? Будет выполнено ${count} задач(и) одновременно.`; modal.innerHTML=`<div class="confirm-modal-content"><div class="confirm-modal-icon"><i class="fas fa-clipboard-list"></i></div><div class="confirm-modal-title">Подтверждение</div><div class="confirm-modal-message">${msg}</div><div class="confirm-modal-buttons"><button class="confirm-modal-btn confirm" id="confirmMassYes">Да, выполнить</button><button class="confirm-modal-btn cancel" id="confirmMassNo">Отмена</button></div></div>`; document.body.appendChild(modal); const confirmBtn=modal.querySelector('#confirmMassYes'); const cancelBtn=modal.querySelector('#confirmMassNo'); confirmBtn.onclick=async()=>{ modal.remove(); await executeTasks(tasks); }; cancelBtn.onclick=()=>modal.remove(); modal.onclick=(e)=>{if(e.target===modal) modal.remove();}; }
    
    async function executeTasks(tasks){ showLoader(); let successCount=0; for(let t of tasks){ const ok=await completeTask(t.taskId, currentUserNameFromSheet, t.rowIndex); if(ok) successCount++; } await refreshAllData(); clearSelection(); renderCurrentTab(); hideLoader(); alert(`✅ Выполнено задач: ${successCount} из ${tasks.length}`); }
    
    async function refreshAllData(){ await loadAllData(); updateBadges(); }
    function renderCurrentTab(){ const activeTab=document.querySelector('.tab-content.active')?.id; if(activeTab==='tab1') renderJournalCards(); else if(activeTab==='tab2') renderInstructorCards(); else if(activeTab==='tab3') renderEngineerCards(); }
    function renderJournalCards(){ renderCards('journal-cards', journalData, 'journal', currentJournalPage, null, 'journal-pagination'); }
    function renderInstructorCards(){ renderCards('instructor-cards', instructorData, 'instructor', currentInstructorPage, null, 'instructor-pagination'); }
    function renderEngineerCards(){ renderCards('engineer-cards', engineerData, 'engineer', currentEngineerPage, null, 'engineer-pagination'); }
    
    function updatePagination(paginationId, type){ const pag=document.getElementById(paginationId); if(!pag) return; let cur=1,tot=1; if(type==='journal'){ cur=currentJournalPage; tot=totalJournalPages; } else if(type==='instructor'){ cur=currentInstructorPage; tot=totalInstructorPages; } else { cur=currentEngineerPage; tot=totalEngineerPages; } let html=`<button class="page-btn" onclick="changePage('${type}',-1)" ${cur===1?'disabled':''}>‹</button><span class="page-info">${cur} / ${tot}</span><button class="page-btn" onclick="changePage('${type}',1)" ${cur===tot?'disabled':''}>›</button>`; pag.innerHTML=html; pag.style.display=tot>1?'flex':'none'; }
    
    function changePage(type, dir){ if(type==='journal'){ let newPage=currentJournalPage+dir; if(newPage>=1 && newPage<=totalJournalPages){ currentJournalPage=newPage; renderJournalCards(); } } else if(type==='instructor'){ let newPage=currentInstructorPage+dir; if(newPage>=1 && newPage<=totalInstructorPages){ currentInstructorPage=newPage; renderInstructorCards(); } } else { let newPage=currentEngineerPage+dir; if(newPage>=1 && newPage<=totalEngineerPages){ currentEngineerPage=newPage; renderEngineerCards(); } } window.scrollTo({top:0,behavior:'smooth'}); }
    
    function initDatePicker(){ const input=document.getElementById('date-filter-input'); datePicker=flatpickr(input,{ locale:"ru", dateFormat:"d.m.Y", onChange:(dates,dateStr)=>{ if(dateStr){ currentFilterDate=dateStr; isFilterActive=true; filterType=document.querySelector('.tab-content.active')?.id==='tab1'?'journal':(document.querySelector('.tab-content.active')?.id==='tab2'?'instructor':'engineer'); applyFilterToActive(); } else { clearDateFilter(); } } }); }
    function applyFilterToActive(){ const activeId=document.querySelector('.tab-content.active')?.id; if(activeId==='tab1'){ journalData=(originalJournalData||[]).filter(t=>t.completedDate===currentFilterDate && ['PS','МЕХ','ps','мех'].some(k=>(t.task||'').toLowerCase().includes(k.toLowerCase()))); currentJournalPage=1; renderJournalCards(); } else if(activeId==='tab2'){ instructorData=(originalJournalData||[]).filter(t=>t.completedDate===currentFilterDate && ['ИНСТ','инст'].some(k=>(t.task||'').toLowerCase().includes(k.toLowerCase()))); currentInstructorPage=1; renderInstructorCards(); } else if(activeId==='tab3'){ engineerData=(originalJournalData||[]).filter(t=>t.completedDate===currentFilterDate && (t.task||'').toLowerCase().includes('клуб')); currentEngineerPage=1; renderEngineerCards(); } updateBadges(); clearSelection(); }
    function clearDateFilter(){ isFilterActive=false; currentFilterDate=''; document.getElementById('date-filter-input').value=''; refreshAllData().then(()=>renderCurrentTab()); }
    
    function initializeApp(){ showLoader(); initDatePicker(); refreshAllData().then(()=>{ renderJournalCards(); renderInstructorCards(); renderEngineerCards(); hideLoader(); }); document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); btn.classList.add('active'); const id=btn.getAttribute('data-tab'); document.getElementById(id).classList.add('active'); clearSelection(); if(isFilterActive && currentFilterDate) applyFilterToActive(); else refreshAllData().then(()=>renderCurrentTab()); })); document.getElementById('batchCompleteBtn').addEventListener('click',()=>submitBatchTasks()); document.getElementById('clearSelectionBtn').addEventListener('click',()=>{ clearSelection(); renderCurrentTab(); }); setInterval(()=>refreshAllData().then(()=>renderCurrentTab()), 35000); }
    
    window.openDriveLink=(link)=>{ if(link) window.open(link.includes('drive.google.com')?`https://drive.google.com/uc?export=view&id=${(link.match(/\/d\/([^\/]+)/)||[])[1]||''}`:link,'_blank'); };
    window.submitSingleTask=submitSingleTask; window.changePage=changePage; window.toggleUserDropdown=toggleUserDropdown; window.signOut=signOut;
    
    // авто-логин
    window.addEventListener('load',()=>{ const logged=localStorage.getItem('userLoggedIn')==='true', email=localStorage.getItem('userEmail'); if(logged && email){ loginSection.style.display='none'; mainContent.style.display='block'; currentUser={ email, name:localStorage.getItem('userNameFromSheet'), picture:localStorage.getItem('userPic') }; currentUserNameFromSheet=localStorage.getItem('userNameFromSheet'); updateUserAvatar(currentUser); loadSheetsAPI().then(()=>gapi.client.init({ apiKey:AUTH_API_KEY, discoveryDocs:['https://sheets.googleapis.com/$discovery/rest?version=v4'] })).then(()=>checkEmailInSheet(email)).catch(()=>signOut()); } else { loginSection.style.display='flex'; mainContent.style.display='none'; setTimeout(()=>loadingScreen.classList.add('fade-out'),200); } });
</script>
</body>
