<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>ДЕТАЛИ KH</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/dtSpKx0W/1.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    :root {
      --primary: #dc143c;
      --dark: #1f2937;
      --bg: #f0f2f5;
      --header-h: 120px;
    }

    body { margin: 0; background: var(--bg); font-family: 'Segoe UI', Arial, sans-serif; }

    /* --- ШАПКА --- */
    header {
      background-color: var(--dark);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      height: var(--header-h);
    }

    .logo img { width: 80px; height: 80px; object-fit: contain; }

    .site-name {
      font-weight: 800;
      font-size: 38px;
      text-align: center;
      flex-grow: 1;
      letter-spacing: 1px;
    }

    /* --- ПОИСК В ШАПКЕ --- */
    .search-box {
      display: flex;
      align-items: center;
      position: relative;
    }

    #headerSearchInput {
      position: absolute;
      right: 0;
      width: 0;
      opacity: 0;
      height: 50px;
      border-radius: 25px;
      border: 2px solid var(--primary);
      padding: 0;
      font-size: 18px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      outline: none;
    }

    #headerSearchInput.active {
      width: 250px;
      opacity: 1;
      padding: 0 50px 0 20px;
      background: white;
    }

    .search-btn {
      width: 60px;
      height: 60px;
      background: var(--primary);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 24px;
      cursor: pointer;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(220, 20, 60, 0.3);
    }

    /* --- ПАНЕЛЬ УПРАВЛЕНИЯ (НОВАЯ СТРУКТУРА) --- */
    .action-bar {
      display: flex;
      background: white;
      margin: calc(var(--header-h) + 15px) 15px 20px;
      border-radius: 20px;
      padding: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      gap: 10px;
      align-items: center;
    }

    .filter-group {
      flex: 2;
      position: relative;
      display: flex;
      align-items: center;
      background: #f8f9fa;
      border-radius: 15px;
      padding: 0 15px;
      height: 60px;
      border: 1px solid #e5e7eb;
    }

    .filter-group i { color: var(--primary); margin-right: 10px; font-size: 18px; }

    .filter-group select {
      width: 100%;
      background: transparent;
      border: none;
      font-size: 18px;
      font-weight: 600;
      color: var(--dark);
      outline: none;
      cursor: pointer;
    }

    .add-btn-circle {
      width: 60px;
      height: 60px;
      background: var(--dark);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      flex-shrink: 0;
    }

    .add-btn-circle:hover { background: var(--primary); transform: translateY(-2px); }

    /* --- КОНТЕНТ --- */
    #content { padding: 0 15px 100px; max-width: 1300px; margin: 0 auto; }
    
    .cards { 
      display: grid; 
      grid-template-columns: 1fr; 
      gap: 20px; 
    }

    .card {
      background: white;
      border-radius: 25px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
      border: 1px solid #eee;
    }

    .image-holder {
      width: 100%;
      padding-top: 70%;
      background: #eee;
      position: relative;
    }

    .image-holder img {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
    }

    .card-info { padding: 20px; }

    .card-title { font-size: 22px; font-weight: 700; margin-bottom: 15px; color: var(--dark); }

    .card-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .qty-badge {
      background: #f3f4f6;
      padding: 12px 20px;
      border-radius: 15px;
      font-weight: 800;
      font-size: 20px;
      color: var(--primary);
    }

    .btn-qty {
      flex: 1;
      height: 55px;
      border: none;
      border-radius: 15px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
    }

    .btn-take { background: var(--primary); color: white; }
    .btn-add { background: var(--dark); color: white; }

    /* --- АДАПТИВ --- */
    @media (min-width: 1025px) {
      :root { --header-h: 80px; }
      .site-name { font-size: 30px; text-align: left; margin-left: 20px; }
      .cards { grid-template-columns: repeat(3, 1fr); }
      .action-bar { max-width: 1300px; margin-left: auto; margin-right: auto; }
      .add-btn-circle { width: auto; padding: 0 25px; border-radius: 15px; }
      .add-btn-circle span { display: inline; margin-left: 10px; font-size: 16px; }
    }

    @media (max-width: 1024px) {
      .add-btn-circle span { display: none; }
    }

    /* Лоадер */
    .loader-wrap { position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 2000; display: none; justify-content: center; align-items: center; }
    .spinner { width: 50px; height: 50px; border: 5px solid #ddd; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="loader-wrap" id="loader"><div class="spinner"></div></div>

<header>
  <div class="logo">
    <img src="https://i.postimg.cc/wjGzSY92/1.png" alt="Logo">
  </div>
  
  <div class="site-name">LUCKY STRIKE KH</div>

  <div class="search-box">
    <input type="text" id="headerSearchInput" placeholder="Поиск детали...">
    <button class="search-btn" onclick="toggleSearch()">
      <i class="fas fa-search" id="searchIcon"></i>
    </button>
  </div>
</header>

<div id="login" style="position:fixed; inset:0; background:white; z-index:5000; display:flex; flex-direction:column; justify-content:center; align-items:center;">
  <h2 style="color:var(--dark); margin-bottom:20px;">Авторизация</h2>
  <div id="g_id_onload" data-client_id="328749588235-bgfeukqogpoq2ha65j7j0vk840hctiaq.apps.googleusercontent.com" data-callback="onSignIn"></div>
  <div class="g_id_signin" data-type="standard"></div>
</div>

<div id="content">
  <div class="action-bar">
    <div class="filter-group">
      <i class="fas fa-filter"></i>
      <select id="sortSelect">
        <option value="all">Все запчасти</option>
        <option value="popular">Популярные (30 дн)</option>
        <option value="sortByQty">Мало на складе</option>
      </select>
    </div>
    
    <button class="add-btn-circle" onclick="window.open('https://smart-bowling.github.io/ADD-PARTS-KH/', '_blank')">
      <i class="fas fa-plus"></i>
      <span>Добавить деталь</span>
    </button>
  </div>

  <div class="cards" id="cardsContainer"></div>
</div>

<script>
  // Логика поиска
  function toggleSearch() {
    const input = document.getElementById('headerSearchInput');
    const icon = document.getElementById('searchIcon');
    input.classList.toggle('active');
    
    if(input.classList.contains('active')) {
      input.focus();
      icon.classList.replace('fa-search', 'fa-times');
    } else {
      input.value = '';
      icon.classList.replace('fa-times', 'fa-search');
      filterData('');
    }
  }

  function filterData(term) {
    const container = document.getElementById('cardsContainer');
    const cards = container.getElementsByClassName('card');
    const val = term.toLowerCase();
    
    Array.from(cards).forEach(card => {
      const txt = card.textContent.toLowerCase();
      card.style.display = txt.includes(val) ? '' : 'none';
    });
  }

  document.getElementById('headerSearchInput').addEventListener('input', (e) => {
    filterData(e.target.value);
  });

  // Имитация входа (для демонстрации структуры)
  function onSignIn(resp) {
    document.getElementById('login').style.display = 'none';
    document.body.style.overflow = 'auto';
    loadMockData();
  }

  function loadMockData() {
    const container = document.getElementById('cardsContainer');
    // Здесь будет ваш цикл отрисовки из Google Sheets
    for(let i=1; i<=6; i++) {
      container.innerHTML += `
        <div class="card">
          <div class="image-holder"><img src="https://via.placeholder.com/400x300?text=Part+${i}"></div>
          <div class="card-info">
            <div class="card-title">Деталь #${i} - Название</div>
            <div class="card-actions">
              <div class="qty-badge">12 шт</div>
              <button class="btn-qty btn-add">ВЗЯТЬ</button>
              <button class="btn-qty btn-take">ДОБ.</button>
            </div>
          </div>
        </div>
      `;
    }
  }
</script>
</body>
</html>
