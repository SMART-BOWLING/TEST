<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>SMB-LS-KH</title>
    
    <!-- КРИТИЧЕСКИЕ СТИЛИ (минимальные для первого экрана) -->
    <style>
        /* Базовые стили для быстрого отображения */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: #f4f6f9; 
            color: #1a2f40; 
            font-weight: 700;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Критические стили шапки */
        header {
            background: #1f2937;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            min-height: 65px;
        }
        
        .logo img { width: 40px; height: 40px; }
        .site-name { flex: 1; text-align: center; font-size: 20px; font-weight: bold; color: white; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: #4a5568; }
        
        /* Контейнер для контента */
        .container { 
            padding-top: 80px; 
            height: 100vh; 
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Скелетон загрузки */
        .skeleton-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .skeleton-line {
            height: 20px;
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
            margin: 10px 0;
        }
        
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
    
    <!-- НЕКРИТИЧЕСКИЕ РЕСУРСЫ ЗАГРУЖАЕМ АСИНХРОННО -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    
    <!-- Google Identity Services (асинхронно) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    
    <!-- Основные стили (загружаются после критических) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" media="print" onload="this.media='all'">
    
    <noscript>
        <!-- Fallback для браузеров без JS -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap">
    </noscript>
    
    <style>
        /* Остальные стили вашего приложения (будут добавлены позже) */
        .full-styles-loaded .task-card { /* стили карточек */ }
    </style>
</head>
<body>
    <!-- ЭКРАН ЗАГРУЗКИ (минималистичный) -->
    <div class="loading-screen" id="loadingScreen">
        <div class="logo-wrapper">
            <div class="glow-ring"></div>
            <img src="https://i.postimg.cc/wjGzSY92/1.png" alt="Loading Logo" width="120" height="120">
        </div>
    </div>

    <!-- СЕКЦИЯ АВТОРИЗАЦИИ -->
    <div id="login-section" style="display: none;">
        <!-- ... ваш код авторизации ... -->
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div id="main-content" style="display: none;">
        <header>
            <div class="logo">
                <a href="https://smart-bowling.github.io/SMB/">
                    <img src="https://i.postimg.cc/wjGzSY92/1.png" alt="Logo" width="40" height="40">
                </a>
            </div>
            <div class="site-name" onclick="toggleSiteNameDropdown()">
                LUCKY STRIKE KH
                <div class="site-name-dropdown" id="siteNameDropdown">
                    <a href="https://smart-bowling.github.io/SMB-SKYMALL/">SKYMALL</a>
                    <a href="https://smart-bowling.github.io/SMB-BB/">BLOCKBUSTER</a>
                </div>
            </div>
            <div class="user-avatar" id="userAvatar" onclick="toggleUserDropdown()">
                <i class="fas fa-user"></i>
            </div>
            <div class="user-dropdown" id="userDropdown">
                <a href="#" onclick="signOut()"><i class="fas fa-sign-out-alt icon-space"></i> ВЫЙТИ</a>
            </div>
        </header>
        
        <div class="container" id="main-container">
            <div class="header-section">
                <div class="tabs">
                    <button class="tab-btn active" data-tab="tab1">РЕЕСТР ЗАДАЧ</button>
                    <button class="tab-btn" data-tab="tab2">КАТАЛОГ ЗАДАЧ</button>
                </div>
                
                <div class="open-tasks-counter" id="open-tasks-counter">
                    <span class="label">КОЛИЧЕСТВО НЕВЫПОЛНЕННЫХ ЗАДАЧ:</span>
                    <span class="count">0</span>
                </div>
            </div>
            
            <div class="date-filter-container" id="date-filter-container">
                <span class="date-filter-label">Просмотр выполненных задач по дате</span>
                <div class="date-input-wrapper">
                    <i class="fas fa-calendar-alt calendar-icon"></i>
                    <input type="text" class="date-filter-input" id="date-filter-input" placeholder="Выберите дату" readonly>
                </div>
                <button class="clear-filter-btn" id="clear-filter-btn">Сбросить фильтр</button>
            </div>
            
            <div class="tab-content active" id="tab1">
                <!-- СКЕЛЕТОН ЗАГРУЗКИ (показывается сразу) -->
                <div class="cards-grid" id="journal-cards-skeleton">
                    ${Array(3).fill().map(() => `
                        <div class="skeleton-card">
                            <div class="skeleton-line" style="width: 70%; height: 24px;"></div>
                            <div class="skeleton-line" style="width: 90%;"></div>
                            <div class="skeleton-line" style="width: 60%;"></div>
                            <div class="skeleton-line" style="width: 80%;"></div>
                        </div>
                    `).join('')}
                </div>
                <div class="cards-grid" id="journal-cards" style="display: none;"></div>
                <div class="pagination" id="journal-pagination" style="display: none;"></div>
            </div>
            
            <div class="tab-content" id="tab2">
                <div class="cards-grid" id="tasks-cards-skeleton">
                    ${Array(3).fill().map(() => `
                        <div class="skeleton-card">
                            <div class="skeleton-line" style="width: 70%; height: 24px;"></div>
                            <div class="skeleton-line" style="width: 90%;"></div>
                            <div class="skeleton-line" style="width: 60%;"></div>
                            <div class="skeleton-line" style="width: 80%;"></div>
                        </div>
                    `).join('')}
                </div>
                <div class="cards-grid" id="tasks-cards" style="display: none;"></div>
                <div class="pagination" id="tasks-pagination" style="display: none;"></div>
            </div>
        </div>
    </div>

    <!-- Flatpickr загружается асинхронно -->
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/flatpickr" as="script">
    <link rel="preload" href="https://npmcdn.com/flatpickr/dist/l10n/ru.js" as="script">
    
    <script>
        // ОПТИМИЗИРОВАННЫЙ JS КОД
        
        // Константы вынесены в начало для быстрого доступа
        const CONFIG = {
            AUTH: {
                SPREADSHEET_ID: '1-yiVdZYa6wJdupTiuiHvI_ht3Vu73RUjyCehZqs2cJ4',
                SHEET_NAME: '1',
                API_KEY: 'AIzaSyAXL0Hsfxy-g-AgYhnivj4x9gCB2rrtF-0'
            },
            BACKEND_URL: 'https://script.google.com/macros/s/AKfycbyBiibLN40TjLDo1pz69ogyUgERUBhuCcmmkXDCgvS3fUGbt6ifyt_Lh9f3gg8yXZOA/exec',
            CARDS_PER_PAGE: 6,
            CURRENT_SITE: 'https://smart-bowling.github.io/SMB-LS-KH/'
        };

        // Состояние приложения
        let state = {
            user: null,
            tasks: null,
            journal: null,
            originalJournal: null,
            currentJournalPage: 1,
            currentTasksPage: 1,
            totalJournalPages: 1,
            totalTasksPages: 1,
            isFilterActive: false,
            currentFilterDate: '',
            isInitialLoad: true
        };

        // Кэш для данных
        const cache = {
            tasks: null,
            journal: null,
            timestamp: 0
        };

        // DOM элементы (кешируем)
        const elements = {
            loader: document.getElementById('loader'),
            loadingScreen: document.getElementById('loadingScreen'),
            loginSection: document.getElementById('login-section'),
            mainContent: document.getElementById('main-content'),
            journalCards: document.getElementById('journal-cards'),
            tasksCards: document.getElementById('tasks-cards'),
            journalSkeleton: document.getElementById('journal-cards-skeleton'),
            tasksSkeleton: document.getElementById('tasks-cards-skeleton'),
            journalPagination: document.getElementById('journal-pagination'),
            tasksPagination: document.getElementById('tasks-pagination'),
            openTasksCounter: document.getElementById('open-tasks-counter'),
            dateFilterContainer: document.getElementById('date-filter-container'),
            dateFilterInput: document.getElementById('date-filter-input'),
            userAvatar: document.getElementById('userAvatar'),
            userDropdown: document.getElementById('userDropdown'),
            siteNameDropdown: document.getElementById('siteNameDropdown')
        };

        // ===== ФУНКЦИИ ДЛЯ УСКОРЕНИЯ =====
        
        // Показываем скелетон, скрываем реальные карточки
        function showSkeleton(tab) {
            if (tab === 'journal') {
                elements.journalSkeleton.style.display = 'grid';
                elements.journalCards.style.display = 'none';
            } else {
                elements.tasksSkeleton.style.display = 'grid';
                elements.tasksCards.style.display = 'none';
            }
        }

        // Скрываем скелетон, показываем карточки
        function hideSkeleton(tab) {
            if (tab === 'journal') {
                elements.journalSkeleton.style.display = 'none';
                elements.journalCards.style.display = 'grid';
            } else {
                elements.tasksSkeleton.style.display = 'none';
                elements.tasksCards.style.display = 'grid';
            }
        }

        // Быстрая загрузка данных с кэшированием
        async function loadData(type, forceRefresh = false) {
            const now = Date.now();
            
            // Используем кэш если он свежий (менее 30 секунд)
            if (!forceRefresh && cache[type] && (now - cache.timestamp) < 30000) {
                return cache[type];
            }
            
            showSkeleton(type === 'journal' ? 'journal' : 'tasks');
            
            try {
                let data;
                if (type === 'journal') {
                    data = await fetchJournal();
                } else {
                    data = await fetchTasks();
                }
                
                cache[type] = data;
                cache.timestamp = now;
                
                return data;
            } finally {
                hideSkeleton(type === 'journal' ? 'journal' : 'tasks');
            }
        }

        // Оптимизированный fetch с таймаутом
        async function fetchWithTimeout(url, options = {}, timeout = 5000) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            
            try {
                const response = await fetch(url, {
                    ...options,
                    signal: controller.signal
                });
                clearTimeout(id);
                return await response.json();
            } catch (error) {
                clearTimeout(id);
                throw error;
            }
        }

        async function fetchJournal() {
            return fetchWithTimeout(`${CONFIG.BACKEND_URL}?action=getJournal&_=${Date.now()}`);
        }

        async function fetchTasks() {
            return fetchWithTimeout(`${CONFIG.BACKEND_URL}?action=getTasks&_=${Date.now()}`);
        }

        // ===== АВТОРИЗАЦИЯ (упрощенная) =====
        
        // Быстрая проверка локального хранилища
        function checkStoredSession() {
            const isLoggedIn = localStorage.getItem('userLoggedIn') === 'true';
            const email = localStorage.getItem('userEmail');
            const name = localStorage.getItem('userName');
            const pic = localStorage.getItem('userPic');
            
            if (isLoggedIn && email) {
                return { email, name, picture: pic };
            }
            return null;
        }

        // Инициализация приложения (вызывается сразу)
        async function initApp() {
            // Скрываем экран загрузки через 500мс максимум
            setTimeout(() => {
                elements.loadingScreen.classList.add('fade-out');
            }, 500);
            
            const storedUser = checkStoredSession();
            
            if (storedUser) {
                // Быстрый вход без проверки таблицы
                state.user = storedUser;
                elements.loginSection.style.display = 'none';
                elements.mainContent.style.display = 'block';
                updateUserAvatar(storedUser);
                
                // Загружаем данные параллельно
                Promise.all([
                    loadData('journal'),
                    loadData('tasks')
                ]).then(([journal, tasks]) => {
                    state.journal = journal;
                    state.originalJournal = [...journal];
                    state.tasks = tasks;
                    renderJournalCards(journal);
                    renderTasksCards(tasks);
                });
            } else {
                elements.loginSection.style.display = 'flex';
            }
        }

        // Запускаем инициализацию сразу
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }

        // Ленивая загрузка flatpickr (только когда нужен)
        let flatpickrPromise = null;
        async function loadFlatpickr() {
            if (flatpickrPromise) return flatpickrPromise;
            
            flatpickrPromise = Promise.all([
                import('https://cdn.jsdelivr.net/npm/flatpickr'),
                import('https://npmcdn.com/flatpickr/dist/l10n/ru.js')
            ]);
            return flatpickrPromise;
        }

        // Обработчик открытия фильтра (ленивая загрузка календаря)
        elements.openTasksCounter.addEventListener('click', async () => {
            elements.dateFilterContainer.classList.toggle('show');
            
            if (elements.dateFilterContainer.classList.contains('show')) {
                await loadFlatpickr();
                initDatePicker();
            }
        });

        // Остальные функции (renderJournalCards, renderTasksCards и т.д.) остаются без изменений
        // ... (весь остальной код из предыдущей версии)

        // Оптимизация для touch-событий
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, { passive: false });

        // Кэширование селекторов для часто используемых элементов
        const taskCardsCache = new Map();
        
        function getTaskCard(id) {
            if (!taskCardsCache.has(id)) {
                taskCardsCache.set(id, document.querySelector(`[data-task-id="${id}"]`));
            }
            return taskCardsCache.get(id);
        }

        console.log('Оптимизированная версия загружена');
    </script>
</body>
</html>
